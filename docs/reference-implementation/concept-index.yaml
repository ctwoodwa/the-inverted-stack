  kleppmann-property-glossary:
    P1: No spinners — fast, work happens locally
    P2: Your work is not trapped on one device
    P3: The network is optional
    P4: Seamless collaboration with colleagues
    P5: The Long Now — data outlives vendor and subscription
    P6: Security and privacy by default
    P7: You retain ultimate ownership and control
  kill-triggers-by-property:
    P1:
    - Conformance regresses below 95% for 3 consecutive sprints
    - Any user-facing operation crosses 100ms ceiling for common operations
    - Main-thread isolation guarantee violated in CI
    P2:
    - Any data class accessible only on one device by accident (vs. by intentional locality policy)
    - Device addition takes >5 minutes including data sync
    - Conformance regresses below 90% for 3 consecutive sprints
    P3:
    - Any 'you must be online' error path discovered in core function
    - Reconnection after offline interval loses any pending operations
    - Conformance regresses below 95% for 3 consecutive sprints
    P4:
    - Concurrent edits do not converge after sync within reasonable bounded time
    - Per-resource permission bypass discovered
    - Collaborator revocation does not propagate to all peers within 24h
    - Conformance regresses below 90% for 3 consecutive sprints
    P5:
    - Any data unreadable after 50 simulated years (format migration test)
    - Any custody chain breaks across one generational handoff in test
    - Any decision marked irreversible without explicit reversibility-budget consideration
    - Conformance regresses below 90% for 3 consecutive sprints
    P6:
    - Discovery of architectural backdoor in design — full architectural review
    - Any content readable by relay (zero-knowledge violation)
    - Cryptographic primitive discovered with known weakness — algorithm migration triggered
    - Endpoint compromise scope undocumented for any major data class
    - Conformance regresses below 95% for 3 consecutive sprints
    P7:
    - Any data not exportable in open format
    - Any deletion that doesn't propagate within reasonable bounded time
    - Any sharing grant that cannot be revoked
    - Any algorithmic decision affecting user without explanation path
    - Key-loss recovery path inadequate (no multi-sig OR custodian OR paper-key fallback)
    - Conformance regresses below 90% for 3 consecutive sprints
  schema-version-note: v1.1 — added security-axis, applies-to-roles, failed-conditions per concept; kill-triggers
    per primitive cluster (this metadata field). See SCHEMA.md.
concepts:
- chapter: preface
  id: PREF-01
  name: The architectural thesis — local node as primary, vendor as optional
  source: preface §"(opening)"
  source-paper: v13 preface
  definition: 'The book''s central thesis is the inversion of the SaaS dependency relationship: the local
    node is the primary data plane and the vendor relay is an optional accelerator, so the application
    survives vendor withdrawal.'
  must-implement:
  - Application reads and writes hit local storage as the primary data plane
  - No application function depends on cloud reachability for core operation
  - Vendor relay services are optional accelerators, not required dependencies
  - Application continues to function when the vendor service is unreachable, withdrawn, or sanctioned
  verification: Disconnect the application from all vendor services (network block of vendor domains);
    application performs all core read, write, and local collaboration operations identically to the connected
    state.
  kleppmann-properties:
  - P3
  - P5
  - P7
  scope: foundational
  failure-modes:
  - vendor-outage
  - vendor-acquisition
  - data-residency-objection
  tags:
  - thesis
  - architecture
  - philosophy
  - inversion
  notes: This is the book's defining concept; every later concept either implements it or stress-tests
    it.
  failed-conditions:
  - 'Fails to satisfy: Application reads and writes hit local storage as the primary data plane'
  - 'Fails to satisfy: No application function depends on cloud reachability for core operation'
  - Vendor relay services are not optional accelerators, not required dependencies
  - Application continues to function when the vendor service is not unreachable, withdrawn, or sanctioned
  - 'Verification check does not pass: Disconnect the application from all vendor services (network block
    of vendor domains); application performs all core rea...'
- chapter: preface
  id: PREF-02
  name: SaaS tenancy as a withdrawable dependency
  source: preface §"(opening)"
  source-paper: v13 preface
  definition: SaaS tenancy is an external dependency that can be withdrawn unilaterally by the vendor,
    evidenced by the 2022 Adobe/Autodesk/Microsoft/Figma suspensions across Russia and the CIS that locked
    organizations out of their own data on infrastructure they had paid for.
  must-implement: []
  verification: null
  kleppmann-properties:
  - P5
  - P7
  scope: foundational
  failure-modes:
  - vendor-outage
  - vendor-acquisition
  - data-residency-objection
  tags:
  - thesis
  - motivation
  - framing
  - vendor-risk
  notes: Canonical real-world evidence cited throughout the book for the vendor-withdrawal failure mode.
  failed-conditions: []
- chapter: preface
  id: PREF-03
  name: Offline as daily operating condition, not edge case
  source: preface §"(opening)"
  source-paper: v13 preface
  definition: Intermittent or absent connectivity is the baseline operating condition for enterprise users
    across Sub-Saharan Africa, rural India, tier-3 Latin American cities, and much of Southeast Asia,
    so offline-first is a primary requirement rather than a degraded mode.
  must-implement:
  - Application has no degraded mode when offline; offline behavior matches online behavior for core operations
  - Application is usable on intermittent connectivity without user-visible spinners on local actions
  verification: Run the application on a connection that drops for hours at a time; user can complete
    every core workflow during the disconnected windows with no behavioral difference from connected operation.
  kleppmann-properties:
  - P1
  - P3
  scope: foundational
  failure-modes:
  - vendor-outage
  tags:
  - motivation
  - offline
  - global-south
  - framing
  failed-conditions:
  - Application has not no degraded mode when offline; offline behavior matches online behavior for core
    operations
  - Application is not usable on intermittent connectivity without user-visible spinners on local actions
