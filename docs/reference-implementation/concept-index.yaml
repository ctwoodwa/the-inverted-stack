- chapter: appendix-f-regulatory-coverage
  id: COMP-15
  name: Russian import-substitution market-access requirement
  source: appendix-f §"Импортозамещение (Import Substitution Policy)"
  source-paper: null
  definition: A Russian state procurement policy mandating preference for domestically-produced software,
    treated not as a data protection law but as a market-access requirement that a locally-deployed on-device
    build on domestically-licensed components can satisfy where cloud-resident SaaS cannot.
  must-implement:
  - State-sector Russian deployments use components on the domestic licensing register
  - Build provenance for state-sector deployments is documented to support procurement audits
  - The deployment topology distinguishes state-sector tenants from commercial tenants
  verification: A state-sector procurement audit confirms domestic component licensing and locally-deployed
    build provenance for the tenant's nodes
