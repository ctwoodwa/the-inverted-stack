- id: LENS-E-01
  name: MDM compliance attestation at capability negotiation
  source: ch05 §"What Voss Scored Well"
  source-paper: v13 §16
  definition: Before a node joins the sync mesh and exchanges data, it must present a valid compliance
    attestation from the organization's Mobile Device Management platform during capability negotiation,
    with non-compliant nodes rejected at the gate rather than after data exchange.
  must-implement:
  - Sync daemon handshake includes an MDM compliance attestation phase before capability exchange completes
  - A node failing the compliance attestation is rejected before any data frame is transmitted
  - Compliance is validated continuously at the point of access, not only at installation time
  - Attestation freshness is enforced; expired attestations cause rejection
  verification: Sync daemon protocol specification defines a pre-capability MDM compliance phase; behavioral
    test confirms a node with revoked or expired MDM attestation is rejected at handshake before receiving
    any record payload.
  kleppmann-properties:
  - P6
  scope: inverted-stack-specific
  failure-modes:
  - key-compromise
  tags:
  - enterprise
  - mdm
  - sync
  - handshake
  security-axis:
  - authenticity
  failed-conditions:
  - Sync daemon handshake does not include an MDM compliance attestation phase before capability exchange
    completes
  - A node failing the compliance attestation is not rejected before any data frame is transmitted
  - Compliance is not validated continuously at the point of access, not only at installation time
  - Attestation freshness is not enforced; expired attestations cause rejection
  - 'Verification check does not pass: Sync daemon protocol specification defines a pre-capability MDM
    compliance phase; behavioral test confirms a node with r...'
- id: LENS-E-02
  name: Platform-agnostic MDM integration with regional coverage
  source: ch05 §"What Voss Scored Well"
  source-paper: v13 §16
  definition: The MDM compliance attestation protocol is platform-agnostic at the architecture level and
    ships with documented integration patterns for at least the dominant Western and non-Western enterprise
    MDM platforms used in target markets.
  must-implement:
  - Compliance attestation protocol defines a platform-neutral interface, not a vendor-specific binding
  - Documented integration patterns exist for Intune, Jamf, and SCCM
  - Documented integration patterns exist for SOTI MobiControl, IBM MaaS360, and Ivanti Endpoint Manager
  - At least six MDM platforms are named with concrete integration guidance
  verification: Architecture documentation enumerates the supported MDM platforms with per-platform integration
    guides; protocol specification shows the attestation interface accepts attestations from any conforming
    MDM source.
