- id: LENS-E-06
  name: Defined incident response runbook
  source: 'ch05 §"The Blocking Issue: No Incident Response Procedure"'
  source-paper: null
  definition: A formal incident response runbook accompanies the architecture, specifying triggering events,
    artifact collection sequence, chain of custody requirements, escalation path, and jurisdiction-specific
    regulatory notification windows, distinct from and complementary to the CRDT audit trail.
  must-implement:
  - Runbook enumerates the triggering events (suspected unauthorized node access, unauthorized device
    in sync mesh, key compromise, relay-traffic exfiltration)
  - Runbook specifies which artifacts are collected from which systems in what order
  - Runbook defines chain-of-custody procedures for collected artifacts
  - Runbook defines escalation timing (CISO within one hour, legal within four hours when personal data
    is implicated)
  - Runbook enumerates per-jurisdiction regulatory notification windows (GDPR Article 33 72 hours, HIPAA
    60 days, DPDP, PIPA, PIPL, NDPR, POPIA, LGPD, 242-FZ) with cross-reference to Appendix F
  verification: Companion runbook document exists alongside architecture spec; runbook contains each enumerated
    section; tabletop exercise executes the runbook end-to-end against a simulated incident.
  kleppmann-properties:
  - P6
  - P7
  scope: foundational
  failure-modes:
  - key-compromise
  tags:
  - incident-response
  - compliance
  - runbook
  - governance
