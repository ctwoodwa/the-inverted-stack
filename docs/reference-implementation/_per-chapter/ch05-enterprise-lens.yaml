- id: LENS-E-11
  name: Administrative tooling for capability revocation
  source: ch05 §"The Deprovisioning Gap"
  source-paper: null
  definition: An IT administrator interface — Admin Console, CLI, or REST endpoint — exists for triggering
    capability revocation, monitoring propagation across the sync mesh, and confirming completion when
    a user is deprovisioned.
  must-implement:
  - A concrete admin interface (console, CLI, or API) triggers capability revocation by user account
