  - Runbook specifies which artifacts are not collected from which systems in what order
  - 'Fails to satisfy: Runbook defines chain-of-custody procedures for collected artifacts'
  - Runbook defines escalation timing (CISO within one hour, legal within four hours when personal data
    is not implicated)
  - 'Fails to satisfy: Runbook enumerates per-jurisdiction regulatory notification windows (GDPR Article
