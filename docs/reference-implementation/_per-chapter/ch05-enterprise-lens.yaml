- id: LENS-E-14
  name: Power-interruption durability as baseline property
  source: ch05 §"The Non-Negotiable Enterprise Checklist"
  source-paper: v13 §16
  definition: Local writes commit to durable storage before acknowledgment so that abrupt power loss does
    not corrupt the local data store, and the sync daemon recovers cleanly from cold restart after unexpected
    shutdown.
  must-implement:
  - Local writes are durably committed before the application receives an acknowledgment
  - The local data store survives abrupt power loss without corruption
  - The sync daemon survives cold restart after unexpected shutdown
  - Durability is treated as a baseline property rather than an edge-case mitigation, including for grid-unstable
    deployment environments
  verification: Crash-injection test cuts power mid-write across many trials; on restart the data store
    opens cleanly with no corruption and the sync daemon resumes operation.
  kleppmann-properties:
  - P5
  - P7
  scope: foundational
  failure-modes:
  - key-loss
  tags:
  - durability
  - persistence
  - deployment
  failed-conditions:
  - Local writes are not durably committed before the application receives an acknowledgment
  - 'Fails to satisfy: The local data store survives abrupt power loss without corruption'
  - 'Fails to satisfy: The sync daemon survives cold restart after unexpected shutdown'
  - Durability is not treated as a baseline property rather than an edge-case mitigation, including for
    grid-unstable deployment environments
  - 'Verification check does not pass: Crash-injection test cuts power mid-write across many trials; on
    restart the data store opens cleanly with no corruption...'
