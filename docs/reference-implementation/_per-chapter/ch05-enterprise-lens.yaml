- id: LENS-E-12
  name: Four-phase reversible migration model
  source: ch05 §"The Migration Path"
  source-paper: v13 §16
  definition: Organizations transition from hosted tools to the local node through a four-phase model
    — shadow mode, partial offline editing, new-project authority, full historical migration — where each
    phase is independently reversible and admits indefinite pause.
  must-implement:
  - Phase one runs the local node in shadow mode with no authoritative writes
  - Phase two enables offline editing for non-conflicting data domains while the hosted platform remains
    active for the rest
  - Phase three grants the local node full authority for new projects while legacy records remain hosted
  - Phase four migrates historical records via bulk import that preserves record history
  - Each phase is independently reversible; rollback to the prior phase is supported
  - Each phase transition has documented success criteria and rough timing heuristics for change advisory
    board review
  verification: Migration playbook documents each phase with entry, exit, and rollback procedures plus
    rough timing heuristics (e.g., four to eight weeks shadow-mode with sync error rate below 0.1 percent
    before phase two).
  kleppmann-properties:
  - P5
  - P7
  scope: inverted-stack-specific
  failure-modes:
  - vendor-acquisition
  - vendor-outage
  tags:
  - migration
  - deployment
  - governance
  failed-conditions:
  - 'Fails to satisfy: Phase one runs the local node in shadow mode with no authoritative writes'
  - 'Fails to satisfy: Phase two enables offline editing for non-conflicting data domains while the hosted
    platform remains active for the rest'
  - Phase three does not grant the local node full authority for new projects while legacy records remain
    hosted
  - Phase four does not migrate historical records via bulk import that preserves record history
  - Each phase is not independently reversible; rollback to the prior phase is supported
  - Each phase transition has not documented success criteria and rough timing heuristics for change advisory
    board review
  - 'Verification check does not pass: Migration playbook documents each phase with entry, exit, and rollback
    procedures plus rough timing heuristics (e.g., fo...'
