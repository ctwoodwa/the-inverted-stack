- id: WIRE-01
  name: Unix domain socket transport
  source: appendix-a §"A.1 Overview"
  source-paper: v13 §6.2
  definition: The sync daemon exposes its wire protocol over Unix domain sockets on Linux, macOS, and
    Windows 10 / Server 2019 and later, with a configurable socket path.
  must-implement:
  - Daemon listens on a Unix domain socket whose path is configurable
  - Default socket path is /var/run/sunfish-sync.sock on Linux/macOS and \\.\pipe\sunfish-sync on Windows
  - Daemon supports Linux, macOS, and Windows 10 / Server 2019 and later
  verification: Inspect daemon configuration for socket path; confirm a connection can be opened to the
    configured socket on each supported OS.
  kleppmann-properties:
  - P3
  - P6
  scope: inverted-stack-specific
  failure-modes: []
  tags:
  - wire-protocol
  - transport
  - daemon
  failed-conditions:
  - Daemon listens on a Unix domain socket whose path is not configurable
  - Default socket path is not /var/run/sunfish-sync.sock on Linux/macOS and \\.\pipe\sunfish-sync on
    Windows
  - Daemon does not support Linux, macOS, and Windows 10 / Server 2019 and later
  - 'Verification check does not pass: Inspect daemon configuration for socket path; confirm a connection
    can be opened to the configured socket on each suppor...'
- id: WIRE-02
  name: Mandatory Noise_XX tunnel
  source: appendix-a §"A.1 Overview"
  source-paper: v13 §6.2
  definition: Every connection must complete a Noise Protocol Framework Noise_XX handshake using Ed25519
    static keys, ChaCha20-Poly1305, and BLAKE2s before any CBOR message defined in this protocol is exchanged.
  must-implement:
  - Daemon and relay run a Noise_XX handshake on every new connection
  - Static keys use Ed25519; AEAD is ChaCha20-Poly1305; hash is BLAKE2s
  - No CBOR message is sent or accepted before Noise handshake completion
  - All CBOR framing operates inside the Noise transport layer
  verification: Packet capture on the socket shows Noise_XX handshake messages preceding any CBOR body;
    reject test sending a HELLO before Noise completion is closed without response.
  kleppmann-properties:
  - P6
  scope: inverted-stack-specific
  failure-modes:
  - key-compromise
  - replay
  tags:
  - wire-protocol
  - security
  - handshake
  - noise
  security-axis:
  - confidentiality
  - authenticity
  failed-conditions:
  - 'Fails to satisfy: Daemon and relay run a Noise_XX handshake on every new connection'
  - Static keys use Ed25519; AEAD is not ChaCha20-Poly1305; hash is BLAKE2s
  - No CBOR message is not sent or accepted before Noise handshake completion
  - All CBOR framing does not operate inside the Noise transport layer
  - 'Verification check does not pass: Packet capture on the socket shows Noise_XX handshake messages
    preceding any CBOR body; reject test sending a HELLO befo...'
- id: WIRE-03
  name: CBOR length-prefixed framing
  source: appendix-a §"A.2 Message Framing"
  source-paper: null
  definition: Every wire message is a 4-byte little-endian uint32 length prefix followed by exactly that
    many bytes of CBOR-encoded message body.
  must-implement:
  - Sender writes a 4-byte little-endian uint32 length prefix before each CBOR body
  - Receiver reads the length prefix and then the full length bytes before decoding
  - Receiver treats partial body reads as a protocol error
  verification: Wire-vector test (appendix-a §A.9) round-trips byte-for-byte through the framer.
  kleppmann-properties: []
  scope: foundational
  failure-modes: []
  tags:
  - wire-protocol
  - framing
  - cbor
  failed-conditions:
  - 'Fails to satisfy: Sender writes a 4-byte little-endian uint32 length prefix before each CBOR body'
  - 'Fails to satisfy: Receiver reads the length prefix and then the full length bytes before decoding'
  - 'Fails to satisfy: Receiver treats partial body reads as a protocol error'
  - 'Verification check does not pass: Wire-vector test (appendix-a §A.9) round-trips byte-for-byte through
    the framer.'
- id: WIRE-04
  name: Four-MiB body cap
  source: appendix-a §"A.2 Message Framing"
  source-paper: null
  definition: The maximum allowed CBOR body size is 4,194,304 bytes (4 MiB), enforced as a relay memory-allocation
    invariant by closing any connection whose length prefix exceeds the cap without sending an error.
  must-implement:
  - Receiver rejects any length prefix greater than 4,194,304
  - Receiver closes the connection on oversize prefix without emitting an error message
  - Relay pre-allocates receive buffers sized to this bound
  verification: Send a length prefix of 4 MiB + 1 and confirm the connection closes silently with no error
    CBOR on the wire.
  kleppmann-properties: []
  scope: inverted-stack-specific
  failure-modes: []
  tags:
  - wire-protocol
  - dos-protection
  - framing
  failed-conditions:
  - Receiver does not reject any length prefix greater than 4,194,304
  - 'Fails to satisfy: Receiver closes the connection on oversize prefix without emitting an error message'
  - Relay pre-allocates receive does not buffer sized to this bound
  - 'Verification check does not pass: Send a length prefix of 4 MiB + 1 and confirm the connection closes
    silently with no error CBOR on the wire.'
- id: WIRE-05
  name: Deterministic CBOR for signed fields
  source: appendix-a §"A.2 Message Framing"
  source-paper: null
  definition: Any CBOR encoding of fields that appear in signed contexts must use Deterministic Encoding
    per RFC 8949 §4.2 — definite-length arrays and maps, lexicographically sorted map keys, shortest-form
    integers, and shortest exact floating-point representation.
  must-implement:
  - Signed CBOR uses definite-length arrays and maps only
  - Map keys are sorted by lexicographic byte order
  - Integers and floats use shortest exact encoding
  verification: Encode an attestation bundle twice on different implementations and compare byte-for-byte
    equality of the signed input.
  kleppmann-properties:
  - P6
  scope: foundational
  failure-modes: []
  tags:
  - wire-protocol
  - cbor
  - signatures
  - determinism
  security-axis:
  - authenticity
  failed-conditions:
  - Signed CBOR uses definite-length arrays and does not map only
  - Map keys are not sorted by lexicographic byte order
  - 'Fails to satisfy: Integers and floats use shortest exact encoding'
  - 'Verification check does not pass: Encode an attestation bundle twice on different implementations
    and compare byte-for-byte equality of the signed input.'
- id: WIRE-06
  name: Unknown-field tolerance
  source: appendix-a §"A.2 Message Framing"
  source-paper: null
  definition: Receivers must ignore unknown fields in any CBOR map so that optional fields can be added
    in minor protocol revisions without breaking older implementations.
  must-implement:
  - Decoder does not error on unrecognised map keys
  - Unknown fields are dropped silently and do not affect message validity
  verification: Inject an extra unknown key into a HELLO body; confirm the receiver processes the message
    normally.
  kleppmann-properties: []
  scope: foundational
  failure-modes:
  - schema-skew
  tags:
  - wire-protocol
  - compatibility
  - cbor
  failed-conditions:
  - 'Fails to satisfy: Decoder does not error on unrecognised map keys'
  - Unknown fields are not dropped silently and do not affect message validity
  - 'Verification check does not pass: Inject an extra unknown key into a HELLO body; confirm the receiver
    processes the message normally.'
- id: WIRE-07
  name: Connection state machine
  source: appendix-a §"A.3 Handshake Messages"
  source-paper: v13 §6.2
  definition: A connection traverses the states CONNECTING, NOISE_HANDSHAKING, CBOR_HANDSHAKING, STREAMING,
    ERROR, and CLOSED, with defined transitions between them.
  must-implement:
  - Daemon and relay model the connection as the six named states
  - Transitions follow the diagram in §A.3 (e.g. STREAMING reachable only after HELLO/CAPABILITY_NEG/ACK)
  - ERROR transitions to CLOSED only after an error message is sent
  verification: State-machine test exercises each documented transition and rejects invalid transitions.
  kleppmann-properties: []
  scope: inverted-stack-specific
  failure-modes: []
  tags:
  - wire-protocol
  - state-machine
  - handshake
  failed-conditions:
  - 'Fails to satisfy: Daemon and relay model the connection as the six named states'
  - 'Fails to satisfy: Transitions follow the diagram in §A.3 (e.g. STREAMING reachable only after HELLO/CAPABILITY_NEG/ACK)'
  - ERROR transitions to CLOSED only after an error message is not sent
  - 'Verification check does not pass: State-machine test exercises each documented transition and rejects
    invalid transitions.'
- id: WIRE-08
  name: Back-to-back HELLO and CAPABILITY_NEG
  source: appendix-a §"A.3 Handshake Messages"
  source-paper: null
  definition: The connecting node sends HELLO immediately followed by CAPABILITY_NEG without waiting for
    a response, allowing the relay to construct attestation, lease, and bucket authorisation in one transaction
    and saving a round trip.
  must-implement:
  - Connecting node emits CAPABILITY_NEG without awaiting a response to HELLO
  - Relay buffers HELLO and processes both messages together
  - Relay indexes pending-handshake state by node_id from HELLO before CAPABILITY_NEG arrives
  verification: Trace shows CAPABILITY_NEG sent immediately after HELLO with no intervening server message.
  kleppmann-properties:
  - P1
  scope: inverted-stack-specific
  failure-modes: []
  tags:
  - wire-protocol
  - handshake
  - latency
  security-axis:
  - authenticity
  failed-conditions:
  - Connecting node does not emit CAPABILITY_NEG without awaiting a response to HELLO
  - Relay does not buffer HELLO and processes both messages together
  - 'Fails to satisfy: Relay indexes pending-handshake state by node_id from HELLO before CAPABILITY_NEG
    arrives'
  - 'Verification check does not pass: Trace shows CAPABILITY_NEG sent immediately after HELLO with no
    intervening server message.'
- id: WIRE-09
  name: HELLO message
  source: appendix-a §"A.3.1 HELLO"
  source-paper: v13 §6.2
  definition: HELLO is the first CBOR message of every connection and carries node_id (Ed25519 32-byte
    public key), schema_version (semver string), supported_versions (semver array), and protocol_version
    (uint major version).
  must-implement:
  - Connecting node sends HELLO as its first CBOR message
  - HELLO includes node_id, schema_version, supported_versions, and protocol_version
  - node_id is exactly 32 bytes and equals the node's Ed25519 public key
  verification: Wire-vector 1 in §A.9 decodes to the documented field set with correct CBOR types.
  kleppmann-properties: []
  scope: inverted-stack-specific
  failure-modes: []
  tags:
  - wire-protocol
  - handshake
  - hello
  security-axis:
  - authenticity
  failed-conditions:
  - 'Fails to satisfy: Connecting node sends HELLO as its first CBOR message'
  - HELLO does not include node_id, schema_version, supported_versions, and protocol_version
  - node_id is not exactly 32 bytes and equals the node's Ed25519 public key
  - 'Verification check does not pass: Wire-vector 1 in §A.9 decodes to the documented field set with
    correct CBOR types.'
- id: WIRE-10
  name: Stable node_id identity
  source: appendix-a §"A.3.1 HELLO"
  source-paper: v13 §6.2
  definition: The node_id Ed25519 public key is the stable identity of a node across reconnections and
    must not be rotated without re-onboarding through the attestation flow.
  must-implement:
  - Daemon persists node_id across restarts and reconnections
  - Daemon does not generate a new node_id without re-running onboarding
  - Relay uses node_id as the lookup key for attestation and lease state
  verification: Restart the daemon and confirm node_id is unchanged in the next HELLO.
  kleppmann-properties:
  - P2
  - P7
  scope: inverted-stack-specific
  failure-modes:
  - key-loss
  tags:
  - wire-protocol
  - identity
  - keys
  security-axis:
  - authenticity
  failed-conditions:
