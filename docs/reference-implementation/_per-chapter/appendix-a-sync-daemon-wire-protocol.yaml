- id: WIRE-30
  name: Founder vs joiner bundle semantics
  source: appendix-a §"A.6 QR Onboarding Payload Format"
  source-paper: v13 §6.2
  definition: Founder bundles are self-signed (issuer_public_key equals subject_public_key) and carry
    an implicit grant of every role claim accepted only at initial node creation; joiner bundles are signed
    by the founder or any admin-role holder and verified by the relay during CAPABILITY_NEG.
  must-implement:
  - Relay accepts founder (self-signed) bundles only during initial node creation
  - Joiner bundles are issued by founder or any admin-role holder
  - Relay verifies issuer signature against issuer_public_key during CAPABILITY_NEG
  verification: Re-presenting a founder bundle to an established relay is rejected; a joiner bundle from
    a non-admin issuer is rejected.
