- id: WIRE-16
  name: Empty grant is not an error
  source: appendix-a §"A.3.3 ACK"
  source-paper: null
  definition: granted_streams and granted_buckets may be empty arrays when the attestation bundle authorises
    none of the requested resources; the connection remains valid and the node should surface the empty
    grant to the operator.
  must-implement:
  - Receiver does not treat empty grant arrays as a protocol error
  - Daemon surfaces empty-grant condition to the operator log
  - Daemon does not silently continue without alerting
  verification: Test attestation that authorises no requested streams produces ACK with empty arrays and
