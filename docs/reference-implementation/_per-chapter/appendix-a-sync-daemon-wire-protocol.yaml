- id: WIRE-17
  name: DELTA_STREAM message
  source: appendix-a §"A.4.1 DELTA_STREAM"
  source-paper: v13 §6.2
  definition: DELTA_STREAM carries a single CRDT operation tagged with stream_id, op_type (insert/delete/update),
    vector_clock, opaque CRDT payload bytes, and an optional epoch_id for CP-class records, fanned out
    by the relay to every node subscribed to that stream.
  must-implement:
  - DELTA_STREAM includes stream_id, op_type, vector_clock, payload
  - epoch_id is set on every CP-class operation
  - Relay fans out received DELTA_STREAM to every subscriber of stream_id
  - stream_id matches an entry in granted_streams
  verification: 'Multi-peer test: a DELTA_STREAM published by one node arrives unchanged at every subscribed
    peer.'
  kleppmann-properties:
  - P3
  - P4
  scope: inverted-stack-specific
  failure-modes: []
  tags:
  - wire-protocol
  - streaming
  - crdt
  - delta
