- id: WIRE-14
  name: ACK message
  source: appendix-a §"A.3.3 ACK"
  source-paper: v13 §6.2
  definition: ACK is the relay's single closing message of the handshake, carrying negotiated_version,
    granted_streams, granted_buckets, and an optional human-readable denied_reason; receipt of ACK transitions
    the connection to STREAMING.
  must-implement:
  - Relay sends ACK only after validating both HELLO and CAPABILITY_NEG
  - ACK carries negotiated_version, granted_streams, granted_buckets
  - denied_reason is included when any requested resource is refused
  verification: Wire-vector test for ACK decodes the expected fields; STREAMING transition occurs on ACK
