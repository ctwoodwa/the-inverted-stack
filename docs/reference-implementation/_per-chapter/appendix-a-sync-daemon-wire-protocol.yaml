- id: WIRE-13
  name: CP-class lease acquisition before ACK
  source: appendix-a §"A.3.2 CAPABILITY_NEG"
  source-paper: v13 §6.2
  definition: For every record type listed in cp_leases the relay acquires and holds a Flease-protocol
    distributed lease on behalf of the node before returning ACK; types not listed default to AP-class
    with no lease.
  must-implement:
  - Relay acquires Flease leases for each cp_leases entry prior to ACK
  - Relay treats record types omitted from cp_leases as AP-class
  - Lease is held for the lifetime of the session
  verification: 'Integration test: connecting with cp_leases set blocks ACK until lease acquisition completes.'
  kleppmann-properties:
