- id: WIRE-22
  name: GOSSIP_PING membership protocol
  source: appendix-a §"A.4.2 GOSSIP_PING"
  source-paper: v13 §6.2
  definition: Each node sends a GOSSIP_PING to all connected peers every 30 seconds carrying sender_id,
    a partial membership_excerpt of known peers, and the sender's vector_clock summary; the relay forwards
    the message unchanged.
  must-implement:
