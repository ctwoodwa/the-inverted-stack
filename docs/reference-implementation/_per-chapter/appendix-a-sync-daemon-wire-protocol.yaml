- id: WIRE-15
  name: Wire-version negotiation rule
  source: appendix-a §"A.3.3 ACK"
  source-paper: null
  definition: negotiated_version is the highest wire protocol version supported by both peers (intersection
    of node supported_versions and relay capabilities), and the connecting node must use that version
    for all subsequent messages.
  must-implement:
  - Relay selects the highest mutually supported version present in supported_versions
  - Connecting node uses negotiated_version for every subsequent message
  - Node logs a downgrade when negotiated_version differs from its preferred protocol_version
  verification: Connect with supported_versions = ["1.0.0","1.1.0"] against a relay capped at 1.0.0; confirm
    negotiated_version = 1 and downgrade is logged.
  kleppmann-properties: []
  scope: inverted-stack-specific
  failure-modes:
  - schema-skew
  tags:
  - wire-protocol
  - versioning
  - compatibility
  failed-conditions:
