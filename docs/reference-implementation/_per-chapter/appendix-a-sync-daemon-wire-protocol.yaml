- id: WIRE-27
  name: Error retry semantics catalogue
  source: appendix-a §"A.5 Error Codes"
  source-paper: null
  definition: Each defined error code carries a normative retry policy — exponential backoff with jitter
    for ERR_RATE_LIMIT_EXCEEDED and ERR_THROTTLE, no-retry for ERR_VERSION_INCOMPATIBLE and ERR_BUCKET_NOT_AUTHORIZED,
    IdP re-authentication for ERR_ATTESTATION_REQUIRED and ERR_KEY_REVOKED, and epoch snapshot fetch for
    ERR_EPOCH_MISMATCH.
  must-implement:
  - ERR_RATE_LIMIT_EXCEEDED retries with exponential backoff (initial 1 s, max 60 s) and uniform jitter
    in [0, interval/2]
  - ERR_THROTTLE applies the same backoff as ERR_RATE_LIMIT_EXCEEDED
  - ERR_VERSION_INCOMPATIBLE and ERR_BUCKET_NOT_AUTHORIZED do not auto-retry
  - ERR_ATTESTATION_REQUIRED triggers fresh IdP attestation acquisition
  - ERR_KEY_REVOKED requires a new key bundle from the org admin and permanently invalidates the old node_id
  - ERR_EPOCH_MISMATCH triggers epoch snapshot fetch from a peer before retry
  verification: Failure-injection harness exercises each error code and confirms the retry handler matches
    the documented policy.
  kleppmann-properties:
  - P6
  scope: inverted-stack-specific
  failure-modes:
  - key-compromise
  - key-loss
  - schema-skew
  - partition
  tags:
  - wire-protocol
  - errors
  - retry
  security-axis:
  - authenticity
  failed-conditions:
  - 'Fails to satisfy: ERR_RATE_LIMIT_EXCEEDED retries with exponential backoff (initial 1 s, max 60 s)
    and uniform jitter in [0, interval/2]'
  - ERR_THROTTLE does not applie the same backoff as ERR_RATE_LIMIT_EXCEEDED
  - 'Fails to satisfy: ERR_VERSION_INCOMPATIBLE and ERR_BUCKET_NOT_AUTHORIZED do not auto-retry'
