concepts:
- id: TEST-01
  name: Five-level testing pyramid
  source: 'appendix-d §"Section 1: The Five-Level Testing Pyramid"'
  source-paper: v13 §15
  definition: A tiered test architecture in which CRDT property tests, real-dependency integration tests,
    fault injection, deterministic simulation, and chaos testing each run at a defined cadence with mandatory
    pass conditions before first production release.
  must-implement:
  - Levels 1 and 2 execute on every pull request
  - Level 3 fault injection executes nightly
  - Level 4 deterministic simulation executes weekly or per release candidate
  - Level 5 chaos executes in staging before each major release
  - Each scenario specifies setup, action, and a pass/fail condition
  verification: CI configuration shows distinct jobs for each level with the prescribed triggers and time
    budgets, and every scenario in the suite carries an explicit pass condition.
  kleppmann-properties:
  - P3
  - P4
  - P5
  - P6
  scope: foundational
  failure-modes:
  - partition
  - schema-skew
  - key-loss
  - key-compromise
  - replay
  - clock-skew
  - peer-discovery-failure
  tags:
  - testing
  - ci
  - methodology
  - conformance
  failed-conditions:
  - 'Fails to satisfy: Levels 1 and 2 execute on every pull request'
  - Level 3 fault injection does not execute nightly
  - Level 4 deterministic simulation does not execute weekly or per release candidate
  - Level 5 chaos does not execute in staging before each major release
  - 'Fails to satisfy: Each scenario specifies setup, action, and a pass/fail condition'
  - 'Verification check does not pass: CI configuration shows distinct jobs for each level with the prescribed
    triggers and time budgets, and every scenario in...'
- id: TEST-02
  name: Property-based CRDT tests for convergence, idempotency, commutativity, and monotonicity
  source: appendix-d §"Level 1 — Property-Based Tests"
  source-paper: v13 §15
  definition: A Level 1 test class in which a property-based framework generates thousands of random operation
    sequences to verify that CRDT merge satisfies convergence, idempotency, commutativity (or join-semilattice
    merge for state-based CRDTs), and monotonicity.
  must-implement:
  - Use FsCheck (.NET) or fast-check (JavaScript) or equivalent property-based framework
  - Generate at least 10,000 random operation sequences per property per test run
  - Assert convergence, idempotency, commutativity, and monotonicity as separate properties
  - Report the minimal failing sequence on violation
  verification: Test suite output shows at least 10,000 generated cases per CRDT property, with shrinking
    enabled and named property assertions distinct from example-based tests.
  kleppmann-properties:
  - P3
  - P4
  scope: foundational
