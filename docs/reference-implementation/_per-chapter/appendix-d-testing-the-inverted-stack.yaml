- id: TEST-13
  name: Tiered CI configuration with archived test artefacts
  source: 'appendix-d §"Section 4: CI Configuration Guidance"'
  source-paper: v13 §15
  definition: A four-tier CI configuration (per-PR, nightly, weekly/RC, pre-major-release) that gates
    merges on L1+L2, runs L3 nightly, executes L4 simulation weekly or per RC, and runs L5 chaos before
    major releases, with archived test report, scenario evidence, harness configuration, and SBOM per
    release.
  must-implement:
  - Gate every PR merge on L1 (<5 min) and L2 (<15 min) tests
  - Run L3 nightly within a 2-hour budget with P1 incident on failure
  - Run L4 simulation weekly and on RC tags, blocking the RC on failure
  - Run L5 chaos for 24–48 hours before major release on a permanently maintained representative staging
    environment
  - Capture and archive per-release test report, scenario evidence, harness configuration, and SBOM tied
    to the release version and code SHA
  verification: CI definitions show four named tiers with the prescribed triggers, time budgets, and artefact-upload
    steps producing an archive linked to each release tag.
