- id: TEST-05
  name: Deterministic simulation harness with virtual clock and message scheduler
  source: appendix-d §"Level 4 — Deterministic Simulation"
  source-paper: v13 §15
  definition: A Level 4 in-process test harness that boots N node instances under a controllable virtual
    clock and a deterministic message scheduler, enabling exhaustive coverage of mixed-version sync, offline
    epoch transitions, and Flease edge cases that real-time tests cannot reach reliably.
  must-implement:
  - Provide a global monotonic virtual clock advanced in discrete ticks by the test driver
  - Provide a pluggable scheduler that can delay, reorder, or drop messages per test
  - Boot N node instances in-process, each with an isolated SQLCipher store, wired to the scheduler instead
    of real sockets
  - Provide invariant assertion hooks for CRDT convergence, ledger balance, lease exclusivity, and epoch
    monotonicity
  - Design the harness against the Appendix A wire protocol specification before implementation
  verification: Repository contains a simulation harness whose tests resolve all timeouts against the
    virtual clock and pass deterministically on repeated runs with the same seed.
  kleppmann-properties:
  - P3
  - P4
  - P5
  scope: inverted-stack-specific
  failure-modes:
  - partition
  - schema-skew
  - clock-skew
  tags:
  - testing
  - simulation
  - deterministic
  - virtual-clock
  - level-4
  failed-conditions:
