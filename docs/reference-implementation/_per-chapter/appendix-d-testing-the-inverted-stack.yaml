- id: TEST-03
  name: Real-daemon integration tests via Testcontainers
  source: appendix-d §"Level 2 — Integration Tests (Real Dependencies)"
  source-paper: v13 §15
  definition: A Level 2 test class that exercises the full sync handshake (HELLO, CAPABILITY_NEG, ACK,
    DELTA_STREAM, GOSSIP_PING) against a real local-node process spun up via Testcontainers, asserting
    on resulting CRDT state rather than wire messages.
  must-implement:
  - Spin up a real local-node instance per test suite using Testcontainers
  - Execute the full five-step handshake end to end
  - Assert on post-exchange CRDT state, not on wire message sequences
  - Forbid mocking the sync daemon for integration coverage
  verification: Integration test fixtures launch a containerized node, complete the handshake, and assertions
    reference CRDT state hashes; CI environment provides Docker.
  kleppmann-properties:
  - P3
  - P4
  scope: inverted-stack-specific
