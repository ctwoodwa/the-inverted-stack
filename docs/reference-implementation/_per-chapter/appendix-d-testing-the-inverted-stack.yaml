- id: TEST-10
  name: Flease edge case scenarios
  source: appendix-d §"Flease Edge Cases"
  source-paper: v13 §15
  definition: A required scenario set covering CP lease holder crash mid-write (partial write quarantined
    and visible, lease re-acquired by a peer after timeout) and partition during lease negotiation (both
    sides identify no-quorum and block writes with no split-brain).
  must-implement:
  - On lease holder crash mid-write, expire the lease after the configured timeout (default 30 seconds)
    and let a peer acquire a new lease
  - Quarantine partial writes from a crashed lease holder and surface them for operator review rather
    than silently merging
  - Under partition during CAPABILITY_NEG lease request, have both partitions independently report no-quorum
    and block writes with no split-brain
  verification: Test injects each scenario and asserts the partial write appears in a quarantine queue,
    lease ownership transfers cleanly, and no two partitions claim the lease concurrently.
  kleppmann-properties:
