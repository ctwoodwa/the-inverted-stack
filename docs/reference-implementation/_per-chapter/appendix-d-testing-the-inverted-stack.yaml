- id: TEST-12
  name: Ledger invariant scenarios under failure and duplication
  source: appendix-d §"Ledger"
  source-paper: v13 §15
  definition: A required scenario set asserting that the sum-to-zero ledger invariant holds across the
    complete account set after a posting-node crash and retry, and that idempotency keys prevent duplicate
    postings when an identical domain event is submitted twice.
  must-implement:
  - Verify exactly one posting set exists after a mid-transaction crash and retry, with no duplicate postings
  - Verify sum-to-zero across the full related-account set, not only directly involved accounts
  - Verify idempotency keys cause a duplicate domain event to produce exactly one set of postings
  verification: Test sums the ledger across all related accounts after each scenario and asserts a single
    posting set keyed by the idempotency token.
