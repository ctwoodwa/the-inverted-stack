- id: SYNC-09
  name: Lowest-latency path selection with hot standby
  source: ch14 §"Three-Tier Peer Discovery"
  source-paper: v13 §6
  definition: The daemon selects the lowest-latency reachable path to each known peer and dynamically
    updates path selection as network conditions change, retaining alternate paths as hot standby.
  must-implement:
  - Daemon measures per-path latency to each known peer
  - Daemon promotes an alternate path when the primary degrades
  - Path selection updates without re-handshake
  verification: Sever the primary path between two peers; observe the daemon promoting the standby within
    one gossip interval without a fresh CAPABILITY_NEG.
  kleppmann-properties:
  - P3
  - P4
  scope: foundational
  failure-modes:
  - partition
  tags:
  - transport
  - failover
  failed-conditions:
