- id: SYNC-13
  name: ACK with granted_subscriptions and typed rejections
  source: ch14 §"Five-Step Handshake"
  source-paper: v13 §6
  definition: The accepting node responds with granted_subscriptions[] and a rejected[] list using typed
    reason codes (MISSING_ATTESTATION, EXPIRED_ATTESTATION, INVALID_SIGNATURE), and silently omits streams
    the requester has no attestation for to prevent stream enumeration.
  must-implement:
