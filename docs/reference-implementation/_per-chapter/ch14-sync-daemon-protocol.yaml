- id: SYNC-08
  name: Managed relay for restricted networks
  source: ch14 §"Three-Tier Peer Discovery"
  source-paper: v13 §6
  definition: For deployments where direct peer-to-peer connectivity is not viable, the daemon connects
    through a managed relay that forwards delta streams without decrypting them and cannot inject or modify
    operations.
  must-implement:
  - Relay forwards delta frames opaquely without decrypting payloads
  - Receiving daemon verifies Ed25519 signatures on every relay-forwarded message
  - Relay cannot read content or inject operations
  verification: Run a relay with logging instrumented; confirm no plaintext payload visibility and that
    mutated frames are rejected by the receiving daemon's signature check.
  kleppmann-properties:
  - P3
  - P4
  - P6
  - P7
