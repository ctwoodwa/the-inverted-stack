concepts:
- id: SYNC-01
  name: Sync daemon as separate OS process
  source: ch14 §"Process Isolation"
  source-paper: v13 §6
  definition: The sync daemon runs as a distinct OS-level process from the application, decoupling network
    and replication lifecycle from application lifecycle.
  must-implement:
  - Daemon runs in a process distinct from the application process
  - Daemon survives application restart, update, and crash
  - Daemon continues accepting inbound deltas while application is down
  - Daemon reconnects to peers independent of application UI startup
  verification: Kill the application process while peers are streaming; confirm daemon process retains
    peer connections and queues inbound deltas for next application startup.
  kleppmann-properties:
  - P1
  - P3
  - P4
  scope: inverted-stack-specific
  failure-modes:
  - vendor-outage
  - partition
  tags:
  - daemon
  - process-model
  - architecture
  failed-conditions:
  - 'Fails to satisfy: Daemon runs in a process distinct from the application process'
  - 'Fails to satisfy: Daemon survives application restart, update, and crash'
  - Daemon continues accepting inbound deltas while application is not down
  - 'Fails to satisfy: Daemon reconnects to peers independent of application UI startup'
  - 'Verification check does not pass: Kill the application process while peers are streaming; confirm
    daemon process retains peer connections and queues inbou...'
- id: SYNC-02
  name: IPC over Unix domain socket / named pipe
  source: ch14 §"Process Isolation"
  source-paper: v13 §6
  definition: The application communicates with the daemon over a Unix domain socket on Linux/macOS and
    a named pipe on Windows, with file-permission/ACL controls scoping access to the same user.
  must-implement:
  - Daemon exposes a local IPC endpoint (UDS or named pipe)
  - Socket path enforces user-level filesystem permissions or explicit ACL grants
  - No network port is exposed for application-to-daemon communication
  verification: Inspect socket path permissions; confirm only same-user processes (or explicit ACL grantees)
    can connect.
  kleppmann-properties:
  - P6
  scope: inverted-stack-specific
  failure-modes: []
  tags:
  - ipc
  - transport
  - security
  failed-conditions:
  - Daemon does not expose a local IPC endpoint (UDS or named pipe)
  - Socket path does not enforce user-level filesystem permissions or explicit ACL grants
  - No network port is not exposed for application-to-daemon communication
  - 'Verification check does not pass: Inspect socket path permissions; confirm only same-user processes
    (or explicit ACL grantees) can connect.'
- id: SYNC-03
  name: Device-key authentication on the IPC channel
  source: ch14 §"Process Isolation"
  source-paper: v13 §6
  definition: All messages on the daemon's IPC channel are authenticated with a device key, so processes
    that can reach the socket cannot inject operations without a valid key.
  must-implement:
  - Daemon rejects IPC sessions that do not present a valid device key
  - Authentication occurs before any command-channel operation is processed
  verification: Connect a process without a device key to the socket and confirm the daemon refuses session
    establishment.
  kleppmann-properties:
  - P6
  scope: inverted-stack-specific
  failure-modes:
  - key-compromise
  tags:
  - security
  - ipc
  - authentication
  failed-conditions:
  - Daemon does not reject IPC sessions that do not present a valid device key
  - Authentication occurs before any command-channel operation is not processed
  - 'Verification check does not pass: Connect a process without a device key to the socket and confirm
    the daemon refuses session establishment.'
- id: SYNC-04
  name: Daemon ownership of four responsibilities
  source: ch14 §"Process Isolation"
  source-paper: v13 §6
  definition: The daemon owns the local CRDT document store, peer/relay connections, per-peer capability
    and subscription enforcement, and background tasks (compaction, archival), and the application never
    touches the document store directly.
  must-implement:
  - Document store is accessed only via the daemon
  - Peer connection lifecycle is managed by the daemon, not the application
  - Capability/subscription rules are enforced inside the daemon
  - Background maintenance (compaction, archival) runs in the daemon
  verification: Inspect the application binary; confirm no code paths read or mutate the document store
    outside the daemon command channel.
  kleppmann-properties:
  - P3
  - P4
  - P5
  - P6
  scope: inverted-stack-specific
  failure-modes: []
  tags:
  - daemon
  - architecture
  - separation-of-concerns
  failed-conditions:
  - Document store is not accessed only via the daemon
  - Peer connection lifecycle is not managed by the daemon, not the application
  - Capability/subscription rules are not enforced inside the daemon
  - 'Fails to satisfy: Background maintenance (compaction, archival) runs in the daemon'
  - 'Verification check does not pass: Inspect the application binary; confirm no code paths read or mutate
    the document store outside the daemon command chann...'
- id: SYNC-05
  name: Three-tier peer discovery
  source: ch14 §"Three-Tier Peer Discovery"
  source-paper: v13 §6
  definition: The daemon discovers peers concurrently across three mechanisms — mDNS for LAN, mesh VPN
    for cross-network, and managed relay for restricted networks — with no tier acting as a fallback that
    disables another.
  must-implement:
  - Daemon runs all three discovery mechanisms concurrently when configured
  - Tiers are not mutually exclusive; a peer reachable on multiple paths is recorded for all
  - Daemon selects the lowest-latency reachable path per peer
  verification: With a peer reachable via mDNS and mesh VPN, observe the daemon selecting mDNS as primary
    while keeping VPN as hot standby.
  kleppmann-properties:
  - P3
  - P4
  scope: inverted-stack-specific
  failure-modes:
  - peer-discovery-failure
  tags:
  - discovery
  - transport
  - topology
  failed-conditions:
  - 'Fails to satisfy: Daemon runs all three discovery mechanisms concurrently when configured'
  - Tiers are not mutually exclusive; a peer reachable on multiple paths is not recorded for all
  - 'Fails to satisfy: Daemon selects the lowest-latency reachable path per peer'
  - 'Verification check does not pass: With a peer reachable via mDNS and mesh VPN, observe the daemon
    selecting mDNS as primary while keeping VPN as hot stand...'
- id: SYNC-06
  name: mDNS LAN discovery
  source: ch14 §"Three-Tier Peer Discovery"
  source-paper: v13 §6
  definition: On a local network segment, the daemon announces node ID, schema version, and IPC endpoint
    via multicast DNS, removing peers from the candidate list after three missed heartbeat intervals.
  must-implement:
  - Daemon emits mDNS announcements containing node ID and schema version
  - Daemon removes a peer from the candidate list after three missed heartbeats
  - Discovery requires no central coordinator on the LAN
  verification: Two daemons on the same LAN segment discover each other within one mDNS announcement interval
    with zero configuration.
  kleppmann-properties:
  - P3
  - P4
  scope: foundational
  failure-modes:
  - peer-discovery-failure
  tags:
  - discovery
  - mdns
  - lan
  failed-conditions:
  - Daemon does not emit mDNS announcements containing node ID and schema version
  - 'Fails to satisfy: Daemon removes a peer from the candidate list after three missed heartbeats'
  - Discovery does not require no central coordinator on the LAN
  - 'Verification check does not pass: Two daemons on the same LAN segment discover each other within
    one mDNS announcement interval with zero configuration.'
- id: SYNC-07
  name: Mesh VPN cross-network discovery
  source: ch14 §"Three-Tier Peer Discovery"
  source-paper: v13 §6
  definition: Peers on different networks connect through a WireGuard-based mesh VPN that handles NAT
    traversal and provides in-transit encryption independent of protocol-layer authentication.
  must-implement:
  - Daemon supports a WireGuard-based mesh VPN transport
  - No port forwarding is required at either endpoint
  - VPN peers are treated identically to LAN peers above the transport layer
  verification: Two daemons behind separate NATs establish a session through the mesh VPN with no per-endpoint
    port forwarding.
  kleppmann-properties:
  - P3
  - P4
  scope: foundational
  failure-modes:
  - peer-discovery-failure
  - partition
  tags:
  - discovery
  - vpn
  - nat-traversal
  security-axis:
  - confidentiality
  failed-conditions:
