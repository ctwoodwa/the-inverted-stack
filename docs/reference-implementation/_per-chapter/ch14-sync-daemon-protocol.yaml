- id: SYNC-16
  name: CBOR canonical wire encoding with length prefix
  source: ch14 §"Wire Format — Message Field Reference"
  source-paper: v13 §6
  definition: All wire messages use CBOR (RFC 8949) canonical encoding, length-prefixed with a 4-byte
    big-endian frame length, with individual frames capped at 16 MiB and unknown fields ignored for forward
    compatibility.
  must-implement:
  - All frames use CBOR canonical encoding
  - 4-byte big-endian length precedes each CBOR payload
  - Frames exceeding 16 MiB are rejected
  - Unknown fields are ignored on decode
  verification: Send a frame with an unknown field; confirm receiver accepts the frame and processes the
    known fields.
  kleppmann-properties: []
  scope: inverted-stack-specific
  failure-modes: []
  tags:
  - wire-protocol
  - encoding
  - cbor
  failed-conditions:
  - 'Fails to satisfy: All frames use CBOR canonical encoding'
  - 'Fails to satisfy: 4-byte big-endian length precedes each CBOR payload'
  - Frames exceeding 16 MiB are not rejected
  - Unknown fields are not ignored on decode
  - 'Verification check does not pass: Send a frame with an unknown field; confirm receiver accepts the
    frame and processes the known fields.'
