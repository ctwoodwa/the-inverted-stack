- id: SYNC-11
  name: HELLO message and schema-version negotiation
  source: ch14 §"Five-Step Handshake"
  source-paper: v13 §6
  definition: HELLO carries node ID, current schema epoch, public key, signed timestamp, and supported
    protocol versions; the session proceeds on the highest mutually supported version, and incompatible
    epochs result in SCHEMA_VERSION_INCOMPATIBLE and session close.
  must-implement:
  - HELLO carries node_id, schema_version, public_key, sent_at, signature, supported_versions
  - Session uses the highest version in the intersection of both peers' supported lists
  - Incompatible schema epoch closes the session with SCHEMA_VERSION_INCOMPATIBLE; no partial or read-only
    mode
  - Application surfaces a schema-update notification when the daemon closes a session on version grounds
  verification: Connect two daemons with non-overlapping supported_versions; confirm SCHEMA_VERSION_INCOMPATIBLE
    is sent and the session closes.
  kleppmann-properties:
  - P4
  - P6
  scope: inverted-stack-specific
  failure-modes:
  - schema-skew
  tags:
  - wire-protocol
  - handshake
  - schema
  security-axis:
  - authenticity
  failed-conditions:
