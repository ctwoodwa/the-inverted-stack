- id: SYNC-10
  name: Five-step handshake (HELLO, CAPABILITY_NEG, ACK, DELTA_STREAM, GOSSIP_PING)
  source: ch14 §"Five-Step Handshake"
  source-paper: v13 §6
  definition: Every peer connection follows a fixed five-step sequence — HELLO, CAPABILITY_NEG, ACK, DELTA_STREAM,
    GOSSIP_PING — that establishes identity, negotiates capabilities, and confirms subscription grants
    before any CRDT operations flow.
  must-implement:
  - No DELTA_STREAM frames flow before ACK is received
  - Both peers exchange HELLO simultaneously at session start
  - GOSSIP_PING runs on a 30-second cadence after the session is live
  verification: Capture wire trace of a fresh session; confirm the five message types appear in the specified
    order and no operations precede ACK.
  kleppmann-properties:
