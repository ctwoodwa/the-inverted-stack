- id: SYNC-22
  name: Field-level scope stripping within streams
  source: ch14 §"Data Minimization at the Stream Level"
  source-paper: v13 §6
  definition: Stream definitions specify the minimum field set required per role, and the daemon strips
    operations for out-of-scope fields when constructing outbound deltas even within streams the receiver
    is authorized to receive.
  must-implement:
  - Stream definitions encode per-role minimum field sets
  - Daemon strips out-of-scope-field operations at delta construction
  - Field-level exclusions are invisible to the receiver
  verification: Two-role test where Role A receives a stream with field set {x, y} and Role B receives
    the same stream with {x}; confirm Role B's wire trace contains no operations for field y.
