- id: SYNC-28
  name: Exponential backoff with jitter on reconnect
  source: ch14 §"Reconnection Storm Handling"
  source-paper: v13 §6
  definition: When a previously unavailable network path becomes reachable, the daemon waits a random
    interval drawn from an exponential distribution bounded at 60 seconds before initiating handshake,
