- id: SYNC-14
  name: DELTA_STREAM continuous CRDT operation flow
  source: ch14 §"Five-Step Handshake"
  source-paper: v13 §6
  definition: After ACK, both nodes emit a continuous append-only stream of compact binary CRDT deltas
    computed from the difference between sender state and receiver vector clock, with out-of-scope operations
    dropped at the send tier.
  must-implement:
  - Deltas are computed per receiver vector clock
  - Out-of-scope operations are dropped at the sender, not filtered at the receiver
  - Receiver applies operations and advances its vector clock
  verification: Observe wire trace; confirm deltas contain only operations the receiver has not seen and
    only for granted subscriptions.
  kleppmann-properties:
  - P3
  - P4
  scope: foundational
  failure-modes: []
  tags:
  - wire-protocol
  - delta-sync
  - crdt
  failed-conditions:
  - Deltas are not computed per receiver vector clock
  - Out-of-scope operations are not dropped at the sender, not filtered at the receiver
  - Receiver does not applie operations and advances its vector clock
  - 'Verification check does not pass: Observe wire trace; confirm deltas contain only operations the
    receiver has not seen and only for granted subscriptions.'
- id: SYNC-15
  name: GOSSIP_PING for membership and clock summary
  source: ch14 §"Five-Step Handshake"
  source-paper: v13 §6
  definition: Every 30 seconds each node emits GOSSIP_PING carrying its current vector clock summary and
    known-peer membership list, enabling drift detection, peer discovery via transitive knowledge, and
    network healing without a central directory.
  must-implement:
  - Daemon emits GOSSIP_PING on a 30-second cadence (configurable)
  - GOSSIP_PING carries vector clock summary and membership entries
  - Receiving node merges new peers and updated addresses into local membership list
  verification: Three-node test where C learns of B's new address only via A's GOSSIP_PING transitively
    forwarding it.
  kleppmann-properties:
  - P4
  scope: inverted-stack-specific
  failure-modes:
  - peer-discovery-failure
  - clock-skew
  tags:
  - wire-protocol
  - gossip
