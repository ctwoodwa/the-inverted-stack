- id: SYNC-12
  name: CAPABILITY_NEG with role-attestation tokens
  source: ch14 §"Five-Step Handshake"
  source-paper: v13 §6
  definition: The requesting node declares CRDT streams, CP leases, and bucket subscriptions, with each
    requested subscription accompanied by a role attestation signed by the node's device key that the
