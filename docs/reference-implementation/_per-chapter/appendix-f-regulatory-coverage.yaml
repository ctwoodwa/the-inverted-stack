- id: COMP-07
  name: RBI 2018 hard payment-data localization
  source: appendix-f §"RBI Data Localization Circular"
  source-paper: null
  definition: A Reserve Bank of India circular requiring all payment-related data of Indian payment-system
    operators to be stored exclusively within India, treated as a Tier 3 architectural driver rather than
    a design preference.
  must-implement:
  - Payment-related personal data for RBI-scoped tenants is stored only on India-resident nodes
  - Sync relays carrying RBI-scoped data terminate within India
  - The deployment topology distinguishes payment data from non-payment data scope
  verification: An infrastructure inventory shows every node and relay handling RBI-scoped data resides
    within India
