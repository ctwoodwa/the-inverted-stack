concepts:
- id: COMP-01
  name: GDPR Article 17 right-to-erasure via crypto-shredding
  source: appendix-f §"GDPR (Regulation (EU) 2016/679)"
  source-paper: null
  definition: An EU-mandated individual right to erasure that local-first architectures answer by destroying
    the per-record DEK so encrypted CRDT history becomes unrecoverable, with the lawfulness of crypto-shred-as-erasure
    remaining unsettled across CNIL and German DPAs.
  must-implement:
  - Per-record or per-tenant DEKs are independently destroyable
  - Operator documentation describes the crypto-shred procedure as the Article 17 mechanism
  - Residual CRDT metadata (operation IDs, timestamps, DAG position) is enumerated for jurisdictional
    review
  - Legal review precedes any production reliance on crypto-shred for Article 17 responses
  verification: After erasure, the targeted record's ciphertext remains but no DEK path exists to decrypt
    it; an ADR documents the chosen erasure mechanism and its jurisdictional caveats
  kleppmann-properties:
  - P5
  - P6
  - P7
  scope: foundational
  failure-modes:
  - data-residency-objection
  - key-loss
  tags:
  - gdpr
  - erasure
  - crypto-shredding
  - compliance
  - eu
  security-axis:
  - confidentiality
  failed-conditions:
  - Per-record or per-tenant DEKs are not independently destroyable
  - 'Fails to satisfy: Operator documentation describes the crypto-shred procedure as the Article 17 mechanism'
  - Residual CRDT metadata (operation IDs, timestamps, DAG position) is not enumerated for jurisdictional
    review
  - 'Fails to satisfy: Legal review precedes any production reliance on crypto-shred for Article 17 responses'
  - 'Verification check does not pass: After erasure, the targeted record''s ciphertext remains but no
    DEK path exists to decrypt it; an ADR documents the chose...'
- id: COMP-02
  name: GDPR Article 30 records-of-processing at the node level
  source: appendix-f §"GDPR (Regulation (EU) 2016/679)"
  source-paper: null
  definition: A GDPR requirement that processing activities be logged in a controller-accessible record,
    satisfied in local-first architectures by per-node processing logs rather than centralized SaaS audit
    trails.
  must-implement:
  - Each node maintains a processing record covering purpose, categories of data, and retention
  - Records are exportable for controller and DPA inspection
  - The 72-hour Article 33 breach-notification window is the shortest assumed deadline absent stricter
    local rules
  verification: A node export produces an Article-30-compliant processing record without requiring vendor
    cooperation
  kleppmann-properties:
  - P5
  - P6
  - P7
  scope: foundational
  failure-modes:
  - data-residency-objection
  tags:
  - gdpr
  - audit
  - records
  - compliance
  - eu
  failed-conditions:
  - Each node does not maintain a processing record covering purpose, categories of data, and retention
  - Records are not exportable for controller and DPA inspection
  - The 72-hour Article 33 breach-notification window is not the shortest assumed deadline absent stricter
    local rules
  - 'Verification check does not pass: A node export produces an Article-30-compliant processing record
    without requiring vendor cooperation'
- id: COMP-03
  name: Schrems II structural answer via no cross-border transfer
  source: appendix-f §"Schrems II"
  source-paper: null
  definition: The CJEU C-311/18 ruling invalidating Privacy Shield and constraining SCCs is bypassed structurally
    when a local-first node never exports personal data to a foreign cloud, removing the transfer mechanism
    the ruling evaluates.
  must-implement:
  - Personal data of EEA subjects never leaves EEA-resident nodes during normal operation
  - Sync relays for EEA tenants terminate within EEA jurisdiction
  - The deployment topology is documented sufficient to assert no cross-border transfer occurs
  verification: A traffic-flow diagram and a deployment audit show no PII egress from EEA-resident nodes
    to non-adequate jurisdictions
  kleppmann-properties:
  - P3
  - P5
  - P6
  - P7
  scope: inverted-stack-specific
  failure-modes:
  - data-residency-objection
  tags:
  - schrems-ii
  - transfer
  - eu
  - residency
  - compliance
  failed-conditions:
  - 'Fails to satisfy: Personal data of EEA subjects never leaves EEA-resident nodes during normal operation'
  - 'Fails to satisfy: Sync relays for EEA tenants terminate within EEA jurisdiction'
  - The deployment topology is not documented sufficient to assert no cross-border transfer occurs
  - 'Verification check does not pass: A traffic-flow diagram and a deployment audit show no PII egress
    from EEA-resident nodes to non-adequate jurisdictions'
- id: COMP-04
  name: DIFC DPL 2020 categorical foreign-cloud prohibition
  source: appendix-f §"DIFC Data Protection Law 2020"
  source-paper: null
  definition: A DIFC-jurisdiction rule prohibiting DIFC-licensed financial entities from routing personal
    data through offshore cloud infrastructure, satisfied at the architectural level by a local-first
    node that never traverses an offshore cloud.
  must-implement:
  - DIFC-tenant nodes route personal data only through infrastructure inside the permitted jurisdiction
  - Sync paths and relay endpoints for DIFC tenants are independently auditable
  - The deployment topology documents which components are inside DIFC and which are not
  verification: A network-egress test for a DIFC tenant shows no personal data leaving permitted infrastructure
    under any operational condition including degraded sync
