- id: COMP-08
  name: Russia Federal Law 242-FZ initial-collection localization
  source: appendix-f §"Russia Federal Law 242-FZ"
  source-paper: null
  definition: The 2015 amendment to Federal Law 152-FZ requiring personal data of Russian citizens to
    be initially collected and stored on servers physically located in Russia, predating GDPR and establishing
    the doctrinal pattern of hard territorial mandates that local-first satisfies architecturally.
  must-implement:
  - Initial collection of Russian-citizen personal data targets Russia-resident nodes
  - Subsequent processing nodes outside Russia receive only data already domiciled inside Russia
  - The deployment topology identifies which nodes are inside the Russian Federation
  verification: A data-flow trace for a Russian-citizen record shows initial write to a Russia-resident
    node before any cross-border replication
