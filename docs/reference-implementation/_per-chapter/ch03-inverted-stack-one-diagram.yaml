    schema epochs for breaking changes
  - CRDT history is bounded by a tiered GC policy with a stale-peer recovery protocol
  verification: Threat model documents endpoint compromise scenarios and the four-layer defense mapping;
    migration test runs five concurrent schema versions to convergence; GC test reintegrates a peer offline
    for longer than the active retention window.
