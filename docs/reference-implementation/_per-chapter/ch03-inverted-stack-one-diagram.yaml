- id: INV-17
  name: Honest new failure modes introduced by the architecture
  source: ch03 §"How This Changes Failure Modes"
  source-paper: v13 §5
  definition: The inversion introduces three categorically new operational concerns — endpoint-compromise
    expansion of the attack surface, schema migration across independently-updating nodes, and CRDT garbage-collection
    debt across long-lived peers — each of which the architecture addresses but does not eliminate.
  must-implement:
  - Endpoint defense uses layered controls (encryption at rest, field-level encryption, sync-layer minimization,
    circuit-breaker quarantine)
