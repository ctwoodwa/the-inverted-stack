- id: INV-03
  name: Presentation layer owns no state
  source: 'ch03 §"Layer 1: Presentation"'
  source-paper: v5 §2.1
  definition: The presentation layer renders directly from the local store, owns no independent state,
    caches nothing on its own, and makes no data decisions.
  must-implement:
  - UI components read from the local store and do not maintain a parallel cache
  - The same component surface renders against a local desktop node and a hosted tenant node without modification
  - UI behavior is unchanged when no peers are reachable, except for the sync-status indicator
  verification: UI integration test renders the same component tree against an Anchor instance and a Bridge
    instance and asserts identical output for the same store state.
