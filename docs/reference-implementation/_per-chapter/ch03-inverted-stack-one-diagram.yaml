- id: INV-06
  name: Per-record-class CAP positioning
  source: 'ch03 §"Layer 2: Application Logic"'
  source-paper: v13 §5
  definition: CAP trade-offs are made per record class rather than per application — documents and notes
    are AP via CRDT merge, identity facts are AP with deferred merge, reservations and slots are CP via
    distributed lease, and financial transactions are CP under lease plus ledger ordering.
  must-implement:
  - Each record class declares its CAP position in the schema
  - AP-class records use CRDT merge with deterministic semantics
  - CP-class records require lease acquisition before commit
  - Audit-bound records commit through an append-only ledger with strict ordering
  verification: Schema definition enumerates CAP class per record type; integration test demonstrates
    AP-class writes succeed under partition while CP-class writes block until quorum returns.
  kleppmann-properties:
  - P3
  - P4
  scope: foundational
  failure-modes:
  - partition
  - clock-skew
  tags:
  - cap
  - crdt
  - lease
  - schema
  failed-conditions:
  - Each record class does not declare its CAP position in the schema
  - AP-class does not record use CRDT merge with deterministic semantics
  - CP-class does not record require lease acquisition before commit
  - Audit-bound does not record commit through an append-only ledger with strict ordering
  - 'Verification check does not pass: Schema definition enumerates CAP class per record type; integration
