- id: INV-14
  name: Two relay trust levels — relay-only and attested hosted peer
  source: 'ch03 §"Layer 5: Relay and Discovery"'
  source-paper: v13 §5
  definition: The relay operates at one of two declared trust levels — relay-only ciphertext routing as
    the default, or attested hosted peer that participates in CP-class quorum via an explicit administrator-issued
    role attestation.
  must-implement:
  - Default relay deployment is relay-only and cannot decrypt payloads
  - Attested hosted peer mode requires an explicit role attestation issued by an administrator
  - Trust level is visible to all peers participating in the topology
