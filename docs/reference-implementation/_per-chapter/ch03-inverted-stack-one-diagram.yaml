concepts:
- id: INV-01
  name: Local node as primary; cloud relay as optional peer
  source: ch03 §"The Inversion in One Sentence"
  source-paper: v13 §5
  definition: The architectural inversion replaces SaaS's cloud-primary / device-cache topology with a
    topology where the local node holds the authoritative copy and any cloud relay participates only as
    an optional sync peer.
  must-implement:
  - Application reads and writes hit the local store as the primary data path
  - No code path requires cloud connectivity for core function
  - Cloud relay participation is optional and removable without changing application behavior
  - The node has no degraded mode when no peers are reachable
  verification: Disconnect all network interfaces; the application performs every core operation identically
    and the relay role can be unplugged without rebuilding the application.
  kleppmann-properties:
  - P1
  - P3
  - P5
  - P7
  scope: foundational
  failure-modes:
  - vendor-outage
  - partition
  - data-residency-objection
  tags:
  - thesis
  - architecture
  - inversion
  failed-conditions:
  - 'Fails to satisfy: Application reads and writes hit the local store as the primary data path'
  - No code path does not require cloud connectivity for core function
  - Cloud relay participation is not optional and removable without changing application behavior
  - The node has not no degraded mode when no peers are reachable
  - 'Verification check does not pass: Disconnect all network interfaces; the application performs every
    core operation identically and the relay role can be u...'
- id: INV-02
  name: Five-layer reference model
  source: ch03 §"The Five Layers"
  source-paper: v13 §5
  definition: The inverted stack decomposes into five layers — Presentation, Application Logic, Sync Daemon,
    Storage, and Relay/Discovery — each with a single owner, a single boundary, and an explicit answer
    to the network-unavailable question.
  must-implement:
  - Each layer has one owner and a documented boundary
  - Each layer has a defined behavior when no peer is reachable
  - Layers are addressable independently and replaceable without rewriting adjacent layers
  verification: Architecture documentation enumerates five layers, each with owner, boundary, and offline-behavior
    statements; the reference implementation contains a separate component per layer.
  kleppmann-properties:
  - P3
  scope: inverted-stack-specific
  failure-modes: []
  tags:
  - architecture
  - reference-model
  failed-conditions:
  - Each layer has not one owner and a documented boundary
  - Each layer has not a defined behavior when no peer is reachable
  - Layers are not addressable independently and replaceable without rewriting adjacent layers
