- id: INV-04
  name: Four-state node health indicator
  source: 'ch03 §"Layer 1: Presentation"'
  source-paper: v5 §2.1
  definition: The presentation layer surfaces sync state as four named states — sync-healthy, stale, offline,
    and conflict-pending — each communicated through more than color and announced to assistive technology
    on transition.
  must-implement:
  - Health indicator exposes sync-healthy, stale, offline, and conflict-pending states
