- id: INV-13
  name: Relay as ciphertext-only optional peer
  source: 'ch03 §"Layer 5: Relay and Discovery"'
  source-paper: v13 §5
  definition: The relay is an optional component that receives, fans out, and rendezvous-routes encrypted
    CRDT deltas without ever holding decryption keys, decrypted content, or authoritative data.
  must-implement:
  - The relay holds no keys for any payload it routes
  - The relay stores no plaintext from any peer
  - The relay protocol is open and the relay is self-hostable
  - Removing the relay leaves LAN and mesh-VPN sync unaffected
  verification: Relay process inspection confirms no key material is present; protocol fuzz test confirms
    the relay rejects any request that requires plaintext access; replacing the managed relay with a self-hosted
    relay requires no node configuration change.
  kleppmann-properties:
