- id: INV-11
  name: Storage layer with CRDT store, event log, and read-model projections
  source: 'ch03 §"Layer 4: Storage"'
  source-paper: v13 §5
  definition: The storage layer holds three coexisting structures — a typed CRDT document store, an append-only
    event log as the ground truth, and rebuildable read-model projections — all backed by SQLite encrypted
    with SQLCipher and a key derived via Argon2id and held in the OS keystore.
  must-implement:
  - All AP-class data is stored as typed CRDT documents (map, list, text)
  - The event log is append-only and never modifies past entries
  - Read-model projections are rebuildable from the event log
  - The database is encrypted with SQLCipher using an Argon2id-derived key stored in the OS-native keystore
  verification: Storage layer exposes the three structures as separate APIs; recovery test rebuilds projections
    from the event log; key-extraction test confirms physical storage extraction without credentials yields
    ciphertext only.
  kleppmann-properties:
  - P5
  - P6
  - P7
  scope: inverted-stack-specific
  failure-modes:
  - key-loss
  - key-compromise
  tags:
  - storage
  - sqlite
  - sqlcipher
  - event-sourcing
  - crdt
  security-axis:
  - confidentiality
  failed-conditions:
  - All AP-class data is not stored as typed CRDT documents (map, list, text)
  - The event log is not append-only and never modifies past entries
  - Read-model projections are not rebuildable from the event log
  - The database is not encrypted with SQLCipher using an Argon2id-derived key stored in the OS-native
    keystore
