- id: INV-07
  name: Sync daemon as separate long-running process
  source: 'ch03 §"Layer 3: Sync Daemon"'
  source-paper: v13 §5
  definition: The sync daemon runs as a separate OS-managed long-running process that survives application
    restarts and communicates with the application shell over a Unix-domain socket.
  must-implement:
  - The daemon registers with the OS service manager and starts at login independently of the application
    window
  - The daemon continues collecting peer deltas while the application is closed or crashed
  - Application-to-daemon communication uses a local IPC socket, not in-process calls
  verification: Process listing confirms the daemon runs independently of the app; restart test confirms
    deltas received during app downtime are present when the app reconnects.
  kleppmann-properties:
