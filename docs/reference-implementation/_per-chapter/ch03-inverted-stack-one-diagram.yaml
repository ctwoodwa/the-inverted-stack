- id: INV-18
  name: Three developer-habit shifts under the inversion
  source: ch03 §"What Changes for the Developer"
  source-paper: v13 §5
  definition: Building under the inversion shifts three habits — writes succeed on local durability rather
    than remote acknowledgement, business logic owns its correctness independently of the network, and
    failure modes are explicit rather than papered over.
