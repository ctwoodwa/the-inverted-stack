- id: INV-08
  name: Three-tier peer discovery hierarchy
  source: 'ch03 §"Layer 3: Sync Daemon"'
  source-paper: v13 §5
  definition: Peer discovery follows a fixed hierarchy — mDNS on the local network, mesh-VPN (WireGuard-based)
    for NAT traversal across networks, and the managed relay as the final fallback.
  must-implement:
  - Daemon attempts mDNS discovery on the local network first
  - Daemon falls back to mesh-VPN peer discovery across networks
  - Daemon uses the managed relay only when neither prior tier yields peers
  - Each tier is independently configurable and removable
  verification: Daemon trace shows the three-tier order on cold start; LAN-only test confirms two devices
    on the same Wi-Fi sync with no relay traffic.
  kleppmann-properties:
  - P3
  - P4
  - P7
  scope: inverted-stack-specific
  failure-modes:
  - peer-discovery-failure
  tags:
