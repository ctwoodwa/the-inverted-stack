  - id: CRDT-32
    name: Layer 5 — decentralized archival with proof-of-storage (opt-in enterprise)
    source: ch12 §"The Five-Layer Storage Architecture"
    source-paper: v13 §9
    definition: Layer 5 commits signed archive segments from the event log to a decentralized storage network that issues cryptographic proofs of storage and integrity, satisfying regulated-industry audit requirements where self-attesting archives would not pass scrutiny — opt-in and never an operational dependency.
