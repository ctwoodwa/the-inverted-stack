- id: NODE-27
  name: Ciphertext-only managed relay
  source: ch11 §"Process Boundaries and IPC"
  source-paper: v13 §5
  definition: The managed relay observes and routes ciphertext only, holds no decryption keys, and is
    required only when nodes on different networks lack a direct IP path.
