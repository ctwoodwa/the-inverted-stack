  source: ch11 §"Kernel Responsibilities"
  source-paper: v13 §5
  definition: 'The kernel routes writes to one of three coordinators based on tier classification: ICrdtEngine
    for AP-class records with deterministic merge, Flease coordinator for CP-class records requiring linearizable
    writes, and an append-only ledger engine for records not subject to merge.'
  must-implement:
