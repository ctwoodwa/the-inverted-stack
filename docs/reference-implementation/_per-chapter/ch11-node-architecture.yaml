- id: NODE-24
  name: Length-prefixed CBOR IPC channel
  source: ch11 §"Process Boundaries and IPC"
  source-paper: v13 §5
  definition: The host-to-daemon channel uses Unix domain sockets on POSIX and named pipes on Windows,
    framed as CBOR payloads preceded by a 4-byte big-endian length prefix with frames capped at 16 MiB.
  must-implement:
  - POSIX implementation uses UnixDomainSocketEndPoint with file-permission confinement
  - Windows implementation uses named pipes with OS-level access controls
  - Every message is a CBOR payload prefixed by a 4-byte big-endian length
  - Frames exceeding 16 MiB are rejected; chunking is done at the application layer
  - All IPC messages use CBOR per RFC 8949 with canonical mode for signed messages
  verification: Wire-format test inspects an IPC frame and confirms the prefix-then-CBOR layout; oversize-frame
    test confirms rejection.
