  source: ch11 §"Kernel Responsibilities"
  source-paper: v13 §5
  definition: Sunfish.Kernel.Buckets evaluates sync-bucket eligibility against attestation bundles received
    during peer handshake, refusing non-attested peers before any bucket data is transferred.
  must-implement:
