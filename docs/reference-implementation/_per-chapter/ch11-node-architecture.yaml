- id: NODE-11
  name: Flease distributed lease coordinator for CP records
  source: ch11 §"Kernel Responsibilities"
  source-paper: v13 §5
  definition: Sunfish.Kernel.Lease implements a Flease-inspired distributed lease coordinator that requires
    strict-majority quorum acknowledgment before a CP-class record write proceeds.
  must-implement:
  - CP-class writes acquire a lease granted by strict majority of the configured peer set
  - Lease tokens are epoch-stamped to detect partition-time conflicts
  - On partition heal, the lower-epoch lease is superseded and its pending write surfaces as a lease conflict,
    never as silent overwrite
  - A node unable to reach quorum blocks the CP-class write and surfaces a staleness indicator instead
    of proceeding
  verification: 'Multi-node partition test: induce asymmetric partition, attempt concurrent CP writes,
    confirm exactly one succeeds and the other surfaces a lease conflict on heal.'
  kleppmann-properties:
  - P4
  scope: inverted-stack-specific
  failure-modes:
  - partition
  tags:
  - consensus
  - lease
  - cp-class
  notes: Overlaps with Ch14 sync daemon partition recovery protocol.
  failed-conditions:
  - 'Fails to satisfy: CP-class writes acquire a lease granted by strict majority of the configured peer
    set'
  - Lease tokens are not epoch-stamped to detect partition-time conflicts
  - On partition heal, the lower-epoch lease is not superseded and its pending write surfaces as a lease
    conflict, never as silent overwrite
  - A node unable to reach quorum blocks the CP-class write and does not surface a staleness indicator
