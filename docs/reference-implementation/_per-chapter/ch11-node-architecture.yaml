- id: NODE-01
  name: Microkernel monolith pattern
  source: ch11 §"The Microkernel Monolith"
  source-paper: v13 §5
  definition: A small stable kernel owns infrastructure concerns while domain plugins implementing well-defined
    extension-point contracts run in-process within the same monolith.
  must-implement:
  - Kernel exposes a fixed set of infrastructure contracts that plugins consume but do not implement
  - All plugins execute in-process with the kernel with no per-plugin processes or inter-plugin RPC
  - Domain plugins are versioned and deployed independently of the kernel
  verification: Sunfish.Kernel.Runtime package exists exposing INodeHost and IPluginRegistry; plugin-to-kernel
    calls occur via in-process method dispatch with no serialization layer.
  kleppmann-properties:
  - P1
  - P5
  scope: inverted-stack-specific
  failure-modes: []
  tags:
  - architecture
  - kernel
  - plugins
  failed-conditions:
  - Kernel does not expose a fixed set of infrastructure contracts that plugins consume but do not implement
  - 'Fails to satisfy: All plugins execute in-process with the kernel with no per-plugin processes or
    inter-plugin RPC'
  - Domain plugins are not versioned and deployed independently of the kernel
  - 'Verification check does not pass: Sunfish.Kernel.Runtime package exists exposing INodeHost and IPluginRegistry;
    plugin-to-kernel calls occur via in-proces...'
- id: NODE-02
  name: Kernel-plugin boundary by change cadence
  source: ch11 §"The Microkernel Monolith"
  source-paper: v13 §5
  definition: Concerns are assigned to the kernel when changes require coordinated updates across all
    plugins, and to plugins when they encode independently-evolving domain knowledge.
  must-implement:
  - Kernel responsibilities cover node lifecycle, sync daemon, CRDT engine abstraction, schema migration,
    security primitives, partial sync engine, and plugin registry
  - Plugin responsibilities cover aggregates, commands, events, projections, and UI blocks
  - No domain-specific knowledge is hard-coded inside the kernel
  verification: Static analysis of kernel namespaces shows no references to specific domain types (scheduling,
    ledger, billing, etc.); kernel package set matches the eight named infrastructure concerns.
  kleppmann-properties:
  - P5
  scope: inverted-stack-specific
  failure-modes: []
  tags:
  - architecture
  - separation-of-concerns
  security-axis:
  - authenticity
