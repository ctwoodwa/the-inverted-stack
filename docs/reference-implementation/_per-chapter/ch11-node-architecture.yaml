  - Plugins cannot mutate tier classification at runtime
  - Kernel routes each write to the coordinator matching the declared tier
  verification: Plugin manifest schema enforces tier declaration; load-time test rejects manifests missing
    tier classifications; behavioral test confirms a CP-declared record never bypasses the lease coordinator.
  kleppmann-properties:
