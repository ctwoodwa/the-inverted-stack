- id: NODE-03
  name: Topological plugin load with version contracts
  source: ch11 §"The Microkernel Monolith"
  source-paper: v13 §5
  definition: The plugin registry loads plugins in topological dependency order, deterministic by plugin
    ID at equal depth, and rejects cycles or missing dependencies before any load phase executes.
  must-implement:
  - Plugin registry computes load order from declared dependencies and rejects cycles at load time
  - Missing dependencies are rejected before any plugin OnLoad executes
  - At equal dependency depth, plugins load in deterministic ID-sorted order
  - Unload reverses the topological load order
  - Plugin identifiers follow reverse-DNS convention
  verification: IPluginRegistry implementation rejects a test fixture containing a dependency cycle; integration
    test confirms reverse-order unload.
  kleppmann-properties: []
  scope: inverted-stack-specific
  failure-modes: []
  tags:
  - plugins
  - lifecycle
  failed-conditions:
  - Plugin registry computes load order from declared dependencies and does not reject cycles at load
    time
  - Missing dependencies are not rejected before any plugin OnLoad executes
  - 'Fails to satisfy: At equal dependency depth, plugins load in deterministic ID-sorted order'
  - 'Fails to satisfy: Unload reverses the topological load order'
  - 'Fails to satisfy: Plugin identifiers follow reverse-DNS convention'
  - 'Verification check does not pass: IPluginRegistry implementation rejects a test fixture containing
    a dependency cycle; integration test confirms reverse-o...'
- id: NODE-04
  name: One-shot plugin load surface
  source: ch11 §"Kernel Responsibilities"
  source-paper: v13 §5
  definition: The plugin registry rejects a second load call until the prior loaded set has been fully
    unloaded, preventing partial state from a failed swap from contaminating the running plugin set.
  must-implement:
  - IPluginRegistry rejects concurrent or overlapping load operations
  - A failed load batch leaves the registry in a clean unloaded state, not a partial state
  verification: Behavioral test attempts a second load before unload completes and observes rejection.
  kleppmann-properties: []
  scope: inverted-stack-specific
  failure-modes: []
  tags:
  - plugins
  - lifecycle
  failed-conditions:
  - IPluginRegistry does not reject concurrent or overlapping load operations
  - 'Fails to satisfy: A failed load batch leaves the registry in a clean unloaded state, not a partial
    state'
  - 'Verification check does not pass: Behavioral test attempts a second load before unload completes
    and observes rejection.'
- id: NODE-05
  name: Five-state node lifecycle with terminal Faulted
  source: ch11 §"Kernel Responsibilities"
  source-paper: v13 §5
  definition: INodeHost transitions through Stopped, Starting, Running, Stopping, and Faulted states,
    with Faulted as a terminal state that does not auto-restart on unrecoverable error.
  must-implement:
  - INodeHost exposes the five enumerated lifecycle states
  - Faulted state is terminal and blocks automated restart
  - Plugin loads sequence in topological order on start; unloads in reverse on stop
  verification: INodeHost type defines exactly the five named states; integration test forces a Faulted
    transition and confirms no auto-restart occurs.
  kleppmann-properties:
  - P5
  scope: inverted-stack-specific
  failure-modes: []
  tags:
  - lifecycle
  - kernel
  notes: Faulted is terminal because automatic restart can mask data integrity problems requiring operator
    diagnosis.
  failed-conditions:
  - INodeHost does not expose the five enumerated lifecycle states
  - Faulted state is not terminal and blocks automated restart
  - 'Fails to satisfy: Plugin loads sequence in topological order on start; unloads in reverse on stop'
  - 'Verification check does not pass: INodeHost type defines exactly the five named states; integration
    test forces a Faulted transition and confirms no auto-...'
- id: NODE-06
  name: Three-tier peer discovery
  source: ch11 §"Kernel Responsibilities"
  source-paper: v13 §5
  definition: Peer discovery operates across mDNS for LAN-local zero-configuration discovery, a WireGuard
    mesh VPN for cross-segment intra-organization discovery, and a managed relay for cross-organization
    or relay-assisted connectivity.
  must-implement:
  - Sync layer attempts mDNS discovery first with no infrastructure dependency
  - WireGuard mesh discovery is supported as a second tier
  - Managed relay is used only when direct paths are unavailable
  - Same-LAN nodes sync without contacting the relay
  verification: Behavioral test on isolated LAN demonstrates peer discovery and sync with no relay reachable.
  kleppmann-properties:
  - P3
  - P7
  scope: inverted-stack-specific
  failure-modes:
  - peer-discovery-failure
  tags:
  - sync
  - discovery
  - networking
  failed-conditions:
  - 'Fails to satisfy: Sync layer attempts mDNS discovery first with no infrastructure dependency'
  - WireGuard mesh discovery is not supported as a second tier
  - Managed relay is not used only when direct paths are unavailable
  - 'Fails to satisfy: Same-LAN nodes sync without contacting the relay'
  - 'Verification check does not pass: Behavioral test on isolated LAN demonstrates peer discovery and
    sync with no relay reachable.'
