- id: FILT-05
  name: Filter 5 — Team capability and timeline
  source: 'ch04 §"Filter 5: Team Capability and Timeline"'
  source-paper: v13 §20.7
  definition: A check that governs when and how to adopt local-first by honestly assessing whether the
    team has CRDT, distributed-state, multi-version schema, and key-management skills, and whether the
    timeline accommodates the required investment.
  must-implement:
  - Team capability assessment names CRDT debugging, distributed state management, multi-version schema
    migration, and key management as the four required skills
  - Timeline budgets 3–6 months for CRDT and sync work and 1–3 months for key management before naming
    a production date
  - Sub-3-month timelines route to Zone C (start with traditional SaaS, architect for local-node migration
    from day one)
  - Existing hosted products with established users route to Zone C incremental migration, not Zone A
    greenfield rebuild
  - Greenfield projects with adequate timeline and capability route to Zone A
  verification: Project plan documents the four-skill capability assessment, the CRDT/sync and key-management
    budgets, and the resulting Zone selection; production date is not set before the key-management budget
    elapses.
  kleppmann-properties: []
  scope: foundational
  failure-modes:
