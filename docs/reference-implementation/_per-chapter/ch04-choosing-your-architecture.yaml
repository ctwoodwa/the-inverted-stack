- id: DEC-10
  name: Replaceable-relay invariant
  source: 'ch04 §"Filter 4: Business Model Alignment"'
  source-paper: v13 §20.6
  definition: The structural property that the managed relay is replaceable infrastructure rather than
    a data custodian, such that relay failure degrades sync and cross-organization collaboration but never
    affects local operation or data access.
  must-implement:
  - Relay failure does not affect local operation or data access on any node
  - A team can replace its relay provider without data migration
  - The relay holds no authoritative state that is not also held on at least one node
  - Cross-organization collaboration is the only function that requires a reachable relay
  verification: Behavioral test stops the relay and confirms full local operation continues; relay-replacement
    procedure swaps providers without migrating authoritative data.
