- id: DEC-04
  name: Zone B — Centralized SaaS outcome (when local-first is wrong)
  source: ch04 §"The Three Outcome Zones"
  source-paper: v13 §20.8
  definition: The outcome when Filter 1 or Filter 2 returns a hard "centralized only" verdict, applying
    to multi-tenant aggregation as core value, anonymous public access, millisecond global consistency
    requirements, and pure content delivery.
  must-implement:
  - Architecture decision record cites the specific Filter 1 or Filter 2 result that routed the product
    to centralized
  - Local-first is not retrofitted onto a domain whose primary value is aggregated state or whose core
    loop requires CP-class consistency
  - The architecture serves the domain — building financial trading infrastructure on a local-node architecture
    is recognized as wrong for the domain
  verification: Architecture decision record names which filter forced Zone B and identifies the aggregated
    value or consistency invariant that justifies centralization.
