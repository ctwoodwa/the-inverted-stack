- id: DEC-05
  name: Zone C — Hybrid outcome
  source: ch04 §"The Three Outcome Zones"
  source-paper: v13 §20.8
  definition: The outcome when filters pass for user-scoped primary records but fail for specific coordination
    features, or when Filter 5 indicates a timeline incompatible with full Zone A investment, where the
    local node handles user-owned data and a cloud relay handles sync, cross-organization collaboration,
    payments, and compliance reporting.
  must-implement:
  - The local node holds all user-owned data and performs all day-to-day compute
  - The cloud relay handles sync, cross-organization collaboration, payment-class transactions, and compliance
    reporting
  - A traditional web layer handles public-facing surfaces when present
  - Hybrids are designed with an explicit trajectory toward Zone A; server-side logic is not allowed to
    accumulate indefinitely
  verification: Architecture decision record documents which features run on the relay versus the node;
    reference implementation is the Bridge accelerator under Sunfish; periodic review confirms server-side
