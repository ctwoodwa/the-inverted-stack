- id: FILT-03
  name: Filter 3 — Connectivity and operational environment
  source: 'ch04 §"Filter 3: Connectivity and Operational Environment"'
  source-paper: v13 §20.5
  definition: A check that names the actual deployment environment and routes to local-first when users
    operate in field, air-gapped, regulated-residency, clinical, or chronically intermittent-connectivity
    conditions.
  must-implement:
  - Architecture decision record names the physical deployment environment of the primary user, not the
    cloud provider's SLA
  - Field, air-gapped, MDM-governed, residency-regulated, and chronically-intermittent environments route
    to local-first as mandatory or strongly preferred
  - The product treats absence of network as a normal operating mode, not a degraded one — input is accepted
    and writes are queued without network access
  - Always-online browser-only zero-install scenarios are the only category routed to traditional SaaS
    at this filter
  verification: Architecture decision record names the actual environments; behavioral test confirms the
    application accepts input and persists writes with no network present, distinguished from a degraded-but-online
    state.
