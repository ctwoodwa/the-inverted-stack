- id: DEC-02
  name: Mixed-ownership architecture pattern
  source: ch04 §"The One Question That Decides Everything"
  source-paper: v13 §20.2
  definition: A product whose primary records are user-owned but which also exposes aggregated surfaces
    routes the primary records through the local-node data plane and treats aggregated surfaces as optional
    read models on a separate service layer.
  must-implement:
  - Primary user-owned records live on the local-node data plane
  - Aggregated surfaces (org dashboards, cross-team reports, benchmarking) are served by a separate service
    that treats local nodes as the source of truth
  - Aggregated read models are not authoritative; loss of the aggregation service does not impair access
    to primary records
  verification: System diagram shows aggregated surfaces as downstream consumers of node-sourced data;
    integration test confirms primary records remain readable and writable after the aggregation service
    is stopped.
  kleppmann-properties:
  - P3
  - P5
  - P7
  scope: inverted-stack-specific
  failure-modes:
  - vendor-outage
  tags:
  - architecture
  - hybrid
  - zone-c
  - read-models
  failed-conditions:
