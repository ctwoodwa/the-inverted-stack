- id: DEC-03
  name: Zone A — Local-first node outcome
  source: ch04 §"The Three Outcome Zones"
  source-paper: v13 §20.8
  definition: The outcome when all five filters clear and the team has timeline and capability to build
    the full local-first node from the start, where every user runs a complete local node and the relay
    is optional infrastructure.
  must-implement:
  - Every user runs a complete local node holding authoritative state
  - The relay is optional infrastructure for peer discovery and backup, not a runtime dependency
  - The application operates at full fidelity with no server reachable
  - Domain fit is single-tenant or team-scoped productivity, professional or enterprise users, software
    whose value exists before any other user joins
  verification: Integration test confirms the application provides full functionality with no relay reachable;
    reference implementation is the Anchor accelerator under Sunfish.
  kleppmann-properties:
  - P1
  - P2
