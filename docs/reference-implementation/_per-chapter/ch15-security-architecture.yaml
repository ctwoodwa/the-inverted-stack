- id: KEY-08
  name: Key compromise incident response procedure
  source: ch15 §"Key Compromise Incident Response"
  source-paper: v13 §11
  definition: On compromise, the administrator generates a new KEK from fresh entropy (never derived from
    the compromised key), re-wraps all affected DEKs, distributes new bundles, then triggers discard of
    the old KEK and a revocation broadcast.
  must-implement:
  - New KEK is generated from fresh entropy, never derived from the compromised key
  - All DEKs in scope are re-wrapped under the new KEK before old KEK discard
  - Old KEK discard signal zeros in-memory copies and removes keystore entries on every node
  - Revocation event is published for the compromised key identifier
  - Affected users receive a notification specifying the data-at-risk window
  verification: Incident-response runbook is exercised end-to-end and produces an audit log showing each
    step in order
  kleppmann-properties:
  - P6
  scope: foundational
  failure-modes:
  - key-compromise
  tags:
  - incident-response
  - key-rotation
  security-axis:
  - confidentiality
  - authenticity
  failed-conditions:
  - New KEK is not generated from fresh entropy, never derived from the compromised key
  - All DEKs in scope are not re-wrapped under the new KEK before old KEK discard
  - 'Fails to satisfy: Old KEK discard signal zeros in-memory copies and removes keystore entries on every
    node'
  - Revocation event is not published for the compromised key identifier
  - 'Fails to satisfy: Affected users receive a notification specifying the data-at-risk window'
  - 'Verification check does not pass: Incident-response runbook is exercised end-to-end and produces
    an audit log showing each step in order'
