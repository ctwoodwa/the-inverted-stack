- id: SEC-01
  name: Distributed honeypot threat model
  source: ch15 §"Threat Model"
  source-paper: v13 §11
  definition: Distributing data to endpoints does not eliminate the honeypot problem but spreads it across
    many smaller perimeters whose weakest device sets the attacker's minimum viable entry cost.
  must-implement:
  - Architecture documents that endpoint compromise is an expected event, not an exception
  - System bounds blast radius rather than denying endpoint exposure
  verification: Threat model document explicitly enumerates endpoint compromise as in-scope and states
    the bounded blast radius as a design property
  kleppmann-properties:
  - P6
  - P7
  scope: foundational
  failure-modes:
  - key-compromise
  tags:
  - threat-model
  - security
  - philosophy
  failed-conditions:
  - Architecture documents that endpoint compromise is not an expected event, not an exception
  - 'Fails to satisfy: System bounds blast radius rather than denying endpoint exposure'
  - 'Verification check does not pass: Threat model document explicitly enumerates endpoint compromise
    as in-scope and states the bounded blast radius as a des...'
- id: SEC-02
  name: Three blast-radius bounding properties
  source: ch15 §"Threat Model"
  source-paper: v13 §11
  definition: Each node holds only data its role subscriptions permit, per-role keys are absent from non-member
    nodes, and key compromise does not expose historical data encrypted under previously rotated keys.
  must-implement:
  - Node storage contains only data for roles the node holds
  - Per-role encryption keys are absent from non-member nodes
  - Rotated keys remain absent from compromised nodes after rotation
  verification: Compromise simulation test confirms that seizing one node's full disk and memory exposes
    only data for that node's current role keys
  kleppmann-properties:
  - P6
  - P7
  scope: foundational
  failure-modes:
  - key-compromise
  tags:
  - threat-model
  - blast-radius
  - key-management
  security-axis:
  - confidentiality
  failed-conditions:
  - 'Fails to satisfy: Node storage contains only data for roles the node holds'
  - Per-role encryption keys are not absent from non-member nodes
  - 'Fails to satisfy: Rotated keys remain absent from compromised nodes after rotation'
