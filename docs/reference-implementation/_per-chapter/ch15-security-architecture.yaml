- id: SEC-05
  name: Defense in depth — four independent layers
  source: ch15 §"Four Defensive Layers"
  source-paper: v13 §11
  definition: Security applies four independent layers — encryption at rest, field-level encryption, stream-level
    data minimization, and circuit breaker quarantine — where defeating one layer yields no advantage
    on the next.
  must-implement:
  - Each layer is implemented in a separately auditable module
  - No layer's correctness depends on another layer being uncompromised
  verification: Static analysis confirms no shared trust assumption between the four layer implementations
  kleppmann-properties:
  - P6
  scope: inverted-stack-specific
  failure-modes:
  - key-compromise
  tags:
  - defense-in-depth
  - architecture
  security-axis:
  - confidentiality
  failed-conditions:
  - Each layer is not implemented in a separately auditable module
  - 'Fails to satisfy: No layer''s correctness depends on another layer being uncompromised'
  - 'Verification check does not pass: Static analysis confirms no shared trust assumption between the
    four layer implementations'
- id: SEC-06
  name: SQLCipher encryption at rest with OS keystore root
  source: ch15 §"Layer 1 — Encryption at Rest"
  source-paper: v13 §11
  definition: Local databases use SQLCipher with the database key derived via HKDF-SHA256 from a 256-bit
    root seed stored in the OS-native keystore (Keychain, DPAPI, or Linux Secret Service).
  must-implement:
  - Local database files are encrypted using SQLCipher
  - Root seed is 256 bits from a CSRNG and stored only in the OS keystore
  - Database key is derived via HKDF-SHA256 from the root seed
  - Database key is loaded on demand and zeroed after the session closes
  - Database key is never written to disk
  verification: Disk forensic capture of the database file without OS keystore access yields no plaintext;
    process memory inspection after database close finds no residual key bytes
  kleppmann-properties:
  - P6
  - P7
  scope: inverted-stack-specific
  failure-modes:
  - key-compromise
  tags:
  - encryption-at-rest
  - sqlcipher
  - key-derivation
  security-axis:
  - confidentiality
  failed-conditions:
  - Local database files are not encrypted using SQLCipher
  - Root seed is not 256 bits from a CSRNG and stored only in the OS keystore
  - Database key is not derived via HKDF-SHA256 from the root seed
  - Database key is not loaded on demand and zeroed after the session closes
  - Database key is not never written to disk
  - 'Verification check does not pass: Disk forensic capture of the database file without OS keystore
    access yields no plaintext; process memory inspection aft...'
- id: SEC-07
  name: Field-level encryption with per-role keys
  source: ch15 §"Layer 2 — Field-Level Encryption"
  source-paper: v13 §11
  definition: Records in high-sensitivity buckets carry per-field encryption under per-role symmetric
    keys distinct from the database key, so opening the database does not grant access to fields the node
    lacks the role for.
  must-implement:
  - Fields in high-sensitivity buckets are encrypted with per-role keys
  - The field-level key is distinct from the database key
  - Decryption fails closed when the role key is absent
  verification: Test demonstrates a node with database access but without a role key cannot read field-encrypted
    records for that role
  kleppmann-properties:
  - P6
  - P7
  scope: inverted-stack-specific
  failure-modes:
  - key-compromise
  tags:
  - field-encryption
  - role-keys
  security-axis:
  - confidentiality
  failed-conditions:
  - Fields in high-sensitivity buckets are not encrypted with per-role keys
  - The field-level key is not distinct from the database key
  - Decryption fails closed when the role key is not absent
  - 'Verification check does not pass: Test demonstrates a node with database access but without a role
    key cannot read field-encrypted records for that role'
- id: SEC-08
  name: Send-tier subscription filtering invariant
  source: ch15 §"Layer 3 — Stream-Level Data Minimization"
  source-paper: v13 §11
  definition: The sync daemon enforces subscription filtering before any event leaves the originating
    node, so non-subscribed nodes never receive events regardless of relay state or administrator misconfiguration.
  must-implement:
  - Sync daemon filters events at the originating node before transmission
  - No code path bypasses send-tier filtering for any event class
  verification: Wire-protocol test confirms that events outside a peer's declared subscription set are
    never observed entering the relay from the originating node
  kleppmann-properties:
  - P6
  scope: inverted-stack-specific
  failure-modes:
  - key-compromise
  tags:
  - sync
  - data-minimization
  - access-control
  failed-conditions:
  - 'Fails to satisfy: Sync daemon filters events at the originating node before transmission'
  - 'Fails to satisfy: No code path bypasses send-tier filtering for any event class'
  - 'Verification check does not pass: Wire-protocol test confirms that events outside a peer''s declared
    subscription set are never observed entering the relay...'
- id: SEC-09
  name: Circuit breaker quarantine for offline writes
  source: ch15 §"Layer 4 — Circuit Breaker and Quarantine"
  source-paper: v13 §11
  definition: Writes from a reconnecting node that conflict with current authorization policy are held
    in quarantine pending administrator review rather than discarded or auto-applied.
  must-implement:
  - Reconnecting nodes' writes are validated against current team state
  - Conflicting writes enter a quarantine queue
  - Administrator promotes or rejects each quarantined write with logged reason
  - Audit trail records what was offered, who reviewed, and what decision was made
  verification: Quarantine review test produces an audit record containing offered write, reviewer identity,
    decision, and reason
  kleppmann-properties:
  - P6
  - P7
  scope: inverted-stack-specific
  failure-modes:
  - key-compromise
  tags:
  - authorization
  - quarantine
  - audit
  failed-conditions:
  - Reconnecting nodes' writes are not validated against current team state
  - 'Fails to satisfy: Conflicting writes enter a quarantine queue'
  - Administrator promotes or does not reject each quarantined write with logged reason
  - Audit trail does not record what was offered, who reviewed, and what decision was made
  - 'Verification check does not pass: Quarantine review test produces an audit record containing offered
    write, reviewer identity, decision, and reason'
- id: KEY-01
  name: Four-tier key hierarchy
  source: ch15 §"Key Hierarchy"
  source-paper: v13 §11
  definition: Keys are organized in four independently rotatable tiers — root organization key, role KEKs,
    node-level wrapped KEK copies, and per-document DEKs.
  must-implement:
  - Each tier has a distinct key type with its own rotation procedure
  - Rotation of any tier does not require rotating other tiers
  verification: Rotation procedure for each tier exists and is independently exercisable in isolation
    tests
  kleppmann-properties:
  - P6
  - P7
  scope: inverted-stack-specific
  failure-modes:
  - key-compromise
  tags:
  - key-hierarchy
  - key-management
  security-axis:
  - confidentiality
  - authenticity
  failed-conditions:
  - Each tier has not a distinct key type with its own rotation procedure
  - 'Fails to satisfy: Rotation of any tier does not require rotating other tiers'
  - 'Verification check does not pass: Rotation procedure for each tier exists and is independently exercisable
    in isolation tests'
- id: KEY-02
  name: KEK/DEK envelope encryption
  source: ch15 §"Key Hierarchy"
  source-paper: v13 §11
  definition: Each document is encrypted under a freshly generated 256-bit DEK using AES-256-GCM, and
    the DEK is itself wrapped under the role's current KEK so KEK rotation re-wraps DEKs without re-encrypting
    document bodies.
  must-implement:
  - DEK is 256 bits from the OS CSRNG, generated fresh per document
  - Document body encrypted with AES-256-GCM, 96-bit random nonce per encryption, 128-bit tag
  - DEK wrapped with current role KEK using AES-256-GCM with fresh 96-bit nonce
  - Wrapped DEK stored alongside ciphertext
  - KEK never touches document body
  - DEK does not persist in unwrapped form beyond the active decryption operation
  verification: Encryption library test confirms nonces are randomly generated per encryption event and
    never reused under the same key
  kleppmann-properties:
  - P6
  scope: inverted-stack-specific
  failure-modes:
  - key-compromise
  tags:
  - envelope-encryption
  - aes-gcm
  - dek
  - kek
  security-axis:
  - confidentiality
  - authenticity
  failed-conditions:
  - DEK is not 256 bits from the OS CSRNG, generated fresh per document
  - 'Fails to satisfy: Document body encrypted with AES-256-GCM, 96-bit random nonce per encryption, 128-bit
    tag'
  - 'Fails to satisfy: DEK wrapped with current role KEK using AES-256-GCM with fresh 96-bit nonce'
  - 'Fails to satisfy: Wrapped DEK stored alongside ciphertext'
  - 'Fails to satisfy: KEK never touches document body'
  - 'Fails to satisfy: DEK does not persist in unwrapped form beyond the active decryption operation'
