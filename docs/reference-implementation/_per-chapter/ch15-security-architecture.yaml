- id: SEC-17
  name: Crypto-shredding for GDPR Article 17
  source: ch15 §"GDPR (General Data Protection Regulation) Article 17 and Crypto-Shredding"
  source-paper: v13 §11
  definition: Erasure requests destroy the DEK for the targeted record, leaving the operation entry in
    the immutable log while making its ciphertext permanently unreadable.
  must-implement:
  - Erasure operation zeros the targeted DEK from all node keystores
  - Operation stub remains in the log with a marker indicating destroyed DEK
  - Erasure event is logged with data subject identifier, targeted operation identifier, and timestamp
  - No copy of the destroyed DEK is retained anywhere in the system
  verification: After crypto-shredding, the targeted record's ciphertext is recoverable but no key path
    exists to decrypt it
  kleppmann-properties:
  - P6
  - P7
  scope: foundational
  failure-modes: []
  tags:
  - gdpr
  - erasure
  - crypto-shredding
  - compliance
  security-axis:
  - confidentiality
  failed-conditions:
  - 'Fails to satisfy: Erasure operation zeros the targeted DEK from all node keystores'
  - 'Fails to satisfy: Operation stub remains in the log with a marker indicating destroyed DEK'
  - Erasure event is not logged with data subject identifier, targeted operation identifier, and timestamp
