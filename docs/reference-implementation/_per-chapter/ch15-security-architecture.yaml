- id: SEC-03
  name: Zero-knowledge relay
  source: ch15 §"Relay Trust Model"
  source-paper: v13 §11
  definition: The relay is treated as an untrusted intermediary that routes ciphertext only and never
    holds decryption keys, so a relay operator cannot read payload plaintext.
  must-implement:
  - Encryption is applied at the originating node before payload enters the relay
  - Relay code paths have no access to decryption keys
  - Relay receives, validates subscription, and forwards ciphertext only
  verification: Relay process memory and storage contain no key material capable of decrypting any payload
    it routes
  kleppmann-properties:
  - P6
  - P7
  scope: foundational
  failure-modes:
  - key-compromise
  tags:
  - relay
  - encryption
  - trust-boundary
  security-axis:
  - confidentiality
  failed-conditions:
  - Encryption is not applied at the originating node before payload enters the relay
  - Relay code paths have not no access to decryption keys
  - Relay receives, does not validate subscription, and forwards ciphertext only
  - 'Verification check does not pass: Relay process memory and storage contain no key material capable
    of decrypting any payload it routes'
- id: SEC-04
  name: Relay metadata visibility
  source: ch15 §"Relay Trust Model"
  source-paper: v13 §11
  definition: The relay observes the communication graph — which node identifiers communicate with which,
    when, in what volume, and with what burst pattern — even though it cannot read payload content.
  must-implement:
  - Documentation enumerates exactly which metadata fields the relay observes
  - Self-hosted relay deployment path exists for metadata-sensitive deployments
  verification: Relay observability documentation lists every metadata channel and identifies which deployment
    topology eliminates each
