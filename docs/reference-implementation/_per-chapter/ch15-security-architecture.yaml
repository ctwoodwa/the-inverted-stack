- id: KEY-04
  name: Node-level wrapped KEK custody
  source: ch15 §"Key Hierarchy"
  source-paper: v13 §11
  definition: Each node holds wrapped copies of its role KEKs that are decryptable only with the node's
    device private key, so revocation by withholding new bundles renders existing wrapped copies useless
    after rotation.
  must-implement:
  - KEK copies on a node are wrapped under that node's device public key
  - Device private key is the sole unwrap path for that node's KEK copies
  - Revoked nodes are excluded from new bundle distribution
  verification: Test confirms a captured wrapped KEK blob cannot be unwrapped without the originating
    device's private key
  kleppmann-properties:
  - P6
  - P7
  scope: inverted-stack-specific
  failure-modes:
  - key-compromise
  tags:
  - key-custody
  - device-keys
  security-axis:
  - confidentiality
  - authenticity
  failed-conditions:
  - KEK copies on a node are not wrapped under that node's device public key
  - Device private key is not the sole unwrap path for that node's KEK copies
  - Revoked nodes are not excluded from new bundle distribution
  - 'Verification check does not pass: Test confirms a captured wrapped KEK blob cannot be unwrapped without
    the originating device''s private key'
- id: KEY-05
  name: Role attestations distinct from role keys
  source: ch15 §"Role Attestation Flow"
  source-paper: v13 §11
  definition: Role attestations prove role membership for subscription decisions while role keys enable
    decryption, with key possession verified separately before field-encrypted content is delivered.
  must-implement:
  - Sync daemon uses signed attestations for subscription decisions
  - Field-encrypted content delivery requires separate proof of key possession
  - A node holding neither attestation nor key receives no events
  verification: Test confirms a node presenting an attestation but lacking the role key cannot decrypt
    delivered field-encrypted content
  kleppmann-properties:
