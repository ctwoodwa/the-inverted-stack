- id: SEC-12
  name: Re-authentication interval
  source: ch15 §"In-Memory Key Handling"
  source-paper: v13 §11
  definition: A configurable re-authentication interval (default four hours, sixty minutes for highly
    regulated deployments) evicts in-memory key material and prompts re-authentication to bound cold-boot
    and memory-forensics exposure.
  must-implement:
