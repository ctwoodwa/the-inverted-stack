- id: KEY-06
  name: Administrator-signed key bundle distribution
  source: ch15 §"Role Attestation Flow"
  source-paper: v13 §11
  definition: Per-role KEKs are wrapped per-member with the member's device public key and published as
    administrator-signed administrative events in the CRDT log, with nodes verifying the signature before
    accepting any bundle.
  must-implement:
  - Per-role KEK is generated from a fresh entropy source, not derived from any organizational root
  - KEK is wrapped per member using the member's device public key
  - Wrapped bundles are published as administrative events in the CRDT log
  - Administrative events are signed by the administrator key
  - Receiving nodes verify the signature before accepting the bundle
  verification: Test confirms an unsigned or invalidly signed bundle is rejected and never written to
    the OS keystore
  kleppmann-properties:
  - P6
  - P7
  scope: inverted-stack-specific
  failure-modes:
  - key-compromise
  tags:
  - key-distribution
  - signing
  security-axis:
  - confidentiality
  - authenticity
  failed-conditions:
  - Per-role KEK is not generated from a fresh entropy source, not derived from any organizational root
  - KEK is not wrapped per member using the member's device public key
  - Wrapped bundles are not published as administrative events in the CRDT log
  - Administrative events are not signed by the administrator key
  - 'Fails to satisfy: Receiving nodes verify the signature before accepting the bundle'
  - 'Verification check does not pass: Test confirms an unsigned or invalidly signed bundle is rejected
    and never written to the OS keystore'
