- id: LENS-LF-12
  name: Default-deny telemetry with named privacy model
  source: ch09 §"Implementation Drift Risk"
  source-paper: v13 §13
  definition: Product analytics in a local-first architecture must be specified before the first analytics
    request arrives — opt-in telemetry disabled by default, aggregate-through-relay privacy-preserving
    statistics as the only permitted centralized collection — and the chosen model is documented in an
    ADR mapped to GDPR Article 25 privacy-by-design so the line stays durable under future product pressure.
  must-implement:
  - Telemetry is opt-in and disabled by default at first install
  - Centralized analytics collection is restricted to aggregate-through-relay privacy-preserving statistics
    or none at all
  - An ADR documents the chosen telemetry model with explicit mapping to GDPR Article 25 privacy-by-design
  verification: Confirm a fresh install reports no telemetry; confirm an ADR exists naming the telemetry
    model with the GDPR Article 25 mapping; confirm centralized collection paths in the codebase emit
    only aggregate metadata.
  kleppmann-properties:
  - P6
  - P7
  scope: foundational
  failure-modes: []
  tags:
  - telemetry
  - privacy
  - gdpr
  - adr
  - drift-prevention
  failed-conditions:
  - Telemetry is not opt-in and disabled by default at first install
  - Centralized analytics collection is not restricted to aggregate-through-relay privacy-preserving statistics
    or none at all
  - 'Fails to satisfy: An ADR documents the chosen telemetry model with explicit mapping to GDPR Article
    25 privacy-by-design'
  - 'Verification check does not pass: Confirm a fresh install reports no telemetry; confirm an ADR exists
    naming the telemetry model with the GDPR Article 25 ...'
- id: LENS-LF-13
  name: Implementation drift prohibition on server-side feature gating
  source: ch09 §"Implementation Drift Risk"
  source-paper: v13 §13
  definition: A local-first architecture explicitly prohibits server-side feature flag checks, server-side
    A/B tests, and server-coordinated business logic that would re-introduce the network as a runtime
    dependency, naming this as the primary drift path that erodes local-first commitments one reasonable-sounding
    decision at a time.
  must-implement:
  - Feature flag evaluation runs entirely against the local node with no network call as a precondition
    for feature visibility
  - A/B assignment is computed locally from a deterministic seed, not retrieved from a server-side experiment
    service
  - Business logic gating is rejected at code review when it requires a server round-trip
  verification: Disconnect the network, launch the application, and confirm all features behave identically
    to a connected launch; code review checklist includes a server-side-feature-gate prohibition.
  kleppmann-properties:
  - P1
  - P3
  - P7
  scope: foundational
  failure-modes:
  - vendor-outage
  tags:
  - drift-prevention
  - feature-flags
  - governance
  failed-conditions:
  - 'Fails to satisfy: Feature flag evaluation runs entirely against the local node with no network call
    as a precondition for feature visibility'
  - A/B assignment is not computed locally from a deterministic seed, not retrieved from a server-side
    experiment service
  - Business logic gating is not rejected at code review when it requires a server round-trip
  - 'Verification check does not pass: Disconnect the network, launch the application, and confirm all
    features behave identically to a connected launch; code ...'
- id: LENS-LF-14
  name: Intermittent connectivity as architectural baseline
  source: ch09 §"Global Deployment Context — Ferreira's Empirical Note"
  source-paper: v13 §13
  definition: The architecture treats intermittent connectivity as the operational baseline for hundreds
    of millions of enterprise workers across Sub-Saharan Africa, South and Southeast Asia, and rural Latin
    America — not as a carrier-grade NAT edge case — so all sync, conflict, and recovery flows are designed
    for sessions that span many disconnected intervals.
  must-implement:
  - Sync daemon is designed for long-running sessions across repeated disconnections without manual reconnect
    actions
  - Subscription scoping at the sync daemon limits per-reconnect catch-up cost to role-relevant data
  - Conflict surfaces remain usable after multi-day partitions, not just brief outages
  verification: Run a multi-day partition simulation across the test fleet; confirm reconnect catch-up
    completes without manual intervention and the conflict inbox remains within the documented usability
    envelope.
  kleppmann-properties:
  - P3
  - P4
  - P7
  scope: foundational
  failure-modes:
  - partition
  - peer-discovery-failure
  tags:
  - global-deployment
  - intermittent-connectivity
  - baseline
  security-axis:
  - authenticity
  failed-conditions:
