- id: LENS-LF-01
  name: Plain-file application-independent export path
  source: 'ch09 §"The Blocking Issue: No Export Path"'
  source-paper: v13 §13
  definition: A user-owned local-first application must provide a single command that produces user data
    in durable application-independent formats — JSON for structured records, CSV for tabular data, Markdown
    for long-form documents — readable by any other competent software without vendor cooperation, active
    subscription, or network connectivity.
  must-implement:
  - Application exposes a single export command that runs entirely against the local node
  - Export emits JSON for structured records, CSV for tabular data, and Markdown for long-form documents
  - Export operates with no vendor cooperation, no active subscription check, and no network connectivity
    required
  - Export output is byte-for-byte readable by software that has never seen the producing application
  verification: Disconnect the network, cancel the subscription if applicable, run the export command,
    then ingest the resulting JSON/CSV/Markdown into a different application and confirm semantic equivalence
    to the source records.
  kleppmann-properties:
  - P5
  - P7
  scope: foundational
  failure-modes:
  - vendor-outage
  - vendor-acquisition
  tags:
  - data-portability
  - export
  - ownership
  - shipping-requirement
  notes: Distinguished from rclone-style backup, which preserves only the internal database format and
    therefore delivers custody rather than ownership.
  failed-conditions:
  - Application does not expose a single export command that runs entirely against the local node
  - Export does not emit JSON for structured records, CSV for tabular data, and Markdown for long-form
    documents
  - Export does not operate with no vendor cooperation, no active subscription check, and no network connectivity
    required
  - Export output is not byte-for-byte readable by software that has never seen the producing application
  - 'Verification check does not pass: Disconnect the network, cancel the subscription if applicable,
    run the export command, then ingest the resulting JSON/CS...'
- id: LENS-LF-02
  name: Non-technical disaster recovery walkthrough
  source: ch09 §"What Changed Between Rounds"
  source-paper: v13 §13
  definition: Recovery from total device loss is a documented step-by-step path that a non-technical user
    can complete unaided in under thirty minutes, ending with a working node that resumes from BYOC backup
    without exposing any technical surface such as bucket URLs or rclone paths.
  must-implement:
  - Recovery flow is specified as a sequenced user-facing walkthrough — buy device, install application,
    enter recovery code or scan team-member QR, confirm BYOC target, restore runs in background
  - Recovery substitutes a recovery code or peer-attestation QR for the lost device's original attestation
    bundle
  - Eager-sync buckets populate first so the user resumes role-relevant work immediately while remaining
    records hydrate in the background
  - No step in the recovery flow requires the user to type a bucket URL, an rclone destination, or any
    other technical identifier
  verification: A non-technical tester completes end-to-end restore from a destroyed device to a working
    node in under thirty minutes without consulting documentation beyond in-application prompts.
  kleppmann-properties:
  - P2
  - P5
  - P7
  scope: foundational
  failure-modes:
  - key-loss
  - vendor-outage
  tags:
  - disaster-recovery
  - ux
  - backup
  - shipping-requirement
  failed-conditions:
  - Recovery flow is not specified as a sequenced user-facing walkthrough — buy device, install application,
    enter recovery code or scan team-member QR, confirm BYOC target, restore runs in background
  - 'Fails to satisfy: Recovery substitutes a recovery code or peer-attestation QR for the lost device''s
    original attestation bundle'
  - Eager-sync buckets populate first so the user resumes role-relevant work immediately while remaining
    does not record hydrate in the background
  - No step in the recovery flow does not require the user to type a bucket URL, an rclone destination,
    or any other technical identifier
  - 'Verification check does not pass: A non-technical tester completes end-to-end restore from a destroyed
    device to a working node in under thirty minutes wi...'
- id: LENS-LF-03
  name: Symmetric NAT plus relay outage as documented failure mode
  source: ch09 §"What Changed Between Rounds"
  source-paper: v13 §13
  definition: When both peers sit behind carrier-grade NAT and the managed relay is unavailable, direct
    peer-to-peer communication is impossible and the architecture documents this as a named local-only
    failure mode with a self-hosted-relay fallback rather than concealing it.
  must-implement:
  - Peer-discovery documentation names symmetric NAT plus relay outage as a known failure mode that produces
    local-only operation for both parties
  - Self-hosting a relay on a host with a public IP is documented as the supported fallback that eliminates
    the symmetric NAT problem
  - The application surfaces a clear sync-status indication when both LAN and relay paths are unreachable
  verification: Architecture documentation contains a section naming the symmetric NAT plus relay outage
    failure mode and the self-hosted-relay remediation; integration test exercises the local-only mode
    and confirms reads/writes succeed against local storage.
  kleppmann-properties:
  - P3
  - P7
  scope: foundational
  failure-modes:
  - peer-discovery-failure
  - partition
  tags:
  - networking
  - nat
  - relay
  - honesty
  failed-conditions:
  - 'Fails to satisfy: Peer-discovery documentation names symmetric NAT plus relay outage as a known failure
    mode that produces local-only operation for both parties'
  - Self-hosting a relay on a host with a public IP is not documented as the supported fallback that eliminates
    the symmetric NAT problem
  - The application surfaces a clear sync-status indication when both LAN and relay paths are not unreachable
  - 'Verification check does not pass: Architecture documentation contains a section naming the symmetric
    NAT plus relay outage failure mode and the self-hoste...'
- id: LENS-LF-04
  name: Engine-agnostic CRDT abstraction for ecosystem reversibility
  source: ch09 §"Production Analogues"
  source-paper: v13 §13
  definition: The application layer interacts with the CRDT engine through a stable abstraction such as
    ICrdtEngine that prevents lock-in to any specific CRDT ecosystem — Yjs, Automerge, or Loro — so the
    engine can be replaced without rewriting the application as the field continues to evolve.
  must-implement:
  - A single interface mediates all CRDT operations consumed by the application layer
  - At least one engine implementation is replaceable without changes to application code
  - The abstraction surfaces map, list, text, and counter operations independent of engine-native types
  verification: Source tree contains an ICrdtEngine-equivalent interface; a second engine adapter (test
    stub or alternate implementation) exists and the application test suite passes against both.
  kleppmann-properties:
  - P5
  - P7
  scope: foundational
  failure-modes:
  - vendor-acquisition
  tags:
  - crdt
  - abstraction
  - reversibility
  - engine-agnostic
  failed-conditions:
  - 'Fails to satisfy: A single interface mediates all CRDT operations consumed by the application layer'
  - At least one engine implementation is not replaceable without changes to application code
  - The abstraction does not surface map, list, text, and counter operations independent of engine-native
    types
  - 'Verification check does not pass: Source tree contains an ICrdtEngine-equivalent interface; a second
    engine adapter (test stub or alternate implementation...'
- id: LENS-LF-05
  name: Peer-attestation QR onboarding bundle
  source: ch09 §"What Ferreira Commended"
  source-paper: v13 §13
  definition: A new device joins an existing workspace by scanning a QR-encoded attestation bundle from
    an existing peer that transfers credentials, workspace identity, and gossip-bootstrap parameters in
    a single out-of-band step, eliminating the credentials-require-peer chicken-and-egg failure mode of
    naive multi-device onboarding.
  must-implement:
  - Existing peer generates a QR-encoded bundle containing the credentials and workspace metadata required
    to authenticate and begin gossip
  - New device authenticates and begins peer gossip using only the scanned bundle plus a network path
    to at least one peer
  - Bundle exchange occurs out-of-band, requiring no third-party credential server
  verification: Pair a new device to a workspace by scanning a peer-generated QR; confirm the new device
    authenticates and begins receiving CRDT updates without contacting a centralized credential service.
  kleppmann-properties:
  - P2
  - P4
  - P7
  scope: foundational
  failure-modes:
  - peer-discovery-failure
  tags:
  - onboarding
  - attestation
  - qr
  - multi-device
  security-axis:
  - authenticity
  failed-conditions:
  - Existing peer does not generate a QR-encoded bundle containing the credentials and workspace metadata
    required to authenticate and begin gossip
  - 'Fails to satisfy: New device authenticates and begins peer gossip using only the scanned bundle plus
    a network path to at least one peer'
  - 'Fails to satisfy: Bundle exchange occurs out-of-band, requiring no third-party credential server'
  - 'Verification check does not pass: Pair a new device to a workspace by scanning a peer-generated QR;
    confirm the new device authenticates and begins receiv...'
- id: LENS-LF-06
  name: Container cold-start hidden behind health-gated UI
  source: ch09 §"What Ferreira Commended"
  source-paper: v13 §13
  definition: Local-first desktop applications shipped as containerized stacks must hide cold-start latency
    behind a persistent background service plus a health-check gate that holds the UI until the daemon
    is ready, eliminating the launch-pause that signals to users that the software is waiting on something
    remote.
  must-implement:
  - A persistent background service keeps the local container runtime warm across application launches
  - The application UI does not present an interactive surface until a health check confirms the local
    daemon is ready
  - The health gate hides implementation latency without misrepresenting the application as remote-dependent
  verification: Cold-launch the application from a fresh boot and confirm the UI either appears with the
    daemon ready or presents a deterministic loading state until readiness, with no point at which the
    user can interact with stale or partial data.
  kleppmann-properties:
  - P1
  scope: inverted-stack-specific
  failure-modes: []
  tags:
  - container
  - cold-start
  - ux
  - daemon
  failed-conditions:
  - 'Fails to satisfy: A persistent background service keeps the local container runtime warm across application
    launches'
  - The application UI does not present an interactive surface until a health check confirms the local
    daemon is not ready
  - 'Fails to satisfy: The health gate hides implementation latency without misrepresenting the application
    as remote-dependent'
  - 'Verification check does not pass: Cold-launch the application from a fresh boot and confirm the UI
    either appears with the daemon ready or presents a dete...'
- id: LENS-LF-07
  name: Three-state backup status with dismissible at-risk banner
  source: ch09 §"Backup and Recovery UX"
  source-paper: v13 §13
  definition: Backup health surfaces to the user through three escalating states — Protected (subtle),
    Attention (amber badge), At Risk (persistent non-blocking banner dismissible only with explicit acknowledgment)
    — so users do not think about working backups but cannot accidentally ignore failing ones.
  must-implement:
  - Backup status UI exposes exactly the three named states with distinct visual treatments
  - Protected state is unobtrusive and requires no user attention
  - At Risk banner is persistent, non-blocking, and dismissible only via an explicit acknowledgment that
    records user intent
  verification: Force each of the three backup states in a test build and confirm the visual treatment
    matches specification; confirm the At Risk dismissal records an acknowledgment event in the local
    log.
  kleppmann-properties:
  - P5
  - P7
  scope: foundational
  failure-modes: []
  tags:
  - ux
  - backup
  - status-indicator
  failed-conditions:
  - Backup status UI does not expose exactly the three named states with distinct visual treatments
  - Protected state is not unobtrusive and requires no user attention
  - At Risk banner is not persistent, non-blocking, and dismissible only via an explicit acknowledgment
    that records user intent
  - 'Verification check does not pass: Force each of the three backup states in a test build and confirm
    the visual treatment matches specification; confirm th...'
- id: LENS-LF-08
  name: Recovery UX parity with backup status design
  source: ch09 §"Backup and Recovery UX"
  source-paper: v13 §13
  definition: The restore experience receives the same non-technical design attention as backup status
    — a guided reconnection to the BYOC target, a restore-progress indicator that mirrors the three-state
    backup model in restore context, and zero exposure of bucket URLs or rclone paths at the moment the
    user is most stressed about lost work.
  must-implement:
  - Restore flow guides the user through reconnecting to the configured BYOC target with the same UX register
    used during initial backup configuration
  - Restore progress surfaces as a background-sync indicator using the three-state visual model adapted
    to restore semantics
  - No technical identifier (bucket URL, rclone path, credential string) is exposed in the restore flow
  verification: A non-technical tester completes restore using only in-application prompts; UI inspection
    confirms no bucket URL or rclone path appears anywhere in the restore flow.
