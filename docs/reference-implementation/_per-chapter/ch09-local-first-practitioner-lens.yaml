- id: LENS-LF-09
  name: Zero-state first-run experience as product specification
  source: ch09 §"The Zero-State First-Run Problem"
  source-paper: v13 §13
  definition: The first thirty seconds after install for a brand-new solo user with no prior data and
    no existing peers is specified as a product requirement that walks the user from blank state to first
    project, first backup configuration, and first invite — closing the most common 30-day abandonment
    path for local-first applications.
  must-implement:
  - The application specifies the zero-state screen explicitly — what the user sees, the first action
    surfaced, and the path to first project
  - The first-run flow guides the user to configure a backup target before significant data is created
  - The first-run flow surfaces the invite path so the workspace is not silently single-user by default
  verification: Install the application on a fresh device with no prior workspace; confirm the user reaches
    a first project, a configured backup target, and an invite surface within the first session without
    consulting external documentation.
  kleppmann-properties:
  - P1
  - P2
  - P4
  scope: foundational
