- id: EPI-04
  name: Cryptographic role revocation
  source: epilogue §"What the Stack Owes You"
  source-paper: v13 §20
  definition: Role revocation is implemented through DEK/KEK envelope encryption with key rotation proportional
    to document count, so that a revoked role cannot decrypt documents whose keys have been rotated.
  must-implement:
  - Each protected document is encrypted with a per-document DEK wrapped by a role KEK
  - Role revocation triggers DEK rotation for documents the revoked role had access to
  - The former role-holder's KEK cannot unwrap rotated DEKs
  verification: Revocation procedure is executed, then the revoked principal's key material is presented
    against rotated documents and fails to decrypt.
  kleppmann-properties:
  - P6
  - P7
  scope: foundational
  failure-modes:
  - key-compromise
  tags:
  - obligation
  - encryption
  - revocation
  - keys
  security-axis:
  - confidentiality
  failed-conditions:
  - Each protected document is not encrypted with a per-document DEK wrapped by a role KEK
  - 'Fails to satisfy: Role revocation triggers DEK rotation for documents the revoked role had access
    to'
  - 'Fails to satisfy: The former role-holder''s KEK cannot unwrap rotated DEKs'
