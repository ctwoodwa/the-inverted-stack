- id: EPI-08
  name: KEK-compromise incident response at scale
  source: epilogue §"The Open Questions That Remain Genuinely Unsettled"
  source-paper: v13 §20
  definition: The procedure for responding to compromise of a broadly-scoped Key Encryption Key across
    thousands of documents and hundreds of nodes is specified in principle but has not been validated
    under production load.
  must-implement:
  - Incident response runbook for KEK compromise exists
  - Runbook covers fan-out re-keying across all affected nodes and documents
  - Stress-test plan is identified as outstanding work
  verification: Runbook document exists naming the steps; an explicit open item records that production-scale
    validation has not been completed.
  kleppmann-properties:
  - P6
  scope: inverted-stack-specific
  failure-modes:
  - key-compromise
  tags:
  - open-question
  - incident-response
  - keys
  notes: Acknowledged as unfinished work; included so conformance scoring can mark partial coverage rather
    than overstating completeness.
  security-axis:
  - confidentiality
  failed-conditions:
