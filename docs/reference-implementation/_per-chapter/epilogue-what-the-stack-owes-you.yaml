- id: EPI-11
  name: Domain invariant enforcement above CRDT convergence
  source: epilogue §"The Open Questions That Remain Genuinely Unsettled"
  source-paper: v13 §20
  definition: CRDTs deliver structural convergence but not domain invariants such as inventory-cannot-go-negative,
    no-double-booking, or ledger-balance, which require additional modeling beyond the CRDT engine and
    have no standardized formal verification approach in this architecture.
  must-implement:
  - Semantic layer enforces named domain invariants on top of CRDT merge
  - Each enforced invariant is documented with the data type and the enforcement mechanism
  - Invariants whose enforcement is not yet specified are listed as open items
  verification: Semantic-layer document enumerates enforced invariants and their mechanisms; merge tests
    demonstrate violation rejection for each enforced invariant.
  kleppmann-properties:
  - P4
  scope: foundational
  failure-modes:
  - partition
  tags:
  - open-question
  - invariants
  - semantic-layer
  - crdt
  failed-conditions:
  - Semantic layer does not enforce named domain invariants on top of CRDT merge
  - Each enforced invariant is not documented with the data type and the enforcement mechanism
  - Invariants whose enforcement is not yet specified are not listed as open items
  - 'Verification check does not pass: Semantic-layer document enumerates enforced invariants and their
