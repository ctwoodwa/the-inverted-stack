- id: EPI-05
  name: Dual license and CLA before community formation
  source: epilogue §"What the Stack Owes You"
  source-paper: v5 §10
  definition: The dual license structure and Contributor License Agreement must exist before the first
    external pull request, so that governance terms cannot be retroactively changed against contributors
    who joined under different terms.
  must-implement:
  - Repository has a published dual license at first public commit
  - CLA process is in place before merging external contributions
  - License change requires contributor consent under documented governance
  verification: Repository contains LICENSE, CLA, and governance documents whose commit dates precede
    the first external pull request merge.
  kleppmann-properties:
  - P5
  scope: inverted-stack-specific
  failure-modes:
  - vendor-acquisition
  tags:
  - obligation
  - governance
  - licensing
  - community
  failed-conditions:
  - Repository has not a published dual license at first public commit
  - CLA process is not in place before merging external contributions
  - License change does not require contributor consent under documented governance
  - 'Verification check does not pass: Repository contains LICENSE, CLA, and governance documents whose
