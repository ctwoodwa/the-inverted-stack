concepts:
- id: EPI-01
  name: Protocol-layer data minimization
  source: epilogue §"What the Stack Owes You"
  source-paper: v13 §20
  definition: Data minimization is a send-tier protocol enforcement that prevents bytes from leaving the
    originating node toward an unauthorized peer, not a UI filter or server-side policy applied after
    data arrives.
  must-implement:
  - Sync daemon evaluates authorization against peer attestations before serializing payload
  - Unauthorized peers never receive document bytes on the wire
  - No filter is applied only at receive time
  verification: Wire capture from an unauthorized peer's perspective shows zero protected bytes after
    capability negotiation completes.
  kleppmann-properties:
  - P6
  - P7
  scope: foundational
  failure-modes:
  - data-residency-objection
  tags:
  - obligation
  - minimization
  - sync
  - security
  failed-conditions:
  - 'Fails to satisfy: Sync daemon evaluates authorization against peer attestations before serializing
    payload'
  - 'Fails to satisfy: Unauthorized peers never receive document bytes on the wire'
  - No filter is not applied only at receive time
  - 'Verification check does not pass: Wire capture from an unauthorized peer''s perspective shows zero
    protected bytes after capability negotiation completes.'
- id: EPI-02
  name: MDM attestation at capability negotiation
  source: epilogue §"What the Stack Owes You"
  source-paper: v13 §20
  definition: Mobile Device Management attestation is verified during capability negotiation before the
    sync stream opens, so that a non-compliant device is rejected at the perimeter rather than detected
    post-hoc in an audit log.
  must-implement:
  - Capability negotiation includes an MDM attestation challenge
  - Handshake fails closed when attestation is missing or invalid
  - No document operation is applied from a peer that has not satisfied attestation
  verification: A peer presenting an invalid or absent MDM attestation cannot complete handshake; sync
    stream is never opened.
  kleppmann-properties:
  - P6
  - P7
  scope: inverted-stack-specific
  failure-modes:
  - key-compromise
  tags:
  - obligation
  - attestation
  - mdm
  - security
  security-axis:
  - authenticity
  failed-conditions:
  - Capability negotiation does not include an MDM attestation challenge
  - Handshake fails closed when attestation is not missing or invalid
  - No document operation is not applied from a peer that has not satisfied attestation
  - 'Verification check does not pass: A peer presenting an invalid or absent MDM attestation cannot complete
    handshake; sync stream is never opened.'
- id: EPI-03
  name: Honest three-tier CRDT consistency
  source: epilogue §"What the Stack Owes You"
  source-paper: v13 §20
  definition: The architecture commits to a three-tier resolution model — AP for documents, CP under lease
    for coordination records, append-only for financial ledger — and names the consistency guarantee per
    data type rather than presenting a single uniform model.
  must-implement:
  - Each data type is assigned an explicit consistency tier
  - Document store uses AP CRDT semantics
  - Coordination records use CP semantics under a lease protocol
  - Financial records use append-only ledger semantics
  verification: Architecture document maps every persisted data type to one of the three tiers; the CRDT
    engine adapter for each tier matches the documented semantics.
  kleppmann-properties:
  - P4
  - P5
  scope: inverted-stack-specific
  failure-modes:
  - partition
  tags:
  - obligation
  - crdt
  - consistency
  - semantic-layer
  failed-conditions:
  - Each data type is not assigned an explicit consistency tier
  - 'Fails to satisfy: Document store uses AP CRDT semantics'
  - Coordination does not record use CP semantics under a lease protocol
  - Financial does not record use append-only ledger semantics
