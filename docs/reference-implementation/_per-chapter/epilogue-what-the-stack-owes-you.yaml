- id: EPI-13
  name: Mobile platform constraints unresolved
  source: epilogue §"The Open Questions That Remain Genuinely Unsettled"
  source-paper: v5 §9
  definition: iOS and Android impose background-execution, keystore, and filesystem constraints that the
    desktop-first local-node architecture has not yet solved, so mobile is not yet a first-class deployment
    target with a fully specified tradeoff envelope.
  must-implement:
  - Mobile deployment guide identifies background-execution, keystore, and filesystem constraints
  - Tradeoffs in battery, background limits, and permission prompts are documented
  - Architecture backlog names mobile-first work as outstanding
  verification: Mobile platform notes exist enumerating the constraints and the architectural choices
    that remain open.
