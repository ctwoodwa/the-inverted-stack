- id: EPI-14
  name: Implementation drift via server-side convenience paths
  source: epilogue §"The Implementation Drift Risk"
  source-paper: v13 §20
  definition: The dominant failure mode for local-first architectures in practice is the gradual accumulation
    of locally-reasonable server-side paths — feature gates, analytics, A/B testing, compliance logging,
    write-time permission checks — that re-establish the server as load-bearing and reduce the local node
    to a cache.
  must-implement:
  - Architecture names each drift anti-pattern with the local-first equivalent that replaces it
  - Feature flags evaluate locally via a Sunfish.Foundation.FeatureManagement-equivalent capability
  - Telemetry, compliance logging, and permission checks are designed before the first request that would
    centralize them
  verification: ADR set documents each named anti-pattern with the local replacement; sample drift requests
    are matched to the ADR that already answers them.
  kleppmann-properties:
  - P3
  - P5
  - P7
  scope: inverted-stack-specific
  failure-modes:
  - vendor-outage
  tags:
