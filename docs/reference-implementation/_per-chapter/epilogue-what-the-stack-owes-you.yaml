- id: EPI-12
  name: Crypto-shredding as right-to-erasure mechanism
  source: epilogue §"The Open Questions That Remain Genuinely Unsettled"
  source-paper: v13 §20
  definition: Right-to-erasure is implemented technically by destroying the per-document DEK so that ciphertext
    becomes unrecoverable; whether residual CRDT-log operation metadata constitutes personal data under
    a given jurisdiction's deletion statute is an unsettled legal question, not a technical one.
  must-implement:
  - DEK destruction procedure renders document content unrecoverable
  - Residual CRDT operation metadata is documented as the surface a legal review must evaluate
  - Per-jurisdiction legal posture is captured in the compliance appendix
  verification: Destroying a document's DEK is shown to render its ciphertext unrecoverable; compliance
    documentation names the jurisdictions in scope and the open legal question for each.
  kleppmann-properties:
  - P6
  - P7
  scope: foundational
  failure-modes: []
  tags:
  - open-question
  - erasure
  - gdpr
  - dpdp
