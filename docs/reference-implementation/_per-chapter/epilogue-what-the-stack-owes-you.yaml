- id: EPI-15
  name: ADRs with named enforcement owner
  source: epilogue §"The Implementation Drift Risk"
  source-paper: v13 §20
  definition: Architecture Decision Records that prevent drift must name an enforcement owner — a review
    board, principal engineer, or CTO sign-off path — because ADRs without an owner do not survive velocity
    pressure.
  must-implement:
  - Every drift-prevention ADR names an accountable role for deviation approval
  - Deviation requests follow a documented review path
  - ADR template requires the enforcement owner field
  verification: ADR template includes an enforcement owner field; existing drift-prevention ADRs have
    that field populated with a named role.
