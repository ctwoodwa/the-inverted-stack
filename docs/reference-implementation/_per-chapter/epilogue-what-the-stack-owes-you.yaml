- id: EPI-09
  name: Relay isolation for high-risk verticals
  source: epilogue §"The Open Questions That Remain Genuinely Unsettled"
  source-paper: v13 §20
  definition: The relay is designed as a data-minimal transit cache, but a complete threat model and isolation
    architecture for verticals where metadata about document existence is itself regulated (legal, healthcare)
    is not yet specified.
  must-implement:
  - Relay deployment documents what metadata is observable at the relay
  - High-risk vertical deployments specify additional metadata-isolation controls
  - Outstanding work for legal and healthcare isolation is named in the architecture backlog
  verification: Threat model document for the relay enumerates observable metadata; deployment guide for
    high-risk verticals either specifies isolation controls or marks them as open.
  kleppmann-properties:
  - P6
  - P7
  scope: inverted-stack-specific
  failure-modes:
  - data-residency-objection
  tags:
  - open-question
  - relay
