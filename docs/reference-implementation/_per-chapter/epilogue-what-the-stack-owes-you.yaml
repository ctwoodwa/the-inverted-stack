- id: EPI-10
  name: Long-now archival format beyond CRDT log
  source: epilogue §"The Open Questions That Remain Genuinely Unsettled"
  source-paper: v13 §20
  definition: Because the CRDT event log is not a stable archival format, long-horizon durability requires
    snapshots in standardized formats (signed append-only logs, documented export schemas) that the architecture
    has not yet specified.
  must-implement:
  - Architecture identifies a stable archival snapshot format separate from the live CRDT log
  - Periodic snapshot generation is specified
  - Snapshot format is consumable without a running CRDT engine
  verification: Snapshot specification document exists; a snapshot can be opened and read by a tool that
    has no CRDT engine in its dependency tree.
  kleppmann-properties:
  - P5
  scope: foundational
  failure-modes: []
  tags:
