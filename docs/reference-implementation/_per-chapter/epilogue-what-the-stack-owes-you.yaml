- id: EPI-07
  name: Plain-file export without vendor cooperation
  source: epilogue §"What the Stack Owes You"
  source-paper: v13 §20
  definition: User data is available on local disk in a documented file format under user-controlled keys,
    allowing the user to leave the platform at any time without negotiating with the vendor or depending
    on its continued operation.
  must-implement:
  - Export format is publicly documented
  - Export proceeds entirely from local disk and local key material
  - No vendor service is required to produce or interpret an export
  verification: Disconnect network and revoke vendor accounts; user produces a complete export and a third-party
    tool reads it using only the public format spec and the user's keys.
  kleppmann-properties:
  - P5
  - P7
  scope: foundational
  failure-modes:
  - vendor-outage
  - vendor-acquisition
  tags:
  - obligation
  - export
  - ownership
  - portability
  failed-conditions:
  - Export format is not publicly documented
  - 'Fails to satisfy: Export proceeds entirely from local disk and local key material'
  - No vendor service is not required to produce or interpret an export
