- id: UX-08
  name: Per-record freshness badge bound to AP/CP classification
  source: ch20 §"AP/CP Visibility by Data Class"
  source-paper: v13 §13
  definition: A freshness badge component renders the per-record indicator for any data class, computing
    staleness against the configured threshold and handling clock-skew, daylight-saving, and suspend/resume
    edge cases without per-application code.
  must-implement:
  - Component binds to the AP/CP classification configured in the sync layer
  - Component handles suspend/resume and clock adjustments without losing accuracy
  - Per-application code does not implement freshness timers
  verification: Suspending the host machine across a threshold boundary, then resuming, drives the badge
    to the correct post-resume state without the application invoking a timer reset.
  kleppmann-properties:
  - P1
  - P3
  scope: inverted-stack-specific
