- id: UX-15
  name: Auditable conflict-resolution event log
  source: ch20 §"The Conflict Inbox and Bulk Resolution"
  source-paper: v13 §13
  definition: Every conflict resolution writes an event log entry recording the conflict shape, the rule
    applied, the resolving user, and the timestamp; no resolution may pass through the system without
    a corresponding entry.
  must-implement:
  - Each resolution emits a structured log entry with shape, rule, user, and timestamp
  - Log entries are persisted alongside the underlying CRDT events
  - Resolution paths that bypass logging are rejected at component boundary
  verification: Performing a resolution and inspecting the event log shows a matching entry; attempting
    to invoke a non-logging resolution path fails at the component boundary.
