- id: UX-04
  name: Node health indicator semantics
  source: ch20 §"The Three Always-Visible Indicators"
  source-paper: v13 §13
  definition: The node health indicator signals whether the local node is operating normally (green =
    engine and sync daemon running and last self-check passed; amber = degraded; red = node cannot accept
    writes and requires user action).
  must-implement:
  - Indicator reflects engine, sync-daemon, and self-check state
  - Amber state covers disk-near-capacity, sync-daemon restart, and schema-migration-in-progress
  - Red state surfaces a plain-language prompt for required user action (e.g., re-sign-in after credential
    revocation) without naming protocol terms
  verification: Forcing each underlying condition (low disk, daemon restart, migration, credential revocation)
    drives the indicator to the documented state and surface text.
  kleppmann-properties:
  - P1
  - P6
  scope: inverted-stack-specific
  failure-modes:
  - key-compromise
  tags:
  - ux
  - status
  - node-health
  applies-to-roles:
  - full-node
  - full-node-multi-user
  failed-conditions:
  - 'Fails to satisfy: Indicator reflects engine, sync-daemon, and self-check state'
  - Amber state does not cover disk-near-capacity, sync-daemon restart, and schema-migration-in-progress
