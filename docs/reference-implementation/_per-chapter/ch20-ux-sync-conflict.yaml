- id: UX-11
  name: Conflict inbox as single resolution surface
  source: ch20 §"The Conflict Inbox and Bulk Resolution"
  source-paper: v13 §13
  definition: All conflict resolution occurs in a dedicated panel — not a modal, not an interstitial —
    accessible from the status bar and any failed-write indicator.
  must-implement:
  - Application exposes one canonical conflict inbox surface, not multiple per-feature dialogs
  - Inbox is reachable from both the status bar and any failed-write indicator
  - Conflict resolution UX never blocks unrelated work via modal dialogs
  verification: Two independent conflict-producing edits route both items to the same inbox panel reachable
    from the status bar.
  kleppmann-properties:
  - P4
  scope: foundational
  failure-modes:
  - partition
  tags:
  - ux
  - conflict
  - inbox
  applies-to-roles:
  - full-node
  - full-node-multi-user
  failed-conditions:
