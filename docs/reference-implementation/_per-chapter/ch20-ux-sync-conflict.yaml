- id: UX-24
  name: Component-manifest accessibility enforcement
  source: ch20 §"Accessibility as a Contract"
  source-paper: v5 §6
  definition: Each UI block declares its ARIA roles, announced state transitions, and keyboard contract
    via a component manifest, and the platform refuses to register a custom replacement that declares
    a weaker contract than the component it replaces.
  must-implement:
  - UI block manifest declares ARIA role, announced transitions, and keyboard contract
  - Platform validates the manifest at registration time
  - Custom replacement components must declare an equal-or-stronger contract or fail registration
  verification: Registering a custom component whose manifest weakens any declared contract relative to
    the replaced component fails at registration with a documented error.
