- id: UX-14
  name: Resolve-all-similar bulk action
  source: ch20 §"The Conflict Inbox and Bulk Resolution"
  source-paper: v13 §13
  definition: A bulk affordance applies a chosen rule to every conflict of the same shape in a single
    operation, with outliers retained for individual review.
  must-implement:
  - Bulk action applies the selected rule to all conflicts matching the active group's shape
  - Outliers that do not match the rule remain in the inbox for individual handling
  - The bulk action is reachable from the inbox without leaving the surface
  verification: Producing 40 same-shape conflicts and applying "resolve all similar" with one rule resolves
    them in one user-visible operation, leaving any outliers visible.
  kleppmann-properties:
