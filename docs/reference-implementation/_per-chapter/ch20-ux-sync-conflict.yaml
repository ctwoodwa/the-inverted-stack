- id: UX-07
  name: AP/CP visibility per data class
  source: ch20 §"AP/CP Visibility by Data Class"
  source-paper: v13 §13
  definition: Each data class declares its own staleness threshold and UX treatment derived from its AP/CP
    classification, with tighter thresholds and stricter blocking for data whose stale use causes immediate
    concrete harm.
  must-implement:
  - Each data class declares a staleness threshold and UX treatment in configuration
  - CP-class actions are blocked while freshness cannot be confirmed; AP-class edits apply locally and
    propagate
  - Per-record freshness is computed against the class threshold without per-application code
  verification: Configuration manifest enumerates data classes with thresholds and treatments; behavioral
    test confirms a CP-class write is blocked while a matching AP-class write succeeds offline.
  kleppmann-properties:
  - P1
  - P3
  - P4
  scope: inverted-stack-specific
  failure-modes:
