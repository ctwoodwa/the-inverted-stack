- id: UX-13
  name: Configurable resolution rules constrained by data model
  source: ch20 §"The Conflict Inbox and Bulk Resolution"
  source-paper: v13 §13
  definition: Per-conflict-group resolution offers prefer-mine, prefer-remote, or a configurable merge
    rule chosen from rules declared per record type — end users cannot select arbitrary merge strategies
    the data model does not support.
  must-implement:
  - Merge rules are declared per record type in application configuration
  - Resolution UI presents only declared rules for the affected type
  - Component rejects attempts to apply undeclared rules
  verification: Configuration declares a numeric "keep higher value" rule; resolution UI for a numeric
    field offers it and rejects an attempt to apply a non-declared rule.
  kleppmann-properties:
  - P4
  scope: inverted-stack-specific
