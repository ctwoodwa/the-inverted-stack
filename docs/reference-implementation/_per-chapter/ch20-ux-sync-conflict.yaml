- id: UX-03
  name: Three always-visible status indicators
  source: ch20 §"The Three Always-Visible Indicators"
  source-paper: v13 §13
  definition: The application status bar displays three indicators at all times — node health, link status,
    and data freshness — non-intrusive under normal conditions and expanding to plain-language labels
    under degraded conditions.
  must-implement:
  - Status bar persists across all application screens
  - Three indicators (node health, link status, data freshness) are present and ambient under normal conditions
  - Degraded states surface a short plain-language label and amber/red emphasis
  verification: Application shell includes a status bar implementing the three indicators; a screenshot
    under normal connectivity shows ambient icons with no labels.
  kleppmann-properties:
  - P1
  - P3
  scope: inverted-stack-specific
  failure-modes: []
  tags:
  - ux
  - status
  - indicators
  applies-to-roles:
  - full-node
  - full-node-multi-user
  failed-conditions:
  - Status bar does not persist across all application screens
  - Three indicators (node health, link status, data freshness) are not present and ambient under normal
