- id: UX-23
  name: Accessibility as a Tier-1 contract
  source: ch20 §"Accessibility as a Contract"
  source-paper: v13 §13
  definition: Every UX surface in the application carries an accessibility contract — semantic ARIA roles,
    keyboard reachability, declared component metadata, and plain-language assistive-technology text —
    enforced as rigorously as the write path.
  must-implement:
  - Status surfaces use role="status" with aria-live="polite" for ambient changes and role="alert" with
    aria-live="assertive" for required-action states
  - Colour is never the sole signal; every indicator pairs colour with localised text
  - Interactive elements support tab order, Enter and Space activation, and Escape-to-dismiss where dismissal
    is allowed
  - Focus after conflict resolution returns to the next pending group, not to the page header
  verification: Automated accessibility audit on every shipped UI block confirms ARIA roles, keyboard
    reachability, and colour-plus-text pairing; a screen-reader walkthrough of the conflict inbox resolves
    a conflict without pointer input and lands focus on the next pending group.
  kleppmann-properties:
  - P1
  - P4
  scope: foundational
  failure-modes: []
  tags:
  - ux
  - accessibility
  - aria
  - keyboard
  applies-to-roles:
  - full-node
  - full-node-multi-user
  failed-conditions:
  - Status does not surface use role="status" with aria-live="polite" for ambient changes and role="alert"
