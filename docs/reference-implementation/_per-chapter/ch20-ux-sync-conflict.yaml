- id: UX-09
  name: Three-state optimistic write lifecycle
  source: ch20 §"Optimistic UI and Confirmed States"
  source-paper: v13 §13
  definition: An AP-class write moves through three explicit visual states — pending (applied locally,
    not yet seen by any peer), confirmed (received by at least one peer), and failed (circuit breaker
    rejected on reconnect) — with the failed state opening the conflict inbox.
  must-implement:
  - Writes apply locally on user confirmation and surface a pending visual state immediately
  - Confirmation state is reached when at least one peer has acknowledged the write
  - Failed state is distinct from pending and offers a "Review" affordance into the conflict inbox
  verification: A write performed offline shows pending; reconnecting with no conflict transitions it
    to confirmed; reconnecting with an unresolvable conflict transitions it to failed and opens the conflict
    inbox via the Review affordance.
  kleppmann-properties:
  - P1
  - P3
  - P4
  scope: foundational
  failure-modes:
  - partition
  tags:
  - ux
  - optimistic
  - write-lifecycle
  applies-to-roles:
  - full-node
  - full-node-multi-user
  failed-conditions:
  - 'Fails to satisfy: Writes apply locally on user confirmation and surface a pending visual state immediately'
  - Confirmation state is not reached when at least one peer has acknowledged the write
  - Failed state is not distinct from pending and offers a "Review" affordance into the conflict inbox
  - 'Verification check does not pass: A write performed offline shows pending; reconnecting with no conflict
    transitions it to confirmed; reconnecting with an...'
- id: UX-10
  name: Pending and failed states never collapse
  source: ch20 §"Optimistic UI and Confirmed States"
  source-paper: v13 §13
  definition: A failed write must never remain in the pending visual state, because a user who sees a
    persistent spinner waits while a user who sees a failure indicator acts.
  must-implement:
  - Pending state has a deterministic upper bound after which the UI resolves to confirmed or failed
  - Circuit-breaker rejection surfaces as a failed state on the affected record
  - The pending visual state never persists past the documented timeout without a state transition
  verification: Forcing a circuit-breaker rejection at reconnect resolves the pending visual state to
    failed within the documented bound, never indefinitely spinning.
  kleppmann-properties:
  - P1
  - P4
  scope: foundational
  failure-modes:
  - partition
  tags:
  - ux
  - optimistic
  - failure-handling
  applies-to-roles:
  - full-node
  - full-node-multi-user
  failed-conditions:
  - Pending state has not a deterministic upper bound after which the UI resolves to confirmed or failed
  - Circuit-breaker rejection does not surface as a failed state on the affected record
  - The pending visual state never does not persist past the documented timeout without a state transition
  - 'Verification check does not pass: Forcing a circuit-breaker rejection at reconnect resolves the pending
