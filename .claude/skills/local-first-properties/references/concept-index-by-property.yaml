    scope: foundational
    definition: Enterprise general availability requires three published runbooks — node onboarding, node
      deprovisioning, and incident response for node or key compromise — each with named commands, expected
      outputs, and audit-log verification steps.
    must-implement: &id181
    - Node onboarding runbook covers IdP confirmation, attestation issuance, pre-seeded config, MDM deployment,
      and audit-log verification
    - Node deprovisioning runbook covers admin revocation, MDM wipe, and audit-log archival
    - Incident response runbook covers immediate revocation on suspicion, forensic-hold coordination,
      and key-material rotation
    - Each runbook includes the named command, expected output, and an audit-log verification step
    verification: docs/runbooks/ contains all three named runbooks with command-output-verification triplets
      and expected-duration targets
  - ref: epilogue-what-the-stack-owes-you:EPI-01
    name: Protocol-layer data minimization
    scope: foundational
    definition: Data minimization is a send-tier protocol enforcement that prevents bytes from leaving
      the originating node toward an unauthorized peer, not a UI filter or server-side policy applied
      after data arrives.
    must-implement: &id182
    - Sync daemon evaluates authorization against peer attestations before serializing payload
    - Unauthorized peers never receive document bytes on the wire
    - No filter is applied only at receive time
    verification: Wire capture from an unauthorized peer's perspective shows zero protected bytes after
      capability negotiation completes.
  - ref: epilogue-what-the-stack-owes-you:EPI-04
    name: Cryptographic role revocation
    scope: foundational
    definition: Role revocation is implemented through DEK/KEK envelope encryption with key rotation proportional
      to document count, so that a revoked role cannot decrypt documents whose keys have been rotated.
    must-implement: &id183
    - Each protected document is encrypted with a per-document DEK wrapped by a role KEK
    - Role revocation triggers DEK rotation for documents the revoked role had access to
    - The former role-holder's KEK cannot unwrap rotated DEKs
    verification: Revocation procedure is executed, then the revoked principal's key material is presented
      against rotated documents and fails to decrypt.
  - ref: epilogue-what-the-stack-owes-you:EPI-12
    name: Crypto-shredding as right-to-erasure mechanism
    scope: foundational
    definition: Right-to-erasure is implemented technically by destroying the per-document DEK so that
      ciphertext becomes unrecoverable; whether residual CRDT-log operation metadata constitutes personal
      data under a given jurisdiction's deletion statute is an unsettled legal question, not a technical
      one.
    must-implement: &id186
    - DEK destruction procedure renders document content unrecoverable
    - Residual CRDT operation metadata is documented as the surface a legal review must evaluate
    - Per-jurisdiction legal posture is captured in the compliance appendix
    verification: Destroying a document's DEK is shown to render its ciphertext unrecoverable; compliance
      documentation names the jurisdictions in scope and the open legal question for each.
  - ref: appendix-a-sync-daemon-wire-protocol:WIRE-05
    name: Deterministic CBOR for signed fields
    scope: foundational
    definition: Any CBOR encoding of fields that appear in signed contexts must use Deterministic Encoding
      per RFC 8949 §4.2 — definite-length arrays and maps, lexicographically sorted map keys, shortest-form
      integers, and shortest exact floating-point representation.
    must-implement:
    - Signed CBOR uses definite-length arrays and maps only
    - Map keys are sorted by lexicographic byte order
    - Integers and floats use shortest exact encoding
    verification: Encode an attestation bundle twice on different implementations and compare byte-for-byte
      equality of the signed input.
  - ref: appendix-b-threat-model-worksheets:SEC-01
    name: Asset inventory worksheet
    scope: foundational
    definition: A maintained table enumerating every asset whose compromise, loss, or corruption would
      cause material harm, classified by sensitivity, location, and owner.
    must-implement: &id187
    - Maintain an asset inventory listing CRDT documents, KEKs, DEKs, device keypairs, attestation bundles,
      sync logs, relay caches, MDM config, and audit logs
    - Assign each asset a classification label (Node-secret, Team-secret, Team-confidential, Team-internal,
      Encrypted)
    - Record location, owner, and sensitivity for each asset
    - Update the inventory whenever the asset set changes
    verification: Repository contains an asset inventory document covering all canonical asset categories
      with classification, location, owner, and sensitivity columns populated.
  - ref: appendix-b-threat-model-worksheets:SEC-03
    name: Keystore-binding documentation
    scope: foundational
    definition: A requirement to record which OS keystore protects each Node-secret or Team-secret, naming
      the platform-specific protection mechanism rather than relying on generic claims of isolation.
    must-implement:
    - Record the OS keystore (Windows Credential Manager + TPM, macOS Keychain + Secure Enclave, Linux
      libsecret + kernel keyring, Android Keystore, iOS Data Protection) backing each secret
    - Verify actual platform security properties rather than relying on vendor marketing
    verification: Threat-model document names the keystore protecting each per-platform deployment of
      secret material.
  - ref: appendix-b-threat-model-worksheets:SEC-04
    name: Actor taxonomy worksheet
    scope: foundational
    definition: A maintained table enumerating every actor (benign or adversarial) who could realistically
      interact with the system, with access level, motivation, and capability level recorded for each.
    must-implement: &id188
    - List every actor that interacts or could interact with the system, including adversarial ones
    - Record access level, likely motivation, and capability level per actor
    - Plan for the actual capability level encountered, not the desired one
    verification: Threat-model document contains an actor table with access, motivation, and capability
      columns populated for each named actor.
  - ref: appendix-b-threat-model-worksheets:THREAT-01
    name: External remote attacker
    scope: foundational
    definition: An adversary with no initial access who attempts data theft or ransomware against the
      deployment from outside the trust boundary.
    must-implement:
    - Treat external remote attackers as an in-scope actor with low-to-high capability range
    - Apply network-edge controls and end-to-end encryption to limit remote-attacker reach
    verification: Actor taxonomy includes a remote external attacker entry; perimeter and transport controls
      are documented.
  - ref: appendix-b-threat-model-worksheets:THREAT-02
    name: External attacker with physical access
    scope: foundational
    definition: An adversary who obtains physical possession of a node device and attempts credential
      theft or storage extraction.
    must-implement: &id189
    - Enforce full-disk encryption on every node
    - Require device PIN or biometric to unlock keystore-protected material
    - Disable hibernation and suspend-to-disk to constrain cold-boot exposure
    verification: MDM policy enforces disk encryption, PIN/biometric, and hibernation disable on all enrolled
      nodes.
  - ref: appendix-b-threat-model-worksheets:THREAT-03
    name: Malicious insider with role access
    scope: foundational
    definition: An authorized team member who attempts data exfiltration within the scope of their assigned
      role.
    must-implement:
    - Scope role-based access to the minimum data needed
    - Audit role-scoped operations to a tamper-evident log
    verification: Role definitions and audit log coverage are documented; role scope is enforced by KEK
      hierarchy.
  - ref: appendix-b-threat-model-worksheets:THREAT-06
    name: Former team member
    scope: foundational
    definition: A previously authorized member whose future access is blocked by key rotation but whose
      historical-data exposure remains scoped by the data-at-risk calculation.
    must-implement: &id190
    - Rotate KEKs on departure to block future access
    - Compute and document the historical exposure scope per the data-at-risk calculation
    - Distinguish remediated future access from unremediated prior exfiltration in incident records
    verification: Offboarding runbook triggers KEK rotation and logs a data-at-risk computation for the
      affected role.
  - ref: appendix-b-threat-model-worksheets:THREAT-07
    name: Compromised IdP
    scope: foundational
    definition: An identity provider whose signing key is under adversary control, allowing fraudulent
      role attestations that bypass the attestation trust anchor.
    must-implement:
    - Detect IdP compromise and rotate the IdP signing key
    - Re-issue role attestations after IdP signing-key rotation
    verification: IdP-compromise runbook exists naming detection signals and the signing-key rotation
      procedure.
  - ref: appendix-b-threat-model-worksheets:THREAT-08
    name: Supply chain attacker
    scope: foundational
    definition: An adversary who compromises the build pipeline to ship a backdoored binary capable of
      exfiltrating keys or plaintext from inside the trust boundary.
    must-implement: &id191
    - Sign commits and protect source branches
    - Produce reproducible builds with SBOM verification
    - Sign binaries with hardware-backed code-signing keys
    - Verify package manifest signatures on install
    verification: Build pipeline produces signed reproducible artifacts; SBOM and signature verification
      are gating steps in distribution.
  - ref: appendix-b-threat-model-worksheets:THREAT-09
    name: Government authority and regulatory body
    scope: foundational
    definition: A statutory actor with legal compulsion power (warrant, subpoena, administrative order,
      inspection notice, device seizure) whose architectural mitigation is end-to-end encryption with
      local key management so that compelled relay inspection yields ciphertext only.
    must-implement: &id192
    - Hold all key material at the node so the relay can yield only ciphertext under compelled inspection
    - Document the regulatory basis (Schrems II, PIPL, 242-FZ, DIFC, UAE DPL, RBI, POPIA, NDPR, PIPA)
      for each market the team operates in
    - Treat device-present credentials as the boundary of device-seizure exposure
    verification: Architecture proves keys never reach the relay; legal-response runbook lists applicable
      jurisdictional authorities and the architectural response.
  - ref: appendix-b-threat-model-worksheets:SEC-06
    name: Per-vertical worksheet customization
    scope: foundational
    definition: A requirement that each deployment add asset rows and actor rows specific to its vertical
      (healthcare, legal, government, defense, regulated finance) before the worksheet is treated as complete.
    must-implement:
    - Extend the asset inventory with vertical-specific assets before first deployment
    - Extend the actor taxonomy with vertical-specific adversaries before first deployment
    - Document jurisdiction-specific inspection rights for regulated markets
    verification: Per-deployment threat model includes vertical-specific additions beyond the template
      baseline.
  - ref: appendix-b-threat-model-worksheets:SEC-07
    name: Attack tree per worksheet
    scope: foundational
    definition: A branch-by-branch decomposition of a primary threat scenario, naming each control checkpoint
      and its mitigation, and identifying the residual risk where controls do not fully cover the branch.
    must-implement:
    - Walk the highest-probability threat scenario branch by branch
    - Name the mitigation that defeats each branch
    - Identify and label residual risk that mitigations do not cover
    verification: Threat-model document contains at least one named attack tree with explicit mitigations
      and a residual-risk note.
  - ref: appendix-b-threat-model-worksheets:MITIG-01
    name: MDM-enforced device hardening
    scope: foundational
    definition: An MDM-enforced configuration baseline requiring full-disk encryption, minimum 6-digit
      PIN, disabled USB boot, locked BIOS settings, and disabled hibernation/suspend-to-disk on every
      node before it joins the sync mesh.
    must-implement:
    - Enforce full-disk encryption (e.g., BitLocker on Windows) via MDM compliance policy
    - Require minimum 6-digit PIN through MDM
    - Disable USB boot and lock BIOS settings changes
    - Disable hibernation files and suspend-to-disk images via MDM
    - Block sync-mesh enrollment until MDM compliance is confirmed
    verification: MDM policy file enforces all five controls; nodes failing compliance cannot complete
      sync-mesh handshake.
  - ref: appendix-b-threat-model-worksheets:SEC-08
    name: Key-compromise detection checklist
    scope: foundational
    definition: A standing list of triggers (theft, anomalous audit-log access, credential leak, threat-intel
      hit, IdP failures, offboarding, abnormal sync-state inconsistency, lawful access demand) that initiate
      the re-keying procedure on suspicion rather than on confirmation.
    must-implement:
    - Initiate re-keying on suspicion, not on confirmation
    - Cover all eight named trigger categories in the detection checklist
    - Distinguish infrastructure-failure WAL replay from sync-state inconsistency that signals a security
      event
    - Engage legal counsel before responding to lawful access demands
    verification: Incident-response runbook contains a detection checklist with the eight named triggers
      and an explicit suspicion-not-confirmation directive.
  - ref: appendix-b-threat-model-worksheets:SEC-11
    name: Data-at-risk scope calculation
    scope: foundational
    definition: A bounded calculation of compromise exposure defined by the compromised KEK's keystore
      creation date as start, the relay-confirmed revocation date as end, and the documents the KEK protected
      within that window as scope, with documents outside that role or created after revocation explicitly
      excluded.
    must-implement: &id193
    - Use the keystore creation timestamp as the start date, not employee recollection
    - Use the relay-confirmed revocation timestamp as the end date
    - Enumerate all documents the compromised KEK protected within the window
    - Exclude documents in unaffected roles and documents created after the revocation date
    verification: Incident-response output contains a data-at-risk calculation with documented start,
      end, scope, and exclusions.
  - ref: appendix-b-threat-model-worksheets:SEC-12
    name: User notification template and 90-day retention floor
    scope: foundational
    definition: A standardized affected-user notification recording recipient, channel, and timestamp,
      retained for a minimum of 90 days as an audit-log retention floor distinct from regulatory breach-notification
      deadlines.
    must-implement:
    - Send the templated notification to every member of the affected role
    - Log timestamp, channel, and recipient for each notification
    - Retain notification records for at least 90 days
    verification: Audit log contains notification records with the three required fields and a retention
      policy of at least 90 days.
  - ref: appendix-b-threat-model-worksheets:COMP-01
    name: Jurisdictional breach notification SLA matrix
    scope: foundational
    definition: A matrix mapping each operating jurisdiction to its supervisor-notification window and
      data-subject-notification window, against which the incident-response SLA is set to the shortest
      applicable window.
    must-implement: &id194
    - Verify and record the supervisor-notification window for each jurisdiction the team operates in
    - Verify and record the data-subject-notification window for each jurisdiction
    - Set the incident-response SLA against the shortest applicable window
    - Treat the GDPR 72-hour window as the shortest common denominator unless a stricter window applies
    verification: Compliance documentation contains a jurisdiction matrix and an incident SLA equal to
      the shortest listed window.
  - ref: appendix-b-threat-model-worksheets:COMP-02
    name: Pre-deployment regulatory validation
    scope: foundational
    definition: A pre-production requirement to validate, for every market the team operates in, the breach
      notification window, retention floor, regulatory inspection rights, and cross-border data transfer
      rules under the applicable regional frameworks.
    must-implement: &id195
    - Identify the applicable regulatory frameworks for each operating market
    - Validate breach notification window, retention floor, inspection rights, and cross-border transfer
      rules per market
    - Complete validation before first production deployment
    verification: Pre-deployment compliance checklist documents the four validations per operating market.
  - ref: appendix-c-further-reading:READ-01
    name: Kleppmann seven local-first ideals
    scope: foundational
    definition: The seven aspirational properties — fast local performance (P1), multi-device access (P2),
      network-optional operation (P3), seamless collaboration (P4), longevity beyond vendor lifespan (P5),
      security and privacy by default (P6), and ultimate user ownership (P7) — that together define local-first
      software per Kleppmann et al. (Onward! 2019).
    must-implement: *id003
    verification: Conformance scorecard maps every architectural choice to one or more of P1-P7; no property
      is left unaddressed.
  - ref: appendix-d-testing-the-inverted-stack:TEST-01
    name: Five-level testing pyramid
    scope: foundational
    definition: A tiered test architecture in which CRDT property tests, real-dependency integration tests,
      fault injection, deterministic simulation, and chaos testing each run at a defined cadence with
      mandatory pass conditions before first production release.
    must-implement: *id066
    verification: CI configuration shows distinct jobs for each level with the prescribed triggers and
      time budgets, and every scenario in the suite carries an explicit pass condition.
  - ref: appendix-d-testing-the-inverted-stack:TEST-11
    name: Security scenarios for encryption, key rotation, and audit
    scope: foundational
    definition: A required scenario set producing regulator-grade evidence covering SQLCipher unreadability
      without keys, post-rotation key revocation, historical document re-keying under a new KEK, data-boundary
      negative tests with relay disabled, relay-operator inability to decrypt, attestation revocation,
      and tamper-evident audit trail completeness.
    must-implement: *id108
    verification: Per-scenario evidence column captures packet captures, audit log exports with verified
      Merkle root, relay log entries with issuer fingerprint, and ciphertext samples — archived per release.
  - ref: appendix-d-testing-the-inverted-stack:TEST-13
    name: Tiered CI configuration with archived test artefacts
    scope: foundational
    definition: A four-tier CI configuration (per-PR, nightly, weekly/RC, pre-major-release) that gates
      merges on L1+L2, runs L3 nightly, executes L4 simulation weekly or per RC, and runs L5 chaos before
      major releases, with archived test report, scenario evidence, harness configuration, and SBOM per
      release.
    must-implement: *id109
    verification: CI definitions show four named tiers with the prescribed triggers, time budgets, and
      artefact-upload steps producing an archive linked to each release tag.
  - ref: appendix-f-regulatory-coverage:COMP-01
    name: GDPR Article 17 right-to-erasure via crypto-shredding
    scope: foundational
    definition: An EU-mandated individual right to erasure that local-first architectures answer by destroying
      the per-record DEK so encrypted CRDT history becomes unrecoverable, with the lawfulness of crypto-shred-as-erasure
      remaining unsettled across CNIL and German DPAs.
    must-implement: *id110
    verification: After erasure, the targeted record's ciphertext remains but no DEK path exists to decrypt
      it; an ADR documents the chosen erasure mechanism and its jurisdictional caveats
  - ref: appendix-f-regulatory-coverage:COMP-02
    name: GDPR Article 30 records-of-processing at the node level
    scope: foundational
    definition: A GDPR requirement that processing activities be logged in a controller-accessible record,
      satisfied in local-first architectures by per-node processing logs rather than centralized SaaS
      audit trails.
    must-implement: *id111
    verification: A node export produces an Article-30-compliant processing record without requiring vendor
      cooperation
  - ref: appendix-f-regulatory-coverage:COMP-05
    name: UAE Federal DPL 2022 Article 16 erasure right
    scope: foundational
    definition: A UAE federal data protection rule establishing an Article 16 erasure right for processing
      outside DIFC and ADGM, carrying the same crypto-shredding sufficiency tension as GDPR Article 17.
    must-implement: *id112
    verification: A UAE federal tenant erasure request produces the same crypto-shred audit artifacts
      as a GDPR Article 17 request
  - ref: appendix-f-regulatory-coverage:COMP-06
    name: India DPDP Act 2023 Section 12 erasure rights
    scope: foundational
    definition: India's omnibus data protection statute establishes a Section 12 erasure right parallel
      to GDPR Article 17, with implementing rules pending and BFSI deployments layered with the RBI localization
      circular.
    must-implement: *id113
    verification: A DPDP Section 12 erasure request produces a documented crypto-shred audit trail for
      the targeted record
  - ref: appendix-f-regulatory-coverage:COMP-09
    name: China PIPL plus MLPS 2.0 strict cross-border restriction
    scope: foundational
    definition: PIPL Article 47 erasure rights combined with MLPS 2.0 security classification create one
      of the strictest cross-border transfer regimes globally, generally requiring personal data of Chinese
      residents to remain inside China.
    must-implement: *id098
    verification: A China-tenant deployment audit confirms node residency, MLPS classification, and absence
      of unauthorized cross-border egress
  - ref: appendix-f-regulatory-coverage:COMP-10
    name: Japan APPI Article 36 cross-border consent and erasure
    scope: foundational
    definition: The 2022-revised Japanese APPI introduces Article 36 cross-border transfer consent and
      an erasure-equivalent right that inherits the same CRDT-history-versus-DEK-destruction tension as
      GDPR Article 17.
    must-implement: *id114
    verification: A Japan-tenant erasure request produces a crypto-shred audit trail and any cross-border
      transfer carries an attached consent record
  - ref: appendix-f-regulatory-coverage:COMP-11
    name: South Korea PIPA plus ISMS-P procurement certification
    scope: foundational
    definition: South Korea's PIPA establishes erasure rights and ISMS-P functions as a procurement-required
      certification that the local-first vendor must produce alongside SOC 2 and ISO 27001 documentation.
    must-implement: *id115
    verification: An ISMS-P artifact exists in the procurement-evidence bundle and an erasure dry-run
      produces a PIPA-suitable audit trail
  - ref: appendix-f-regulatory-coverage:COMP-12
    name: Africa parallel mandates (NDPA, POPIA, Kenya DPA)
    scope: foundational
    definition: A coherent set of African data-protection statutes (Nigeria NDPA 2023, South Africa POPIA
      Sections 24 and 72, Kenya DPA 2019 Section 40) establishing erasure rights and cross-border transfer
      prohibitions to non-adequate countries that mirror the GDPR structural argument for on-device residency.
    must-implement: *id116
    verification: A POPIA Section 72 transfer review and a per-tenant sectoral-obligation register exist
      and are kept current
  - ref: appendix-f-regulatory-coverage:COMP-13
    name: LATAM erasure-rights cluster (LGPD, LFPDPPP ARCO)
    scope: foundational
    definition: A Latin American cluster of statutes (Brazil LGPD Article 18, Mexico LFPDPPP ARCO cancellation
      right, Colombia Ley 1581, Argentina Ley 25.326) establishing erasure rights parallel to GDPR Article
      17 with the ANPD's stance on crypto-shredding still unsettled.
    must-implement: *id117
    verification: An LGPD Article 18 erasure dry-run produces a crypto-shred audit trail and an open-question
      note for ANPD review
  - ref: appendix-f-regulatory-coverage:COMP-14
    name: US sector-specific frameworks (HIPAA, FedRAMP, ITAR)
    scope: foundational
    definition: The absence of a US omnibus privacy law leaves sector-specific regimes — HIPAA for PHI,
      FedRAMP for federal cloud authorization, ITAR/EAR for export-controlled technology, CCPA/CPRA for
      California consumer rights — each addressed by on-device encryption and sovereign deployment patterns.
    must-implement: *id118
    verification: A US-tenant deployment registers each applicable sectoral framework and produces the
      corresponding evidence artifacts on demand
  P7:
  - ref: preface:PREF-01
    name: The architectural thesis — local node as primary, vendor as optional
    scope: foundational
    definition: 'The book''s central thesis is the inversion of the SaaS dependency relationship: the
      local node is the primary data plane and the vendor relay is an optional accelerator, so the application
      survives vendor withdrawal.'
    must-implement: *id071
    verification: Disconnect the application from all vendor services (network block of vendor domains);
      application performs all core read, write, and local collaboration operations identically to the
      connected state.
  - ref: preface:PREF-02
    name: SaaS tenancy as a withdrawable dependency
    scope: foundational
    definition: SaaS tenancy is an external dependency that can be withdrawn unilaterally by the vendor,
      evidenced by the 2022 Adobe/Autodesk/Microsoft/Figma suspensions across Russia and the CIS that
      locked organizations out of their own data on infrastructure they had paid for.
    must-implement: *id119
    verification: null
  - ref: ch01-when-saas-fights-reality:THESIS-01
    name: The SaaS bundle as conjoined value-and-cost
    scope: foundational
    definition: SaaS packages three desirable properties (real-time collaboration, multi-device access,
      zero maintenance) inseparably with three undesirable conditions (data on vendor infrastructure,
      vendor-discretion pricing, vendor-contingent service continuity), accepted as a single take-it-or-leave-it
      deal because the technology of the time made the conditions appear structurally required to deliver
      the properties.
    must-implement: *id120
    verification: null
  - ref: ch01-when-saas-fights-reality:THESIS-03
    name: Vendor disappearance as routine product end-state
    scope: foundational
    definition: A failure mode in which the SaaS provider is acquired, sunset, pivoted, or runs out of
      runway, terminating service on a vendor-controlled timeline and leaving users with whatever export
      the vendor chooses to provide in whatever format the vendor chooses to emit.
    must-implement: *id121
    verification: Remove all vendor-side services; application launches, reads historical data, and continues
      normal operation against the local store.
  - ref: ch01-when-saas-fights-reality:THESIS-05
    name: Data inaccessibility despite nominal ownership
    scope: foundational
    definition: A failure mode in which user data is contractually owned by the user but operationally
      inaccessible due to export rate limits, proprietary formats that strip semantic structure, feature-gated
      export behind paid tiers, or short post-cancellation retrieval windows.
    must-implement: *id122
    verification: Run a documented export procedure on a representative dataset; confirm the export round-trips
      into a third-party tool with attachments, threading, and field semantics intact.
  - ref: ch01-when-saas-fights-reality:THESIS-06
    name: Post-adoption pricing capture
    scope: foundational
    definition: A failure mode in which switching costs accumulated through training, integrations, historical
      data, and learned workflows allow vendors to raise prices, move features behind higher tiers, or
      change contractual terms after the customer has lost realistic exit leverage, with per-seat pricing
      and integration ecosystems compounding the lock-in as teams grow.
    must-implement: *id123
    verification: Cancel any optional vendor relay or sync service; confirm the application retains all
      core functionality on the local node alone.
  - ref: ch01-when-saas-fights-reality:THESIS-07
    name: Third-party veto over vendor-custodied data
    scope: foundational
    definition: A failure mode in which an external authority — sanctions regime, data residency regulator,
      court order, or national security designation — compels the vendor to suspend service or compels
      the customer to cease use, ending the relationship regardless of either party's preferences because
      data custody at the vendor concentrates the exposure surface there.
    must-implement: *id099
    verification: Specification documents the data custody boundary; deployment guide demonstrates substituting
      a user-controlled relay for a vendor relay with no application-level changes.
  - ref: ch01-when-saas-fights-reality:THESIS-08
    name: Architectural reversal of data custody
    scope: foundational
    definition: The thesis-level architectural inversion that moves authoritative state from vendor infrastructure
      to user infrastructure, demoting the vendor's role from primary data plane to optional relay peer,
      made feasible by three independently matured technology shifts (production CRDTs, edge gossip protocols,
      the local service pattern).
    must-implement: *id072
    verification: Architecture documents identify the device-resident authoritative store; sync protocol
      documents identify any cloud component as relay or peer rather than primary; component inventory
      cites mature open implementations for each substrate.
  - ref: ch01-when-saas-fights-reality:THESIS-10
    name: Asymmetric exposure of small-and-medium organizations
    scope: foundational
    definition: The observation that the SaaS bundle's undesirable conditions fall hardest on small and
      medium professional service firms because they sign standard terms without negotiated SLA, escrow,
      or portability clauses, while bearing direct professional, regulatory, and client-relationship consequences
      from any of the six failure modes.
    must-implement: *id124
    verification: Default deployment of the architecture passes a representative SMB compliance checklist
      (HIPAA, professional responsibility, jurisdictional residency) without enterprise-tier features
      enabled.
  - ref: ch02-local-first-serious-stack:LF-07
    name: You retain ultimate ownership and control
    scope: foundational
    definition: The user structurally — not contractually — decides where data lives, who can access it,
      and when to delete it, because the bits live on hardware the user controls in a format the user
      can read under encryption the user can manage.
    must-implement:
    - Data resides on hardware physically controlled by the user
    - Data format is readable by the user without vendor cooperation
    - Encryption keys are managed by the user, not held in escrow by the vendor
    - Ownership is structural (architectural) rather than promised by contract
    verification: Confirm user can copy, back up, and read data files independently of the vendor application;
      confirm key material is held only on user-controlled hardware.
  - ref: ch02-local-first-serious-stack:THESIS-01
    name: Seven properties as a minimum bar, not a wishlist
    scope: foundational
    definition: The seven Kleppmann properties function as a calibrated filter that fails any system satisfying
      only a subset, not as a menu from which an implementer may select.
    must-implement: *id001
    verification: Conformance scorecard reports per-property pass/fail in addition to any gradient score;
      overall conformance requires all seven to pass.
  - ref: ch03-inverted-stack-one-diagram:INV-01
    name: Local node as primary; cloud relay as optional peer
    scope: foundational
    definition: The architectural inversion replaces SaaS's cloud-primary / device-cache topology with
      a topology where the local node holds the authoritative copy and any cloud relay participates only
      as an optional sync peer.
    must-implement: *id009
    verification: Disconnect all network interfaces; the application performs every core operation identically
      and the relay role can be unplugged without rebuilding the application.
  - ref: ch03-inverted-stack-one-diagram:INV-12
    name: Engine-agnostic CRDT abstraction
    scope: foundational
    definition: The CRDT engine is consumed through an abstraction (`ICrdtEngine`) so that the choice
      between YDotNet (current) and Loro (aspirational target) is reversible without changes to the application
      layer.
    must-implement: *id125
    verification: Test suite runs the same convergence scenarios against multiple engine implementations
      and asserts byte-identical merged state.
  - ref: ch03-inverted-stack-one-diagram:INV-15
    name: Mirror-inversion of Ch01 failure modes
    scope: foundational
    definition: The inversion specifically resolves each of Ch01's six named SaaS failure modes — The
      Outage and The Dependency Chain, The Vendor, The Connectivity, The Data, The Price, and The Third-Party
      Veto — by removing the vendor's data custody as the load-bearing dependency.
    must-implement: *id074
    verification: Failure-mode regression tests for each named mode confirm continued local function and
      data accessibility; export test produces a standard-format archive without vendor API calls.
  - ref: ch03-inverted-stack-one-diagram:INV-16
    name: The Security Breach as hidden-exposure reveal
    scope: foundational
    definition: SaaS exposes users to a structurally invisible failure mode — vendor-side breach of decryptable
      copies — that the inverted architecture neutralizes by ensuring the relay only ever holds ciphertext
      sealed under per-document DEKs wrapped by role KEKs whose keys never leave the originating node.
    must-implement: *id126
    verification: Threat-model audit demonstrates no key material crosses the node boundary; relay breach
      simulation produces only ciphertext payloads with no path to plaintext.
  - ref: ch04-choosing-your-architecture:DEC-01
    name: The One Question (user-owned vs aggregated value)
    scope: foundational
    definition: The architecture-determining question is whether the primary value of the software comes
      from the user's own data or from data aggregated across many users.
    must-implement: *id127
    verification: Architecture decision record names the primary records, identifies their natural owner,
      and cites the One Question answer as the basis for selecting Zone A, B, or C.
  - ref: ch04-choosing-your-architecture:FILT-02
    name: Filter 2 — Data ownership profile
    scope: foundational
    definition: A check that classifies the natural owner of the primary records by who creates them,
      who uses them, and who suffers loss when access is severed — distinguishing user-owned, vendor-aggregated,
      and regulator-custodied profiles.
    must-implement: *id128
    verification: Architecture decision record cites the data-ownership profile per primary record type;
      regulator-custodian flows reference the specific regulation (HIPAA, FINRA, ITAR, etc.) and the custodial
      mechanism used.
  - ref: ch04-choosing-your-architecture:FILT-04
    name: Filter 4 — Business model alignment
    scope: foundational
    definition: A check that rejects local-first when revenue depends on controlling user access to their
      own data, and confirms it when revenue derives from service quality, managed relay, support, tooling,
      or dual-licensed open-core offerings.
    must-implement: *id129
    verification: Business model document names the revenue path; relay-failure test confirms local operation
      and data access continue unaffected; user data export is supported without vendor mediation.
  - ref: ch04-choosing-your-architecture:DEC-06
    name: The Practical Shortcut (three-question prefilter)
    scope: foundational
    definition: A three-question prefilter — primary-record ownership, sustained-offline requirement,
      vendor-outlive requirement — that determines whether a full five-filter evaluation is worth the
      time for a project in early discovery.
    must-implement: *id075
    verification: Discovery-stage architecture note records the three shortcut answers and either cites
      the resulting Zone or names the filter requiring full evaluation.
  - ref: ch04-choosing-your-architecture:DEC-07
    name: Vendor-outlive requirement
    scope: foundational
    definition: The requirement that the product keep working regardless of whether the vendor survives,
      is acquired, changes pricing, or is directed to stop serving a given jurisdiction — making vendor-independent
      authoritative data custody a structural, not contractual, property.
    must-implement: *id130
    verification: Behavioral test simulates vendor service permanently unavailable; the application continues
      to function on local data and a documented procedure exists for replacing vendor-provided relay
      infrastructure without data migration.
  - ref: ch05-enterprise-lens:LENS-E-06
    name: Defined incident response runbook
    scope: foundational
    definition: A formal incident response runbook accompanies the architecture, specifying triggering
      events, artifact collection sequence, chain of custody requirements, escalation path, and jurisdiction-specific
      regulatory notification windows, distinct from and complementary to the CRDT audit trail.
    must-implement: *id131
    verification: Companion runbook document exists alongside architecture spec; runbook contains each
      enumerated section; tabletop exercise executes the runbook end-to-end against a simulated incident.
  - ref: ch05-enterprise-lens:LENS-E-14
    name: Power-interruption durability as baseline property
    scope: foundational
    definition: Local writes commit to durable storage before acknowledgment so that abrupt power loss
      does not corrupt the local data store, and the sync daemon recovers cleanly from cold restart after
      unexpected shutdown.
    must-implement: *id132
    verification: Crash-injection test cuts power mid-write across many trials; on restart the data store
      opens cleanly with no corruption and the sync daemon resumes operation.
  - ref: ch05-enterprise-lens:LENS-E-15
    name: Structural data residency by jurisdiction
    scope: foundational
    definition: Local-first data custody satisfies data-residency requirements across major regulatory
      regimes (GDPR/Schrems II, India DPDP, UAE DIFC DPL 2020, Russian import-substitution, and the full
      Appendix F matrix) as a structural property of the deployment rather than as a configuration option.
    must-implement: *id133
    verification: Compliance documentation maps each named regime to the architectural property that satisfies
      it; deployment audit confirms no Western cloud dependency exists in the default node configuration.
  - ref: ch07-security-lens:LENS-S-01
    name: Send-tier subscription filtering
    scope: foundational
    definition: Subscription filtering is enforced at the sync daemon's send tier so that a node lacking
      the required role attestation never receives the operations, eliminating any reliance on the application
      or UI to discard data it should not have.
    must-implement: *id134
    verification: Black-box test in which a node without a role attestation observes zero matching operations
      on the wire and zero matching rows in local storage
  - ref: ch07-security-lens:LENS-S-02
    name: Distributed attack surface acknowledgment
    scope: foundational
    definition: Distributing data to endpoints does not eliminate the honeypot problem; it relocates the
      honeypot to the weakest endpoint in a heterogeneous fleet whose security posture sets the effective
      bound for any data that endpoint holds.
    must-implement: *id135
    verification: Threat-model document enumerates endpoint compromise as in-scope and states that the
      weakest endpoint sets the data-at-risk bound for that endpoint's roles
  - ref: ch07-security-lens:LENS-S-03
    name: DEK/KEK envelope encryption hierarchy
    scope: foundational
    definition: A four-level hierarchy in which the root organization key wraps role KEKs, role KEKs are
      wrapped per authorized node with each node's public key, role KEKs wrap per-record DEKs, and DEKs
      encrypt ciphertext using a symmetric cipher.
    must-implement: *id136
    verification: Key hierarchy diagram and code path demonstrate that decrypting any document requires
      unwrapping in the documented order from node key to role KEK to DEK to plaintext
  - ref: ch07-security-lens:LENS-S-04
    name: Key compromise response procedure
    scope: foundational
    definition: A specified sequence triggered by detection of KEK compromise that generates a fresh KEK
      not derived from the compromised key, re-wraps every DEK owned by the affected role, discards old
      KEK copies, broadcasts revocation through the relay, and notifies affected users with the data-at-risk
      window.
    must-implement: *id137
    verification: Compromise drill executes the documented procedure end-to-end and produces revocation
      broadcast, re-wrapped DEKs, discarded prior key material, and a user-visible notification within
      a measurable interval
  - ref: ch07-security-lens:LENS-S-09
    name: Supply chain signing custody and transparency
    scope: foundational
    definition: 'Release artifact integrity rests on three layered controls: documented custody for the
      release signing key, reproducible builds that allow independent verification of binary against source,
      and a publicly auditable transparency log such as Sigstore that records every signing event.'
    must-implement: *id138
    verification: Independent rebuild matches the published artifact byte-for-byte and the signature appears
      in the public transparency log
  - ref: ch07-security-lens:LENS-S-10
    name: Ciphertext-only relay
    scope: foundational
    definition: The relay is treated as untrusted transport that handles only end-to-end encrypted payloads,
      so a relay operator who reads everything on the wire obtains operation identifiers and timestamps
      but no plaintext content.
    must-implement: *id139
    verification: Inspection of relay process memory and storage finds no key material capable of decrypting
      any routed payload
  - ref: ch07-security-lens:LENS-S-11
    name: Relay traffic-analysis disclosure
    scope: foundational
    definition: A ciphertext-only relay still observes the communication graph, timing, and volume between
      nodes, and the architecture must disclose this metadata exposure rather than leave it for security
      teams to discover at deployment.
    must-implement: *id140
    verification: Relay documentation lists each observable metadata channel and identifies the deployment
      topology that removes each
  - ref: ch07-security-lens:LENS-S-12
    name: Compelled-access threat model
    scope: foundational
    definition: A jurisdictional threat in which infrastructure operators are subject to mandatory government
      access requirements, addressed structurally because the relay holds only ciphertext and the keys
      never leave the originating device, so the operator cannot produce decryptable content under compulsion.
    must-implement: *id141
    verification: Threat-model worksheet for compelled access lists the relay operator as unable to produce
      plaintext and references the supporting key custody and ciphertext-only properties
  - ref: ch07-security-lens:LENS-S-13
    name: Crypto-shredding for right-to-erasure
    scope: foundational
    definition: A pattern that satisfies right-to-erasure obligations against an immutable CRDT log by
      destroying the DEK that protects the targeted operation's content, leaving the operation entry in
      the log structurally intact while rendering its ciphertext permanently unreadable.
    must-implement: *id102
    verification: Erasure drill destroys the targeted DEK, confirms ciphertext is no longer decryptable
      on any replica, and produces a documentation artifact stating the metadata residue
  - ref: ch07-security-lens:LENS-S-14
    name: Credential recovery paths
    scope: foundational
    definition: A required set of artifact-based recovery options — recovery-key file, administrator-held
      wrapped KEK escrow, MDM re-enrollment plus relay-assisted re-sync — from which every deployment
      must select and test at least one before production, with the no-artifact case explicitly disclosed
      as permanent loss.
    must-implement: *id103
    verification: Recovery drill executes each enabled path end-to-end and restores access; onboarding
      flow surfaces the no-artifact disclosure
  - ref: ch07-security-lens:LENS-S-15
    name: Defense-in-depth four-layer model
    scope: foundational
    definition: A non-optional composition of four enforcement layers — encryption at rest, field-level
      envelope encryption, stream-level send-tier data minimization, and circuit-breaker quarantine of
      offline writes — each built from independently audited primitives and specified before use.
    must-implement: *id142
    verification: Architecture conformance test confirms presence and engagement of each of the four layers
      and that primitives in use are from the approved list
  - ref: ch07-security-lens:LENS-S-17
    name: Root key custody via HSM or multi-party ceremony
    scope: foundational
    definition: The root organization key is custodied either inside a Hardware Security Module or under
      a documented multi-party key ceremony, with a domestic equivalent permitted in jurisdictions where
      Western HSM hardware is not approved.
    must-implement: *id143
    verification: Custody documentation names the HSM model or the multi-party procedure and the on-call
      holders, and an audit confirms the root key is not present in any node-level store
  - ref: ch08-product-economic-lens:LENS-P-14
    name: Vendor-continuity risk as commercial purchasing argument
    scope: foundational
    definition: The architecture's structural ability to keep operating after vendor commercial relationship
      is severed — empirically anchored by the 2022 Western SaaS withdrawal from Russia and CIS markets
      — is positioned in procurement materials as a structural commercial claim that cloud-dependent competitors
      cannot make without re-architecture.
    must-implement: *id079
    verification: Sales collateral contains the vendor-continuity claim with the 2022 anchor citation;
      tabletop exercise demonstrates continued local operation after simulated vendor severance.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-01
    name: Plain-file application-independent export path
    scope: foundational
    definition: A user-owned local-first application must provide a single command that produces user
      data in durable application-independent formats — JSON for structured records, CSV for tabular data,
      Markdown for long-form documents — readable by any other competent software without vendor cooperation,
      active subscription, or network connectivity.
    must-implement: *id144
    verification: Disconnect the network, cancel the subscription if applicable, run the export command,
      then ingest the resulting JSON/CSV/Markdown into a different application and confirm semantic equivalence
      to the source records.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-02
    name: Non-technical disaster recovery walkthrough
    scope: foundational
    definition: Recovery from total device loss is a documented step-by-step path that a non-technical
      user can complete unaided in under thirty minutes, ending with a working node that resumes from
      BYOC backup without exposing any technical surface such as bucket URLs or rclone paths.
    must-implement: *id080
    verification: A non-technical tester completes end-to-end restore from a destroyed device to a working
      node in under thirty minutes without consulting documentation beyond in-application prompts.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-03
    name: Symmetric NAT plus relay outage as documented failure mode
    scope: foundational
    definition: When both peers sit behind carrier-grade NAT and the managed relay is unavailable, direct
      peer-to-peer communication is impossible and the architecture documents this as a named local-only
      failure mode with a self-hosted-relay fallback rather than concealing it.
    must-implement: *id145
    verification: Architecture documentation contains a section naming the symmetric NAT plus relay outage
      failure mode and the self-hosted-relay remediation; integration test exercises the local-only mode
      and confirms reads/writes succeed against local storage.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-04
    name: Engine-agnostic CRDT abstraction for ecosystem reversibility
    scope: foundational
    definition: The application layer interacts with the CRDT engine through a stable abstraction such
      as ICrdtEngine that prevents lock-in to any specific CRDT ecosystem — Yjs, Automerge, or Loro —
      so the engine can be replaced without rewriting the application as the field continues to evolve.
    must-implement: *id146
    verification: Source tree contains an ICrdtEngine-equivalent interface; a second engine adapter (test
      stub or alternate implementation) exists and the application test suite passes against both.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-05
    name: Peer-attestation QR onboarding bundle
    scope: foundational
    definition: A new device joins an existing workspace by scanning a QR-encoded attestation bundle from
      an existing peer that transfers credentials, workspace identity, and gossip-bootstrap parameters
      in a single out-of-band step, eliminating the credentials-require-peer chicken-and-egg failure mode
      of naive multi-device onboarding.
    must-implement: *id036
    verification: Pair a new device to a workspace by scanning a peer-generated QR; confirm the new device
      authenticates and begins receiving CRDT updates without contacting a centralized credential service.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-07
    name: Three-state backup status with dismissible at-risk banner
    scope: foundational
    definition: Backup health surfaces to the user through three escalating states — Protected (subtle),
      Attention (amber badge), At Risk (persistent non-blocking banner dismissible only with explicit
      acknowledgment) — so users do not think about working backups but cannot accidentally ignore failing
      ones.
    must-implement: *id147
    verification: Force each of the three backup states in a test build and confirm the visual treatment
      matches specification; confirm the At Risk dismissal records an acknowledgment event in the local
      log.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-08
    name: Recovery UX parity with backup status design
    scope: foundational
    definition: The restore experience receives the same non-technical design attention as backup status
      — a guided reconnection to the BYOC target, a restore-progress indicator that mirrors the three-state
      backup model in restore context, and zero exposure of bucket URLs or rclone paths at the moment
      the user is most stressed about lost work.
    must-implement: *id148
    verification: A non-technical tester completes restore using only in-application prompts; UI inspection
      confirms no bucket URL or rclone path appears anywhere in the restore flow.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-12
    name: Default-deny telemetry with named privacy model
    scope: foundational
    definition: Product analytics in a local-first architecture must be specified before the first analytics
      request arrives — opt-in telemetry disabled by default, aggregate-through-relay privacy-preserving
      statistics as the only permitted centralized collection — and the chosen model is documented in
      an ADR mapped to GDPR Article 25 privacy-by-design so the line stays durable under future product
      pressure.
    must-implement: *id149
    verification: Confirm a fresh install reports no telemetry; confirm an ADR exists naming the telemetry
      model with the GDPR Article 25 mapping; confirm centralized collection paths in the codebase emit
      only aggregate metadata.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-13
    name: Implementation drift prohibition on server-side feature gating
    scope: foundational
    definition: A local-first architecture explicitly prohibits server-side feature flag checks, server-side
      A/B tests, and server-coordinated business logic that would re-introduce the network as a runtime
      dependency, naming this as the primary drift path that erodes local-first commitments one reasonable-sounding
      decision at a time.
    must-implement: *id015
    verification: Disconnect the network, launch the application, and confirm all features behave identically
      to a connected launch; code review checklist includes a server-side-feature-gate prohibition.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-14
    name: Intermittent connectivity as architectural baseline
    scope: foundational
    definition: The architecture treats intermittent connectivity as the operational baseline for hundreds
      of millions of enterprise workers across Sub-Saharan Africa, South and Southeast Asia, and rural
      Latin America — not as a carrier-grade NAT edge case — so all sync, conflict, and recovery flows
      are designed for sessions that span many disconnected intervals.
    must-implement: *id039
    verification: Run a multi-day partition simulation across the test fleet; confirm reconnect catch-up
      completes without manual intervention and the conflict inbox remains within the documented usability
      envelope.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-15
    name: Sanctions-grade availability as design anchor
    scope: foundational
    definition: The architecture is anchored against the empirical case of the 2022 sanctions-driven SaaS
      suspensions across Russia and CIS markets — hundreds of thousands of organizations losing vendor
      access on days of notice — establishing that surviving vendor suspension is not a theoretical improvement
      but a property the architecture has already had to provide.
    must-implement: *id081
    verification: Block all vendor-controlled domains at the network layer and confirm the application
      performs all core operations identically; confirm a self-hosted relay deployment guide exists in
      the public documentation.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-16
    name: Shared-device role-scoped recovery
    scope: foundational
    definition: Recovery must support shared-device deployments — a single tablet rotated across a team
      of field workers — by targeting the role and the workspace rather than the device and its sole user,
      with BYOC backup configured against role-scoped workspace targets so any team member can restore
      from any device.
    must-implement: *id040
    verification: Provision a workspace with three role-scoped users, restore each onto a single shared
      device in succession, and confirm each user reaches role-relevant data without loss to the others'
      backup state.
  - ref: ch10-synthesis:LENS-02
    name: Send-tier subscription filtering as data minimization invariant
    scope: foundational
    definition: Subscription filtering enforces role-scoped data minimization at the sending node before
      transmission, not at the receiver or in the application layer.
    must-implement: *id150
    verification: Sync daemon trace shows that data outside a peer's subscription scope is never serialized
      for that peer; integration test asserts a peer with a restricted role never receives out-of-scope
      ciphertext on the wire.
  - ref: ch10-synthesis:LENS-05
    name: DEK/KEK envelope encryption with role-scoped rotation
    scope: foundational
    definition: Each document holds a Data Encryption Key wrapped by role-scoped Key Encryption Keys,
      organized as a four-level hierarchy (root org key to role KEKs to per-node wrapped keys to per-record
      DEKs) such that role revocation rotates the affected KEK and re-wraps in-scope DEKs.
    must-implement: *id151
    verification: Security architecture chapter specifies the four-level hierarchy; revocation test confirms
      that after rotation the old KEK no longer decrypts in-scope documents and never decrypted out-of-scope
      documents.
  - ref: ch10-synthesis:LENS-07
    name: Non-technical disaster recovery path
    scope: foundational
    definition: A non-technical user can recover their complete data after total device failure without
      contacting support and without developer-only tooling.
    must-implement: *id082
    verification: Documented walkthrough exists; usability test with a non-technical participant completes
      restore on a fresh device without developer assistance.
  - ref: ch10-synthesis:LENS-08
    name: Plain-file export without vendor cooperation
    scope: foundational
    definition: A user can export all of their data to standard plain-file formats (CSV, JSON, plain files)
      using only a standard file manager, with no vendor service call and no special tooling.
    must-implement: *id152
    verification: Disconnect node from network; trigger export; verify produced files open in standard
      tools and contain the user's full record set; verify any withheld categories are listed with the
      regulatory basis.
  - ref: ch10-synthesis:LENS-12
    name: Sanctions-grade availability as design anchor
    scope: foundational
    definition: The architecture treats the documented 2022 Western SaaS withdrawal from Russia and CIS
      markets as the empirical anchor against which availability, encryption, and ownership invariants
      are validated, not as a hypothetical threat model.
    must-implement: *id083
    verification: Tabletop exercise simulating sudden vendor withdrawal demonstrates continued local operation,
      retained data, and standalone software availability.
  - ref: ch10-synthesis:LENS-13
    name: Crypto-shredding as erasure-rights resolution with documented limits
    scope: foundational
    definition: Erasure rights against CRDT full-history retention are resolved by destroying the per-document
      DEK, rendering the data cryptographically inaccessible, and the architecture documents that cryptographic
      inaccessibility is not the same as physical erasure under every regulatory regime.
    must-implement: *id153
    verification: Compliance documentation maps each named jurisdiction (GDPR, LGPD, POPIA, NDPR, DPDP,
      PIPA, PIPL, etc.) to its treatment of crypto-shredding; behavioral test confirms DEK destruction
      on erasure request.
  - ref: ch10-synthesis:LENS-15
    name: Local key custody as architectural answer to compelled disclosure
    scope: foundational
    definition: Encryption keys never leave the user-controlled device, so a relay or cloud operator served
      with a compelled-disclosure order cannot produce decryptable content because no decryptable content
      is in their custody.
    must-implement: *id154
    verification: Audit of relay storage and logs confirms no key material is present; cryptographic protocol
      specification documents that relay never receives a private key.
  - ref: ch10-synthesis:LENS-17
    name: Default-no analytics with deliberate model selection
    scope: foundational
    definition: Local-first architecture has no server-side analytics endpoint by default, and the analytics
      model (opt-in telemetry only, aggregate via relay metadata, or none) must be selected and specified
      before implementation teams face delivery pressure to add one.
    must-implement: *id155
    verification: Architecture document names the chosen analytics model and the rationale; sync daemon
      and node kernel contain no implicit telemetry channel.
  - ref: ch11-node-architecture:NODE-10
    name: Send-side subscription filtering invariant
    scope: foundational
    definition: Bucket eligibility filtering occurs at the send tier before events leave the originating
      daemon, never at the receive tier where the data has already traveled.
    must-implement: *id156
    verification: Wire-trace test on a protected bucket confirms zero packets containing protected events
      leave the originator toward an unauthorized peer.
  - ref: ch11-node-architecture:NODE-31
    name: Local-first encrypted store foundation
    scope: foundational
    definition: Sunfish.Foundation.LocalFirst provides the local encrypted store (SQLCipher-backed), the
      IOfflineStore contract, and the circuit-breaker quarantine queue as foundational primitives every
      node depends on.
    must-implement: *id104
    verification: Sunfish.Foundation.LocalFirst package exists with encrypted store and IOfflineStore;
      storage file inspection confirms encryption-at-rest.
  - ref: ch12-crdt-engine-data-layer:CRDT-04
    name: Semantic layer enforces domain invariants
    scope: foundational
    definition: The semantic layer interprets CRDT data-layer changes as domain events and enforces invariants
      that CRDT merge cannot enforce structurally — for example, turning a concurrent posting-amount mutation
      into a compensating ledger entry rather than a silent corruption.
    must-implement: *id157
    verification: Test injects a CRDT-merged state that violates a domain invariant; assertion confirms
      semantic layer flags or compensates rather than accepting silently.
  - ref: ch12-crdt-engine-data-layer:CRDT-23
    name: Double-entry ledger as canonical CP subsystem
    scope: foundational
    definition: The double-entry ledger is the correct model for value records — not a CRDT workaround
      — because its append-only, immutable, strictly-ordered, balanced-postings structure aligns directly
      with what CP positioning requires for audit integrity.
    must-implement: *id158
    verification: Attempt to mutate a committed posting and confirm the operation is rejected; verify
      ledger integrity check confirms balanced postings per transaction.
  - ref: ch12-crdt-engine-data-layer:CRDT-26
    name: Period close and rollup snapshots
    scope: foundational
    definition: At period close, the projection engine computes account balances, P&L, and cash flow as
      rollup snapshots committed as closing events to the append-only log, and any subsequent postings
      affecting a closed period are directed to adjustment accounts in the next open period — the closed-period
      log is never rewritten.
    must-implement: *id159
    verification: Close a period, attempt a backdated posting, assert it is recorded as an adjustment
      in the current period and the closed-period log is unchanged.
  - ref: ch13-schema-migration-evolution:SCH-24
    name: Local-only archival of retired epoch streams
    scope: foundational
    definition: Retired epoch streams remain on the node operator's storage and are not replicated to
      the managed relay by default, so archival retention does not trigger a cross-border data transfer
      event.
    must-implement: *id106
    verification: Configuration audit confirms archived streams are not enumerated in default replication
      targets; opt-in requires a signed administrative event.
  - ref: ch13-schema-migration-evolution:SCH-25
    name: Crypto-shred deletion bridge to right-to-erasure
    scope: foundational
    definition: The tension between immutable archival history and storage-limitation or erasure-rights
      regulation is resolved by deleting the per-record DEK rather than rewriting the archive, rendering
      the historical record cryptographically unreadable.
    must-implement: *id107
    verification: Erasure test confirms post-deletion the archived ciphertext remains on disk but is unrecoverable
      without the DEK; audit log records the operation.
  - ref: ch15-security-architecture:SEC-01
    name: Distributed honeypot threat model
    scope: foundational
    definition: Distributing data to endpoints does not eliminate the honeypot problem but spreads it
      across many smaller perimeters whose weakest device sets the attacker's minimum viable entry cost.
    must-implement: *id160
    verification: Threat model document explicitly enumerates endpoint compromise as in-scope and states
      the bounded blast radius as a design property
  - ref: ch15-security-architecture:SEC-02
    name: Three blast-radius bounding properties
    scope: foundational
    definition: Each node holds only data its role subscriptions permit, per-role keys are absent from
      non-member nodes, and key compromise does not expose historical data encrypted under previously
      rotated keys.
    must-implement: *id161
    verification: Compromise simulation test confirms that seizing one node's full disk and memory exposes
      only data for that node's current role keys
  - ref: ch15-security-architecture:SEC-03
    name: Zero-knowledge relay
    scope: foundational
    definition: The relay is treated as an untrusted intermediary that routes ciphertext only and never
      holds decryption keys, so a relay operator cannot read payload plaintext.
    must-implement: *id162
    verification: Relay process memory and storage contain no key material capable of decrypting any payload
      it routes
  - ref: ch15-security-architecture:SEC-13
    name: Content-addressed update verification
    scope: foundational
    definition: Each update package is identified by a content identifier (CID) computed from package
      contents and distributed via a signed release manifest separate from the CDN, with the client verifying
      the computed CID before installation.
    must-implement: *id163
    verification: Tampered-binary test produces a CID mismatch and aborts installation
  - ref: ch15-security-architecture:SEC-17
    name: Crypto-shredding for GDPR Article 17
    scope: foundational
    definition: Erasure requests destroy the DEK for the targeted record, leaving the operation entry
      in the immutable log while making its ciphertext permanently unreadable.
    must-implement: *id164
    verification: After crypto-shredding, the targeted record's ciphertext is recoverable but no key path
      exists to decrypt it
  - ref: ch15-security-architecture:SEC-19
    name: Compelled-access structural defense
    scope: foundational
    definition: The relay cannot produce decryptable content under legal compulsion because it does not
      possess decryptable content, providing a structural answer to compelled-access threat models that
      customer-managed-key cloud patterns cannot match.
    must-implement: *id165
    verification: Legal-process simulation confirms relay can only produce ciphertext and metadata, never
      plaintext
  - ref: ch15-security-architecture:SEC-20
    name: Self-hosted relay for metadata-sensitive deployments
    scope: foundational
    definition: Deployments where the communication graph itself is sensitive replace the third-party
      relay with a self-hosted relay running the same codebase under the organization's operational custody.
    must-implement: *id166
    verification: Self-hosted deployment guide exists and the relay binary runs identically against the
      standard wire protocol
  - ref: ch16-persistence-beyond-the-node:DUR-01
    name: Node as authority over data it holds
    scope: foundational
    definition: Local-first does not mean data lives only on one machine; it means the node is the authority
      over the data it holds, and persistence beyond the node is composed from explicit additional tiers.
    must-implement: *id167
    verification: Architecture document specifies persistence tiers and names the authority for each tier
      as the node, not a vendor service.
  - ref: ch16-persistence-beyond-the-node:DUR-03
    name: Event log as source of truth
    scope: foundational
    definition: An append-only log of all CRDT operations and domain events is the system's source of
      truth for sync and audit; the local database is a derived projection of the log.
    must-implement: *id168
    verification: Deleting the local database file and replaying the event log reproduces equivalent application
      state.
  - ref: ch16-persistence-beyond-the-node:DUR-18
    name: Ciphertext-only relay invariant
    scope: foundational
    definition: The relay routes encrypted CRDT operation frames between authenticated peers without holding
      decryption keys; it sees peer identities, workspace identifiers, and frame envelopes but no plaintext
      payload.
    must-implement: *id169
    verification: Static analysis of relay binary confirms no key material is accepted or stored; integration
      test confirms forwarded frames are opaque ciphertext to the relay process.
  - ref: ch16-persistence-beyond-the-node:DUR-21
    name: Relay compelled-access immunity
    scope: foundational
    definition: A subpoena or compulsion order to the relay operator yields connection logs and message
      envelopes only — never payload plaintext — because the relay structurally does not possess decryptable
      content.
    must-implement: *id170
    verification: Architecture document and threat model state the compelled-access invariant; implementation
      review confirms no key escrow path exists at the relay layer.
  - ref: ch16-persistence-beyond-the-node:DUR-25
    name: Plain-file export as architectural requirement
    scope: foundational
    definition: All user data must be exportable as standard formats (SQLite, JSON, CSV, original-format
      binaries, Markdown) without running the application, as a first-class architectural feature rather
      than a compliance afterthought.
    must-implement: *id171
    verification: Run export with network disconnected; resulting directory opens in third-party tools
      (SQLite client, text editor, spreadsheet) without application software.
  - ref: ch16-persistence-beyond-the-node:DUR-26
    name: Export determinism and completeness guarantees
    scope: foundational
    definition: The export process emits no telemetry, requires no network, produces deterministic output
      (identical state yields identical export), and includes every record the local node holds — full
      records as content, stubs as metadata-plus-hash.
    must-implement: *id172
    verification: Run export twice over identical state; diff confirms identical contents. Capture network
      traffic during export; confirm zero outbound requests.
  - ref: ch16-persistence-beyond-the-node:DUR-28
    name: Markdown as long-now format
    scope: foundational
    definition: Markdown is included as an export format for long-form document content because it is
      simultaneously human-readable in any text editor, machine-parseable by any competent library, and
      version-control friendly without specialized tooling.
    must-implement: *id173
    verification: Open any Markdown export file in a plain text editor; content is human-readable without
      rendering.
  - ref: ch17-building-first-node:BUILD-12
    name: Founder bundle as self-signed trust root
    scope: foundational
    definition: A founder bundle is self-signed (issuer and subject are the same device key) and embeds
      the founder's Ed25519 public key, establishing the trust root for the team without any external
      certificate authority.
    must-implement: *id174
    verification: Generate a founder bundle and inspect it — issuer equals subject, IssuerPublicKey is
      present, verification succeeds against the embedded key alone.
  - ref: ch18-migrating-existing-saas:MIG-01
    name: Reversible four-phase migration model
    scope: foundational
    definition: A SaaS-to-local-first migration runs in four sequential phases where every gate below
      the final phase is reversible without data loss, replacing rewrite-everything cutover with phase-bounded
      engineering investment.
    must-implement: *id175
    verification: Migration runbook exists naming the four phases with per-phase rollback procedure; rollback
      procedures for Phases 1 through 3 are exercised in a staging environment without invoking a data
      migration job.
  - ref: ch18-migrating-existing-saas:MIG-02
    name: Five migration triggers
    scope: foundational
    definition: A team justifies migrating a hosted SaaS to local-first only when at least one of five
      named business triggers applies — compliance mandate, data-residency objection in enterprise sales,
      vendor reliability or termination event, churn driven by data sovereignty, or procurement review
      blocking adoption.
    must-implement: *id176
    verification: Migration kickoff document names the triggering condition with linked customer or regulatory
      evidence, reviewed by a non-engineering stakeholder before engineering investment begins.
  - ref: ch18-migrating-existing-saas:MIG-03
    name: Five-filter eligibility framework applied per record class
    scope: foundational
    definition: Migration eligibility is determined by running each record class through five filters
      covering ownership, staleness tolerance, conflict resolvability, offline value, and compliance posture,
      with the result selecting Zone B, Zone C, or no migration at all.
    must-implement: *id094
    verification: A filter-result table exists with one row per record class and five filter columns,
      archived in the migration plan.
  - ref: ch18-migrating-existing-saas:MIG-15
    name: Phase 2 reversibility via CRDT log preservation
    scope: foundational
    definition: Phase 2 is reversible per domain by disabling CRDT writes, returning authority to the
      server API while preserving the CRDT event log so local authority can be re-enabled later by replay.
    must-implement: *id177
    verification: Per-domain rollback procedure is exercised on a staging tenant; re-enable replay produces
      the expected projection without loss.
  - ref: ch18-migrating-existing-saas:MIG-19
    name: Phase 4 per-workspace one-way door with 30-day stabilization
    scope: foundational
    definition: Phase 4 is opt-in per workspace, runs incrementally one workspace at a time, holds each
      migrated workspace for 30 days on Phase 3 before treating the migration as stable, and is not reversible
      without re-running the copy-transform in reverse.
    must-implement: *id178
    verification: Migration runbook documents the per-workspace cadence and the 30-day hold; rollout dashboard
      tracks per-workspace days-since-cutover.
  - ref: ch19-shipping-to-enterprise:ENT-01
    name: Dual-license structure with commercial exception
    scope: foundational
    definition: The open-source core ships under AGPLv3 by default with a parallel commercial license
      offered to organizations that cannot accept the network-use clause.
    must-implement: *id179
    verification: Repository inspection finds both license texts under LICENSES/ and a top-level NOTICE
      or README pointer to the commercial exception
  - ref: ch19-shipping-to-enterprise:ENT-02
    name: Contributor License Agreement precondition
    scope: foundational
    definition: An inbound-equals-outbound CLA is in place before any external contribution is accepted,
      preserving the legal authority to offer the commercial license exception.
    must-implement: *id180
    verification: Repository CI configuration enforces a CLA-check status before merge; a signed CLA record
      exists for every author in git history
  - ref: ch19-shipping-to-enterprise:ENT-22
    name: Three-runbook minimum for enterprise GA
    scope: foundational
    definition: Enterprise general availability requires three published runbooks — node onboarding, node
      deprovisioning, and incident response for node or key compromise — each with named commands, expected
      outputs, and audit-log verification steps.
    must-implement: *id181
    verification: docs/runbooks/ contains all three named runbooks with command-output-verification triplets
      and expected-duration targets
  - ref: epilogue-what-the-stack-owes-you:EPI-01
    name: Protocol-layer data minimization
    scope: foundational
    definition: Data minimization is a send-tier protocol enforcement that prevents bytes from leaving
      the originating node toward an unauthorized peer, not a UI filter or server-side policy applied
      after data arrives.
    must-implement: *id182
    verification: Wire capture from an unauthorized peer's perspective shows zero protected bytes after
      capability negotiation completes.
  - ref: epilogue-what-the-stack-owes-you:EPI-04
    name: Cryptographic role revocation
    scope: foundational
    definition: Role revocation is implemented through DEK/KEK envelope encryption with key rotation proportional
      to document count, so that a revoked role cannot decrypt documents whose keys have been rotated.
    must-implement: *id183
    verification: Revocation procedure is executed, then the revoked principal's key material is presented
      against rotated documents and fails to decrypt.
  - ref: epilogue-what-the-stack-owes-you:EPI-06
    name: Non-technical disaster recovery
    scope: foundational
    definition: A non-technical user must be able to restore complete data after a device failure without
      contacting support, using a backup, restore, and verification UX legible to someone who is not an
      engineer.
    must-implement: *id184
    verification: A non-technical tester completes device-loss recovery scenario without engineering assistance
      and confirms data integrity.
  - ref: epilogue-what-the-stack-owes-you:EPI-07
    name: Plain-file export without vendor cooperation
    scope: foundational
    definition: User data is available on local disk in a documented file format under user-controlled
      keys, allowing the user to leave the platform at any time without negotiating with the vendor or
      depending on its continued operation.
    must-implement: *id185
    verification: Disconnect network and revoke vendor accounts; user produces a complete export and a
      third-party tool reads it using only the public format spec and the user's keys.
  - ref: epilogue-what-the-stack-owes-you:EPI-12
    name: Crypto-shredding as right-to-erasure mechanism
    scope: foundational
    definition: Right-to-erasure is implemented technically by destroying the per-document DEK so that
      ciphertext becomes unrecoverable; whether residual CRDT-log operation metadata constitutes personal
      data under a given jurisdiction's deletion statute is an unsettled legal question, not a technical
      one.
    must-implement: *id186
    verification: Destroying a document's DEK is shown to render its ciphertext unrecoverable; compliance
      documentation names the jurisdictions in scope and the open legal question for each.
  - ref: appendix-b-threat-model-worksheets:SEC-01
    name: Asset inventory worksheet
    scope: foundational
    definition: A maintained table enumerating every asset whose compromise, loss, or corruption would
      cause material harm, classified by sensitivity, location, and owner.
    must-implement: *id187
    verification: Repository contains an asset inventory document covering all canonical asset categories
      with classification, location, owner, and sensitivity columns populated.
  - ref: appendix-b-threat-model-worksheets:SEC-04
    name: Actor taxonomy worksheet
    scope: foundational
    definition: A maintained table enumerating every actor (benign or adversarial) who could realistically
      interact with the system, with access level, motivation, and capability level recorded for each.
    must-implement: *id188
    verification: Threat-model document contains an actor table with access, motivation, and capability
      columns populated for each named actor.
  - ref: appendix-b-threat-model-worksheets:THREAT-02
    name: External attacker with physical access
    scope: foundational
    definition: An adversary who obtains physical possession of a node device and attempts credential
      theft or storage extraction.
    must-implement: *id189
    verification: MDM policy enforces disk encryption, PIN/biometric, and hibernation disable on all enrolled
      nodes.
  - ref: appendix-b-threat-model-worksheets:THREAT-06
    name: Former team member
    scope: foundational
    definition: A previously authorized member whose future access is blocked by key rotation but whose
      historical-data exposure remains scoped by the data-at-risk calculation.
    must-implement: *id190
    verification: Offboarding runbook triggers KEK rotation and logs a data-at-risk computation for the
      affected role.
  - ref: appendix-b-threat-model-worksheets:THREAT-08
    name: Supply chain attacker
    scope: foundational
    definition: An adversary who compromises the build pipeline to ship a backdoored binary capable of
      exfiltrating keys or plaintext from inside the trust boundary.
    must-implement: *id191
    verification: Build pipeline produces signed reproducible artifacts; SBOM and signature verification
      are gating steps in distribution.
  - ref: appendix-b-threat-model-worksheets:THREAT-09
    name: Government authority and regulatory body
    scope: foundational
    definition: A statutory actor with legal compulsion power (warrant, subpoena, administrative order,
      inspection notice, device seizure) whose architectural mitigation is end-to-end encryption with
      local key management so that compelled relay inspection yields ciphertext only.
    must-implement: *id192
    verification: Architecture proves keys never reach the relay; legal-response runbook lists applicable
      jurisdictional authorities and the architectural response.
  - ref: appendix-b-threat-model-worksheets:SEC-11
    name: Data-at-risk scope calculation
    scope: foundational
    definition: A bounded calculation of compromise exposure defined by the compromised KEK's keystore
      creation date as start, the relay-confirmed revocation date as end, and the documents the KEK protected
      within that window as scope, with documents outside that role or created after revocation explicitly
      excluded.
    must-implement: *id193
    verification: Incident-response output contains a data-at-risk calculation with documented start,
      end, scope, and exclusions.
  - ref: appendix-b-threat-model-worksheets:COMP-01
    name: Jurisdictional breach notification SLA matrix
    scope: foundational
    definition: A matrix mapping each operating jurisdiction to its supervisor-notification window and
      data-subject-notification window, against which the incident-response SLA is set to the shortest
      applicable window.
    must-implement: *id194
    verification: Compliance documentation contains a jurisdiction matrix and an incident SLA equal to
      the shortest listed window.
  - ref: appendix-b-threat-model-worksheets:COMP-02
    name: Pre-deployment regulatory validation
    scope: foundational
    definition: A pre-production requirement to validate, for every market the team operates in, the breach
      notification window, retention floor, regulatory inspection rights, and cross-border data transfer
      rules under the applicable regional frameworks.
    must-implement: *id195
    verification: Pre-deployment compliance checklist documents the four validations per operating market.
  - ref: appendix-c-further-reading:READ-01
    name: Kleppmann seven local-first ideals
    scope: foundational
    definition: The seven aspirational properties — fast local performance (P1), multi-device access (P2),
      network-optional operation (P3), seamless collaboration (P4), longevity beyond vendor lifespan (P5),
      security and privacy by default (P6), and ultimate user ownership (P7) — that together define local-first
      software per Kleppmann et al. (Onward! 2019).
    must-implement: *id003
    verification: Conformance scorecard maps every architectural choice to one or more of P1-P7; no property
      is left unaddressed.
  - ref: appendix-c-further-reading:READ-08
    name: Vendor dependency risk as empirical case
    scope: foundational
    definition: The composite 2022 record of Western SaaS providers suspending, restricting, or terminating
      service across Russia, Belarus, and adjacent CIS markets, treated by the book as the empirical case
      study justifying the local-first thesis against vendor dependency.
    must-implement: *id196
    verification: Tabletop exercise confirms that simulated termination of any single vendor does not
      block customer access to their own data.
  - ref: appendix-d-testing-the-inverted-stack:TEST-08
    name: Mandatory partition and reconnect scenarios
    scope: foundational
    definition: A required scenario set covering 30-day offline divergence with merge, 90-day extended-offline
      baseline with intermittent windows, CP quorum loss, 1,000+ queued operations on standard and constrained
      hardware, abrupt power interruption during WAL write, and 30-day air-gapped operation, each with
      explicit pass conditions before first production release.
    must-implement: *id070
    verification: Test report archives per-scenario pass/fail with CRDT state dumps, network captures
      showing zero relay traffic during air-gap, and recovery logs after each WAL kill.
  - ref: appendix-d-testing-the-inverted-stack:TEST-09
    name: Schema migration scenarios across version skew
    scope: foundational
    definition: A required scenario set covering N-to-N-1 bidirectional sync via lenses, offline epoch
      transition recovery without manual intervention, and the couch-device case where a node lagging
      3+ major versions is rejected at capability negotiation rather than migrated lossily.
    must-implement: *id197
    verification: Test suite includes mixed-version pairs, an offline-during-epoch fixture, and an over-gap
      connection attempt asserting the precise error code and update prompt.
  - ref: appendix-d-testing-the-inverted-stack:TEST-11
    name: Security scenarios for encryption, key rotation, and audit
    scope: foundational
    definition: A required scenario set producing regulator-grade evidence covering SQLCipher unreadability
      without keys, post-rotation key revocation, historical document re-keying under a new KEK, data-boundary
      negative tests with relay disabled, relay-operator inability to decrypt, attestation revocation,
      and tamper-evident audit trail completeness.
    must-implement: *id108
    verification: Per-scenario evidence column captures packet captures, audit log exports with verified
      Merkle root, relay log entries with issuer fingerprint, and ciphertext samples — archived per release.
  - ref: appendix-f-regulatory-coverage:COMP-01
    name: GDPR Article 17 right-to-erasure via crypto-shredding
    scope: foundational
    definition: An EU-mandated individual right to erasure that local-first architectures answer by destroying
      the per-record DEK so encrypted CRDT history becomes unrecoverable, with the lawfulness of crypto-shred-as-erasure
      remaining unsettled across CNIL and German DPAs.
    must-implement: *id110
    verification: After erasure, the targeted record's ciphertext remains but no DEK path exists to decrypt
      it; an ADR documents the chosen erasure mechanism and its jurisdictional caveats
  - ref: appendix-f-regulatory-coverage:COMP-02
    name: GDPR Article 30 records-of-processing at the node level
    scope: foundational
    definition: A GDPR requirement that processing activities be logged in a controller-accessible record,
      satisfied in local-first architectures by per-node processing logs rather than centralized SaaS
      audit trails.
    must-implement: *id111
    verification: A node export produces an Article-30-compliant processing record without requiring vendor
      cooperation
  - ref: appendix-f-regulatory-coverage:COMP-05
    name: UAE Federal DPL 2022 Article 16 erasure right
    scope: foundational
    definition: A UAE federal data protection rule establishing an Article 16 erasure right for processing
      outside DIFC and ADGM, carrying the same crypto-shredding sufficiency tension as GDPR Article 17.
    must-implement: *id112
    verification: A UAE federal tenant erasure request produces the same crypto-shred audit artifacts
      as a GDPR Article 17 request
  - ref: appendix-f-regulatory-coverage:COMP-06
    name: India DPDP Act 2023 Section 12 erasure rights
    scope: foundational
    definition: India's omnibus data protection statute establishes a Section 12 erasure right parallel
      to GDPR Article 17, with implementing rules pending and BFSI deployments layered with the RBI localization
      circular.
    must-implement: *id113
    verification: A DPDP Section 12 erasure request produces a documented crypto-shred audit trail for
      the targeted record
  - ref: appendix-f-regulatory-coverage:COMP-09
    name: China PIPL plus MLPS 2.0 strict cross-border restriction
    scope: foundational
    definition: PIPL Article 47 erasure rights combined with MLPS 2.0 security classification create one
      of the strictest cross-border transfer regimes globally, generally requiring personal data of Chinese
      residents to remain inside China.
    must-implement: *id098
    verification: A China-tenant deployment audit confirms node residency, MLPS classification, and absence
      of unauthorized cross-border egress
  - ref: appendix-f-regulatory-coverage:COMP-10
    name: Japan APPI Article 36 cross-border consent and erasure
    scope: foundational
    definition: The 2022-revised Japanese APPI introduces Article 36 cross-border transfer consent and
      an erasure-equivalent right that inherits the same CRDT-history-versus-DEK-destruction tension as
      GDPR Article 17.
    must-implement: *id114
    verification: A Japan-tenant erasure request produces a crypto-shred audit trail and any cross-border
      transfer carries an attached consent record
  - ref: appendix-f-regulatory-coverage:COMP-11
    name: South Korea PIPA plus ISMS-P procurement certification
    scope: foundational
    definition: South Korea's PIPA establishes erasure rights and ISMS-P functions as a procurement-required
      certification that the local-first vendor must produce alongside SOC 2 and ISO 27001 documentation.
    must-implement: *id115
    verification: An ISMS-P artifact exists in the procurement-evidence bundle and an erasure dry-run
      produces a PIPA-suitable audit trail
  - ref: appendix-f-regulatory-coverage:COMP-12
    name: Africa parallel mandates (NDPA, POPIA, Kenya DPA)
    scope: foundational
    definition: A coherent set of African data-protection statutes (Nigeria NDPA 2023, South Africa POPIA
      Sections 24 and 72, Kenya DPA 2019 Section 40) establishing erasure rights and cross-border transfer
      prohibitions to non-adequate countries that mirror the GDPR structural argument for on-device residency.
    must-implement: *id116
    verification: A POPIA Section 72 transfer review and a per-tenant sectoral-obligation register exist
      and are kept current
  - ref: appendix-f-regulatory-coverage:COMP-13
    name: LATAM erasure-rights cluster (LGPD, LFPDPPP ARCO)
    scope: foundational
    definition: A Latin American cluster of statutes (Brazil LGPD Article 18, Mexico LFPDPPP ARCO cancellation
      right, Colombia Ley 1581, Argentina Ley 25.326) establishing erasure rights parallel to GDPR Article
      17 with the ANPD's stance on crypto-shredding still unsettled.
    must-implement: *id117
    verification: An LGPD Article 18 erasure dry-run produces a crypto-shred audit trail and an open-question
      note for ANPD review
  - ref: appendix-f-regulatory-coverage:COMP-14
    name: US sector-specific frameworks (HIPAA, FedRAMP, ITAR)
    scope: foundational
    definition: The absence of a US omnibus privacy law leaves sector-specific regimes — HIPAA for PHI,
      FedRAMP for federal cloud authorization, ITAR/EAR for export-controlled technology, CCPA/CPRA for
      California consumer rights — each addressed by on-device encryption and sovereign deployment patterns.
    must-implement: *id118
    verification: A US-tenant deployment registers each applicable sectoral framework and produces the
      corresponding evidence artifacts on demand
