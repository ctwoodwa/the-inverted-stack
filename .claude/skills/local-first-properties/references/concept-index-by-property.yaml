  - ref: ch07-security-lens:LENS-S-12
    name: Compelled-access threat model
    scope: foundational
    definition: A jurisdictional threat in which infrastructure operators are subject to mandatory government
      access requirements, addressed structurally because the relay holds only ciphertext and the keys
      never leave the originating device, so the operator cannot produce decryptable content under compulsion.
    must-implement: &id141
    - Keys are generated and held only on the originating device
    - Relay holds only ciphertext at all times
    - Threat model document names compelled access as a distinct named threat
    - Self-hosted relay path is offered when metadata residency is also a compelled-access concern
    verification: Threat-model worksheet for compelled access lists the relay operator as unable to produce
      plaintext and references the supporting key custody and ciphertext-only properties
  - ref: ch07-security-lens:LENS-S-13
    name: Crypto-shredding for right-to-erasure
    scope: foundational
    definition: A pattern that satisfies right-to-erasure obligations against an immutable CRDT log by
      destroying the DEK that protects the targeted operation's content, leaving the operation entry in
      the log structurally intact while rendering its ciphertext permanently unreadable.
    must-implement: *id102
    verification: Erasure drill destroys the targeted DEK, confirms ciphertext is no longer decryptable
      on any replica, and produces a documentation artifact stating the metadata residue
  - ref: ch07-security-lens:LENS-S-14
    name: Credential recovery paths
    scope: foundational
    definition: A required set of artifact-based recovery options — recovery-key file, administrator-held
      wrapped KEK escrow, MDM re-enrollment plus relay-assisted re-sync — from which every deployment
      must select and test at least one before production, with the no-artifact case explicitly disclosed
      as permanent loss.
    must-implement: *id103
    verification: Recovery drill executes each enabled path end-to-end and restores access; onboarding
      flow surfaces the no-artifact disclosure
  - ref: ch07-security-lens:LENS-S-15
    name: Defense-in-depth four-layer model
    scope: foundational
    definition: A non-optional composition of four enforcement layers — encryption at rest, field-level
