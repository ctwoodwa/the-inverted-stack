metadata:
  schema-version: '1.0'
  view: Foundational concepts grouped by Kleppmann property (P1-P7)
  purpose: Feeds the local-first-properties Claude skill (any local-first repo can be scored against P1-P7
    from this subset)
  scope-filter: foundational only — inverted-stack-specific concepts excluded so this view is portable
    to non-Inverted-Stack local-first implementations
  concepts-per-property:
    P1: 36
    P2: 9
    P3: 89
    P4: 78
    P5: 108
    P6: 103
    P7: 115
kleppmann-property-glossary:
  P1: No spinners — fast, work happens locally
  P2: Your work is not trapped on one device
  P3: The network is optional
  P4: Seamless collaboration with colleagues
  P5: The Long Now — data outlives vendor and subscription
  P6: Security and privacy by default
  P7: You retain ultimate ownership and control
properties:
  P1:
  - ref: preface:PREF-03
    name: Offline as daily operating condition, not edge case
    scope: foundational
    definition: Intermittent or absent connectivity is the baseline operating condition for enterprise
      users across Sub-Saharan Africa, rural India, tier-3 Latin American cities, and much of Southeast
      Asia, so offline-first is a primary requirement rather than a degraded mode.
    must-implement: &id004
    - Application has no degraded mode when offline; offline behavior matches online behavior for core
      operations
    - Application is usable on intermittent connectivity without user-visible spinners on local actions
    verification: Run the application on a connection that drops for hours at a time; user can complete
      every core workflow during the disconnected windows with no behavioral difference from connected
      operation.
  - ref: ch01-when-saas-fights-reality:THESIS-02
    name: Vendor outage as deadline-coincident failure
    scope: foundational
    definition: A failure mode in which the SaaS provider's infrastructure becomes unavailable (full outage
      or undisclosed degraded performance) and renders user data inaccessible at the moment of greatest
      operational need, with cascading exposure when many vendors share the same underlying cloud region.
    must-implement: &id005
    - Application reads and writes complete locally without dependency on vendor reachability
    - Application surfaces no functional difference between connected and disconnected operation for core
      workflows
    - Application does not silently queue submissions whose persistence cannot be confirmed
    verification: Disconnect network from the device; application performs all core read, write, search,
      and submission operations identically to the connected case.
  - ref: ch01-when-saas-fights-reality:THESIS-04
    name: Capability degradation under offline conditions
    scope: foundational
    definition: A failure mode in which a SaaS application reduces to a read-only cache, queued submissions
      of uncertain success, or total inoperability when network connectivity is intermittent, weak, restricted,
      or absent — disproportionately affecting field, rural, clinical, industrial, air-gapped, and majority-world
      users whose baseline operating environment is non-continuous connectivity.
    must-implement: &id006
    - All core operations including create, update, search, and report execute against local storage with
      no functional difference from the connected case
    - Submission persistence is locally durable and acknowledged at write time
    - No feature is gated on persistent connectivity
    verification: Place device in airplane mode for the duration of a complete representative workflow;
      confirm every action completes locally and converges on later reconnect with no user intervention.
  - ref: ch01-when-saas-fights-reality:THESIS-09
    name: No-degraded-mode commitment
    scope: foundational
    definition: An architectural commitment that the application exposes no reduced-capability operating
      mode under offline, partitioned, or vendor-unreachable conditions — every core capability behaves
      identically whether the network is present or absent.
    must-implement: &id007
    - No feature presents an offline-only read-only state
    - No submission path queues with uncertain persistence semantics
    - Search, reporting, create, update, and delete operate against local storage with the same latency
      and correctness profile online and offline
    - The application surfaces no banner, modal, or capability gate that distinguishes connected from
      disconnected state for core workflows
    verification: Behavioral test runs the full core workflow with the network disabled and asserts byte-identical
      outcomes (modulo timestamps) to the connected baseline; UI inspection confirms no degraded-mode
      indicator appears.
  - ref: ch01-when-saas-fights-reality:THESIS-11
    name: Paper-fallback as evidence of mediation rather than value
    scope: foundational
    definition: The observation that organizations under SaaS outage continue operating via analog fallbacks
      (paper charts, whiteboards, fax, manual reconciliation) demonstrates that the SaaS layer was largely
      mediating work that continued to happen, while the digital affordances (search, cross-history pattern
      detection, analytic queries) were the genuine value lost — value that a local-first node preserves
      through the outage.
    must-implement: &id008
    - Local node retains full digital affordances (search, reporting, cross-record analytics) during vendor
      or network unavailability
    - Reconciliation overhead after a connectivity gap reduces from days of post-incident transcription
      to automatic convergence on reconnect
    - Paper backup remains an available last resort but ceases to be the only operating mode
    verification: Field test simulates vendor unavailability for a representative workday; node retains
      search, reporting, and analytic queries against local data; on reconnect, no manual transcription
      or back-fill is required.
  - ref: ch02-local-first-serious-stack:LF-01
    name: No spinners, no waiting
    scope: foundational
    definition: The software responds instantly because it reads from local state rather than from a network
      request, with no perceptible round-trip latency for any user-visible operation.
    must-implement:
    - Application reads resolve from local storage without a network call
    - User-visible operations show no loading spinners during normal use
    - Latency does not depend on network round-trip time for any core operation
    verification: Disconnect network; instrument all user-visible reads and writes; confirm zero network
      calls and sub-frame latency for every core operation.
  - ref: ch02-local-first-serious-stack:THESIS-01
    name: Seven properties as a minimum bar, not a wishlist
    scope: foundational
    definition: The seven Kleppmann properties function as a calibrated filter that fails any system satisfying
      only a subset, not as a menu from which an implementer may select.
    must-implement: &id001
    - Conformance evaluation treats the seven properties as a conjunctive set
    - Partial satisfaction (e.g., five-of-seven) is recorded as non-conformance, not as success
    - Gradient scoring is permitted alongside but does not replace the binary minimum-bar reading
    verification: Conformance scorecard reports per-property pass/fail in addition to any gradient score;
      overall conformance requires all seven to pass.
  - ref: ch03-inverted-stack-one-diagram:INV-01
    name: Local node as primary; cloud relay as optional peer
    scope: foundational
    definition: The architectural inversion replaces SaaS's cloud-primary / device-cache topology with
      a topology where the local node holds the authoritative copy and any cloud relay participates only
      as an optional sync peer.
    must-implement: &id009
    - Application reads and writes hit the local store as the primary data path
    - No code path requires cloud connectivity for core function
    - Cloud relay participation is optional and removable without changing application behavior
    - The node has no degraded mode when no peers are reachable
    verification: Disconnect all network interfaces; the application performs every core operation identically
      and the relay role can be unplugged without rebuilding the application.
  - ref: ch03-inverted-stack-one-diagram:INV-05
    name: Application logic writes locally without network awareness
    scope: foundational
    definition: Domain command handlers translate user intent into CRDT operations against the local store
      and contain no network-aware code paths, except for explicit consultation of the lease coordinator
      for CP-class records.
    must-implement: &id010
    - Command handlers commit to the local store before acknowledgement
    - The application logic layer contains no implicit network calls in its validation or invariant code
    - CP-class writes explicitly call the lease coordinator and surface a clear constraint when quorum
      is unreachable
    verification: Static analysis confirms application-logic modules import no network client; unit tests
      pass with the sync daemon socket disabled for AP-class operations.
  - ref: ch03-inverted-stack-one-diagram:INV-18
    name: Three developer-habit shifts under the inversion
    scope: foundational
    definition: Building under the inversion shifts three habits — writes succeed on local durability
      rather than remote acknowledgement, business logic owns its correctness independently of the network,
      and failure modes are explicit rather than papered over.
    must-implement: &id011
    - Command handlers acknowledge on local-store commit, not on remote server response
    - Every state mutation is expressed as a CRDT operation, not a current-state assignment
    - Validation, invariants, and state machine transitions execute against local data with no implicit
      network shortcut
    - Sync conflicts surface to a conflict inbox rather than via silent overwrite
    verification: Code review confirms no command handler awaits a remote response before acknowledgement;
      static analysis confirms no validator imports a network client; UI inventory confirms a conflict-inbox
      surface exists.
  - ref: ch04-choosing-your-architecture:FILT-03
    name: Filter 3 — Connectivity and operational environment
    scope: foundational
    definition: A check that names the actual deployment environment and routes to local-first when users
      operate in field, air-gapped, regulated-residency, clinical, or chronically intermittent-connectivity
      conditions.
    must-implement: &id012
    - Architecture decision record names the physical deployment environment of the primary user, not
      the cloud provider's SLA
    - Field, air-gapped, MDM-governed, residency-regulated, and chronically-intermittent environments
      route to local-first as mandatory or strongly preferred
    - The product treats absence of network as a normal operating mode, not a degraded one — input is
      accepted and writes are queued without network access
    - Always-online browser-only zero-install scenarios are the only category routed to traditional SaaS
      at this filter
    verification: Architecture decision record names the actual environments; behavioral test confirms
      the application accepts input and persists writes with no network present, distinguished from a
      degraded-but-online state.
  - ref: ch04-choosing-your-architecture:DEC-08
    name: Degraded-vs-absent network distinction
    scope: foundational
    definition: An operational distinction that treats an application loading stale data and queueing
      writes as degraded (still working) and an application showing a spinner and refusing input as broken
      — establishing absence-tolerance, not graceful-degradation, as the local-first acceptance criterion.
    must-implement: &id013
    - The application accepts user input with no network present
    - Writes are persisted locally and queued for sync without blocking the UI
    - Reads return locally available data without spinners on network absence
    - Failure to reach the network never produces a refused-input state
    verification: Behavioral test disables all network interfaces and exercises the application's primary
      write and read paths; no spinner appears on network absence and no input is refused.
  - ref: ch05-enterprise-lens:LENS-E-08
    name: Zero-downtime rolling update with health-gated rollback
    scope: foundational
    definition: Container updates apply via a rolling update that promotes a new image to one replica,
      runs a defined health-check sequence, and only rotates remaining replicas on success, with automatic
      rollback to the prior image on health-check failure.
    must-implement: &id014
    - Container orchestration applies updates incrementally to one replica before the rest
    - A defined health-check sequence runs against the updated replica before further rotation
    - Failed health checks trigger automatic rollback to the previous image
    - Typical updates complete without a maintenance window
    verification: Deployment manifests define the rolling-update strategy and health-check sequence; failure-injection
      test confirms automatic rollback when the health check fails on the updated replica.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-09
    name: Zero-state first-run experience as product specification
    scope: foundational
    definition: The first thirty seconds after install for a brand-new solo user with no prior data and
      no existing peers is specified as a product requirement that walks the user from blank state to
      first project, first backup configuration, and first invite — closing the most common 30-day abandonment
      path for local-first applications.
    must-implement: &id002
    - The application specifies the zero-state screen explicitly — what the user sees, the first action
      surfaced, and the path to first project
    - The first-run flow guides the user to configure a backup target before significant data is created
    - The first-run flow surfaces the invite path so the workspace is not silently single-user by default
    verification: Install the application on a fresh device with no prior workspace; confirm the user
      reaches a first project, a configured backup target, and an invite surface within the first session
      without consulting external documentation.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-13
    name: Implementation drift prohibition on server-side feature gating
    scope: foundational
    definition: A local-first architecture explicitly prohibits server-side feature flag checks, server-side
      A/B tests, and server-coordinated business logic that would re-introduce the network as a runtime
      dependency, naming this as the primary drift path that erodes local-first commitments one reasonable-sounding
      decision at a time.
    must-implement: &id015
    - Feature flag evaluation runs entirely against the local node with no network call as a precondition
      for feature visibility
    - A/B assignment is computed locally from a deterministic seed, not retrieved from a server-side experiment
      service
    - Business logic gating is rejected at code review when it requires a server round-trip
    verification: Disconnect the network, launch the application, and confirm all features behave identically
      to a connected launch; code review checklist includes a server-side-feature-gate prohibition.
  - ref: ch10-synthesis:LENS-11
    name: Intermittent connectivity as baseline operating condition
    scope: foundational
    definition: The architecture treats intermittent connectivity as the default operating environment
      for the target user population, not as an edge case the system gracefully degrades into.
    must-implement: &id016
    - Core operations complete identically online and offline
    - No feature is gated on continuous connectivity for its primary path
    - Degraded modes are not used to mask online-required behavior
    verification: Disconnect network for an extended period; full feature set executes against the local
      node with no functional regression versus the online state.
  - ref: ch13-schema-migration-evolution:SCH-10
    name: Upcaster chain accumulation problem
    scope: foundational
    definition: Each new schema version adds an upcaster to the chain, producing maintenance and read-path
      complexity that grows linearly with version history unless explicitly bounded.
    must-implement: &id088
    - System tracks total upcaster chain depth per event type
    - Maintenance documentation captures each upcaster's transformation
    - Compaction is triggered before chain depth degrades read latency
    verification: Telemetry exposes per-event-type upcaster chain depth; alert fires when depth exceeds
      configured threshold.
  - ref: ch13-schema-migration-evolution:SCH-11
    name: Mandatory stream compaction
    scope: foundational
    definition: A background copy-transform job that replays the original event stream, applies all current
      upcasters in sequence, and writes a new compacted stream where every event is in current-version
      shape.
    must-implement: &id089
    - Compaction runs as a low-priority background process that does not block sync
    - Compaction is checkpointed so an interrupted run resumes rather than restarts
    - Original stream is archived rather than deleted after compacted stream is verified
    - Retired upcasters are removed from the active read path after compaction verification
    verification: Test interrupts a compaction job mid-run and confirms restart resumes from the last
      checkpoint with byte-identical output to an uninterrupted run.
  - ref: ch13-schema-migration-evolution:SCH-14
    name: Lens version graph and shortest-path composition
    scope: foundational
    definition: Lenses form a directed graph between schema versions; non-adjacent translations are produced
      by composing lenses along the shortest path through the graph.
    must-implement: &id017
    - Lens registry maintains a graph of version-to-version edges
    - Sync daemon computes shortest path between peer and local schema versions
    - Composed lens chains are cached per peer schema version
    verification: Lens engine exposes a query returning the composition path between any two registered
      versions; cache hit-rate metric is observable.
  - ref: ch13-schema-migration-evolution:SCH-20
    name: Copy-transform background migration
    scope: foundational
    definition: An idempotent, checkpointed background job that reads the existing event log for governed
      record types, applies all registered lenses and upcasters in sequence, and writes the result to
      a new epoch stream while sync continues uninterrupted.
    must-implement: &id092
    - Job is idempotent and resumes from the last checkpointed position after interruption
    - Job does not block synchronization
    - New operations written during the job land directly in the new epoch stream
    - Old epoch stream is preserved in read-only mode until retention window expires
    verification: Test interrupts the copy-transform job, restarts it, and confirms the resulting new-epoch
      stream is byte-identical to an uninterrupted run; concurrent writes during the job land in the new
      stream.
  - ref: ch16-persistence-beyond-the-node:DUR-09
    name: Snapshot as performance optimization over event log
    scope: foundational
    definition: A snapshot captures the current state of an aggregate at a point in time indexed to the
      last event it incorporates; snapshots are deletable and regenerable without affecting correctness
      because the event log remains the source of truth.
    must-implement: &id093
    - Snapshot record includes aggregate_id, epoch_id, schema_version, last_event_seq, payload, and creation
      timestamp
    - Snapshots are stored separately from the event log
    - Deleting all snapshots and rehydrating from the log produces equivalent application state
    verification: Delete the snapshot store; aggregate rehydration replays from the beginning of the event
      log and reproduces identical state.
  - ref: ch17-building-first-node:BUILD-06
    name: First-document development loop
    scope: foundational
    definition: The canonical first-feature loop is to obtain the CRDT engine from DI, create a document
      by ID, apply a typed update, and subscribe to update events that distinguish local from remote origin.
    must-implement: &id018
    - CRDT engine is obtained via the application's DI container
    - Document creation and open are addressable by stable string ID
    - Local updates are applied through a typed update API
    - Update subscription distinguishes local-origin from remote-origin events
    verification: A worked example in the accelerator's tests creates a document, applies an update, and
      asserts the subscriber receives the change with the correct origin tag.
  - ref: ch17-building-first-node:BUILD-07
    name: Engine-owned persistence (no explicit save)
    scope: foundational
    definition: The CRDT engine persists every applied update automatically into the encrypted store,
      so application code never issues a save call and a reopened document returns with all prior updates
      intact.
    must-implement: &id019
    - Application code contains no explicit document save or flush call
    - Document state survives application restart with byte-identical replay
    - Persistence latency is bounded such that a crash after Apply returns does not lose the update
    verification: Apply an update, kill the process before any user-initiated save, restart, and confirm
      the update is present.
  - ref: ch17-building-first-node:BUILD-18
    name: Three-state optimistic write button
    scope: foundational
    definition: Every write surface in a local-first application reflects three local-write states — pending
      (in-flight to local store), confirmed (durable on local device), failed (local-store error only)
      — without conflating sync delay with write failure.
    must-implement: &id020
    - UI distinguishes pending, confirmed, and failed states for every write surface
    - Confirmed state fires on local-store completion, not on peer acknowledgment
    - Failed state appears only on local-store errors, never on sync delays
    - Sync-delay signal is carried by the Data Freshness indicator, not by the write button
    verification: Disconnect network and submit a write; the button reaches confirmed and the Data Freshness
      indicator transitions to stale, but the write does not enter the failed state.
  - ref: ch18-migrating-existing-saas:MIG-13
    name: Phase 1 read-latency and consistency success criteria
    scope: foundational
    definition: Phase 1 is judged successful only when P95 read latency drops by at least 20% with no
      write-consistency regression and the local replica stays within the declared AP staleness window.
    must-implement:
    - P95 read latency is measured before and after Phase 1 deployment
    - Write-consistency tests run unchanged against the server-API write path during Phase 1
    - Replica staleness is monitored against a declared baseline (30 seconds for typical task-management
      domains)
    - Failure on any criterion blocks the Phase 1 to Phase 2 transition
    verification: Phase 1 exit report includes the three measurements with pre- and post-deployment values;
      CAB sign-off references the report.
  - ref: ch18-migrating-existing-saas:MIG-14
    name: Phase 2 local writes for AP-class only
    scope: foundational
    definition: Phase 2 routes AP-class block writes through the CRDT engine for instant local feedback
      while CP-class records — billing, subscription limits, role membership, audit logs — remain server-authoritative.
    must-implement: &id021
    - AP-class writes apply locally without a server round-trip
    - CRDT merge resolves concurrent edits on AP-class records without data loss
    - CP-class write paths are unmodified and pass existing integration tests unchanged
    - Server transitions to a relay role for AP-class deltas, propagating but not owning them
    - The eligibility test for AP classification is whether two-user concurrent edits with merge yield
      an acceptable result
    verification: Convergence test against AP-class aggregates demonstrates byte-identical state after
      concurrent edits; CP-class regression suite passes unchanged.
  - ref: ch20-ux-sync-conflict:UX-01
    name: Complexity Hiding Standard
    scope: foundational
    definition: A non-technical user must not be able to determine from normal use whether the application
      is local-first or cloud-first; the only visible difference is that the local-first app keeps working
      when the internet does not.
    must-implement: &id022
    - User-facing strings expose no distributed-systems vocabulary (no "gossip", "relay-only", "peer sync")
    - No "offline mode" banner or modal differentiates online from offline operation
    - Application chrome remains constant across connectivity states except for ambient indicators
    verification: A non-technical reviewer using the app under normal connectivity and full offline cannot
      identify which state they are in from chrome alone.
  - ref: ch20-ux-sync-conflict:UX-02
    name: Plain-language register for all user-visible state
    scope: foundational
    definition: Every string a user reads must pass a plain-language test — a practitioner with no knowledge
      of distributed systems understands it without training.
    must-implement:
    - String catalog excludes infrastructure terminology in any user-visible surface
    - Status messages name user actions and consequences, not protocol states
    - Translation review enforces the plain-language register in every active locale
    verification: String audit confirms no occurrences of forbidden terms (gossip, relay, quorum, epoch,
      attestation, CRDT) in any user-facing locale file.
  - ref: ch20-ux-sync-conflict:UX-06
    name: Data freshness indicator with hidden-by-default policy
    scope: foundational
    definition: The data freshness indicator is invisible while every active data class is within its
      staleness threshold and only surfaces when a threshold is close to expiring or has expired.
    must-implement: &id023
    - Indicator computes staleness against the configured threshold for each active data class
    - Indicator is hidden under normal conditions and only renders amber or red when thresholds approach
      or exceed their limit
    - Threshold configuration is sourced from the AP/CP classification declared in sync configuration
    verification: With all data classes within threshold the indicator does not render; advancing system
      clock past a threshold causes the indicator to appear in the documented state.
  - ref: ch20-ux-sync-conflict:UX-09
    name: Three-state optimistic write lifecycle
    scope: foundational
    definition: An AP-class write moves through three explicit visual states — pending (applied locally,
      not yet seen by any peer), confirmed (received by at least one peer), and failed (circuit breaker
      rejected on reconnect) — with the failed state opening the conflict inbox.
    must-implement: &id024
    - Writes apply locally on user confirmation and surface a pending visual state immediately
    - Confirmation state is reached when at least one peer has acknowledged the write
    - Failed state is distinct from pending and offers a "Review" affordance into the conflict inbox
    verification: A write performed offline shows pending; reconnecting with no conflict transitions it
      to confirmed; reconnecting with an unresolvable conflict transitions it to failed and opens the
      conflict inbox via the Review affordance.
  - ref: ch20-ux-sync-conflict:UX-10
    name: Pending and failed states never collapse
    scope: foundational
    definition: A failed write must never remain in the pending visual state, because a user who sees
      a persistent spinner waits while a user who sees a failure indicator acts.
    must-implement: &id062
    - Pending state has a deterministic upper bound after which the UI resolves to confirmed or failed
    - Circuit-breaker rejection surfaces as a failed state on the affected record
    - The pending visual state never persists past the documented timeout without a state transition
    verification: Forcing a circuit-breaker rejection at reconnect resolves the pending visual state to
      failed within the documented bound, never indefinitely spinning.
  - ref: ch20-ux-sync-conflict:UX-18
    name: Invisible recovery from unexpected shutdown
    scope: foundational
    definition: After a power-loss or OS-kill termination the node validates the last write-ahead checkpoint,
      replays pending writes from the CRDT log, and surfaces a single short status only when replay takes
      more than two seconds — never a crash dialog.
    must-implement: &id025
    - Relaunch validates the WAL checkpoint and replays the CRDT log automatically
    - Workspace opens as soon as replay completes
    - Replay surface appears only when recovery exceeds two seconds; no crash dialog is presented
    verification: Killing the node mid-write and relaunching opens the workspace at the prior state; injecting
      a long-replay condition surfaces the documented status string and no crash dialog.
  - ref: ch20-ux-sync-conflict:UX-23
    name: Accessibility as a Tier-1 contract
    scope: foundational
    definition: Every UX surface in the application carries an accessibility contract — semantic ARIA
      roles, keyboard reachability, declared component metadata, and plain-language assistive-technology
      text — enforced as rigorously as the write path.
    must-implement: &id064
    - Status surfaces use role="status" with aria-live="polite" for ambient changes and role="alert" with
      aria-live="assertive" for required-action states
    - Colour is never the sole signal; every indicator pairs colour with localised text
    - Interactive elements support tab order, Enter and Space activation, and Escape-to-dismiss where
      dismissal is allowed
    - Focus after conflict resolution returns to the next pending group, not to the page header
    verification: Automated accessibility audit on every shipped UI block confirms ARIA roles, keyboard
      reachability, and colour-plus-text pairing; a screen-reader walkthrough of the conflict inbox resolves
      a conflict without pointer input and lands focus on the next pending group.
  - ref: appendix-c-further-reading:READ-01
    name: Kleppmann seven local-first ideals
    scope: foundational
    definition: The seven aspirational properties — fast local performance (P1), multi-device access (P2),
      network-optional operation (P3), seamless collaboration (P4), longevity beyond vendor lifespan (P5),
      security and privacy by default (P6), and ultimate user ownership (P7) — that together define local-first
      software per Kleppmann et al. (Onward! 2019).
    must-implement: &id003
    - System satisfies all seven Kleppmann properties P1-P7 measurably
    - Each property has a verification test in the conformance suite
    - Trade-offs against any property are documented in an ADR
    verification: Conformance scorecard maps every architectural choice to one or more of P1-P7; no property
      is left unaddressed.
  - ref: appendix-c-further-reading:READ-05
    name: Optimistic replication semantics
    scope: foundational
    definition: The Saito and Shapiro 2005 framing of replication that allows tentative local commits,
      eventual convergence, and application-level conflict resolution — the academic vocabulary for what
      the book operationally calls local-first.
    must-implement: &id026
    - Local writes commit tentatively without coordination
    - Convergence is eventual across all reachable peers
    - Conflict resolution is specified per data type
    verification: Behavioral test confirms a local write commits and is visible to the local reader before
      any peer acknowledges it.
  - ref: appendix-d-testing-the-inverted-stack:TEST-07
    name: CRDT growth tests for bounded resource use
    scope: foundational
    definition: A weekly and pre-release test class that simulates median-vertical usage at 30, 90, and
      365 day horizons and measures CRDT document size to verify the system stays within its configured
      storage budget, that compaction reduces size when fired, and that per-shard size stays below the
      shallow snapshot threshold.
    must-implement: &id097
    - Simulate median-activity usage at 30, 90, and 365 day horizons
    - Assert 365-day document size stays within the configured storage budget (default 10 GB per node)
    - Assert library-level compaction measurably reduces size when its threshold is reached
    - Assert per-shard size stays below the shallow snapshot threshold and shallow mode activates correctly
      when crossed
    verification: Weekly CI job runs the growth simulation and emits per-horizon size metrics that the
      build gate compares to budget thresholds.
  P2:
  - ref: ch02-local-first-serious-stack:LF-02
    name: Work is not trapped on one device
    scope: foundational
    definition: User data is structurally accessible across all the user's devices and to designated collaborators
      without depending on a vendor account or subscription to remain accessible.
    must-implement:
    - Data syncs across the user's own devices without vendor account dependency
    - Data syncs to designated collaborators without subscription gating
    - Loss of vendor service does not strand data on a single device
    verification: Cancel the vendor subscription or simulate vendor disappearance; confirm data remains
      accessible and syncable across devices the user controls.
  - ref: ch02-local-first-serious-stack:THESIS-01
    name: Seven properties as a minimum bar, not a wishlist
    scope: foundational
    definition: The seven Kleppmann properties function as a calibrated filter that fails any system satisfying
      only a subset, not as a menu from which an implementer may select.
    must-implement: *id001
    verification: Conformance scorecard reports per-property pass/fail in addition to any gradient score;
      overall conformance requires all seven to pass.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-02
    name: Non-technical disaster recovery walkthrough
    scope: foundational
    definition: Recovery from total device loss is a documented step-by-step path that a non-technical
      user can complete unaided in under thirty minutes, ending with a working node that resumes from
      BYOC backup without exposing any technical surface such as bucket URLs or rclone paths.
    must-implement: &id080
    - Recovery flow is specified as a sequenced user-facing walkthrough — buy device, install application,
      enter recovery code or scan team-member QR, confirm BYOC target, restore runs in background
    - Recovery substitutes a recovery code or peer-attestation QR for the lost device's original attestation
      bundle
    - Eager-sync buckets populate first so the user resumes role-relevant work immediately while remaining
      records hydrate in the background
    - No step in the recovery flow requires the user to type a bucket URL, an rclone destination, or any
      other technical identifier
    verification: A non-technical tester completes end-to-end restore from a destroyed device to a working
      node in under thirty minutes without consulting documentation beyond in-application prompts.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-05
    name: Peer-attestation QR onboarding bundle
    scope: foundational
    definition: A new device joins an existing workspace by scanning a QR-encoded attestation bundle from
      an existing peer that transfers credentials, workspace identity, and gossip-bootstrap parameters
      in a single out-of-band step, eliminating the credentials-require-peer chicken-and-egg failure mode
      of naive multi-device onboarding.
    must-implement: &id036
    - Existing peer generates a QR-encoded bundle containing the credentials and workspace metadata required
      to authenticate and begin gossip
    - New device authenticates and begins peer gossip using only the scanned bundle plus a network path
      to at least one peer
    - Bundle exchange occurs out-of-band, requiring no third-party credential server
    verification: Pair a new device to a workspace by scanning a peer-generated QR; confirm the new device
      authenticates and begins receiving CRDT updates without contacting a centralized credential service.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-09
    name: Zero-state first-run experience as product specification
    scope: foundational
    definition: The first thirty seconds after install for a brand-new solo user with no prior data and
      no existing peers is specified as a product requirement that walks the user from blank state to
      first project, first backup configuration, and first invite — closing the most common 30-day abandonment
      path for local-first applications.
    must-implement: *id002
    verification: Install the application on a fresh device with no prior workspace; confirm the user
      reaches a first project, a configured backup target, and an invite surface within the first session
      without consulting external documentation.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-16
    name: Shared-device role-scoped recovery
    scope: foundational
    definition: Recovery must support shared-device deployments — a single tablet rotated across a team
      of field workers — by targeting the role and the workspace rather than the device and its sole user,
      with BYOC backup configured against role-scoped workspace targets so any team member can restore
      from any device.
    must-implement: &id040
    - BYOC backup targets are scoped to workspace and role, not bound to a specific device serial
    - Recovery flow accepts a role credential plus workspace identifier as sufficient inputs to restore
      role-relevant data
    - Multiple users may rotate through the same physical device without each restore wiping the prior
      user's role state from backup
    verification: Provision a workspace with three role-scoped users, restore each onto a single shared
      device in succession, and confirm each user reaches role-relevant data without loss to the others'
      backup state.
  - ref: ch10-synthesis:LENS-07
    name: Non-technical disaster recovery path
    scope: foundational
    definition: A non-technical user can recover their complete data after total device failure without
      contacting support and without developer-only tooling.
    must-implement: &id082
    - Recovery flow is documented as a UX walkthrough usable by a non-developer
    - Recovery requires only artifacts a non-technical user can manage (recovery phrase, backup file,
      or equivalent)
    - Recovery does not depend on vendor support intervention
    verification: Documented walkthrough exists; usability test with a non-technical participant completes
      restore on a fresh device without developer assistance.
  - ref: appendix-c-further-reading:READ-01
    name: Kleppmann seven local-first ideals
    scope: foundational
    definition: The seven aspirational properties — fast local performance (P1), multi-device access (P2),
      network-optional operation (P3), seamless collaboration (P4), longevity beyond vendor lifespan (P5),
      security and privacy by default (P6), and ultimate user ownership (P7) — that together define local-first
      software per Kleppmann et al. (Onward! 2019).
    must-implement: *id003
    verification: Conformance scorecard maps every architectural choice to one or more of P1-P7; no property
      is left unaddressed.
  - ref: appendix-c-further-reading:READ-07
    name: Cambria lens-based schema evolution
    scope: foundational
    definition: The Ink and Switch Cambria abstraction (2021) of bidirectional lenses that translate documents
      between schema versions N and N+1 without data loss, which is the conceptual foundation for the
      Chapter 13 schema migration approach.
    must-implement: &id096
    - Schema migrations are expressed as bidirectional lenses, not destructive ALTER operations
    - Each lens is reversible to preserve backward compatibility across heterogeneous fleets
    - Old-version peers continue to read new-version documents through lens application
    verification: Schema migration tests demonstrate round-trip lens application preserves data on a fleet
      running mixed schema versions.
  P3:
  - ref: preface:PREF-01
    name: The architectural thesis — local node as primary, vendor as optional
    scope: foundational
    definition: 'The book''s central thesis is the inversion of the SaaS dependency relationship: the
      local node is the primary data plane and the vendor relay is an optional accelerator, so the application
      survives vendor withdrawal.'
    must-implement: &id071
    - Application reads and writes hit local storage as the primary data plane
    - No application function depends on cloud reachability for core operation
    - Vendor relay services are optional accelerators, not required dependencies
    - Application continues to function when the vendor service is unreachable, withdrawn, or sanctioned
    verification: Disconnect the application from all vendor services (network block of vendor domains);
      application performs all core read, write, and local collaboration operations identically to the
      connected state.
  - ref: preface:PREF-03
    name: Offline as daily operating condition, not edge case
    scope: foundational
    definition: Intermittent or absent connectivity is the baseline operating condition for enterprise
      users across Sub-Saharan Africa, rural India, tier-3 Latin American cities, and much of Southeast
      Asia, so offline-first is a primary requirement rather than a degraded mode.
    must-implement: *id004
    verification: Run the application on a connection that drops for hours at a time; user can complete
      every core workflow during the disconnected windows with no behavioral difference from connected
      operation.
  - ref: ch01-when-saas-fights-reality:THESIS-02
    name: Vendor outage as deadline-coincident failure
    scope: foundational
    definition: A failure mode in which the SaaS provider's infrastructure becomes unavailable (full outage
      or undisclosed degraded performance) and renders user data inaccessible at the moment of greatest
      operational need, with cascading exposure when many vendors share the same underlying cloud region.
    must-implement: *id005
    verification: Disconnect network from the device; application performs all core read, write, search,
      and submission operations identically to the connected case.
  - ref: ch01-when-saas-fights-reality:THESIS-04
    name: Capability degradation under offline conditions
    scope: foundational
    definition: A failure mode in which a SaaS application reduces to a read-only cache, queued submissions
      of uncertain success, or total inoperability when network connectivity is intermittent, weak, restricted,
      or absent — disproportionately affecting field, rural, clinical, industrial, air-gapped, and majority-world
      users whose baseline operating environment is non-continuous connectivity.
    must-implement: *id006
    verification: Place device in airplane mode for the duration of a complete representative workflow;
      confirm every action completes locally and converges on later reconnect with no user intervention.
  - ref: ch01-when-saas-fights-reality:THESIS-08
    name: Architectural reversal of data custody
    scope: foundational
    definition: The thesis-level architectural inversion that moves authoritative state from vendor infrastructure
      to user infrastructure, demoting the vendor's role from primary data plane to optional relay peer,
      made feasible by three independently matured technology shifts (production CRDTs, edge gossip protocols,
      the local service pattern).
    must-implement: &id072
    - Authoritative copy of user data lives on the user's device or user-controlled infrastructure
    - Vendor or shared services participate, when present, as peers or relays rather than as authoritative
      state holders
    - The architecture composes production-proven CRDT, gossip, and local-service-pattern components rather
      than introducing novel primitives
    verification: Architecture documents identify the device-resident authoritative store; sync protocol
      documents identify any cloud component as relay or peer rather than primary; component inventory
      cites mature open implementations for each substrate.
  - ref: ch01-when-saas-fights-reality:THESIS-09
    name: No-degraded-mode commitment
    scope: foundational
    definition: An architectural commitment that the application exposes no reduced-capability operating
      mode under offline, partitioned, or vendor-unreachable conditions — every core capability behaves
      identically whether the network is present or absent.
    must-implement: *id007
    verification: Behavioral test runs the full core workflow with the network disabled and asserts byte-identical
      outcomes (modulo timestamps) to the connected baseline; UI inspection confirms no degraded-mode
      indicator appears.
  - ref: ch01-when-saas-fights-reality:THESIS-11
    name: Paper-fallback as evidence of mediation rather than value
    scope: foundational
    definition: The observation that organizations under SaaS outage continue operating via analog fallbacks
      (paper charts, whiteboards, fax, manual reconciliation) demonstrates that the SaaS layer was largely
      mediating work that continued to happen, while the digital affordances (search, cross-history pattern
      detection, analytic queries) were the genuine value lost — value that a local-first node preserves
      through the outage.
    must-implement: *id008
    verification: Field test simulates vendor unavailability for a representative workday; node retains
      search, reporting, and analytic queries against local data; on reconnect, no manual transcription
      or back-fill is required.
  - ref: ch02-local-first-serious-stack:LF-03
    name: The network is optional
    scope: foundational
    definition: The full application works without any network connection indefinitely and syncs when
      a connection becomes available, with the local node holding an authoritative copy of all data it
      is allowed to act on.
    must-implement:
    - Every core operation works identically with the network disconnected
    - The local node holds an authoritative copy of data it can act on, not a stale cache
    - No operation queues waiting for a server before completing locally
    - Sync resumes automatically when connectivity returns
    verification: Disconnect network indefinitely; perform all core operations; confirm identical behavior
      to online mode and successful convergence after reconnection.
  - ref: ch02-local-first-serious-stack:THESIS-01
    name: Seven properties as a minimum bar, not a wishlist
    scope: foundational
    definition: The seven Kleppmann properties function as a calibrated filter that fails any system satisfying
      only a subset, not as a menu from which an implementer may select.
    must-implement: *id001
    verification: Conformance scorecard reports per-property pass/fail in addition to any gradient score;
      overall conformance requires all seven to pass.
  - ref: ch03-inverted-stack-one-diagram:INV-01
    name: Local node as primary; cloud relay as optional peer
    scope: foundational
    definition: The architectural inversion replaces SaaS's cloud-primary / device-cache topology with
      a topology where the local node holds the authoritative copy and any cloud relay participates only
      as an optional sync peer.
    must-implement: *id009
    verification: Disconnect all network interfaces; the application performs every core operation identically
      and the relay role can be unplugged without rebuilding the application.
  - ref: ch03-inverted-stack-one-diagram:INV-05
    name: Application logic writes locally without network awareness
    scope: foundational
    definition: Domain command handlers translate user intent into CRDT operations against the local store
      and contain no network-aware code paths, except for explicit consultation of the lease coordinator
      for CP-class records.
    must-implement: *id010
    verification: Static analysis confirms application-logic modules import no network client; unit tests
      pass with the sync daemon socket disabled for AP-class operations.
  - ref: ch03-inverted-stack-one-diagram:INV-06
    name: Per-record-class CAP positioning
    scope: foundational
    definition: CAP trade-offs are made per record class rather than per application — documents and notes
      are AP via CRDT merge, identity facts are AP with deferred merge, reservations and slots are CP
      via distributed lease, and financial transactions are CP under lease plus ledger ordering.
    must-implement: &id027
    - Each record class declares its CAP position in the schema
    - AP-class records use CRDT merge with deterministic semantics
    - CP-class records require lease acquisition before commit
    - Audit-bound records commit through an append-only ledger with strict ordering
    verification: Schema definition enumerates CAP class per record type; integration test demonstrates
      AP-class writes succeed under partition while CP-class writes block until quorum returns.
  - ref: ch03-inverted-stack-one-diagram:INV-09
    name: Gossip anti-entropy with vector clocks
    scope: foundational
    definition: The daemon converges peer state through periodic gossip — every 30 seconds it selects
      two random peers, exchanges deltas based on vector-clock divergence, and streams missing CRDT operations
      using CBOR encoding.
    must-implement: &id028
    - Daemon selects gossip partners on a periodic schedule with random peer selection
    - Vector clocks track per-peer operation visibility
    - Delta payloads use CBOR wire encoding
    - Gossip operates correctly with no central coordinator
    verification: Wire trace confirms CBOR-encoded delta exchange on the configured interval; multi-peer
      convergence test demonstrates byte-identical state across peers after gossip rounds.
  - ref: ch03-inverted-stack-one-diagram:INV-10
    name: Write buffering with durable local commit before peer delivery
    scope: foundational
    definition: When no peers are reachable, the daemon accepts writes from the application logic layer
      and buffers them to the durable local event log before acknowledgement, then drains the buffer when
      any peer becomes reachable.
    must-implement: &id073
    - Buffered writes commit to the local event log before the daemon acknowledges them
    - A power interruption between buffering and peer delivery does not lose buffered data
    - The daemon resumes buffer drainage automatically when a peer becomes reachable
    - The application is not required to track whether a write was buffered or delivered
    verification: Durability test interrupts power after buffering and before delivery, then asserts the
      write replays from the event log on restart and reaches peers when reconnected.
  - ref: ch03-inverted-stack-one-diagram:INV-15
    name: Mirror-inversion of Ch01 failure modes
    scope: foundational
    definition: The inversion specifically resolves each of Ch01's six named SaaS failure modes — The
      Outage and The Dependency Chain, The Vendor, The Connectivity, The Data, The Price, and The Third-Party
      Veto — by removing the vendor's data custody as the load-bearing dependency.
    must-implement: &id074
    - Local authoritative state survives any upstream cloud-region outage
    - Vendor business changes do not interrupt access to user data
    - Connectivity enables sync but is not a prerequisite for function
    - User data is exportable in a standard format without vendor participation
    - Switching costs are bounded by relay replacement, not full data extraction
    - Disaggregation of data custody from service custody limits third-party veto exposure
    verification: Failure-mode regression tests for each named mode confirm continued local function and
      data accessibility; export test produces a standard-format archive without vendor API calls.
  - ref: ch03-inverted-stack-one-diagram:INV-18
    name: Three developer-habit shifts under the inversion
    scope: foundational
    definition: Building under the inversion shifts three habits — writes succeed on local durability
      rather than remote acknowledgement, business logic owns its correctness independently of the network,
      and failure modes are explicit rather than papered over.
    must-implement: *id011
    verification: Code review confirms no command handler awaits a remote response before acknowledgement;
      static analysis confirms no validator imports a network client; UI inventory confirms a conflict-inbox
      surface exists.
  - ref: ch04-choosing-your-architecture:FILT-01
    name: Filter 1 — Consistency requirements (hard stop)
    scope: foundational
    definition: A disqualifying check that rejects local-first architecture when the domain requires atomic
      cross-user transactions, intolerance for stale data, or millisecond-identical truth across all peers.
    must-implement: &id029
    - Architecture review explicitly evaluates whether primary records require atomic cross-user consistency
      as a moment-to-moment invariant
    - Domains requiring globally consistent state at settlement (payments processors, exchanges, real-time
      inventory) are routed to centralized architecture
    - CP-class subsystems (e.g., the double-entry ledger) are scoped as deliberately specified components,
      not as the product's core loop
    verification: Architecture decision record answers all four Filter 1 questions in writing; any "yes"
      to atomic cross-user transactions, dangerous stale data, or millisecond-identical truth requirements
      documents the centralized routing for that subsystem.
  - ref: ch04-choosing-your-architecture:FILT-03
    name: Filter 3 — Connectivity and operational environment
    scope: foundational
    definition: A check that names the actual deployment environment and routes to local-first when users
      operate in field, air-gapped, regulated-residency, clinical, or chronically intermittent-connectivity
      conditions.
    must-implement: *id012
    verification: Architecture decision record names the actual environments; behavioral test confirms
      the application accepts input and persists writes with no network present, distinguished from a
      degraded-but-online state.
  - ref: ch04-choosing-your-architecture:DEC-06
    name: The Practical Shortcut (three-question prefilter)
    scope: foundational
    definition: A three-question prefilter — primary-record ownership, sustained-offline requirement,
      vendor-outlive requirement — that determines whether a full five-filter evaluation is worth the
      time for a project in early discovery.
    must-implement: &id075
    - Discovery-stage projects answer the three shortcut questions before committing to a full filter
      evaluation
    - All-yes answers route to Zone A (Anchor) for greenfield or Zone C (Bridge) for migration
    - A "no" answer maps to a specific filter for full evaluation (Q1 → Filter 2, Q2 → Zone C tolerance,
      Q3 → Filter 4)
    - The shortcut is not a substitute for the full five filters in a production architectural decision
    verification: Discovery-stage architecture note records the three shortcut answers and either cites
      the resulting Zone or names the filter requiring full evaluation.
  - ref: ch04-choosing-your-architecture:DEC-08
    name: Degraded-vs-absent network distinction
    scope: foundational
    definition: An operational distinction that treats an application loading stale data and queueing
      writes as degraded (still working) and an application showing a spinner and refusing input as broken
      — establishing absence-tolerance, not graceful-degradation, as the local-first acceptance criterion.
    must-implement: *id013
    verification: Behavioral test disables all network interfaces and exercises the application's primary
      write and read paths; no spinner appears on network absence and no input is refused.
  - ref: ch05-enterprise-lens:LENS-E-08
    name: Zero-downtime rolling update with health-gated rollback
    scope: foundational
    definition: Container updates apply via a rolling update that promotes a new image to one replica,
      runs a defined health-check sequence, and only rotates remaining replicas on success, with automatic
      rollback to the prior image on health-check failure.
    must-implement: *id014
    verification: Deployment manifests define the rolling-update strategy and health-check sequence; failure-injection
      test confirms automatic rollback when the health check fails on the updated replica.
  - ref: ch05-enterprise-lens:LENS-E-09
    name: Enterprise network footprint and proxy compatibility
    scope: foundational
    definition: The node exposes no inbound ports on external interfaces, routes all relay traffic exclusively
      over port 443 with TLS 1.3, and respects system proxy configuration including PAC files, authenticating
      proxies, and TLS-inspecting corporate proxies via documented bypass-list format.
    must-implement: &id101
    - No inbound ports are opened on any external interface
    - All relay traffic uses port 443 with TLS 1.3
    - Sync daemon honors system proxy configuration including PAC files
    - Sync daemon authenticates against authenticating corporate proxies
    - Documentation specifies the bypass-list entry format for environments performing TLS inspection
    verification: Network audit on a managed endpoint confirms zero inbound listeners and port-443-only
      outbound; proxy compatibility test passes the daemon through a PAC-configured authenticating proxy
      and through a TLS-inspecting proxy with a documented bypass entry.
  - ref: ch06-distributed-systems-lens:LENS-D-01
    name: Convergence is not correctness
    scope: foundational
    definition: CRDT convergence guarantees that all peers reach the same state but does not guarantee
      that the converged state satisfies application-level correctness or domain invariants.
    must-implement: &id030
    - Architecture documents distinguish CRDT convergence guarantees from application correctness guarantees
    - Domain invariants are validated at a layer above raw CRDT merge
    - Specification names which guarantees are structural and which require application enforcement
    verification: Specification document explicitly separates convergence (data-structure property) from
      correctness (application property) and identifies the validation boundary.
  - ref: ch06-distributed-systems-lens:LENS-D-02
    name: CRDT applicability boundary by record class
    scope: foundational
    definition: CRDT merge semantics are appropriate for AP-class records where concurrent writes can
      be deterministically reconciled but are insufficient for CP-class records where concurrent writes
      produce double-bookings, oversold inventory, or duplicate sequential IDs.
    must-implement: &id031
    - Each record class is classified as AP (CRDT-merge safe) or CP (requires linearizable write coordination)
    - CP-class records do not rely on CRDT merge for correctness
    - AP-class records use CRDT merge as the primary reconciliation mechanism
    verification: Schema definitions tag each record type with its CAP class; classification is enforceable
      at code-review time and at runtime by the sync daemon.
  - ref: ch06-distributed-systems-lens:LENS-D-03
    name: Monotonic CRDT growth as structural property
    scope: foundational
    definition: An operation-based CRDT must retain enough operation history to deterministically merge
      concurrent changes from peers that have not yet seen each other's operations, causing internal state
      to grow monotonically with edits regardless of visible content size.
    must-implement: &id077
    - CRDT engine retains causal history sufficient for deterministic merge with any peer up to a defined
      retention horizon
    - Retention behavior is documented as a structural property, not a bug
    - Storage growth is bounded by an explicit GC policy rather than treated as an implementation detail
    verification: CRDT engine documentation states the retention guarantee in operation-history terms;
      storage growth observable in long-running test deployment matches the stated retention policy.
  - ref: ch06-distributed-systems-lens:LENS-D-07
    name: Flease lease protocol for CP-class records
    scope: foundational
    definition: Flease provides leader-free distributed mutual exclusion via message-passing quorum, used
      to serialize linearizable writes for CP-class records such as sequential IDs, global unique constraints,
      and financial transaction totals.
    must-implement: &id032
    - CP-class write paths acquire a Flease lease before performing the linearizable operation
    - Lease grant requires acknowledgment from a quorum of reachable peers
    - No dedicated leader process is required for lease coordination
    verification: Architecture decision record names Flease as the chosen lease protocol; sync daemon
      implementation includes a lease-acquisition path gated on quorum acknowledgment for tagged CP-class
      operations.
  - ref: ch06-distributed-systems-lens:LENS-D-10
    name: Post-merge invariant validation for AP-backed CP constraints
    scope: foundational
    definition: For records where a CP constraint is a domain invariant layered on top of an AP data structure,
      CRDT merge resolves concurrent writes into a deterministic state and the domain invariant is enforced
      as a post-merge validation step rather than via lease coordination.
    must-implement: &id033
    - Records of this hybrid class use CRDT merge as the structural reconciliation mechanism
    - Domain invariants are evaluated against the merged state, not per-write
    - Validation failures surface through the conflict-inbox path rather than data corruption
    verification: Schema definition identifies hybrid AP-with-domain-invariant record types; semantic-layer
      code includes post-merge validation hooks for these types; behavioral test confirms invariant violations
      after concurrent merges are surfaced rather than silently committed.
  - ref: ch06-distributed-systems-lens:LENS-D-12
    name: CRDT store as durable outbound buffer
    scope: foundational
    definition: The local CRDT store itself serves as the durable outbound operation buffer during partition,
      so operations are persisted across process restarts and re-read by the sync daemon on reconnection
      rather than queued in a separate in-memory buffer.
    must-implement: &id078
    - Sync daemon does not maintain a separate in-memory-only outbound queue for unsent operations
    - Outbound operations are persisted to the CRDT store and re-read on reconnect
    - Buffer capacity is bounded only by local disk capacity, not in-memory queue size
    verification: Sync daemon implementation reads pending outbound operations from the CRDT store on
      startup; integration test confirms operations survive process restart during partition and are transmitted
      on reconnect.
  - ref: ch06-distributed-systems-lens:LENS-D-13
    name: Schema-validation gate at CRDT store entry
    scope: foundational
    definition: Before an operation is applied locally and queued for gossip, the sync daemon validates
      it against the current schema definition for the operation's record type, quarantining structurally
      valid but semantically incorrect operations rather than letting them propagate.
    must-implement: &id034
    - Sync daemon validates every incoming operation against the current schema definition before insertion
    - Operations failing validation are routed to the quarantine queue rather than applied
    - Validation occurs prior to gossip propagation so corrupt operations do not spread
    verification: Sync daemon code path shows schema validation between deserialization and CRDT store
      apply; behavioral test injects a structurally valid but schema-violating operation and confirms
      it is quarantined rather than applied or propagated.
  - ref: ch06-distributed-systems-lens:LENS-D-15
    name: Required test categories for sync protocol correctness
    scope: foundational
    definition: Sync protocol verification requires a defined set of test categories — network partition
      simulation, clock skew injection, concurrent edit generation, GC boundary conditions, Byzantine
      operation injection, and long-partition reconnect scenarios.
    must-implement: &id035
    - Test suite includes named coverage for each of the six categories
    - Each category is exercisable as an isolated test fixture, not only as part of an end-to-end run
    - CI gating treats absence of any category as a coverage failure for the sync protocol
    verification: Test directory includes labeled fixtures for partition, clock-skew, concurrent-edit,
      GC-boundary, Byzantine-injection, and long-partition-reconnect scenarios; CI configuration enforces
      presence of each.
  - ref: ch08-product-economic-lens:LENS-P-14
    name: Vendor-continuity risk as commercial purchasing argument
    scope: foundational
    definition: The architecture's structural ability to keep operating after vendor commercial relationship
      is severed — empirically anchored by the 2022 Western SaaS withdrawal from Russia and CIS markets
      — is positioned in procurement materials as a structural commercial claim that cloud-dependent competitors
      cannot make without re-architecture.
    must-implement: &id079
    - Procurement and sales materials name vendor-continuity-on-suspension as a structural property of
      the architecture
    - The 2022 SaaS withdrawal is cited as the empirical anchor rather than as a hypothetical
    - The claim is supported by demonstrable continued operation after disconnection in a tabletop or
      sandbox test
    - Cloud-dependent competitors' inability to construct the same claim is articulated explicitly
    verification: Sales collateral contains the vendor-continuity claim with the 2022 anchor citation;
      tabletop exercise demonstrates continued local operation after simulated vendor severance.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-03
    name: Symmetric NAT plus relay outage as documented failure mode
    scope: foundational
    definition: When both peers sit behind carrier-grade NAT and the managed relay is unavailable, direct
      peer-to-peer communication is impossible and the architecture documents this as a named local-only
      failure mode with a self-hosted-relay fallback rather than concealing it.
    must-implement: &id145
    - Peer-discovery documentation names symmetric NAT plus relay outage as a known failure mode that
      produces local-only operation for both parties
    - Self-hosting a relay on a host with a public IP is documented as the supported fallback that eliminates
      the symmetric NAT problem
    - The application surfaces a clear sync-status indication when both LAN and relay paths are unreachable
    verification: Architecture documentation contains a section naming the symmetric NAT plus relay outage
      failure mode and the self-hosted-relay remediation; integration test exercises the local-only mode
      and confirms reads/writes succeed against local storage.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-10
    name: Conflict-inbox grouping with auto-resolve and resolve-all-similar
    scope: foundational
    definition: When two offline nodes reconnect, surfaced conflicts are grouped by record type and cause,
      auto-resolved where predefined rules clearly apply, and offer a resolve-all-similar action for the
      remainder — converting the undifferentiated conflict list that breaks most collaborative local-first
      applications into a manageable inbox.
    must-implement: &id037
    - Conflict UI groups conflicts by record type and by underlying cause rather than presenting a flat
      list
    - Conflicts matching predefined deterministic resolution rules are auto-resolved and surfaced as informational
      rather than blocking
    - A resolve-all-similar action exists that applies a single user decision across all conflicts in
      a group
    verification: Generate a synthetic conflict set covering at least three record types and two cause
      classes after a partition heal; confirm the UI groups by type and cause, auto-resolves rule-matching
      conflicts, and exposes resolve-all-similar.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-11
    name: Three-tier sync status indicator with degradation escalation
    scope: foundational
    definition: Sync state surfaces to the user through three persistent but unobtrusive status-bar indicators
      that escalate from silent to informative to persistent-banner as connectivity and sync health degrade,
      giving the user accurate situational awareness without alarm fatigue.
    must-implement: &id038
    - The status bar exposes a sync-state indicator with three distinct levels matching the silent / informative
      / persistent-banner pattern
    - Indicator escalation is driven by observable sync-health signals, not arbitrary timers
    - The persistent-banner level appears only when sync degradation crosses a documented threshold
    verification: Simulate healthy, degraded, and failed sync conditions in a test build and confirm the
      indicator transitions through the three levels at the documented thresholds.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-13
    name: Implementation drift prohibition on server-side feature gating
    scope: foundational
    definition: A local-first architecture explicitly prohibits server-side feature flag checks, server-side
      A/B tests, and server-coordinated business logic that would re-introduce the network as a runtime
      dependency, naming this as the primary drift path that erodes local-first commitments one reasonable-sounding
      decision at a time.
    must-implement: *id015
    verification: Disconnect the network, launch the application, and confirm all features behave identically
      to a connected launch; code review checklist includes a server-side-feature-gate prohibition.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-14
    name: Intermittent connectivity as architectural baseline
    scope: foundational
    definition: The architecture treats intermittent connectivity as the operational baseline for hundreds
      of millions of enterprise workers across Sub-Saharan Africa, South and Southeast Asia, and rural
      Latin America — not as a carrier-grade NAT edge case — so all sync, conflict, and recovery flows
      are designed for sessions that span many disconnected intervals.
    must-implement: &id039
    - Sync daemon is designed for long-running sessions across repeated disconnections without manual
      reconnect actions
    - Subscription scoping at the sync daemon limits per-reconnect catch-up cost to role-relevant data
    - Conflict surfaces remain usable after multi-day partitions, not just brief outages
    verification: Run a multi-day partition simulation across the test fleet; confirm reconnect catch-up
      completes without manual intervention and the conflict inbox remains within the documented usability
      envelope.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-15
    name: Sanctions-grade availability as design anchor
    scope: foundational
    definition: The architecture is anchored against the empirical case of the 2022 sanctions-driven SaaS
      suspensions across Russia and CIS markets — hundreds of thousands of organizations losing vendor
      access on days of notice — establishing that surviving vendor suspension is not a theoretical improvement
      but a property the architecture has already had to provide.
    must-implement: &id081
    - Core read and write paths function with all vendor-controlled endpoints unreachable
    - Self-hosted relay deployment is documented and supported as a first-class option
    - License terms permit continued use under vendor-jurisdiction sanctions enforcement
    verification: Block all vendor-controlled domains at the network layer and confirm the application
      performs all core operations identically; confirm a self-hosted relay deployment guide exists in
      the public documentation.
  - ref: ch10-synthesis:LENS-04
    name: Three-tier CRDT applicability model
    scope: foundational
    definition: Data is partitioned into three tiers — AP CRDT-merged content, CP single-writer operations
      under lease coordination, and append-only ledger entries outside the CRDT — based on whether automatic
      merge is semantically valid.
    must-implement: &id041
    - Documents and collaborative content use CRDT merge in an AP tier
    - Operations requiring single-writer semantics (sequential IDs, inventory, slots, financial totals)
      use distributed lease coordination in a CP tier
    - Ledger entries are append-only, posted by a domain ledger engine, and not subject to CRDT merge
    verification: Architecture documents the tier classification per data type; tier-violating writes
      (e.g., concurrent CRDT merge of a CP-tier counter) are rejected by the data layer.
  - ref: ch10-synthesis:LENS-11
    name: Intermittent connectivity as baseline operating condition
    scope: foundational
    definition: The architecture treats intermittent connectivity as the default operating environment
      for the target user population, not as an edge case the system gracefully degrades into.
    must-implement: *id016
    verification: Disconnect network for an extended period; full feature set executes against the local
      node with no functional regression versus the online state.
  - ref: ch10-synthesis:LENS-12
    name: Sanctions-grade availability as design anchor
    scope: foundational
    definition: The architecture treats the documented 2022 Western SaaS withdrawal from Russia and CIS
      markets as the empirical anchor against which availability, encryption, and ownership invariants
      are validated, not as a hypothetical threat model.
    must-implement: &id083
    - Ciphertext is held locally so that loss of relay access does not expose plaintext
    - The three-tier CRDT model and plain-file export preserve operational continuity independent of vendor
      availability
    - The dual-license structure prevents vendor removal of the software itself, not only the service
    verification: Tabletop exercise simulating sudden vendor withdrawal demonstrates continued local operation,
      retained data, and standalone software availability.
  - ref: ch11-node-architecture:NODE-31
    name: Local-first encrypted store foundation
    scope: foundational
    definition: Sunfish.Foundation.LocalFirst provides the local encrypted store (SQLCipher-backed), the
      IOfflineStore contract, and the circuit-breaker quarantine queue as foundational primitives every
      node depends on.
    must-implement: &id104
    - Local store is encrypted at rest (SQLCipher or equivalent)
    - IOfflineStore contract is implemented as the primary storage surface
    - Quarantine queue is part of foundation, not kernel runtime
    verification: Sunfish.Foundation.LocalFirst package exists with encrypted store and IOfflineStore;
      storage file inspection confirms encryption-at-rest.
  - ref: ch12-crdt-engine-data-layer:CRDT-02
    name: CRDT merge mathematical properties (commutativity, associativity, idempotency)
    scope: foundational
    definition: A CRDT merge function must satisfy commutativity, associativity, and idempotency so that
      any two peers applying the same set of operations in any order — including duplicate application
      — converge to identical state.
    must-implement: &id042
    - Merge function is commutative across operation order
    - Merge function is associative across operation grouping
    - Applying an operation twice produces the same state as applying it once
    verification: Property-based test applies randomized operation sequences in different orders and with
      duplicates, asserting byte-identical convergent state.
  - ref: ch12-crdt-engine-data-layer:CRDT-07
    name: AP records — CRDT merge with tolerated divergence
    scope: foundational
    definition: AP records (documents, notes, task descriptions, team membership) tolerate concurrent
      offline divergence because deterministic CRDT merge produces a result the user can review, and the
      domain consequence of temporary inconsistency is acceptable.
    must-implement: &id043
    - AP-classified records accept offline writes without coordination
    - Reconnect triggers deterministic CRDT merge with no user prompt for the common path
    - Identity-fact AP records (membership, permissions) re-verify role attestation on reconnect
    verification: Two-peer offline divergence test for an AP stream confirms reconnect produces deterministic
      merged state with no manual intervention.
  - ref: ch12-crdt-engine-data-layer:CRDT-29
    name: Layer 2 — append-only event log as source of truth
    scope: foundational
    definition: Layer 2 is the append-only CRDT and event log — the source of truth — to which every CRDT
      operation, domain event, and ledger posting is durably written (fsync on POSIX, FlushFileBuffers
      on Windows) before the application receives confirmation, with the only mutating operation being
      compaction under the three-tier GC policy.
    must-implement: &id085
    - Every operation is durably persisted (fsync/FlushFileBuffers) before application acknowledgment
    - Write path is append-only with no in-place mutation operation
    - Compaction replaces ranges with snapshots representing equivalent state, never silent deletion
    - Layer 2 truncation without Layer 3 backup is acknowledged as the one irrecoverable failure mode
    verification: Power-loss simulation confirms acknowledged writes survive recovery; static analysis
      confirms no in-place mutation API on the log; compaction test confirms snapshot equivalence.
  - ref: ch13-schema-migration-evolution:SCH-01
    name: Multi-version schema skew across nodes
    scope: foundational
    definition: A team's nodes simultaneously run multiple schema versions because no central authority
      can force coordinated upgrade and the sync daemon cannot know a peer's schema version until handshake.
    must-implement: &id044
    - System tolerates concurrent operation across at least three live schema versions
    - No write path assumes a single global schema version is in effect
    - Application correctness does not depend on coordinated upgrade windows
    verification: Multi-peer test runs three nodes at v1, v2, v3 simultaneously and verifies bidirectional
      sync produces convergent state for shared record types.
  - ref: ch13-schema-migration-evolution:SCH-02
    name: Expand-contract migration pattern
    scope: foundational
    definition: A schema modification divided into an expand phase (additive, dual-write, both old and
      new fields present) and a contract phase (removal of old field) separated by a compatibility window.
    must-implement: &id045
    - Every breaking schema modification decomposes into an expand phase followed by a contract phase
    - Expand phase remains active for at least one full major version release cycle
    - Contract phase is initiated only by explicit operational act, never by timer
    verification: Migration runbook in source control documents the expand-contract decomposition for
      each schema change; CI rejects schema changes lacking a registered expand and contract step.
  - ref: ch13-schema-migration-evolution:SCH-03
    name: Dual-write during expand phase
    scope: foundational
    definition: During the expand phase, every write path produces records carrying both the old and the
      new field, so that nodes on either schema version can interpret the record without information loss.
    must-implement: &id046
    - All write paths producing a migrated record type write both old and new fields atomically
    - New-schema reads prefer the new field and fall back to the old field when absent
    - A code-review invariant prohibits write paths that emit only the new field during expand phase
    verification: Static analysis or grep-based check enumerates all write sites for the record type and
      confirms each writes both fields; integration test produces a record on a v2 node and reads it correctly
      on a v1 peer.
  - ref: ch13-schema-migration-evolution:SCH-04
    name: Unknown-field tolerance in CRDT maps
    scope: foundational
    definition: CRDT map types preserve unknown keys received from peers running newer schemas, storing
      them rather than rejecting the operation.
    must-implement: &id047
    - CRDT map deserialization preserves unknown keys rather than dropping them
    - Unknown keys are retained on disk and re-emitted to peers on subsequent sync
    - Domain logic ignores unknown keys without failing
    verification: Test sends a CRDT map operation containing a field absent from the local schema; node
      stores the field and re-emits it on subsequent sync to a third peer that recognizes it.
  - ref: ch13-schema-migration-evolution:SCH-05
    name: Compatibility window minimum duration
    scope: foundational
    definition: The expand phase must remain active long enough that all realistically deployed nodes
      have had the opportunity to upgrade, governed by the slowest-connecting node in the deployment.
    must-implement: &id087
    - Kernel tracks the oldest schema version observed per peer per sync session
    - Epoch coordinator consults peer-version tracking before initiating contract phase
    - Compatibility window duration is configurable per deployment intermittency profile
    verification: Kernel exposes a per-peer oldest-schema-version metric queryable by the epoch coordinator;
      coordinator refuses to advance epoch if any acknowledged peer is below threshold.
  - ref: ch13-schema-migration-evolution:SCH-08
    name: Additive change classes that skip upcasters
    scope: foundational
    definition: Two classes of schema change require no upcaster — adding a new optional field to an existing
      event type, and adding a new event variant — because absence is a defined default and unknown variants
      are quarantined.
    must-implement: &id048
    - Optional field absence is treated as the field's declared default
    - New event variants unknown to a node are quarantined into the circuit breaker queue rather than
      dropped
    - Quarantined events are re-evaluated after upgrade
    verification: Test introduces a new optional field and a new event variant, sends both to an old node,
      and confirms the optional field is defaulted and the new variant lands in the circuit breaker queue.
  - ref: ch13-schema-migration-evolution:SCH-12
    name: Bidirectional schema lens
    scope: foundational
    definition: A pair of forward and backward transformation functions between two schema versions, where
      forward and backward must be mutual inverses up to information loss.
    must-implement: &id049
    - Each lens registers both forward and backward functions
    - Bidirectionality is verified at startup against a canonical property-based test fixture
    - A lens whose round-trip is not identity halts node startup with a diagnostic naming the failing
      edge
    verification: Sunfish.Kernel.SchemaRegistry startup runs round-trip tests for each registered lens;
      injecting a lens with a non-identity round-trip causes startup to fail with the failing edge name
      in the diagnostic.
  - ref: ch13-schema-migration-evolution:SCH-13
    name: Lens application on transmission and receipt
    scope: foundational
    definition: The sync daemon applies the backward lens before transmitting a delta to an older-schema
      peer and the forward lens on receipt of a delta from an older-schema peer, so neither node stores
      data in the wrong version shape.
    must-implement: &id050
    - Outbound deltas to older-schema peers pass through the backward lens
    - Inbound deltas from older-schema peers pass through the forward lens
    - Local storage always reflects the local node's own schema version
    verification: Sync test between a v1 and v2 node confirms each node's local store contains records
      in its own schema version after bidirectional sync.
  - ref: ch13-schema-migration-evolution:SCH-14
    name: Lens version graph and shortest-path composition
    scope: foundational
    definition: Lenses form a directed graph between schema versions; non-adjacent translations are produced
      by composing lenses along the shortest path through the graph.
    must-implement: *id017
    verification: Lens engine exposes a query returning the composition path between any two registered
      versions; cache hit-rate metric is observable.
  - ref: ch13-schema-migration-evolution:SCH-15
    name: Missing lens edge suspends sync
    scope: foundational
    definition: When the lens version graph contains no path between a peer's schema version and the local
      schema version for a given record type, synchronization for that record type is suspended until
      a lens is installed or the peer upgrades.
    must-implement: &id051
    - Sync daemon checks for a lens path during HELLO handshake per record type
    - Absence of a path suspends only the affected record types, not the entire sync session
    - Suspension produces a diagnostic identifying the missing edge
    verification: Test removes a lens edge between v2 and v3, connects a v1 and v3 peer, and confirms
      only the affected record types are suspended while unaffected types continue to sync.
  - ref: ch13-schema-migration-evolution:SCH-19
    name: Couch device snapshot recovery
    scope: foundational
    definition: A node returning after an absence so long that the lens graph no longer spans its version
      recovers by discarding its local event log for affected record types and downloading a current-version
      snapshot from a reachable peer.
    must-implement: &id091
    - Sync handshake detects when peer vector clock predates the GC horizon
    - Daemon reports a snapshot-required condition rather than attempting incremental sync
    - Snapshot delivery supports byte-offset resume across interrupted connections
    - Peer's pre-absence local edits to governed types are quarantined for human review
    verification: Test simulates a peer offline across two epoch boundaries; on reconnect, daemon reports
      snapshot-required, snapshot resumes after connection interruption, and offline edits to governed
      types appear in the circuit breaker queue.
  - ref: ch14-sync-daemon-protocol:SYNC-06
    name: mDNS LAN discovery
    scope: foundational
    definition: On a local network segment, the daemon announces node ID, schema version, and IPC endpoint
      via multicast DNS, removing peers from the candidate list after three missed heartbeat intervals.
    must-implement: &id052
    - Daemon emits mDNS announcements containing node ID and schema version
    - Daemon removes a peer from the candidate list after three missed heartbeats
    - Discovery requires no central coordinator on the LAN
    verification: Two daemons on the same LAN segment discover each other within one mDNS announcement
      interval with zero configuration.
  - ref: ch14-sync-daemon-protocol:SYNC-07
    name: Mesh VPN cross-network discovery
    scope: foundational
    definition: Peers on different networks connect through a WireGuard-based mesh VPN that handles NAT
      traversal and provides in-transit encryption independent of protocol-layer authentication.
    must-implement: &id053
    - Daemon supports a WireGuard-based mesh VPN transport
    - No port forwarding is required at either endpoint
    - VPN peers are treated identically to LAN peers above the transport layer
    verification: Two daemons behind separate NATs establish a session through the mesh VPN with no per-endpoint
      port forwarding.
  - ref: ch14-sync-daemon-protocol:SYNC-09
    name: Lowest-latency path selection with hot standby
    scope: foundational
    definition: The daemon selects the lowest-latency reachable path to each known peer and dynamically
      updates path selection as network conditions change, retaining alternate paths as hot standby.
    must-implement: &id054
    - Daemon measures per-path latency to each known peer
    - Daemon promotes an alternate path when the primary degrades
    - Path selection updates without re-handshake
    verification: Sever the primary path between two peers; observe the daemon promoting the standby within
      one gossip interval without a fresh CAPABILITY_NEG.
  - ref: ch14-sync-daemon-protocol:SYNC-14
    name: DELTA_STREAM continuous CRDT operation flow
    scope: foundational
    definition: After ACK, both nodes emit a continuous append-only stream of compact binary CRDT deltas
      computed from the difference between sender state and receiver vector clock, with out-of-scope operations
      dropped at the send tier.
    must-implement: &id055
    - Deltas are computed per receiver vector clock
    - Out-of-scope operations are dropped at the sender, not filtered at the receiver
    - Receiver applies operations and advances its vector clock
    verification: Observe wire trace; confirm deltas contain only operations the receiver has not seen
      and only for granted subscriptions.
  - ref: ch14-sync-daemon-protocol:SYNC-20
    name: Vector-clock-driven delta computation
    scope: foundational
    definition: Each CRDT operation carries a vector clock entry identifying the originating node and
      logical time, and deltas include all operations causally ahead of the remote peer's last known clock.
    must-implement: &id056
    - Operations carry per-node vector clock entries
    - Receiver advances its vector clock on operation apply
    - Delta computation includes only operations causally ahead of remote clock
    verification: Two-peer convergence test under partition heal; confirm byte-identical state after exchange.
  - ref: ch14-sync-daemon-protocol:SYNC-28
    name: Exponential backoff with jitter on reconnect
    scope: foundational
    definition: When a previously unavailable network path becomes reachable, the daemon waits a random
      interval drawn from an exponential distribution bounded at 60 seconds before initiating handshake,
      ensuring simultaneously disconnected nodes do not reconnect simultaneously.
    must-implement: &id057
    - Backoff formula is min(base * 2^attempt, max_seconds) + uniform_jitter(0, jitter_range)
    - Maximum backoff is 60 seconds (relay-enforced)
    - A node offline beyond a full gossip cycle uses maximum backoff on first reconnect
    verification: Simulate 100 nodes reconnecting after a partition heal; confirm reconnection events
      are spread across the 60-second window.
  - ref: ch14-sync-daemon-protocol:SYNC-31
    name: Suspected-peer recovery without re-handshake
    scope: foundational
    definition: A suspected peer that responds to a GOSSIP_PING transitions immediately back to active
      and resumes delta exchange on the existing session without requiring a fresh handshake.
    must-implement: &id058
    - Suspected-to-active transition occurs on first GOSSIP_PING response
    - Existing session is preserved across suspected interval
    - No fresh CAPABILITY_NEG is required for recovery
    verification: Drive a peer to suspected state, then resume responses; confirm session continues without
      re-handshake and accumulated deltas exchange.
  - ref: ch14-sync-daemon-protocol:SYNC-32
    name: Address-change reconnect on same node ID
    scope: foundational
    definition: A new peer presenting the same node ID as a previously failed peer is treated as a reconnect,
      triggering a fresh handshake including full CAPABILITY_NEG and resetting the failure counter.
    must-implement: &id059
    - Daemon recognizes returning node IDs and resets failure counter
    - Address change triggers fresh CAPABILITY_NEG, not stale-session reuse
    - Membership list updates to the new address
    verification: Have a node move from Wi-Fi to cellular, presenting the same node ID at a new address;
      confirm fresh handshake completes and old address is replaced.
  - ref: ch17-building-first-node:BUILD-06
    name: First-document development loop
    scope: foundational
    definition: The canonical first-feature loop is to obtain the CRDT engine from DI, create a document
      by ID, apply a typed update, and subscribe to update events that distinguish local from remote origin.
    must-implement: *id018
    verification: A worked example in the accelerator's tests creates a document, applies an update, and
      asserts the subscriber receives the change with the correct origin tag.
  - ref: ch17-building-first-node:BUILD-07
    name: Engine-owned persistence (no explicit save)
    scope: foundational
    definition: The CRDT engine persists every applied update automatically into the encrypted store,
      so application code never issues a save call and a reopened document returns with all prior updates
      intact.
    must-implement: *id019
    verification: Apply an update, kill the process before any user-initiated save, restart, and confirm
      the update is present.
  - ref: ch17-building-first-node:BUILD-16
    name: Always-visible three-indicator status bar
    scope: foundational
    definition: A local-first node renders a permanently-visible status bar with three indicators — Node
      Health, Link Status, and Data Freshness — so the user can always perceive how the node's behavior
      depends on its current network and sync state.
    must-implement: &id060
    - Status bar is rendered on every screen, never hidden behind a settings panel
    - Status bar shows Node Health, Link Status, and Data Freshness as three distinct indicators
    - Each indicator has named states with documented meanings
    - Indicators are distinguishable to users with vision impairment (label-or-icon contract)
    verification: Walk every UI route in the application; the status bar is present on each one with all
      three indicators rendered.
  - ref: ch17-building-first-node:BUILD-17
    name: Configurable data-freshness threshold as product decision
    scope: foundational
    definition: The staleness threshold that flips Data Freshness from healthy to stale is a configurable
      product decision (default five minutes) chosen per application context — short for high-frequency
      collaborative writing, long for intermittent-connectivity field deployments — and fixed before the
      first user-facing release.
    must-implement:
    - Staleness threshold is configurable per deployment
    - A default value is shipped (five minutes is the reference default)
    - Threshold is fixed before initial release and changes after release require explicit user-facing
      communication
    verification: Configuration surface exposes the threshold; an integration test asserts the indicator
      transitions to stale at the configured boundary.
  - ref: ch17-building-first-node:BUILD-18
    name: Three-state optimistic write button
    scope: foundational
    definition: Every write surface in a local-first application reflects three local-write states — pending
      (in-flight to local store), confirmed (durable on local device), failed (local-store error only)
      — without conflating sync delay with write failure.
    must-implement: *id020
    verification: Disconnect network and submit a write; the button reaches confirmed and the Data Freshness
      indicator transitions to stale, but the write does not enter the failed state.
  - ref: ch18-migrating-existing-saas:MIG-03
    name: Five-filter eligibility framework applied per record class
    scope: foundational
    definition: Migration eligibility is determined by running each record class through five filters
      covering ownership, staleness tolerance, conflict resolvability, offline value, and compliance posture,
      with the result selecting Zone B, Zone C, or no migration at all.
    must-implement: &id094
    - Every record class in the existing schema is classified against all five filters
    - Filter results are recorded per record class, not aggregated to a product-level verdict
    - Records failing Filter 1 or Filter 2 are routed to Zone B and excluded from local-first migration
      scope
    - Records passing all five filters are eligible for AP-class CRDT treatment
    verification: A filter-result table exists with one row per record class and five filter columns,
      archived in the migration plan.
  - ref: ch18-migrating-existing-saas:MIG-04
    name: AP-class versus CP-class record separation
    scope: foundational
    definition: Records are classified as AP-class — user-owned, eventually consistent, suitable for CRDT
      replication — or CP-class — server-coordinated, requiring linearizable writes — and the two classes
      never share a backing table.
    must-implement: &id061
    - Each table or aggregate is labeled AP-class or CP-class in the schema documentation
    - AP-class data resides on CRDT documents on local nodes
    - CP-class data resides on the server-authoritative store with lease coordination
    - No table mixes AP-class and CP-class fields, regardless of join convenience
    - Table names encode the classification (e.g., ProjectBody for AP, ProjectBillingRecord for CP)
    verification: Schema audit script enumerates tables and asserts each is labeled AP or CP; CI rejects
      schema changes that introduce mixed-class tables.
  - ref: ch18-migrating-existing-saas:MIG-11
    name: Business logic out of stored procedures
    scope: foundational
    definition: Validation, computation, and workflow logic moves from database stored procedures to application-layer
      domain services so it can replicate to local nodes that execute in the application process.
    must-implement:
    - Stored procedures contain only set-based data operations
    - Validation, computation, and workflow logic resides in application-layer domain services
    - The audit and extraction occur during pre-migration decision work, not during Phase 3 provisioning
    verification: Audit script enumerates stored procedures and classifies each as set-operation-only
      or violation; violations are zero before Phase 3 begins.
  - ref: ch18-migrating-existing-saas:MIG-14
    name: Phase 2 local writes for AP-class only
    scope: foundational
    definition: Phase 2 routes AP-class block writes through the CRDT engine for instant local feedback
      while CP-class records — billing, subscription limits, role membership, audit logs — remain server-authoritative.
    must-implement: *id021
    verification: Convergence test against AP-class aggregates demonstrates byte-identical state after
      concurrent edits; CP-class regression suite passes unchanged.
  - ref: ch20-ux-sync-conflict:UX-01
    name: Complexity Hiding Standard
    scope: foundational
    definition: A non-technical user must not be able to determine from normal use whether the application
      is local-first or cloud-first; the only visible difference is that the local-first app keeps working
      when the internet does not.
    must-implement: *id022
    verification: A non-technical reviewer using the app under normal connectivity and full offline cannot
      identify which state they are in from chrome alone.
  - ref: ch20-ux-sync-conflict:UX-05
    name: Link status indicator semantics with no red state
    scope: foundational
    definition: The link status indicator signals connectivity to the team using green (peer reachable,
      gossip flowing), amber (relay-only), and grey (fully offline) — and never red, because connectivity
      failure is not an error condition for a local-first node.
    must-implement:
    - Indicator distinguishes peer-reachable, relay-only, and offline states
    - No red state is ever presented for connectivity loss
    - Offline state is rendered as ambient grey, not as a warning
    verification: Disconnecting the network drives the indicator to grey without surfacing any error or
      warning chrome.
  - ref: ch20-ux-sync-conflict:UX-06
    name: Data freshness indicator with hidden-by-default policy
    scope: foundational
    definition: The data freshness indicator is invisible while every active data class is within its
      staleness threshold and only surfaces when a threshold is close to expiring or has expired.
    must-implement: *id023
    verification: With all data classes within threshold the indicator does not render; advancing system
      clock past a threshold causes the indicator to appear in the documented state.
  - ref: ch20-ux-sync-conflict:UX-09
    name: Three-state optimistic write lifecycle
    scope: foundational
    definition: An AP-class write moves through three explicit visual states — pending (applied locally,
      not yet seen by any peer), confirmed (received by at least one peer), and failed (circuit breaker
      rejected on reconnect) — with the failed state opening the conflict inbox.
    must-implement: *id024
    verification: A write performed offline shows pending; reconnecting with no conflict transitions it
      to confirmed; reconnecting with an unresolvable conflict transitions it to failed and opens the
      conflict inbox via the Review affordance.
  - ref: ch20-ux-sync-conflict:UX-16
    name: Three distinct connectivity-failure UX modes
    scope: foundational
    definition: Full offline, partial connectivity (relay-only), and the quarantine queue are surfaced
      as three distinct UX modes, not collapsed into a single "offline" treatment.
    must-implement: &id063
    - Full offline runs at full fidelity with no degraded banner and no implied apology
    - Relay-only mode surfaces specific explanations for actions requiring direct peer connectivity
    - Quarantine queue surfaces a one-sentence count and a single review action on reconnect
    verification: Each of the three states presents the documented surface in isolation; collapsing any
      two into a shared treatment fails the test.
  - ref: ch20-ux-sync-conflict:UX-18
    name: Invisible recovery from unexpected shutdown
    scope: foundational
    definition: After a power-loss or OS-kill termination the node validates the last write-ahead checkpoint,
      replays pending writes from the CRDT log, and surfaces a single short status only when replay takes
      more than two seconds — never a crash dialog.
    must-implement: *id025
    verification: Killing the node mid-write and relaunching opens the workspace at the prior state; injecting
      a long-replay condition surfaces the documented status string and no crash dialog.
  - ref: appendix-b-threat-model-worksheets:THREAT-05
    name: Relay service termination
    scope: foundational
    definition: The threat that a relay operator withdraws service due to jurisdiction restriction, sanctions,
      or commercial decision, producing total relay unavailability.
    must-implement: &id095
    - Continue local-node operation when the relay is unreachable
    - Continue peer-to-peer sync where peers are reachable without the relay
    - Document a relay-replacement path
    verification: Disconnect the relay; nodes continue local operation and reachable peer-to-peer sync
      without degradation.
  - ref: appendix-c-further-reading:READ-01
    name: Kleppmann seven local-first ideals
    scope: foundational
    definition: The seven aspirational properties — fast local performance (P1), multi-device access (P2),
      network-optional operation (P3), seamless collaboration (P4), longevity beyond vendor lifespan (P5),
      security and privacy by default (P6), and ultimate user ownership (P7) — that together define local-first
      software per Kleppmann et al. (Onward! 2019).
    must-implement: *id003
    verification: Conformance scorecard maps every architectural choice to one or more of P1-P7; no property
      is left unaddressed.
  - ref: appendix-c-further-reading:READ-02
    name: CRDT convergent vs commutative distinction
    scope: foundational
    definition: The Shapiro et al. 2011 distinction between state-based (convergent) CRDTs that ship full
      state and operation-based (commutative) CRDTs that ship operation logs, which determines what is
      carried across the sync wire.
    must-implement: &id065
    - CRDT engine selection documents whether it is state-based, op-based, or delta-based
    - Wire protocol matches the engine's replication model
    - Merge semantics are deterministic and provably convergent
    verification: ADR exists naming the chosen CRDT type family (CvRDT, CmRDT, or delta-CRDT) with citation
      to Shapiro 2011.
  - ref: appendix-c-further-reading:READ-04
    name: CAP theorem as architectural constraint
    scope: foundational
    definition: The Brewer (2000) conjecture and Gilbert-Lynch (2002) proof that a distributed system
      cannot simultaneously guarantee consistency, availability, and partition tolerance, which forces
      every zone in the architecture to be classified as either AP or CP.
    must-implement:
    - Every architectural zone is classified as AP or CP in writing
    - The classification is justified against partition behavior
    - User-facing degradation under partition matches the stated classification
    verification: Each zone's ADR states AP or CP and describes observable behavior under network partition.
  - ref: appendix-c-further-reading:READ-05
    name: Optimistic replication semantics
    scope: foundational
    definition: The Saito and Shapiro 2005 framing of replication that allows tentative local commits,
      eventual convergence, and application-level conflict resolution — the academic vocabulary for what
      the book operationally calls local-first.
    must-implement: *id026
    verification: Behavioral test confirms a local write commits and is visible to the local reader before
      any peer acknowledges it.
  - ref: appendix-d-testing-the-inverted-stack:TEST-01
    name: Five-level testing pyramid
    scope: foundational
    definition: A tiered test architecture in which CRDT property tests, real-dependency integration tests,
      fault injection, deterministic simulation, and chaos testing each run at a defined cadence with
      mandatory pass conditions before first production release.
    must-implement: &id066
    - Levels 1 and 2 execute on every pull request
    - Level 3 fault injection executes nightly
    - Level 4 deterministic simulation executes weekly or per release candidate
    - Level 5 chaos executes in staging before each major release
    - Each scenario specifies setup, action, and a pass/fail condition
    verification: CI configuration shows distinct jobs for each level with the prescribed triggers and
      time budgets, and every scenario in the suite carries an explicit pass condition.
  - ref: appendix-d-testing-the-inverted-stack:TEST-02
    name: Property-based CRDT tests for convergence, idempotency, commutativity, and monotonicity
    scope: foundational
    definition: A Level 1 test class in which a property-based framework generates thousands of random
      operation sequences to verify that CRDT merge satisfies convergence, idempotency, commutativity
      (or join-semilattice merge for state-based CRDTs), and monotonicity.
    must-implement: &id067
    - Use FsCheck (.NET) or fast-check (JavaScript) or equivalent property-based framework
    - Generate at least 10,000 random operation sequences per property per test run
    - Assert convergence, idempotency, commutativity, and monotonicity as separate properties
    - Report the minimal failing sequence on violation
    verification: Test suite output shows at least 10,000 generated cases per CRDT property, with shrinking
      enabled and named property assertions distinct from example-based tests.
  - ref: appendix-d-testing-the-inverted-stack:TEST-04
    name: Fault injection for partition, packet loss, and crash
    scope: foundational
    definition: A Level 3 test class that uses a network proxy such as toxiproxy with Testcontainers to
      inject node crashes mid-handshake, relay unreachability during DELTA_STREAM, and consecutive GOSSIP_PING
      losses, then asserts the system recovers to a CRDT state identical to the no-fault outcome.
    must-implement: &id068
    - Inject a node crash mid-handshake and assert peer recovery to consistent state
    - Make the relay unreachable during DELTA_STREAM and assert sender queues and retransmits on reconnect
    - Drop three consecutive GOSSIP_PING intervals and assert degraded-but-consistent recovery without
      manual intervention
    - Pass condition for every scenario is byte-identical recovered state, not absence of crash
    verification: Nightly CI job runs each fault scenario through toxiproxy and asserts post-recovery
      CRDT hash equals the no-fault baseline.
  - ref: appendix-d-testing-the-inverted-stack:TEST-06
    name: Chaos testing in staging under representative load
    scope: foundational
    definition: A Level 5 test class that runs Pumba, Gremlin, or equivalent chaos tooling against a multi-node
      staging environment loaded at median-production traffic, with the explicit goal of discovering unanticipated
      failure modes rather than verifying known properties.
    must-implement: &id069
    - Operate a permanent multi-node staging environment representative of production
    - Apply process kill, latency injection, node-offline flips, and link-corruption chaos
    - Sustain median-production load throughout chaos runs
    - Document every observed anomaly, whether or not it manifests as a visible failure
    verification: Pre-major-release pipeline executes a 24–48 hour chaos run with logged anomalies and
      recovery times, archived against the release tag.
  - ref: appendix-d-testing-the-inverted-stack:TEST-08
    name: Mandatory partition and reconnect scenarios
    scope: foundational
    definition: A required scenario set covering 30-day offline divergence with merge, 90-day extended-offline
      baseline with intermittent windows, CP quorum loss, 1,000+ queued operations on standard and constrained
      hardware, abrupt power interruption during WAL write, and 30-day air-gapped operation, each with
      explicit pass conditions before first production release.
    must-implement: &id070
    - Two nodes diverge offline for 30 simulated days then merge with no data loss to identical CRDT state
    - Sustain 90 simulated days of offline operation with daily 10-minute sync windows and no operation
      loss
    - Block CP writes under quorum loss with a clear unavailable indicator and no silent drop
    - Apply 1,000+ queued operations on reconnect without timeout, OOM, or duplication, on both standard
      and 2 GB RAM / 16 GB storage hardware
    - SIGKILL during WAL write at random byte offsets 100+ times with full recovery and no partial-as-committed
      records
    - Operate air-gapped for 30 simulated days with zero relay egress packets recorded in the network
      log
    verification: Test report archives per-scenario pass/fail with CRDT state dumps, network captures
      showing zero relay traffic during air-gap, and recovery logs after each WAL kill.
  - ref: appendix-f-regulatory-coverage:COMP-09
    name: China PIPL plus MLPS 2.0 strict cross-border restriction
    scope: foundational
    definition: PIPL Article 47 erasure rights combined with MLPS 2.0 security classification create one
      of the strictest cross-border transfer regimes globally, generally requiring personal data of Chinese
      residents to remain inside China.
    must-implement: &id098
    - Chinese-resident-tenant nodes are domiciled within mainland China
    - Cross-border egress of PIPL-scoped personal data is gated by documented legal basis
    - Erasure mechanism for PIPL-scoped tenants is the same crypto-shred path as GDPR Article 17
    - MLPS 2.0 classification level is recorded for each China-resident deployment
    verification: A China-tenant deployment audit confirms node residency, MLPS classification, and absence
      of unauthorized cross-border egress
  P4:
  - ref: ch01-when-saas-fights-reality:THESIS-11
    name: Paper-fallback as evidence of mediation rather than value
    scope: foundational
    definition: The observation that organizations under SaaS outage continue operating via analog fallbacks
      (paper charts, whiteboards, fax, manual reconciliation) demonstrates that the SaaS layer was largely
      mediating work that continued to happen, while the digital affordances (search, cross-history pattern
      detection, analytic queries) were the genuine value lost — value that a local-first node preserves
      through the outage.
    must-implement: *id008
    verification: Field test simulates vendor unavailability for a representative workday; node retains
      search, reporting, and analytic queries against local data; on reconnect, no manual transcription
      or back-fill is required.
  - ref: ch02-local-first-serious-stack:LF-04
    name: Seamless collaboration
    scope: foundational
    definition: Multiple people can edit the same data simultaneously without explicit locking, checkout
      workflows, or a designated human conflict resolver, with convergence guaranteed by merge semantics
      rather than by a coordinating server.
    must-implement:
    - Concurrent edits from multiple peers converge to a defined merged state
    - No central server is required to adjudicate concurrent writes
    - No explicit lock or checkout workflow gates concurrent editing
    - CRDT or equivalent merge semantics provide deterministic convergence
    verification: Multi-peer concurrent-edit test under partition; confirm byte-identical state on all
      peers after partition heal without server adjudication.
  - ref: ch02-local-first-serious-stack:THESIS-01
    name: Seven properties as a minimum bar, not a wishlist
    scope: foundational
    definition: The seven Kleppmann properties function as a calibrated filter that fails any system satisfying
      only a subset, not as a menu from which an implementer may select.
    must-implement: *id001
    verification: Conformance scorecard reports per-property pass/fail in addition to any gradient score;
      overall conformance requires all seven to pass.
  - ref: ch03-inverted-stack-one-diagram:INV-05
    name: Application logic writes locally without network awareness
    scope: foundational
    definition: Domain command handlers translate user intent into CRDT operations against the local store
      and contain no network-aware code paths, except for explicit consultation of the lease coordinator
      for CP-class records.
    must-implement: *id010
    verification: Static analysis confirms application-logic modules import no network client; unit tests
      pass with the sync daemon socket disabled for AP-class operations.
  - ref: ch03-inverted-stack-one-diagram:INV-06
    name: Per-record-class CAP positioning
    scope: foundational
    definition: CAP trade-offs are made per record class rather than per application — documents and notes
      are AP via CRDT merge, identity facts are AP with deferred merge, reservations and slots are CP
      via distributed lease, and financial transactions are CP under lease plus ledger ordering.
    must-implement: *id027
    verification: Schema definition enumerates CAP class per record type; integration test demonstrates
      AP-class writes succeed under partition while CP-class writes block until quorum returns.
  - ref: ch03-inverted-stack-one-diagram:INV-09
    name: Gossip anti-entropy with vector clocks
    scope: foundational
    definition: The daemon converges peer state through periodic gossip — every 30 seconds it selects
      two random peers, exchanges deltas based on vector-clock divergence, and streams missing CRDT operations
      using CBOR encoding.
    must-implement: *id028
    verification: Wire trace confirms CBOR-encoded delta exchange on the configured interval; multi-peer
      convergence test demonstrates byte-identical state across peers after gossip rounds.
  - ref: ch03-inverted-stack-one-diagram:INV-18
    name: Three developer-habit shifts under the inversion
    scope: foundational
    definition: Building under the inversion shifts three habits — writes succeed on local durability
      rather than remote acknowledgement, business logic owns its correctness independently of the network,
      and failure modes are explicit rather than papered over.
    must-implement: *id011
    verification: Code review confirms no command handler awaits a remote response before acknowledgement;
      static analysis confirms no validator imports a network client; UI inventory confirms a conflict-inbox
      surface exists.
  - ref: ch04-choosing-your-architecture:FILT-01
    name: Filter 1 — Consistency requirements (hard stop)
    scope: foundational
    definition: A disqualifying check that rejects local-first architecture when the domain requires atomic
      cross-user transactions, intolerance for stale data, or millisecond-identical truth across all peers.
    must-implement: *id029
    verification: Architecture decision record answers all four Filter 1 questions in writing; any "yes"
      to atomic cross-user transactions, dangerous stale data, or millisecond-identical truth requirements
      documents the centralized routing for that subsystem.
  - ref: ch04-choosing-your-architecture:DEC-09
    name: Four required local-first engineering skills
    scope: foundational
    definition: The four engineering skills that separate local-node development from standard web application
      development — CRDT debugging, distributed state management, multi-version schema migration, and
      key management.
    must-implement: &id076
    - Team has practitioners who can reason about CRDT type semantics and merge order under uncertainty
    - Team manages authoritative local state under concurrent local edits, incoming sync deltas, and schema
      migrations with explicit design
    - Team applies the expand-contract pattern for schema migrations across a distribution of in-field
      versions
    - Team designs and implements key rotation, revocation, and recovery procedures before first production
      deployment
    verification: Capability matrix documents named owners for each of the four skills; key compromise
      recovery procedure exists in writing before the first production deployment date is set.
  - ref: ch06-distributed-systems-lens:LENS-D-01
    name: Convergence is not correctness
    scope: foundational
    definition: CRDT convergence guarantees that all peers reach the same state but does not guarantee
      that the converged state satisfies application-level correctness or domain invariants.
    must-implement: *id030
    verification: Specification document explicitly separates convergence (data-structure property) from
      correctness (application property) and identifies the validation boundary.
  - ref: ch06-distributed-systems-lens:LENS-D-02
    name: CRDT applicability boundary by record class
    scope: foundational
    definition: CRDT merge semantics are appropriate for AP-class records where concurrent writes can
      be deterministically reconciled but are insufficient for CP-class records where concurrent writes
      produce double-bookings, oversold inventory, or duplicate sequential IDs.
    must-implement: *id031
    verification: Schema definitions tag each record type with its CAP class; classification is enforceable
      at code-review time and at runtime by the sync daemon.
  - ref: ch06-distributed-systems-lens:LENS-D-07
    name: Flease lease protocol for CP-class records
    scope: foundational
    definition: Flease provides leader-free distributed mutual exclusion via message-passing quorum, used
      to serialize linearizable writes for CP-class records such as sequential IDs, global unique constraints,
      and financial transaction totals.
    must-implement: *id032
    verification: Architecture decision record names Flease as the chosen lease protocol; sync daemon
      implementation includes a lease-acquisition path gated on quorum acknowledgment for tagged CP-class
      operations.
  - ref: ch06-distributed-systems-lens:LENS-D-10
    name: Post-merge invariant validation for AP-backed CP constraints
    scope: foundational
    definition: For records where a CP constraint is a domain invariant layered on top of an AP data structure,
      CRDT merge resolves concurrent writes into a deterministic state and the domain invariant is enforced
      as a post-merge validation step rather than via lease coordination.
    must-implement: *id033
    verification: Schema definition identifies hybrid AP-with-domain-invariant record types; semantic-layer
      code includes post-merge validation hooks for these types; behavioral test confirms invariant violations
      after concurrent merges are surfaced rather than silently committed.
  - ref: ch06-distributed-systems-lens:LENS-D-13
    name: Schema-validation gate at CRDT store entry
    scope: foundational
    definition: Before an operation is applied locally and queued for gossip, the sync daemon validates
      it against the current schema definition for the operation's record type, quarantining structurally
      valid but semantically incorrect operations rather than letting them propagate.
    must-implement: *id034
    verification: Sync daemon code path shows schema validation between deserialization and CRDT store
      apply; behavioral test injects a structurally valid but schema-violating operation and confirms
      it is quarantined rather than applied or propagated.
  - ref: ch06-distributed-systems-lens:LENS-D-15
    name: Required test categories for sync protocol correctness
    scope: foundational
    definition: Sync protocol verification requires a defined set of test categories — network partition
      simulation, clock skew injection, concurrent edit generation, GC boundary conditions, Byzantine
      operation injection, and long-partition reconnect scenarios.
    must-implement: *id035
    verification: Test directory includes labeled fixtures for partition, clock-skew, concurrent-edit,
      GC-boundary, Byzantine-injection, and long-partition-reconnect scenarios; CI configuration enforces
      presence of each.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-05
    name: Peer-attestation QR onboarding bundle
    scope: foundational
    definition: A new device joins an existing workspace by scanning a QR-encoded attestation bundle from
      an existing peer that transfers credentials, workspace identity, and gossip-bootstrap parameters
      in a single out-of-band step, eliminating the credentials-require-peer chicken-and-egg failure mode
      of naive multi-device onboarding.
    must-implement: *id036
    verification: Pair a new device to a workspace by scanning a peer-generated QR; confirm the new device
      authenticates and begins receiving CRDT updates without contacting a centralized credential service.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-09
    name: Zero-state first-run experience as product specification
    scope: foundational
    definition: The first thirty seconds after install for a brand-new solo user with no prior data and
      no existing peers is specified as a product requirement that walks the user from blank state to
      first project, first backup configuration, and first invite — closing the most common 30-day abandonment
      path for local-first applications.
    must-implement: *id002
    verification: Install the application on a fresh device with no prior workspace; confirm the user
      reaches a first project, a configured backup target, and an invite surface within the first session
      without consulting external documentation.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-10
    name: Conflict-inbox grouping with auto-resolve and resolve-all-similar
    scope: foundational
    definition: When two offline nodes reconnect, surfaced conflicts are grouped by record type and cause,
      auto-resolved where predefined rules clearly apply, and offer a resolve-all-similar action for the
      remainder — converting the undifferentiated conflict list that breaks most collaborative local-first
      applications into a manageable inbox.
    must-implement: *id037
    verification: Generate a synthetic conflict set covering at least three record types and two cause
      classes after a partition heal; confirm the UI groups by type and cause, auto-resolves rule-matching
      conflicts, and exposes resolve-all-similar.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-11
    name: Three-tier sync status indicator with degradation escalation
    scope: foundational
    definition: Sync state surfaces to the user through three persistent but unobtrusive status-bar indicators
      that escalate from silent to informative to persistent-banner as connectivity and sync health degrade,
      giving the user accurate situational awareness without alarm fatigue.
    must-implement: *id038
    verification: Simulate healthy, degraded, and failed sync conditions in a test build and confirm the
      indicator transitions through the three levels at the documented thresholds.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-14
    name: Intermittent connectivity as architectural baseline
    scope: foundational
    definition: The architecture treats intermittent connectivity as the operational baseline for hundreds
      of millions of enterprise workers across Sub-Saharan Africa, South and Southeast Asia, and rural
      Latin America — not as a carrier-grade NAT edge case — so all sync, conflict, and recovery flows
      are designed for sessions that span many disconnected intervals.
    must-implement: *id039
    verification: Run a multi-day partition simulation across the test fleet; confirm reconnect catch-up
      completes without manual intervention and the conflict inbox remains within the documented usability
      envelope.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-16
    name: Shared-device role-scoped recovery
    scope: foundational
    definition: Recovery must support shared-device deployments — a single tablet rotated across a team
      of field workers — by targeting the role and the workspace rather than the device and its sole user,
      with BYOC backup configured against role-scoped workspace targets so any team member can restore
      from any device.
    must-implement: *id040
    verification: Provision a workspace with three role-scoped users, restore each onto a single shared
      device in succession, and confirm each user reaches role-relevant data without loss to the others'
      backup state.
  - ref: ch10-synthesis:LENS-04
    name: Three-tier CRDT applicability model
    scope: foundational
    definition: Data is partitioned into three tiers — AP CRDT-merged content, CP single-writer operations
      under lease coordination, and append-only ledger entries outside the CRDT — based on whether automatic
      merge is semantically valid.
    must-implement: *id041
    verification: Architecture documents the tier classification per data type; tier-violating writes
      (e.g., concurrent CRDT merge of a CP-tier counter) are rejected by the data layer.
  - ref: ch10-synthesis:LENS-16
    name: Domain-invariant validation as deployment responsibility
    scope: foundational
    definition: Structural validity of a CRDT operation does not imply semantic correctness, and each
      deployment is responsible for specifying and enforcing its own domain-level merge invariants on
      top of the architecture's structural validation layer.
    must-implement:
    - Architecture provides an operation validation layer at insertion that enforces structural validity
    - Each deployment defines and enforces domain-specific semantic invariants
    - A semantically invalid but structurally valid operation does not silently propagate convergence-breaking
      corruption across peers
    verification: Validation layer rejects an operation that violates a registered domain invariant; multi-peer
      test demonstrates that domain-invariant violation at one peer does not propagate as accepted state
      to other peers.
  - ref: ch11-node-architecture:NODE-07
    name: ICrdtEngine abstraction
    scope: foundational
    definition: Sunfish.Kernel.Crdt exposes ICrdtEngine as the single contract for creating and opening
      CRDT documents, allowing engine swaps without changes to kernel or plugin code.
    must-implement:
    - ICrdtEngine interface exists in Sunfish.Kernel.Crdt with engine name and version metadata
    - All CRDT-using code depends on ICrdtEngine, not on a specific backend type
    - At least one production-grade backend (YDotNet) and one test backend (StubCrdtEngine) implement
      the contract
    - Test-only backends are clearly marked not for production
    verification: Sunfish.Kernel.Crdt namespace exposes ICrdtEngine; backend implementations satisfy the
      interface; StubCrdtEngine carries explicit DO NOT SHIP marker.
  - ref: ch11-node-architecture:NODE-08
    name: Schema registry with upcaster chain
    scope: foundational
    definition: Sunfish.Kernel.SchemaRegistry maintains event schema versions and pure-function upcasters,
      coordinates schema epochs across peers, and enables nodes at different plugin versions to interoperate.
    must-implement: &id084
    - Schema registry stores upcasters keyed by source and target version
    - Upcasters are pure functions with no I/O or side effects
    - Inbound events from peers at older versions are lifted through the chain to current version
    - Schema epochs are coordinated across the peer set
    - Stream compaction removes superseded event versions
    verification: ISchemaVersion contract surface present; integration test sends an N-1 schema event
      and observes correct upcasting through the chain.
  - ref: ch12-crdt-engine-data-layer:CRDT-02
    name: CRDT merge mathematical properties (commutativity, associativity, idempotency)
    scope: foundational
    definition: A CRDT merge function must satisfy commutativity, associativity, and idempotency so that
      any two peers applying the same set of operations in any order — including duplicate application
      — converge to identical state.
    must-implement: *id042
    verification: Property-based test applies randomized operation sequences in different orders and with
      duplicates, asserting byte-identical convergent state.
  - ref: ch12-crdt-engine-data-layer:CRDT-03
    name: CRDT data layer primitives (map, list, text, counter)
    scope: foundational
    definition: The data layer exposes four raw CRDT types — map (concurrent key insertions), list (insertion-order-preserving),
      text (human-legible character-merge), and counter (additive across peers) — none of which carry
      domain semantics.
    must-implement:
    - Map type merges concurrent key insertions deterministically
    - List type preserves insertion order across peers under concurrent inserts
    - Text type resolves concurrent character insertions into a human-legible result
    - Counter type accumulates per-peer increments and converges to the correct sum
    verification: Per-type convergence tests under concurrent edits assert deterministic output across
      peers for each primitive.
  - ref: ch12-crdt-engine-data-layer:CRDT-04
    name: Semantic layer enforces domain invariants
    scope: foundational
    definition: The semantic layer interprets CRDT data-layer changes as domain events and enforces invariants
      that CRDT merge cannot enforce structurally — for example, turning a concurrent posting-amount mutation
      into a compensating ledger entry rather than a silent corruption.
    must-implement: &id157
    - Domain validation runs on every CRDT change interpreted as a domain event
    - Invalid state transitions surface to a domain-defined resolution path (compensation, conflict inbox,
      etc.)
    - Semantic layer has authority that the data layer does not
    verification: Test injects a CRDT-merged state that violates a domain invariant; assertion confirms
      semantic layer flags or compensates rather than accepting silently.
  - ref: ch12-crdt-engine-data-layer:CRDT-07
    name: AP records — CRDT merge with tolerated divergence
    scope: foundational
    definition: AP records (documents, notes, task descriptions, team membership) tolerate concurrent
      offline divergence because deterministic CRDT merge produces a result the user can review, and the
      domain consequence of temporary inconsistency is acceptable.
    must-implement: *id043
    verification: Two-peer offline divergence test for an AP stream confirms reconnect produces deterministic
      merged state with no manual intervention.
  - ref: ch12-crdt-engine-data-layer:CRDT-20
    name: Schema-on-write CRDT operation validation at store entry
    scope: foundational
    definition: Every CRDT operation — locally produced or peer-received — passes through schema-level
      validation before insertion into the local CRDT store, gating insertion by record-type check, field
      constraints, and minimum-supported schema version, with failures quarantined rather than applied.
    must-implement: &id105
    - Validation runs on every operation prior to CRDT store insertion
    - Operations whose schema version is below the node's minimum-supported version are rejected
    - Field constraints (required fields, types, enum ranges) are checked
    - Failed operations enter the quarantine queue and surface in the conflict inbox
    verification: Inject a malformed operation via the sync path and assert it is quarantined and surfaced
      to the conflict inbox without modifying CRDT state.
  - ref: ch12-crdt-engine-data-layer:CRDT-31
    name: Layer 4 — content-addressed binary distribution (opt-in)
    scope: foundational
    definition: Layer 4 synchronizes binary assets across nodes using content-hash addressing as the storage
      key, providing integrity verification and deduplication as structural properties — opt-in because
      text-and-structured-data nodes do not need the infrastructure overhead.
    must-implement: &id086
    - Asset storage key is the content hash
    - Two nodes with the same asset confirm identity by hash without redundant transfer
    - Layer is opt-in via deployment configuration
    verification: Two nodes independently receive the same binary; hash comparison confirms identity and
      no redundant transfer occurs.
  - ref: ch13-schema-migration-evolution:SCH-01
    name: Multi-version schema skew across nodes
    scope: foundational
    definition: A team's nodes simultaneously run multiple schema versions because no central authority
      can force coordinated upgrade and the sync daemon cannot know a peer's schema version until handshake.
    must-implement: *id044
    verification: Multi-peer test runs three nodes at v1, v2, v3 simultaneously and verifies bidirectional
      sync produces convergent state for shared record types.
  - ref: ch13-schema-migration-evolution:SCH-02
    name: Expand-contract migration pattern
    scope: foundational
    definition: A schema modification divided into an expand phase (additive, dual-write, both old and
      new fields present) and a contract phase (removal of old field) separated by a compatibility window.
    must-implement: *id045
    verification: Migration runbook in source control documents the expand-contract decomposition for
      each schema change; CI rejects schema changes lacking a registered expand and contract step.
  - ref: ch13-schema-migration-evolution:SCH-03
    name: Dual-write during expand phase
    scope: foundational
    definition: During the expand phase, every write path produces records carrying both the old and the
      new field, so that nodes on either schema version can interpret the record without information loss.
    must-implement: *id046
    verification: Static analysis or grep-based check enumerates all write sites for the record type and
      confirms each writes both fields; integration test produces a record on a v2 node and reads it correctly
      on a v1 peer.
  - ref: ch13-schema-migration-evolution:SCH-04
    name: Unknown-field tolerance in CRDT maps
    scope: foundational
    definition: CRDT map types preserve unknown keys received from peers running newer schemas, storing
      them rather than rejecting the operation.
    must-implement: *id047
    verification: Test sends a CRDT map operation containing a field absent from the local schema; node
      stores the field and re-emits it on subsequent sync to a third peer that recognizes it.
  - ref: ch13-schema-migration-evolution:SCH-08
    name: Additive change classes that skip upcasters
    scope: foundational
    definition: Two classes of schema change require no upcaster — adding a new optional field to an existing
      event type, and adding a new event variant — because absence is a defined default and unknown variants
      are quarantined.
    must-implement: *id048
    verification: Test introduces a new optional field and a new event variant, sends both to an old node,
      and confirms the optional field is defaulted and the new variant lands in the circuit breaker queue.
  - ref: ch13-schema-migration-evolution:SCH-12
    name: Bidirectional schema lens
    scope: foundational
    definition: A pair of forward and backward transformation functions between two schema versions, where
      forward and backward must be mutual inverses up to information loss.
    must-implement: *id049
    verification: Sunfish.Kernel.SchemaRegistry startup runs round-trip tests for each registered lens;
      injecting a lens with a non-identity round-trip causes startup to fail with the failing edge name
      in the diagnostic.
  - ref: ch13-schema-migration-evolution:SCH-13
    name: Lens application on transmission and receipt
    scope: foundational
    definition: The sync daemon applies the backward lens before transmitting a delta to an older-schema
      peer and the forward lens on receipt of a delta from an older-schema peer, so neither node stores
      data in the wrong version shape.
    must-implement: *id050
    verification: Sync test between a v1 and v2 node confirms each node's local store contains records
      in its own schema version after bidirectional sync.
  - ref: ch13-schema-migration-evolution:SCH-14
    name: Lens version graph and shortest-path composition
    scope: foundational
    definition: Lenses form a directed graph between schema versions; non-adjacent translations are produced
      by composing lenses along the shortest path through the graph.
    must-implement: *id017
    verification: Lens engine exposes a query returning the composition path between any two registered
      versions; cache hit-rate metric is observable.
  - ref: ch13-schema-migration-evolution:SCH-15
    name: Missing lens edge suspends sync
    scope: foundational
    definition: When the lens version graph contains no path between a peer's schema version and the local
      schema version for a given record type, synchronization for that record type is suspended until
      a lens is installed or the peer upgrades.
    must-implement: *id051
    verification: Test removes a lens edge between v2 and v3, connects a v1 and v3 peer, and confirms
      only the affected record types are suspended while unaffected types continue to sync.
  - ref: ch13-schema-migration-evolution:SCH-16
    name: Schema epoch with minimum supported version
    scope: foundational
    definition: A versioned, gossiped administrative boundary that carries a minimum supported peer version,
      below which the sync daemon refuses to synchronize the record types governed by the epoch.
    must-implement: &id090
    - Epoch announcements propagate through the gossip network as administrative events
    - Sync daemon enforces minimum supported version for governed record types
    - Below-minimum peers receive an explicit version-gate error rather than partial data
    verification: Test announces epoch E+1 with minimum version v3; v2 peer attempting to sync a governed
      record type receives a version-gate error and does not receive partial data; non-governed types
      continue to sync.
  - ref: ch13-schema-migration-evolution:SCH-18
    name: Epoch quorum acknowledgment
    scope: foundational
    definition: An epoch becomes active only when a strict majority of the currently reachable peer set
      has acknowledged the announcement, matching the CP-class lease quorum from Chapter 12.
    must-implement:
    - Coordinator counts acknowledgments from currently reachable peers
    - Strict majority threshold is required before epoch activation
    - Offline peers receive the epoch event on reconnect and acknowledge then
    verification: Test with 5-node team confirms epoch activation requires 3 acknowledgments and not just
      announcement broadcast; activation is denied below threshold.
  - ref: ch14-sync-daemon-protocol:SYNC-06
    name: mDNS LAN discovery
    scope: foundational
    definition: On a local network segment, the daemon announces node ID, schema version, and IPC endpoint
      via multicast DNS, removing peers from the candidate list after three missed heartbeat intervals.
    must-implement: *id052
    verification: Two daemons on the same LAN segment discover each other within one mDNS announcement
      interval with zero configuration.
  - ref: ch14-sync-daemon-protocol:SYNC-07
    name: Mesh VPN cross-network discovery
    scope: foundational
    definition: Peers on different networks connect through a WireGuard-based mesh VPN that handles NAT
      traversal and provides in-transit encryption independent of protocol-layer authentication.
    must-implement: *id053
    verification: Two daemons behind separate NATs establish a session through the mesh VPN with no per-endpoint
      port forwarding.
  - ref: ch14-sync-daemon-protocol:SYNC-09
    name: Lowest-latency path selection with hot standby
    scope: foundational
    definition: The daemon selects the lowest-latency reachable path to each known peer and dynamically
      updates path selection as network conditions change, retaining alternate paths as hot standby.
    must-implement: *id054
    verification: Sever the primary path between two peers; observe the daemon promoting the standby within
      one gossip interval without a fresh CAPABILITY_NEG.
  - ref: ch14-sync-daemon-protocol:SYNC-14
    name: DELTA_STREAM continuous CRDT operation flow
    scope: foundational
    definition: After ACK, both nodes emit a continuous append-only stream of compact binary CRDT deltas
      computed from the difference between sender state and receiver vector clock, with out-of-scope operations
      dropped at the send tier.
    must-implement: *id055
    verification: Observe wire trace; confirm deltas contain only operations the receiver has not seen
      and only for granted subscriptions.
  - ref: ch14-sync-daemon-protocol:SYNC-19
    name: Random-peer-selection gossip anti-entropy
    scope: foundational
    definition: Every 30 seconds each node selects two peers at random from its active membership list
      and initiates a symmetric delta exchange, ensuring O(log N) propagation and preventing load concentration
      on high-degree nodes.
    must-implement:
    - Daemon selects k random peers (default k=2) per gossip tick
    - Exchange is symmetric — each side sends operations the other lacks
    - 30-second default interval is configurable per deployment
    verification: Run a 10-node simulation; confirm convergence in O(log N) rounds and even per-node send/receive
      distribution.
  - ref: ch14-sync-daemon-protocol:SYNC-20
    name: Vector-clock-driven delta computation
    scope: foundational
    definition: Each CRDT operation carries a vector clock entry identifying the originating node and
      logical time, and deltas include all operations causally ahead of the remote peer's last known clock.
    must-implement: *id056
    verification: Two-peer convergence test under partition heal; confirm byte-identical state after exchange.
  - ref: ch14-sync-daemon-protocol:SYNC-28
    name: Exponential backoff with jitter on reconnect
    scope: foundational
    definition: When a previously unavailable network path becomes reachable, the daemon waits a random
      interval drawn from an exponential distribution bounded at 60 seconds before initiating handshake,
      ensuring simultaneously disconnected nodes do not reconnect simultaneously.
    must-implement: *id057
    verification: Simulate 100 nodes reconnecting after a partition heal; confirm reconnection events
      are spread across the 60-second window.
  - ref: ch14-sync-daemon-protocol:SYNC-30
    name: Three-to-five interval failure detection
    scope: foundational
    definition: A peer that misses three consecutive GOSSIP_PINGs transitions from active to suspected,
      and after five total missed intervals transitions from suspected to failed and is removed from the
      active membership list.
    must-implement:
    - Three missed GOSSIP_PINGs triggers active-to-suspected transition
    - Five total missed intervals triggers suspected-to-failed transition
    - Failed peers are removed from active membership list
    - Suspected peers continue to receive GOSSIP_PINGs
    verification: Block GOSSIP_PINGs to one peer; observe state transitions at the 3rd and 5th missed
      intervals.
  - ref: ch14-sync-daemon-protocol:SYNC-31
    name: Suspected-peer recovery without re-handshake
    scope: foundational
    definition: A suspected peer that responds to a GOSSIP_PING transitions immediately back to active
      and resumes delta exchange on the existing session without requiring a fresh handshake.
    must-implement: *id058
    verification: Drive a peer to suspected state, then resume responses; confirm session continues without
      re-handshake and accumulated deltas exchange.
  - ref: ch14-sync-daemon-protocol:SYNC-32
    name: Address-change reconnect on same node ID
    scope: foundational
    definition: A new peer presenting the same node ID as a previously failed peer is treated as a reconnect,
      triggering a fresh handshake including full CAPABILITY_NEG and resetting the failure counter.
    must-implement: *id059
    verification: Have a node move from Wi-Fi to cellular, presenting the same node ID at a new address;
      confirm fresh handshake completes and old address is replaced.
  - ref: ch14-sync-daemon-protocol:SYNC-33
    name: Transitive address propagation via gossip
    scope: foundational
    definition: Stale addresses are cleaned through explicit removal at failed-state and through address
      updates carried in incoming GOSSIP_PING messages, allowing transitive learning of new addresses
      without direct contact.
    must-implement:
    - Address updates in GOSSIP_PING overwrite older entries for the same node ID
    - Failed-state removal clears stale entries from active list
    - Node C learns Node B's new address via Node A's gossip
    verification: Three-node test where A learns of B's new address from C without A having pinged B directly
      at the new address.
  - ref: ch17-building-first-node:BUILD-06
    name: First-document development loop
    scope: foundational
    definition: The canonical first-feature loop is to obtain the CRDT engine from DI, create a document
      by ID, apply a typed update, and subscribe to update events that distinguish local from remote origin.
    must-implement: *id018
    verification: A worked example in the accelerator's tests creates a document, applies an update, and
      asserts the subscriber receives the change with the correct origin tag.
  - ref: ch17-building-first-node:BUILD-16
    name: Always-visible three-indicator status bar
    scope: foundational
    definition: A local-first node renders a permanently-visible status bar with three indicators — Node
      Health, Link Status, and Data Freshness — so the user can always perceive how the node's behavior
      depends on its current network and sync state.
    must-implement: *id060
    verification: Walk every UI route in the application; the status bar is present on each one with all
      three indicators rendered.
  - ref: ch18-migrating-existing-saas:MIG-04
    name: AP-class versus CP-class record separation
    scope: foundational
    definition: Records are classified as AP-class — user-owned, eventually consistent, suitable for CRDT
      replication — or CP-class — server-coordinated, requiring linearizable writes — and the two classes
      never share a backing table.
    must-implement: *id061
    verification: Schema audit script enumerates tables and asserts each is labeled AP or CP; CI rejects
      schema changes that introduce mixed-class tables.
  - ref: ch18-migrating-existing-saas:MIG-14
    name: Phase 2 local writes for AP-class only
    scope: foundational
    definition: Phase 2 routes AP-class block writes through the CRDT engine for instant local feedback
      while CP-class records — billing, subscription limits, role membership, audit logs — remain server-authoritative.
    must-implement: *id021
    verification: Convergence test against AP-class aggregates demonstrates byte-identical state after
      concurrent edits; CP-class regression suite passes unchanged.
  - ref: ch20-ux-sync-conflict:UX-09
    name: Three-state optimistic write lifecycle
    scope: foundational
    definition: An AP-class write moves through three explicit visual states — pending (applied locally,
      not yet seen by any peer), confirmed (received by at least one peer), and failed (circuit breaker
      rejected on reconnect) — with the failed state opening the conflict inbox.
    must-implement: *id024
    verification: A write performed offline shows pending; reconnecting with no conflict transitions it
      to confirmed; reconnecting with an unresolvable conflict transitions it to failed and opens the
      conflict inbox via the Review affordance.
  - ref: ch20-ux-sync-conflict:UX-10
    name: Pending and failed states never collapse
    scope: foundational
    definition: A failed write must never remain in the pending visual state, because a user who sees
      a persistent spinner waits while a user who sees a failure indicator acts.
    must-implement: *id062
    verification: Forcing a circuit-breaker rejection at reconnect resolves the pending visual state to
      failed within the documented bound, never indefinitely spinning.
  - ref: ch20-ux-sync-conflict:UX-11
    name: Conflict inbox as single resolution surface
    scope: foundational
    definition: All conflict resolution occurs in a dedicated panel — not a modal, not an interstitial
      — accessible from the status bar and any failed-write indicator.
    must-implement:
    - Application exposes one canonical conflict inbox surface, not multiple per-feature dialogs
    - Inbox is reachable from both the status bar and any failed-write indicator
    - Conflict resolution UX never blocks unrelated work via modal dialogs
    verification: Two independent conflict-producing edits route both items to the same inbox panel reachable
      from the status bar.
  - ref: ch20-ux-sync-conflict:UX-12
    name: Conflict grouping by record type and field
    scope: foundational
    definition: 'The conflict inbox groups conflicts by record type and field so a non-technical user
      sees structured items like "Status conflict on task: Design Review" rather than a raw CRDT diff.'
    must-implement:
    - Conflicts are grouped by record type and conflicting field
    - Group labels use the user-facing entity name and field label, not internal identifiers
    - Raw CRDT diffs are not surfaced in the default view
    verification: Producing N conflicts on the same record-type/field shows a single grouped item containing
      N entries with a human-readable label.
  - ref: ch20-ux-sync-conflict:UX-14
    name: Resolve-all-similar bulk action
    scope: foundational
    definition: A bulk affordance applies a chosen rule to every conflict of the same shape in a single
      operation, with outliers retained for individual review.
    must-implement:
    - Bulk action applies the selected rule to all conflicts matching the active group's shape
    - Outliers that do not match the rule remain in the inbox for individual handling
    - The bulk action is reachable from the inbox without leaving the surface
    verification: Producing 40 same-shape conflicts and applying "resolve all similar" with one rule resolves
      them in one user-visible operation, leaving any outliers visible.
  - ref: ch20-ux-sync-conflict:UX-16
    name: Three distinct connectivity-failure UX modes
    scope: foundational
    definition: Full offline, partial connectivity (relay-only), and the quarantine queue are surfaced
      as three distinct UX modes, not collapsed into a single "offline" treatment.
    must-implement: *id063
    verification: Each of the three states presents the documented surface in isolation; collapsing any
      two into a shared treatment fails the test.
  - ref: ch20-ux-sync-conflict:UX-23
    name: Accessibility as a Tier-1 contract
    scope: foundational
    definition: Every UX surface in the application carries an accessibility contract — semantic ARIA
      roles, keyboard reachability, declared component metadata, and plain-language assistive-technology
      text — enforced as rigorously as the write path.
    must-implement: *id064
    verification: Automated accessibility audit on every shipped UI block confirms ARIA roles, keyboard
      reachability, and colour-plus-text pairing; a screen-reader walkthrough of the conflict inbox resolves
      a conflict without pointer input and lands focus on the next pending group.
  - ref: ch20-ux-sync-conflict:UX-25
    name: Plain-language parity across visual and assistive channels
    scope: foundational
    definition: Text surfaced to assistive technology must use the same plain-language register as the
      visible text, with no fallback to technical terminology in ARIA labels.
    must-implement:
    - ARIA labels and live-region announcements use the same plain-language strings as visible text
    - String catalog enforces parity between visible and assistive surfaces per locale
    - Reviews reject components whose assistive surface drops to technical terminology
    verification: Locale audit confirms each visible string has a matching assistive string in the same
      register; a screen-reader pass on the freshness, optimistic-write, and conflict surfaces hears the
      same plain-language register as the sighted view.
  - ref: epilogue-what-the-stack-owes-you:EPI-11
    name: Domain invariant enforcement above CRDT convergence
    scope: foundational
    definition: CRDTs deliver structural convergence but not domain invariants such as inventory-cannot-go-negative,
      no-double-booking, or ledger-balance, which require additional modeling beyond the CRDT engine and
      have no standardized formal verification approach in this architecture.
    must-implement:
    - Semantic layer enforces named domain invariants on top of CRDT merge
    - Each enforced invariant is documented with the data type and the enforcement mechanism
    - Invariants whose enforcement is not yet specified are listed as open items
    verification: Semantic-layer document enumerates enforced invariants and their mechanisms; merge tests
      demonstrate violation rejection for each enforced invariant.
  - ref: appendix-a-sync-daemon-wire-protocol:WIRE-21
    name: No relay reordering or buffering
    scope: foundational
    definition: The relay does not reorder or buffer DELTA_STREAM messages; operations are delivered in
      network order and the CRDT engine guarantees convergent merge regardless of arrival order.
    must-implement:
    - Relay forwards DELTA_STREAM in receive order without buffering
    - CRDT engine produces convergent merge under arbitrary delivery order
    verification: 'Relay test: ordered injected stream emerges in the same order at subscribers; multi-peer
      convergence test demonstrates byte-identical state under reordered deliveries.'
  - ref: appendix-c-further-reading:READ-01
    name: Kleppmann seven local-first ideals
    scope: foundational
    definition: The seven aspirational properties — fast local performance (P1), multi-device access (P2),
      network-optional operation (P3), seamless collaboration (P4), longevity beyond vendor lifespan (P5),
      security and privacy by default (P6), and ultimate user ownership (P7) — that together define local-first
      software per Kleppmann et al. (Onward! 2019).
    must-implement: *id003
    verification: Conformance scorecard maps every architectural choice to one or more of P1-P7; no property
      is left unaddressed.
  - ref: appendix-c-further-reading:READ-02
    name: CRDT convergent vs commutative distinction
    scope: foundational
    definition: The Shapiro et al. 2011 distinction between state-based (convergent) CRDTs that ship full
      state and operation-based (commutative) CRDTs that ship operation logs, which determines what is
      carried across the sync wire.
    must-implement: *id065
    verification: ADR exists naming the chosen CRDT type family (CvRDT, CmRDT, or delta-CRDT) with citation
      to Shapiro 2011.
  - ref: appendix-c-further-reading:READ-05
    name: Optimistic replication semantics
    scope: foundational
    definition: The Saito and Shapiro 2005 framing of replication that allows tentative local commits,
      eventual convergence, and application-level conflict resolution — the academic vocabulary for what
      the book operationally calls local-first.
    must-implement: *id026
    verification: Behavioral test confirms a local write commits and is visible to the local reader before
      any peer acknowledges it.
  - ref: appendix-c-further-reading:READ-06
    name: Lamport logical time
    scope: foundational
    definition: Lamport's 1978 construction of logical clocks and the happens-before relation, which is
      the basis for the vector clocks the Appendix A wire protocol uses to order events across peers without
      relying on wall-clock time.
    must-implement:
    - Sync wire protocol carries logical time (vector clock or equivalent), not wall-clock time
    - Causal ordering of events is preserved across peers
    - Clock skew between peers does not affect correctness
    verification: Wire protocol specification names its logical-time scheme; partition test confirms causal
      order is preserved after heal.
  - ref: appendix-d-testing-the-inverted-stack:TEST-01
    name: Five-level testing pyramid
    scope: foundational
    definition: A tiered test architecture in which CRDT property tests, real-dependency integration tests,
      fault injection, deterministic simulation, and chaos testing each run at a defined cadence with
      mandatory pass conditions before first production release.
    must-implement: *id066
    verification: CI configuration shows distinct jobs for each level with the prescribed triggers and
      time budgets, and every scenario in the suite carries an explicit pass condition.
  - ref: appendix-d-testing-the-inverted-stack:TEST-02
    name: Property-based CRDT tests for convergence, idempotency, commutativity, and monotonicity
    scope: foundational
    definition: A Level 1 test class in which a property-based framework generates thousands of random
      operation sequences to verify that CRDT merge satisfies convergence, idempotency, commutativity
      (or join-semilattice merge for state-based CRDTs), and monotonicity.
    must-implement: *id067
    verification: Test suite output shows at least 10,000 generated cases per CRDT property, with shrinking
      enabled and named property assertions distinct from example-based tests.
  - ref: appendix-d-testing-the-inverted-stack:TEST-04
    name: Fault injection for partition, packet loss, and crash
    scope: foundational
    definition: A Level 3 test class that uses a network proxy such as toxiproxy with Testcontainers to
      inject node crashes mid-handshake, relay unreachability during DELTA_STREAM, and consecutive GOSSIP_PING
      losses, then asserts the system recovers to a CRDT state identical to the no-fault outcome.
    must-implement: *id068
    verification: Nightly CI job runs each fault scenario through toxiproxy and asserts post-recovery
      CRDT hash equals the no-fault baseline.
  - ref: appendix-d-testing-the-inverted-stack:TEST-06
    name: Chaos testing in staging under representative load
    scope: foundational
    definition: A Level 5 test class that runs Pumba, Gremlin, or equivalent chaos tooling against a multi-node
      staging environment loaded at median-production traffic, with the explicit goal of discovering unanticipated
      failure modes rather than verifying known properties.
    must-implement: *id069
    verification: Pre-major-release pipeline executes a 24–48 hour chaos run with logged anomalies and
      recovery times, archived against the release tag.
  - ref: appendix-d-testing-the-inverted-stack:TEST-08
    name: Mandatory partition and reconnect scenarios
    scope: foundational
    definition: A required scenario set covering 30-day offline divergence with merge, 90-day extended-offline
      baseline with intermittent windows, CP quorum loss, 1,000+ queued operations on standard and constrained
      hardware, abrupt power interruption during WAL write, and 30-day air-gapped operation, each with
      explicit pass conditions before first production release.
    must-implement: *id070
    verification: Test report archives per-scenario pass/fail with CRDT state dumps, network captures
      showing zero relay traffic during air-gap, and recovery logs after each WAL kill.
  - ref: appendix-d-testing-the-inverted-stack:TEST-12
    name: Ledger invariant scenarios under failure and duplication
    scope: foundational
    definition: A required scenario set asserting that the sum-to-zero ledger invariant holds across the
      complete account set after a posting-node crash and retry, and that idempotency keys prevent duplicate
      postings when an identical domain event is submitted twice.
    must-implement:
    - Verify exactly one posting set exists after a mid-transaction crash and retry, with no duplicate
      postings
    - Verify sum-to-zero across the full related-account set, not only directly involved accounts
    - Verify idempotency keys cause a duplicate domain event to produce exactly one set of postings
    verification: Test sums the ledger across all related accounts after each scenario and asserts a single
      posting set keyed by the idempotency token.
  - ref: appendix-d-testing-the-inverted-stack:TEST-14
    name: Accessibility test for sync-state announcements
    scope: foundational
    definition: A test scenario asserting that sync-state transitions (sync-healthy, stale, offline, conflict-pending,
      revocation) are exposed through the platform accessibility tree (aria-live on web, UIAccessibilityTraits
      on iOS, AccessibilityNodeInfo on Android) and announced on change.
    must-implement:
    - Expose every sync-state value through the platform accessibility tree on each supported platform
    - Fire a state-change announcement on every sync-state transition
    - Forbid communicating sync state through colour or icon alone
    verification: UI test triggers each sync-state transition and asserts the platform accessibility API
      receives the corresponding announcement on web, iOS, and Android targets.
  P5:
  - ref: preface:PREF-01
    name: The architectural thesis — local node as primary, vendor as optional
    scope: foundational
    definition: 'The book''s central thesis is the inversion of the SaaS dependency relationship: the
      local node is the primary data plane and the vendor relay is an optional accelerator, so the application
      survives vendor withdrawal.'
    must-implement: *id071
    verification: Disconnect the application from all vendor services (network block of vendor domains);
      application performs all core read, write, and local collaboration operations identically to the
      connected state.
  - ref: preface:PREF-02
    name: SaaS tenancy as a withdrawable dependency
    scope: foundational
    definition: SaaS tenancy is an external dependency that can be withdrawn unilaterally by the vendor,
      evidenced by the 2022 Adobe/Autodesk/Microsoft/Figma suspensions across Russia and the CIS that
      locked organizations out of their own data on infrastructure they had paid for.
    must-implement: &id119 []
    verification: null
  - ref: ch01-when-saas-fights-reality:THESIS-01
    name: The SaaS bundle as conjoined value-and-cost
    scope: foundational
    definition: SaaS packages three desirable properties (real-time collaboration, multi-device access,
      zero maintenance) inseparably with three undesirable conditions (data on vendor infrastructure,
      vendor-discretion pricing, vendor-contingent service continuity), accepted as a single take-it-or-leave-it
      deal because the technology of the time made the conditions appear structurally required to deliver
      the properties.
    must-implement: &id120 []
    verification: null
  - ref: ch01-when-saas-fights-reality:THESIS-03
    name: Vendor disappearance as routine product end-state
    scope: foundational
    definition: A failure mode in which the SaaS provider is acquired, sunset, pivoted, or runs out of
      runway, terminating service on a vendor-controlled timeline and leaving users with whatever export
      the vendor chooses to provide in whatever format the vendor chooses to emit.
    must-implement: &id121
    - User data is stored in a format the user can read without the vendor's tools
    - Application continues to function on user-controlled hardware after vendor termination
    - Schema, attachments, comment threads, and relationship structure remain coherent without vendor-side
      reconstruction
    verification: Remove all vendor-side services; application launches, reads historical data, and continues
      normal operation against the local store.
  - ref: ch01-when-saas-fights-reality:THESIS-05
    name: Data inaccessibility despite nominal ownership
    scope: foundational
    definition: A failure mode in which user data is contractually owned by the user but operationally
      inaccessible due to export rate limits, proprietary formats that strip semantic structure, feature-gated
      export behind paid tiers, or short post-cancellation retrieval windows.
    must-implement: &id122
    - User data is stored locally in a documented, schema-described format
    - Bulk export of all user data completes in bounded time without rate limiting
    - Export preserves attachments with metadata, comment threading, and custom-field semantics
    - No retrieval depends on an active subscription or vendor billing state
    verification: Run a documented export procedure on a representative dataset; confirm the export round-trips
      into a third-party tool with attachments, threading, and field semantics intact.
  - ref: ch01-when-saas-fights-reality:THESIS-06
    name: Post-adoption pricing capture
    scope: foundational
    definition: A failure mode in which switching costs accumulated through training, integrations, historical
      data, and learned workflows allow vendors to raise prices, move features behind higher tiers, or
      change contractual terms after the customer has lost realistic exit leverage, with per-seat pricing
      and integration ecosystems compounding the lock-in as teams grow.
    must-implement: &id123
    - Architecture removes the structural switching cost by keeping data, schema, and workflow on user
      infrastructure
    - No core capability is gated on a vendor subscription tier
    - Integration with other tools occurs through user-controlled interfaces, not vendor-locked connectors
    verification: Cancel any optional vendor relay or sync service; confirm the application retains all
      core functionality on the local node alone.
  - ref: ch01-when-saas-fights-reality:THESIS-07
    name: Third-party veto over vendor-custodied data
    scope: foundational
    definition: A failure mode in which an external authority — sanctions regime, data residency regulator,
      court order, or national security designation — compels the vendor to suspend service or compels
      the customer to cease use, ending the relationship regardless of either party's preferences because
      data custody at the vendor concentrates the exposure surface there.
    must-implement: &id099
    - Authoritative state for user data resides on hardware the user controls
    - Application functions independently of any vendor-side service for core workflows
    - Any optional relay holds ciphertext only and is replaceable by a user-controlled relay without data
      migration
    verification: Specification documents the data custody boundary; deployment guide demonstrates substituting
      a user-controlled relay for a vendor relay with no application-level changes.
  - ref: ch01-when-saas-fights-reality:THESIS-08
    name: Architectural reversal of data custody
    scope: foundational
    definition: The thesis-level architectural inversion that moves authoritative state from vendor infrastructure
      to user infrastructure, demoting the vendor's role from primary data plane to optional relay peer,
      made feasible by three independently matured technology shifts (production CRDTs, edge gossip protocols,
      the local service pattern).
    must-implement: *id072
    verification: Architecture documents identify the device-resident authoritative store; sync protocol
      documents identify any cloud component as relay or peer rather than primary; component inventory
      cites mature open implementations for each substrate.
  - ref: ch02-local-first-serious-stack:LF-05
    name: The long now
    scope: foundational
    definition: User data outlives the vendor, the subscription, the company's strategic priorities, and
      the political conditions under which the service operates, by virtue of being stored in an open
      format on user-controlled hardware.
    must-implement:
    - Data is stored in an open, documented format readable by tools other than the originating application
    - Data lives on hardware the user physically controls
    - Continued access does not depend on vendor existence, subscription status, or jurisdictional service
      availability
    - Sync formats are open or interoperable, not proprietary lock-in
    verification: Confirm data file format has a public specification readable by at least one independent
      tool; confirm continued read/write access works after simulated vendor shutdown and after simulated
      jurisdictional service withdrawal.
  - ref: ch02-local-first-serious-stack:THESIS-01
    name: Seven properties as a minimum bar, not a wishlist
    scope: foundational
    definition: The seven Kleppmann properties function as a calibrated filter that fails any system satisfying
      only a subset, not as a menu from which an implementer may select.
    must-implement: *id001
    verification: Conformance scorecard reports per-property pass/fail in addition to any gradient score;
      overall conformance requires all seven to pass.
  - ref: ch03-inverted-stack-one-diagram:INV-01
    name: Local node as primary; cloud relay as optional peer
    scope: foundational
    definition: The architectural inversion replaces SaaS's cloud-primary / device-cache topology with
      a topology where the local node holds the authoritative copy and any cloud relay participates only
      as an optional sync peer.
    must-implement: *id009
    verification: Disconnect all network interfaces; the application performs every core operation identically
      and the relay role can be unplugged without rebuilding the application.
  - ref: ch03-inverted-stack-one-diagram:INV-10
    name: Write buffering with durable local commit before peer delivery
    scope: foundational
    definition: When no peers are reachable, the daemon accepts writes from the application logic layer
      and buffers them to the durable local event log before acknowledgement, then drains the buffer when
      any peer becomes reachable.
    must-implement: *id073
    verification: Durability test interrupts power after buffering and before delivery, then asserts the
      write replays from the event log on restart and reaches peers when reconnected.
  - ref: ch03-inverted-stack-one-diagram:INV-12
    name: Engine-agnostic CRDT abstraction
    scope: foundational
    definition: The CRDT engine is consumed through an abstraction (`ICrdtEngine`) so that the choice
      between YDotNet (current) and Loro (aspirational target) is reversible without changes to the application
      layer.
    must-implement: &id125
    - Application code consumes only the engine abstraction, not engine-specific types
    - Adding a new engine implementation requires no changes to application logic
    - Merge semantics are commutative, associative, and idempotent across all engines behind the abstraction
    verification: Test suite runs the same convergence scenarios against multiple engine implementations
      and asserts byte-identical merged state.
  - ref: ch03-inverted-stack-one-diagram:INV-15
    name: Mirror-inversion of Ch01 failure modes
    scope: foundational
    definition: The inversion specifically resolves each of Ch01's six named SaaS failure modes — The
      Outage and The Dependency Chain, The Vendor, The Connectivity, The Data, The Price, and The Third-Party
      Veto — by removing the vendor's data custody as the load-bearing dependency.
    must-implement: *id074
    verification: Failure-mode regression tests for each named mode confirm continued local function and
      data accessibility; export test produces a standard-format archive without vendor API calls.
  - ref: ch04-choosing-your-architecture:DEC-01
    name: The One Question (user-owned vs aggregated value)
    scope: foundational
    definition: The architecture-determining question is whether the primary value of the software comes
      from the user's own data or from data aggregated across many users.
    must-implement: &id127
    - Architecture decision record states the answer to the One Question for the product's primary records
    - Aggregated-value features are scoped to a separate service layer when present alongside user-owned
      primary records
    - Local-node architecture is selected only when primary value is user-owned
    verification: Architecture decision record names the primary records, identifies their natural owner,
      and cites the One Question answer as the basis for selecting Zone A, B, or C.
  - ref: ch04-choosing-your-architecture:FILT-02
    name: Filter 2 — Data ownership profile
    scope: foundational
    definition: A check that classifies the natural owner of the primary records by who creates them,
      who uses them, and who suffers loss when access is severed — distinguishing user-owned, vendor-aggregated,
      and regulator-custodied profiles.
    must-implement: &id128
    - Architecture decision record names the natural owner of each primary record type
    - Vendor-aggregated-as-product use cases are routed to centralized storage
    - Regulatory-custodian regimes (HIPAA BAA scope, FINRA 4511 / SEC 17a-4 WORM, ITAR) are identified
      before architecture selection and route specific retention flows to the required custodian
    - Mixed-ownership products use Zone C with user-owned primary records and aggregated surfaces on a
      separate service
    verification: Architecture decision record cites the data-ownership profile per primary record type;
      regulator-custodian flows reference the specific regulation (HIPAA, FINRA, ITAR, etc.) and the custodial
      mechanism used.
  - ref: ch04-choosing-your-architecture:FILT-04
    name: Filter 4 — Business model alignment
    scope: foundational
    definition: A check that rejects local-first when revenue depends on controlling user access to their
      own data, and confirms it when revenue derives from service quality, managed relay, support, tooling,
      or dual-licensed open-core offerings.
    must-implement: &id129
    - Architecture decision record states the revenue model and confirms it does not require gating user
      access to user-owned data
    - Revenue paths that depend on data-custody lock-in are explicitly disqualified
    - Managed relay is specified as replaceable infrastructure, not a data custodian — relay failure degrades
      sync but never local operation or data access
    - Dual-licensing patterns (open-source core plus commercial managed offering) are recognized as the
      strongest alignment for this architecture
    verification: Business model document names the revenue path; relay-failure test confirms local operation
      and data access continue unaffected; user data export is supported without vendor mediation.
  - ref: ch04-choosing-your-architecture:DEC-06
    name: The Practical Shortcut (three-question prefilter)
    scope: foundational
    definition: A three-question prefilter — primary-record ownership, sustained-offline requirement,
      vendor-outlive requirement — that determines whether a full five-filter evaluation is worth the
      time for a project in early discovery.
    must-implement: *id075
    verification: Discovery-stage architecture note records the three shortcut answers and either cites
      the resulting Zone or names the filter requiring full evaluation.
  - ref: ch04-choosing-your-architecture:DEC-07
    name: Vendor-outlive requirement
    scope: foundational
    definition: The requirement that the product keep working regardless of whether the vendor survives,
      is acquired, changes pricing, or is directed to stop serving a given jurisdiction — making vendor-independent
      authoritative data custody a structural, not contractual, property.
    must-implement: &id130
    - Authoritative data lives on infrastructure under the user's or customer's control
    - The application functions without vendor server availability
    - Data export is not gated by vendor permission or active subscription
    - Recovery from vendor disappearance does not require vendor cooperation
    verification: Behavioral test simulates vendor service permanently unavailable; the application continues
      to function on local data and a documented procedure exists for replacing vendor-provided relay
      infrastructure without data migration.
  - ref: ch04-choosing-your-architecture:DEC-09
    name: Four required local-first engineering skills
    scope: foundational
    definition: The four engineering skills that separate local-node development from standard web application
      development — CRDT debugging, distributed state management, multi-version schema migration, and
      key management.
    must-implement: *id076
    verification: Capability matrix documents named owners for each of the four skills; key compromise
      recovery procedure exists in writing before the first production deployment date is set.
  - ref: ch05-enterprise-lens:LENS-E-03
    name: Build-time SBOM generation in CycloneDX format
    scope: foundational
    definition: A Software Bill of Materials is generated at build time from source by the CI pipeline
      in CycloneDX format, scanned against vulnerability databases before release, and published with
      each release artifact.
    must-implement: &id100
    - SBOM is produced at build time from the dependency graph, not assembled post-install
    - SBOM is published in CycloneDX format that satisfies NTIA minimum elements and CISA guidance
    - CI pipeline scans the SBOM against NVD and OSS vulnerability databases before release
    - SBOM is published alongside each release artifact
    verification: CI pipeline configuration shows Syft (or equivalent) producing CycloneDX SBOM at build,
      Grype (or equivalent) scanning before release; release artifact directory contains the SBOM file
      for the corresponding binary.
  - ref: ch05-enterprise-lens:LENS-E-14
    name: Power-interruption durability as baseline property
    scope: foundational
    definition: Local writes commit to durable storage before acknowledgment so that abrupt power loss
      does not corrupt the local data store, and the sync daemon recovers cleanly from cold restart after
      unexpected shutdown.
    must-implement: &id132
    - Local writes are durably committed before the application receives an acknowledgment
    - The local data store survives abrupt power loss without corruption
    - The sync daemon survives cold restart after unexpected shutdown
    - Durability is treated as a baseline property rather than an edge-case mitigation, including for
      grid-unstable deployment environments
    verification: Crash-injection test cuts power mid-write across many trials; on restart the data store
      opens cleanly with no corruption and the sync daemon resumes operation.
  - ref: ch06-distributed-systems-lens:LENS-D-03
    name: Monotonic CRDT growth as structural property
    scope: foundational
    definition: An operation-based CRDT must retain enough operation history to deterministically merge
      concurrent changes from peers that have not yet seen each other's operations, causing internal state
      to grow monotonically with edits regardless of visible content size.
    must-implement: *id077
    verification: CRDT engine documentation states the retention guarantee in operation-history terms;
      storage growth observable in long-running test deployment matches the stated retention policy.
  - ref: ch06-distributed-systems-lens:LENS-D-12
    name: CRDT store as durable outbound buffer
    scope: foundational
    definition: The local CRDT store itself serves as the durable outbound operation buffer during partition,
      so operations are persisted across process restarts and re-read by the sync daemon on reconnection
      rather than queued in a separate in-memory buffer.
    must-implement: *id078
    verification: Sync daemon implementation reads pending outbound operations from the CRDT store on
      startup; integration test confirms operations survive process restart during partition and are transmitted
      on reconnect.
  - ref: ch07-security-lens:LENS-S-13
    name: Crypto-shredding for right-to-erasure
    scope: foundational
    definition: A pattern that satisfies right-to-erasure obligations against an immutable CRDT log by
      destroying the DEK that protects the targeted operation's content, leaving the operation entry in
      the log structurally intact while rendering its ciphertext permanently unreadable.
    must-implement: &id102
    - Each erasable operation's content is encrypted under a DEK that can be uniquely identified and destroyed
    - Erasure procedure destroys the DEK across all replicas and key stores
    - Operation entry remains in the log with metadata intact and ciphertext as an unrecoverable stub
    - Documentation names the operation-metadata residue as a known limitation
    verification: Erasure drill destroys the targeted DEK, confirms ciphertext is no longer decryptable
      on any replica, and produces a documentation artifact stating the metadata residue
  - ref: ch07-security-lens:LENS-S-14
    name: Credential recovery paths
    scope: foundational
    definition: A required set of artifact-based recovery options — recovery-key file, administrator-held
      wrapped KEK escrow, MDM re-enrollment plus relay-assisted re-sync — from which every deployment
      must select and test at least one before production, with the no-artifact case explicitly disclosed
      as permanent loss.
    must-implement: &id103
    - System supports a recovery-key file generated at account setup
    - System supports administrator-held wrapped KEK escrow under a defined procedure
    - System supports MDM re-enrollment combined with relay-assisted re-sync
    - Onboarding discloses that declining all recovery paths makes permanent loss possible
    - Deployment checklist requires selection and test of at least one recovery path before production
    verification: Recovery drill executes each enabled path end-to-end and restores access; onboarding
      flow surfaces the no-artifact disclosure
  - ref: ch08-product-economic-lens:LENS-P-09
    name: Project-entity copyright assignment via CLA
    scope: foundational
    definition: The contributor license agreement assigns copyright in contributed code to the project
      entity, preserving the entity's authority to offer the commercial license exception over the entire
      codebase including community contributions.
    must-implement:
    - The CLA grants the project entity rights sufficient to relicense the contribution under the commercial
      exception
    - CLA collection is automated in the pull-request workflow and blocks merge without a recorded signature
    - The project entity is a named legal entity capable of holding copyright assignment
    verification: CLA text in repository assigns inbound rights to a named project entity; CI configuration
      enforces a CLA-check status before any merge.
  - ref: ch08-product-economic-lens:LENS-P-12
    name: Documented project governance model
    scope: foundational
    definition: A governance model — BDFL, contributor council, or lightweight stewardship — is documented
      publicly before the first external pull request so the first significant disagreement has a defined
      resolution path rather than producing a community crisis.
    must-implement:
    - Repository contains a GOVERNANCE document at first public release
    - The document names who approves pull requests and who decides protocol changes
    - The document names the decision-making structure for unresolved disagreements
    - Governance is documented before the first external contribution is accepted
    verification: GOVERNANCE document is present in repository at first public commit; document names
      PR-approval authority, protocol-change authority, and dispute-resolution path.
  - ref: ch08-product-economic-lens:LENS-P-14
    name: Vendor-continuity risk as commercial purchasing argument
    scope: foundational
    definition: The architecture's structural ability to keep operating after vendor commercial relationship
      is severed — empirically anchored by the 2022 Western SaaS withdrawal from Russia and CIS markets
      — is positioned in procurement materials as a structural commercial claim that cloud-dependent competitors
      cannot make without re-architecture.
    must-implement: *id079
    verification: Sales collateral contains the vendor-continuity claim with the 2022 anchor citation;
      tabletop exercise demonstrates continued local operation after simulated vendor severance.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-01
    name: Plain-file application-independent export path
    scope: foundational
    definition: A user-owned local-first application must provide a single command that produces user
      data in durable application-independent formats — JSON for structured records, CSV for tabular data,
      Markdown for long-form documents — readable by any other competent software without vendor cooperation,
      active subscription, or network connectivity.
    must-implement: &id144
    - Application exposes a single export command that runs entirely against the local node
    - Export emits JSON for structured records, CSV for tabular data, and Markdown for long-form documents
    - Export operates with no vendor cooperation, no active subscription check, and no network connectivity
      required
    - Export output is byte-for-byte readable by software that has never seen the producing application
    verification: Disconnect the network, cancel the subscription if applicable, run the export command,
      then ingest the resulting JSON/CSV/Markdown into a different application and confirm semantic equivalence
      to the source records.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-02
    name: Non-technical disaster recovery walkthrough
    scope: foundational
    definition: Recovery from total device loss is a documented step-by-step path that a non-technical
      user can complete unaided in under thirty minutes, ending with a working node that resumes from
      BYOC backup without exposing any technical surface such as bucket URLs or rclone paths.
    must-implement: *id080
    verification: A non-technical tester completes end-to-end restore from a destroyed device to a working
      node in under thirty minutes without consulting documentation beyond in-application prompts.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-04
    name: Engine-agnostic CRDT abstraction for ecosystem reversibility
    scope: foundational
    definition: The application layer interacts with the CRDT engine through a stable abstraction such
      as ICrdtEngine that prevents lock-in to any specific CRDT ecosystem — Yjs, Automerge, or Loro —
      so the engine can be replaced without rewriting the application as the field continues to evolve.
    must-implement: &id146
    - A single interface mediates all CRDT operations consumed by the application layer
    - At least one engine implementation is replaceable without changes to application code
    - The abstraction surfaces map, list, text, and counter operations independent of engine-native types
    verification: Source tree contains an ICrdtEngine-equivalent interface; a second engine adapter (test
      stub or alternate implementation) exists and the application test suite passes against both.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-07
    name: Three-state backup status with dismissible at-risk banner
    scope: foundational
    definition: Backup health surfaces to the user through three escalating states — Protected (subtle),
      Attention (amber badge), At Risk (persistent non-blocking banner dismissible only with explicit
      acknowledgment) — so users do not think about working backups but cannot accidentally ignore failing
      ones.
    must-implement: &id147
    - Backup status UI exposes exactly the three named states with distinct visual treatments
    - Protected state is unobtrusive and requires no user attention
    - At Risk banner is persistent, non-blocking, and dismissible only via an explicit acknowledgment
      that records user intent
    verification: Force each of the three backup states in a test build and confirm the visual treatment
      matches specification; confirm the At Risk dismissal records an acknowledgment event in the local
      log.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-08
    name: Recovery UX parity with backup status design
    scope: foundational
    definition: The restore experience receives the same non-technical design attention as backup status
      — a guided reconnection to the BYOC target, a restore-progress indicator that mirrors the three-state
      backup model in restore context, and zero exposure of bucket URLs or rclone paths at the moment
      the user is most stressed about lost work.
    must-implement: &id148
    - Restore flow guides the user through reconnecting to the configured BYOC target with the same UX
      register used during initial backup configuration
    - Restore progress surfaces as a background-sync indicator using the three-state visual model adapted
      to restore semantics
    - No technical identifier (bucket URL, rclone path, credential string) is exposed in the restore flow
    verification: A non-technical tester completes restore using only in-application prompts; UI inspection
      confirms no bucket URL or rclone path appears anywhere in the restore flow.
  - ref: ch09-local-first-practitioner-lens:LENS-LF-15
    name: Sanctions-grade availability as design anchor
    scope: foundational
    definition: The architecture is anchored against the empirical case of the 2022 sanctions-driven SaaS
      suspensions across Russia and CIS markets — hundreds of thousands of organizations losing vendor
      access on days of notice — establishing that surviving vendor suspension is not a theoretical improvement
      but a property the architecture has already had to provide.
    must-implement: *id081
    verification: Block all vendor-controlled domains at the network layer and confirm the application
      performs all core operations identically; confirm a self-hosted relay deployment guide exists in
      the public documentation.
  - ref: ch10-synthesis:LENS-07
    name: Non-technical disaster recovery path
    scope: foundational
    definition: A non-technical user can recover their complete data after total device failure without
      contacting support and without developer-only tooling.
    must-implement: *id082
    verification: Documented walkthrough exists; usability test with a non-technical participant completes
      restore on a fresh device without developer assistance.
  - ref: ch10-synthesis:LENS-08
    name: Plain-file export without vendor cooperation
    scope: foundational
    definition: A user can export all of their data to standard plain-file formats (CSV, JSON, plain files)
      using only a standard file manager, with no vendor service call and no special tooling.
    must-implement: &id152
    - Export produces standard formats (CSV, JSON, plain files) accessible via a standard file manager
    - Export executes without any network call to a vendor service
    - Export covers all user-owned records held by the node
    - Export discloses categories where regulatory custody overrides user export rights
    verification: Disconnect node from network; trigger export; verify produced files open in standard
      tools and contain the user's full record set; verify any withheld categories are listed with the
      regulatory basis.
  - ref: ch10-synthesis:LENS-12
    name: Sanctions-grade availability as design anchor
    scope: foundational
    definition: The architecture treats the documented 2022 Western SaaS withdrawal from Russia and CIS
      markets as the empirical anchor against which availability, encryption, and ownership invariants
      are validated, not as a hypothetical threat model.
    must-implement: *id083
    verification: Tabletop exercise simulating sudden vendor withdrawal demonstrates continued local operation,
      retained data, and standalone software availability.
  - ref: ch11-node-architecture:NODE-08
    name: Schema registry with upcaster chain
    scope: foundational
    definition: Sunfish.Kernel.SchemaRegistry maintains event schema versions and pure-function upcasters,
      coordinates schema epochs across peers, and enables nodes at different plugin versions to interoperate.
    must-implement: *id084
    verification: ISchemaVersion contract surface present; integration test sends an N-1 schema event
      and observes correct upcasting through the chain.
  - ref: ch11-node-architecture:NODE-13
    name: Append-only durable event log
    scope: foundational
    definition: Sunfish.Kernel.EventBus exposes IEventBus for in-process publication and IEventLog for
      durable append-only persistence, with the event log as the authoritative record from which projections
      are rebuilt.
    must-implement:
    - IEventLog persists events durably in append-only fashion
    - Read-model projections are derived from the event log and may be discarded and rebuilt
    - Both file-backed (production) and in-memory (test) implementations ship with the package
    verification: Sunfish.Kernel.EventBus exposes both IEventBus and IEventLog; durability test confirms
      event survival across process restart.
  - ref: ch11-node-architecture:NODE-17
    name: ISchemaVersion contract with pure upcasters
    scope: foundational
    definition: ISchemaVersion declares the event types a plugin produces and provides a pure-function
      upcaster that lifts older event payloads to the current in-memory shape.
    must-implement:
    - Each ISchemaVersion declares event type, current canonical version, and accepted older versions
    - Upcasters are pure functions with no side effects and no I/O
    - Kernel chains upcasters incrementally from inbound version to current
    verification: Test passes an N-2 event payload through the upcaster chain and observes deterministic
      lift to current shape.
  - ref: ch12-crdt-engine-data-layer:CRDT-13
    name: Monotonic CRDT growth requires bounded mitigation
    scope: foundational
    definition: CRDT documents grow monotonically because tombstones, historical operations, and version-vector
      metadata accumulate as the document is used — this is a structural property of coordinator-free
      deterministic merge, not a flaw, and growth must be bounded rather than eliminated.
    must-implement:
    - Architecture acknowledges monotonic growth as a property and applies bounding strategies
    - At least one of library compaction, sharding, or shallow snapshots is applied per document type
    verification: Long-running soak test on a high-churn document confirms growth is bounded by the configured
      GC policy rather than unbounded.
  - ref: ch12-crdt-engine-data-layer:CRDT-14
    name: Library-level compaction
    scope: foundational
    definition: Library-level compaction is the engine's built-in pruning of tombstones and superseded
      operations, treated as a primary engine evaluation criterion because emergent-GC engines (YDotNet)
      require all-peer acknowledgment before pruning while shallow-snapshot engines (Loro) avoid that
      dependency.
    must-implement:
    - Compaction strategy is specified per chosen engine
    - For acknowledgment-dependent engines, AckVector tracking gates pruning
    verification: Engine compaction runs in an integration test and confirms operations older than the
      acknowledgment watermark are pruned without breaking convergence.
  - ref: ch12-crdt-engine-data-layer:CRDT-16
    name: Periodic shallow snapshots
    scope: foundational
    definition: A shallow snapshot captures current visible state plus a version vector encoding which
      operations are included, discards operations older than the snapshot boundary, and becomes the new
      base for subsequent deltas — opt-in per document type, with full-state transfer required for peers
      whose vector predates the boundary.
    must-implement:
    - Shallow snapshots are opt-in via stream definition
    - Snapshot boundary is recorded as a version vector
    - Peers whose vector predates the boundary fall through to full-state snapshot transfer
    verification: Trigger shallow snapshot on opt-in stream; reconnect a stale peer and assert full-state
      transfer activates rather than incremental delta.
  - ref: ch12-crdt-engine-data-layer:CRDT-18
    name: AckVector and active peer set semantics
    scope: foundational
    definition: AckVector is a compact per-document per-peer acknowledgment watermark persisted alongside
      the Layer 2 event log, and the "active peer set" is the set of peers that authenticated a CAPABILITY_NEG
      handshake within a configurable peer-staleness window (30 days default) — GC proceeds only after
      all active peers have acknowledged.
    must-implement:
    - AckVector tracks each peer's highest-indexed acknowledged operation per document
    - Active peer set membership respects a configurable staleness window
    - GC waits for all active peers to acknowledge before pruning standard-tier operations
    - Administrators may drop staleness-exceeding peers from the active set
    verification: Multi-peer simulation confirms GC blocks until all active peers ack; dropping a stale
      peer unblocks GC; returning peer enters stale-peer recovery.
  - ref: ch12-crdt-engine-data-layer:CRDT-23
    name: Double-entry ledger as canonical CP subsystem
    scope: foundational
    definition: The double-entry ledger is the correct model for value records — not a CRDT workaround
      — because its append-only, immutable, strictly-ordered, balanced-postings structure aligns directly
      with what CP positioning requires for audit integrity.
    must-implement: &id158
    - Every transaction produces at least two postings whose amounts sum to zero
    - Postings are immutable once committed; corrections occur via compensating entries
    - Immutability is enforced structurally by the append-only event log
    verification: Attempt to mutate a committed posting and confirm the operation is rejected; verify
      ledger integrity check confirms balanced postings per transaction.
  - ref: ch12-crdt-engine-data-layer:CRDT-25
    name: CQRS write/read split for ledger
    scope: foundational
    definition: The ledger applies CQRS — the immutable posting event stream is the write side, while
      balance tables, statements, aging reports, and period summaries are derived read-side projections
      that hold no data unrebuildable by replaying the event stream.
    must-implement:
    - Write path appends to the event stream only
    - Projections derive from the event stream and are rebuildable from it
    - Business rule aggregates read from the event stream or current lease-protected CP state, never from
      lagging projections
    verification: Delete projection store, replay event log, and confirm rebuilt projections match original;
      assert no business rule reads from projection-only state.
  - ref: ch12-crdt-engine-data-layer:CRDT-26
    name: Period close and rollup snapshots
    scope: foundational
    definition: At period close, the projection engine computes account balances, P&L, and cash flow as
      rollup snapshots committed as closing events to the append-only log, and any subsequent postings
      affecting a closed period are directed to adjustment accounts in the next open period — the closed-period
      log is never rewritten.
    must-implement: &id159
    - Period close emits rollup snapshot events to the append-only log
    - Postings affecting a closed period route to adjustment accounts in the next open period
    - Closed-period event log is immutable and never rewritten
    verification: Close a period, attempt a backdated posting, assert it is recorded as an adjustment
      in the current period and the closed-period log is unchanged.
  - ref: ch12-crdt-engine-data-layer:CRDT-29
    name: Layer 2 — append-only event log as source of truth
    scope: foundational
    definition: Layer 2 is the append-only CRDT and event log — the source of truth — to which every CRDT
      operation, domain event, and ledger posting is durably written (fsync on POSIX, FlushFileBuffers
      on Windows) before the application receives confirmation, with the only mutating operation being
      compaction under the three-tier GC policy.
    must-implement: *id085
    verification: Power-loss simulation confirms acknowledged writes survive recovery; static analysis
      confirms no in-place mutation API on the log; compaction test confirms snapshot equivalence.
  - ref: ch12-crdt-engine-data-layer:CRDT-31
    name: Layer 4 — content-addressed binary distribution (opt-in)
    scope: foundational
    definition: Layer 4 synchronizes binary assets across nodes using content-hash addressing as the storage
      key, providing integrity verification and deduplication as structural properties — opt-in because
      text-and-structured-data nodes do not need the infrastructure overhead.
    must-implement: *id086
    verification: Two nodes independently receive the same binary; hash comparison confirms identity and
      no redundant transfer occurs.
  - ref: ch13-schema-migration-evolution:SCH-01
    name: Multi-version schema skew across nodes
    scope: foundational
    definition: A team's nodes simultaneously run multiple schema versions because no central authority
      can force coordinated upgrade and the sync daemon cannot know a peer's schema version until handshake.
    must-implement: *id044
    verification: Multi-peer test runs three nodes at v1, v2, v3 simultaneously and verifies bidirectional
      sync produces convergent state for shared record types.
  - ref: ch13-schema-migration-evolution:SCH-02
    name: Expand-contract migration pattern
    scope: foundational
    definition: A schema modification divided into an expand phase (additive, dual-write, both old and
      new fields present) and a contract phase (removal of old field) separated by a compatibility window.
    must-implement: *id045
    verification: Migration runbook in source control documents the expand-contract decomposition for
      each schema change; CI rejects schema changes lacking a registered expand and contract step.
  - ref: ch13-schema-migration-evolution:SCH-05
    name: Compatibility window minimum duration
    scope: foundational
    definition: The expand phase must remain active long enough that all realistically deployed nodes
      have had the opportunity to upgrade, governed by the slowest-connecting node in the deployment.
    must-implement: *id087
    verification: Kernel exposes a per-peer oldest-schema-version metric queryable by the epoch coordinator;
      coordinator refuses to advance epoch if any acknowledged peer is below threshold.
  - ref: ch13-schema-migration-evolution:SCH-07
    name: Event upcaster as pure read-path transform
    scope: foundational
    definition: A pure function that transforms an event of an older type into the equivalent current-version
      event, applied on read by the semantic layer before domain logic sees the event.
    must-implement:
    - Upcasters are pure functions with no side effects
    - Semantic layer applies upcasters on read before delivering events to domain logic
    - The original event in the log is never modified by upcasting
    verification: Upcaster registry test feeds a stored V1 event to the read path and confirms domain
      logic receives a V2-shaped event while the on-disk V1 event is unchanged.
  - ref: ch13-schema-migration-evolution:SCH-08
    name: Additive change classes that skip upcasters
    scope: foundational
    definition: Two classes of schema change require no upcaster — adding a new optional field to an existing
      event type, and adding a new event variant — because absence is a defined default and unknown variants
      are quarantined.
    must-implement: *id048
    verification: Test introduces a new optional field and a new event variant, sends both to an old node,
      and confirms the optional field is defaulted and the new variant lands in the circuit breaker queue.
  - ref: ch13-schema-migration-evolution:SCH-09
    name: New event type for non-additive change
    scope: foundational
    definition: Non-additive changes such as field renames must introduce a new event type alongside the
      unmodified original, registered with an upcaster that promotes the old type to the new on read.
    must-implement:
    - Renames and structural reshuffles produce a new event type, never modify an existing one
    - The prior event type remains readable from the log indefinitely until compaction retires it
    - An upcaster bridges every retained prior version to the current shape
    verification: Audit test enumerates registered event types and confirms no event type's schema definition
      has been mutated since its first commit; SHA of each event type's definition is pinned.
  - ref: ch13-schema-migration-evolution:SCH-10
    name: Upcaster chain accumulation problem
    scope: foundational
    definition: Each new schema version adds an upcaster to the chain, producing maintenance and read-path
      complexity that grows linearly with version history unless explicitly bounded.
    must-implement: *id088
    verification: Telemetry exposes per-event-type upcaster chain depth; alert fires when depth exceeds
      configured threshold.
  - ref: ch13-schema-migration-evolution:SCH-11
    name: Mandatory stream compaction
    scope: foundational
    definition: A background copy-transform job that replays the original event stream, applies all current
      upcasters in sequence, and writes a new compacted stream where every event is in current-version
      shape.
    must-implement: *id089
    verification: Test interrupts a compaction job mid-run and confirms restart resumes from the last
      checkpoint with byte-identical output to an uninterrupted run.
  - ref: ch13-schema-migration-evolution:SCH-12
    name: Bidirectional schema lens
    scope: foundational
    definition: A pair of forward and backward transformation functions between two schema versions, where
      forward and backward must be mutual inverses up to information loss.
    must-implement: *id049
    verification: Sunfish.Kernel.SchemaRegistry startup runs round-trip tests for each registered lens;
      injecting a lens with a non-identity round-trip causes startup to fail with the failing edge name
      in the diagnostic.
  - ref: ch13-schema-migration-evolution:SCH-16
    name: Schema epoch with minimum supported version
    scope: foundational
    definition: A versioned, gossiped administrative boundary that carries a minimum supported peer version,
      below which the sync daemon refuses to synchronize the record types governed by the epoch.
    must-implement: *id090
    verification: Test announces epoch E+1 with minimum version v3; v2 peer attempting to sync a governed
      record type receives a version-gate error and does not receive partial data; non-governed types
      continue to sync.
  - ref: ch13-schema-migration-evolution:SCH-19
    name: Couch device snapshot recovery
    scope: foundational
    definition: A node returning after an absence so long that the lens graph no longer spans its version
      recovers by discarding its local event log for affected record types and downloading a current-version
      snapshot from a reachable peer.
    must-implement: *id091
    verification: Test simulates a peer offline across two epoch boundaries; on reconnect, daemon reports
      snapshot-required, snapshot resumes after connection interruption, and offline edits to governed
      types appear in the circuit breaker queue.
  - ref: ch13-schema-migration-evolution:SCH-20
    name: Copy-transform background migration
    scope: foundational
    definition: An idempotent, checkpointed background job that reads the existing event log for governed
      record types, applies all registered lenses and upcasters in sequence, and writes the result to
      a new epoch stream while sync continues uninterrupted.
    must-implement: *id092
    verification: Test interrupts the copy-transform job, restarts it, and confirms the resulting new-epoch
      stream is byte-identical to an uninterrupted run; concurrent writes during the job land in the new
      stream.
  - ref: ch13-schema-migration-evolution:SCH-21
    name: Eight-step migration runbook with reversibility gate
    scope: foundational
    definition: A sequenced operational procedure of eight steps from epoch announcement through copy-transform
      completion, where every step before the contract phase commit is fully reversible.
    must-implement:
    - Each step is observable and produces an audit record
    - Steps 1 through 6 are reversible without forward-only side effects
    - Step 7 commit is gated on quorum acknowledgment
    - Rolling back after step 7 requires issuing a new epoch, not a true revert
    verification: Runbook test simulates abort at each step 1-6 and confirms full state restoration; abort
      at step 7 requires forward-recovery via new epoch.
  - ref: ch13-schema-migration-evolution:SCH-22
    name: Non-migratable change classes
    scope: foundational
    definition: Three classes of change cannot be expressed as a bidirectional lens and require introducing
      a new document type rather than migrating the existing one — field removal with no semantic equivalent,
      CRDT type change, and field split with no deterministic inverse merge.
    must-implement:
    - Schema-change linter rejects field removals lacking a backward lens with no information loss
    - CRDT type changes are rejected at registration; replacement requires a new field
    - Field splits with non-deterministic inverse are rejected as migrations and treated as new document
      types
    verification: Schema linter test attempts each of the three forbidden change classes against an existing
      schema and confirms each is rejected with an explanation pointing to the new-document-type alternative.
  - ref: ch13-schema-migration-evolution:SCH-24
    name: Local-only archival of retired epoch streams
    scope: foundational
    definition: Retired epoch streams remain on the node operator's storage and are not replicated to
      the managed relay by default, so archival retention does not trigger a cross-border data transfer
      event.
    must-implement: &id106
    - Retired epoch streams default to local-only retention
    - Replication of archived streams to relay requires explicit opt-in
    - Retention window for archived streams is configurable per jurisdiction
    verification: Configuration audit confirms archived streams are not enumerated in default replication
      targets; opt-in requires a signed administrative event.
  - ref: ch13-schema-migration-evolution:SCH-25
    name: Crypto-shred deletion bridge to right-to-erasure
    scope: foundational
    definition: The tension between immutable archival history and storage-limitation or erasure-rights
      regulation is resolved by deleting the per-record DEK rather than rewriting the archive, rendering
      the historical record cryptographically unreadable.
    must-implement: &id107
    - Archived streams are encrypted with per-record or per-document DEKs
    - Erasure operation deletes the DEK, leaving ciphertext unreadable
    - Audit log records the DEK-deletion event without revealing plaintext
    verification: Erasure test confirms post-deletion the archived ciphertext remains on disk but is unrecoverable
      without the DEK; audit log records the operation.
  - ref: ch16-persistence-beyond-the-node:DUR-01
    name: Node as authority over data it holds
    scope: foundational
    definition: Local-first does not mean data lives only on one machine; it means the node is the authority
      over the data it holds, and persistence beyond the node is composed from explicit additional tiers.
    must-implement: &id167
    - Architecture documents how data survives device loss without ceding authority to a vendor
    - No persistence tier introduces a central server that can override the node's local authority
    verification: Architecture document specifies persistence tiers and names the authority for each tier
      as the node, not a vendor service.
  - ref: ch16-persistence-beyond-the-node:DUR-03
    name: Event log as source of truth
    scope: foundational
    definition: An append-only log of all CRDT operations and domain events is the system's source of
      truth for sync and audit; the local database is a derived projection of the log.
    must-implement: &id168
    - Append-only event log is persisted distinctly from the queryable local database
    - Local database can be rebuilt deterministically from the event log
    - Event log survives database deletion or corruption
    verification: Deleting the local database file and replaying the event log reproduces equivalent application
      state.
  - ref: ch16-persistence-beyond-the-node:DUR-09
    name: Snapshot as performance optimization over event log
    scope: foundational
    definition: A snapshot captures the current state of an aggregate at a point in time indexed to the
      last event it incorporates; snapshots are deletable and regenerable without affecting correctness
      because the event log remains the source of truth.
    must-implement: *id093
    verification: Delete the snapshot store; aggregate rehydration replays from the beginning of the event
      log and reproduces identical state.
  - ref: ch16-persistence-beyond-the-node:DUR-12
    name: CRDT garbage collection strategies
    scope: foundational
    definition: CRDT documents grow monotonically under naive storage; the architecture mitigates this
      with three named strategies — library-level compaction, application-level document sharding, and
      periodic shallow snapshots — with full-history retention as the conservative default.
    must-implement:
    - Architecture names the three mitigation strategies and their tradeoffs
    - Default policy retains full history relying on library-level compaction
    - Application-level sharding and shallow snapshots are opt-in per document type via the schema
    verification: Document schema configuration accepts opt-in flags for sharding and shallow-snapshot
      policies; defaults retain full history.
  - ref: ch16-persistence-beyond-the-node:DUR-25
    name: Plain-file export as architectural requirement
    scope: foundational
    definition: All user data must be exportable as standard formats (SQLite, JSON, CSV, original-format
      binaries, Markdown) without running the application, as a first-class architectural feature rather
      than a compliance afterthought.
    must-implement: &id171
    - Export pipeline runs from local data without network connectivity
    - Export emits relational data as SQLite, structured records as JSON, tabular data as CSV, binary
      assets in original format, and long-form text as Markdown
    - Export pipeline is exposed by `Sunfish.Foundation` as a background task with a destination-path
      contract
    - No host-application UI is prescribed by the export pipeline
    verification: Run export with network disconnected; resulting directory opens in third-party tools
      (SQLite client, text editor, spreadsheet) without application software.
  - ref: ch16-persistence-beyond-the-node:DUR-26
    name: Export determinism and completeness guarantees
    scope: foundational
    definition: The export process emits no telemetry, requires no network, produces deterministic output
      (identical state yields identical export), and includes every record the local node holds — full
      records as content, stubs as metadata-plus-hash.
    must-implement: &id172
    - Export emits zero network requests during execution
    - Identical local state produces byte-identical export directory contents (modulo timestamps in UTC
      ISO 8601 filenames)
    - Stubs are exported as metadata plus content hash with content field absent and a documented note
    - No record present in the local database is omitted from export
    verification: Run export twice over identical state; diff confirms identical contents. Capture network
      traffic during export; confirm zero outbound requests.
  - ref: ch16-persistence-beyond-the-node:DUR-28
    name: Markdown as long-now format
    scope: foundational
    definition: Markdown is included as an export format for long-form document content because it is
      simultaneously human-readable in any text editor, machine-parseable by any competent library, and
      version-control friendly without specialized tooling.
    must-implement: &id173
    - Long-form document content (notes, descriptions, inline text) is exported as Markdown
    - Markdown export does not require application-specific tooling to read or parse
    verification: Open any Markdown export file in a plain text editor; content is human-readable without
      rendering.
  - ref: ch17-building-first-node:BUILD-07
    name: Engine-owned persistence (no explicit save)
    scope: foundational
    definition: The CRDT engine persists every applied update automatically into the encrypted store,
      so application code never issues a save call and a reopened document returns with all prior updates
      intact.
    must-implement: *id019
    verification: Apply an update, kill the process before any user-initiated save, restart, and confirm
      the update is present.
  - ref: ch18-migrating-existing-saas:MIG-01
    name: Reversible four-phase migration model
    scope: foundational
    definition: A SaaS-to-local-first migration runs in four sequential phases where every gate below
      the final phase is reversible without data loss, replacing rewrite-everything cutover with phase-bounded
      engineering investment.
    must-implement: &id175
    - Migration plan declares four named phases with explicit entry and exit criteria
    - Phases 1 through 3 are demonstrably reversible by reverting configuration alone, no data migration
      required
    - Phase 4 is bounded to one workspace at a time and never run fleet-wide
    - Each phase delivers user-visible value independently so the team may pause indefinitely between
      phases
    verification: Migration runbook exists naming the four phases with per-phase rollback procedure; rollback
      procedures for Phases 1 through 3 are exercised in a staging environment without invoking a data
      migration job.
  - ref: ch18-migrating-existing-saas:MIG-02
    name: Five migration triggers
    scope: foundational
    definition: A team justifies migrating a hosted SaaS to local-first only when at least one of five
      named business triggers applies — compliance mandate, data-residency objection in enterprise sales,
      vendor reliability or termination event, churn driven by data sovereignty, or procurement review
      blocking adoption.
    must-implement: &id176
    - Migration proposal cites at least one of the five named triggers with concrete evidence from customer
      or regulator interactions
    - Aesthetic, fashion, or curiosity-driven justifications are explicitly rejected as insufficient
    verification: Migration kickoff document names the triggering condition with linked customer or regulatory
      evidence, reviewed by a non-engineering stakeholder before engineering investment begins.
  - ref: ch18-migrating-existing-saas:MIG-03
    name: Five-filter eligibility framework applied per record class
    scope: foundational
    definition: Migration eligibility is determined by running each record class through five filters
      covering ownership, staleness tolerance, conflict resolvability, offline value, and compliance posture,
      with the result selecting Zone B, Zone C, or no migration at all.
    must-implement: *id094
    verification: A filter-result table exists with one row per record class and five filter columns,
      archived in the migration plan.
  - ref: ch18-migrating-existing-saas:MIG-09
    name: Append-only event tables as migration seam
    scope: foundational
    definition: Domain state is stored as append-only event rows for mutable aggregates rather than last-write-wins
      field mutations, providing a mechanical replay path from server events to equivalent CRDT operations.
    must-implement:
    - Mutable aggregates are stored as append-only event tables not nullable-column tables
    - Each event row carries enough information to replay as a CRDT operation
    - New mutable field columns are rejected in code review on the migration path
    verification: Schema review identifies aggregate tables and confirms append-only event-row structure;
      replay job transforms event rows into CRDT operations and asserts projection equivalence.
  - ref: ch18-migrating-existing-saas:MIG-15
    name: Phase 2 reversibility via CRDT log preservation
    scope: foundational
    definition: Phase 2 is reversible per domain by disabling CRDT writes, returning authority to the
      server API while preserving the CRDT event log so local authority can be re-enabled later by replay.
    must-implement: &id177
    - CRDT writes can be disabled per domain via configuration
    - The CRDT event log is preserved on rollback, not deleted
    - A re-enable path exists that replays the preserved log
    - Pausing indefinitely at Phase 2 is treated as a respectable terminal state
    verification: Per-domain rollback procedure is exercised on a staging tenant; re-enable replay produces
      the expected projection without loss.
  - ref: ch18-migrating-existing-saas:MIG-18
    name: Phase 4 copy-transform-validate with projection diff
    scope: foundational
    definition: Phase 4 migrates an existing workspace by reading its server-side domain events, transforming
      each into a CRDT operation, projecting both stores, and asserting projection equivalence under a
      declared comparison contract before switching the write path.
    must-implement:
    - Migration job reads domain events from the existing event store
    - Each event is transformed into an equivalent CRDT operation by a per-aggregate transformer
    - Postgres projection and CRDT projection are compared under a declared equivalence contract covering
      field equality, collection membership, and type coercions
    - The diff fails fast on first divergence with a logged diff object
    - The write path switch occurs only after a clean diff
    - Diff failures hold the workspace at Phase 2 pending transformer correction
    - The migration job is idempotent and may be rerun until the diff is empty
    verification: A pilot workspace migration produces a clean projection diff and the diff report is
      archived; chaos test injects a transformer bug and confirms fail-fast hold at Phase 2.
  - ref: ch18-migrating-existing-saas:MIG-19
    name: Phase 4 per-workspace one-way door with 30-day stabilization
    scope: foundational
    definition: Phase 4 is opt-in per workspace, runs incrementally one workspace at a time, holds each
      migrated workspace for 30 days on Phase 3 before treating the migration as stable, and is not reversible
      without re-running the copy-transform in reverse.
    must-implement: &id178
    - Phase 4 is never run fleet-wide in a single batch
    - A pilot workspace runs first and is observed for 30 days before any expansion
    - The Postgres write path stays disabled for the 30-day stabilization without rollback requests
    - Re-migration from Phase 4 back to Phase 2 is documented as expensive and error-prone, requiring
      inverse copy-transform
    - The CRDT event log becomes the system of record after the 30-day window
    verification: Migration runbook documents the per-workspace cadence and the 30-day hold; rollout dashboard
      tracks per-workspace days-since-cutover.
  - ref: ch18-migrating-existing-saas:MIG-20
    name: Phase transition gates with hard stops
    scope: foundational
    definition: Each phase transition is governed by an explicit gate question with a named hard-stop
      condition — CP-class write regression blocks Phase 1 to 2, merge data loss blocks Phase 2 to 3,
      projection-diff failure blocks fleet rollout from Phase 3 to 4.
    must-implement:
    - A change-advisory-board decision is required at each transition, not a calendar event
    - Each transition documents the gate question and the named hard stop
    - Hard-stop conditions block the transition unconditionally when triggered
    verification: CAB record exists per transition with the gate question, evidence, and decision; hard-stop
      simulation in staging confirms the transition is blocked.
  - ref: ch19-shipping-to-enterprise:ENT-01
    name: Dual-license structure with commercial exception
    scope: foundational
    definition: The open-source core ships under AGPLv3 by default with a parallel commercial license
      offered to organizations that cannot accept the network-use clause.
    must-implement: &id179
    - Repository contains a LICENSES/ directory holding both the AGPLv3 text and a commercial license
      template
    - The commercial license grants internal-modification rights, warranty, and a security-patch SLA
    - Dual-license offer is discoverable from the repository without a sales conversation
    verification: Repository inspection finds both license texts under LICENSES/ and a top-level NOTICE
      or README pointer to the commercial exception
  - ref: ch19-shipping-to-enterprise:ENT-02
    name: Contributor License Agreement precondition
    scope: foundational
    definition: An inbound-equals-outbound CLA is in place before any external contribution is accepted,
      preserving the legal authority to offer the commercial license exception.
    must-implement: &id180
    - A CLA is signed by every external contributor before merging any contributed code
    - The CLA grants inbound rights sufficient to relicense under the commercial exception
    - CI blocks pull requests from contributors lacking a recorded CLA signature
    verification: Repository CI configuration enforces a CLA-check status before merge; a signed CLA record
      exists for every author in git history
  - ref: ch20-ux-sync-conflict:UX-18
    name: Invisible recovery from unexpected shutdown
    scope: foundational
    definition: After a power-loss or OS-kill termination the node validates the last write-ahead checkpoint,
      replays pending writes from the CRDT log, and surfaces a single short status only when replay takes
      more than two seconds — never a crash dialog.
    must-implement: *id025
    verification: Killing the node mid-write and relaunching opens the workspace at the prior state; injecting
      a long-replay condition surfaces the documented status string and no crash dialog.
  - ref: epilogue-what-the-stack-owes-you:EPI-06
    name: Non-technical disaster recovery
    scope: foundational
    definition: A non-technical user must be able to restore complete data after a device failure without
      contacting support, using a backup, restore, and verification UX legible to someone who is not an
      engineer.
    must-implement: &id184
    - Backup UX surfaces backup state and recency without technical vocabulary
    - Restore UX guides recovery from a fresh device end-to-end
    - Verification UX confirms restored data integrity to a non-technical user
    verification: A non-technical tester completes device-loss recovery scenario without engineering assistance
      and confirms data integrity.
  - ref: epilogue-what-the-stack-owes-you:EPI-07
    name: Plain-file export without vendor cooperation
    scope: foundational
    definition: User data is available on local disk in a documented file format under user-controlled
      keys, allowing the user to leave the platform at any time without negotiating with the vendor or
      depending on its continued operation.
    must-implement: &id185
    - Export format is publicly documented
    - Export proceeds entirely from local disk and local key material
    - No vendor service is required to produce or interpret an export
    verification: Disconnect network and revoke vendor accounts; user produces a complete export and a
      third-party tool reads it using only the public format spec and the user's keys.
  - ref: epilogue-what-the-stack-owes-you:EPI-10
    name: Long-now archival format beyond CRDT log
    scope: foundational
    definition: Because the CRDT event log is not a stable archival format, long-horizon durability requires
      snapshots in standardized formats (signed append-only logs, documented export schemas) that the
      architecture has not yet specified.
    must-implement:
    - Architecture identifies a stable archival snapshot format separate from the live CRDT log
    - Periodic snapshot generation is specified
    - Snapshot format is consumable without a running CRDT engine
    verification: Snapshot specification document exists; a snapshot can be opened and read by a tool
      that has no CRDT engine in its dependency tree.
  - ref: appendix-b-threat-model-worksheets:THREAT-05
    name: Relay service termination
    scope: foundational
    definition: The threat that a relay operator withdraws service due to jurisdiction restriction, sanctions,
      or commercial decision, producing total relay unavailability.
    must-implement: *id095
    verification: Disconnect the relay; nodes continue local operation and reachable peer-to-peer sync
      without degradation.
  - ref: appendix-c-further-reading:READ-01
    name: Kleppmann seven local-first ideals
    scope: foundational
    definition: The seven aspirational properties — fast local performance (P1), multi-device access (P2),
      network-optional operation (P3), seamless collaboration (P4), longevity beyond vendor lifespan (P5),
      security and privacy by default (P6), and ultimate user ownership (P7) — that together define local-first
      software per Kleppmann et al. (Onward! 2019).
    must-implement: *id003
    verification: Conformance scorecard maps every architectural choice to one or more of P1-P7; no property
      is left unaddressed.
  - ref: appendix-c-further-reading:READ-07
    name: Cambria lens-based schema evolution
    scope: foundational
    definition: The Ink and Switch Cambria abstraction (2021) of bidirectional lenses that translate documents
      between schema versions N and N+1 without data loss, which is the conceptual foundation for the
      Chapter 13 schema migration approach.
    must-implement: *id096
    verification: Schema migration tests demonstrate round-trip lens application preserves data on a fleet
      running mixed schema versions.
  - ref: appendix-c-further-reading:READ-08
    name: Vendor dependency risk as empirical case
    scope: foundational
    definition: The composite 2022 record of Western SaaS providers suspending, restricting, or terminating
      service across Russia, Belarus, and adjacent CIS markets, treated by the book as the empirical case
      study justifying the local-first thesis against vendor dependency.
    must-implement: &id196
    - Architecture has no single vendor whose unilateral action can revoke customer access to their own
      data
    - Core operations continue when any one external vendor terminates service
    - Data export from any vendor-managed component is possible at any time without vendor cooperation
    verification: Tabletop exercise confirms that simulated termination of any single vendor does not
      block customer access to their own data.
  - ref: appendix-d-testing-the-inverted-stack:TEST-01
    name: Five-level testing pyramid
    scope: foundational
    definition: A tiered test architecture in which CRDT property tests, real-dependency integration tests,
      fault injection, deterministic simulation, and chaos testing each run at a defined cadence with
      mandatory pass conditions before first production release.
    must-implement: *id066
    verification: CI configuration shows distinct jobs for each level with the prescribed triggers and
      time budgets, and every scenario in the suite carries an explicit pass condition.
  - ref: appendix-d-testing-the-inverted-stack:TEST-07
    name: CRDT growth tests for bounded resource use
    scope: foundational
    definition: A weekly and pre-release test class that simulates median-vertical usage at 30, 90, and
      365 day horizons and measures CRDT document size to verify the system stays within its configured
      storage budget, that compaction reduces size when fired, and that per-shard size stays below the
      shallow snapshot threshold.
    must-implement: *id097
    verification: Weekly CI job runs the growth simulation and emits per-horizon size metrics that the
      build gate compares to budget thresholds.
  - ref: appendix-d-testing-the-inverted-stack:TEST-08
    name: Mandatory partition and reconnect scenarios
    scope: foundational
    definition: A required scenario set covering 30-day offline divergence with merge, 90-day extended-offline
      baseline with intermittent windows, CP quorum loss, 1,000+ queued operations on standard and constrained
      hardware, abrupt power interruption during WAL write, and 30-day air-gapped operation, each with
      explicit pass conditions before first production release.
    must-implement: *id070
    verification: Test report archives per-scenario pass/fail with CRDT state dumps, network captures
      showing zero relay traffic during air-gap, and recovery logs after each WAL kill.
  - ref: appendix-d-testing-the-inverted-stack:TEST-09
    name: Schema migration scenarios across version skew
    scope: foundational
    definition: A required scenario set covering N-to-N-1 bidirectional sync via lenses, offline epoch
      transition recovery without manual intervention, and the couch-device case where a node lagging
      3+ major versions is rejected at capability negotiation rather than migrated lossily.
    must-implement: &id197
    - Exchange CRDT deltas between schema N and schema N-1 nodes with bidirectional lens translation and
      no data loss
    - Allow an offline node to download the post-transition epoch snapshot and resume sync without operator
      intervention
    - Reject capability negotiation with ERR_VERSION_INCOMPATIBLE when the schema gap exceeds the configured
      maximum
    - Encode the maximum auto-bridged schema gap as an explicit policy and test the boundary
    verification: Test suite includes mixed-version pairs, an offline-during-epoch fixture, and an over-gap
      connection attempt asserting the precise error code and update prompt.
  - ref: appendix-d-testing-the-inverted-stack:TEST-11
    name: Security scenarios for encryption, key rotation, and audit
    scope: foundational
    definition: A required scenario set producing regulator-grade evidence covering SQLCipher unreadability
      without keys, post-rotation key revocation, historical document re-keying under a new KEK, data-boundary
      negative tests with relay disabled, relay-operator inability to decrypt, attestation revocation,
      and tamper-evident audit trail completeness.
    must-implement: &id108
    - Verify a copied SQLCipher file is unreadable without the encryption key
    - Verify a revoked member receives ERR_KEY_REVOKED and cannot decrypt documents written after rotation
    - Re-wrap all DEKs from KEK version K to K+1 with no document accessible under the old KEK and all
      accessible under the new
    - Capture full network egress while relay is disabled and assert zero relay-destination packets
    - Capture all relay-transiting bytes and verify ciphertext cannot be decrypted with relay-side keys
      alone
    - Reject attestation bundles whose issuer appears on the revocation list with ERR_KEY_REVOKED and
      a logged audit entry
    - Verify the audit log holds every operation in strict monotonic sequence with a passing tamper-evidence
      integrity check
    verification: Per-scenario evidence column captures packet captures, audit log exports with verified
      Merkle root, relay log entries with issuer fingerprint, and ciphertext samples — archived per release.
  - ref: appendix-d-testing-the-inverted-stack:TEST-13
    name: Tiered CI configuration with archived test artefacts
    scope: foundational
    definition: A four-tier CI configuration (per-PR, nightly, weekly/RC, pre-major-release) that gates
      merges on L1+L2, runs L3 nightly, executes L4 simulation weekly or per RC, and runs L5 chaos before
      major releases, with archived test report, scenario evidence, harness configuration, and SBOM per
      release.
    must-implement: &id109
    - Gate every PR merge on L1 (<5 min) and L2 (<15 min) tests
    - Run L3 nightly within a 2-hour budget with P1 incident on failure
    - Run L4 simulation weekly and on RC tags, blocking the RC on failure
    - Run L5 chaos for 24–48 hours before major release on a permanently maintained representative staging
      environment
    - Capture and archive per-release test report, scenario evidence, harness configuration, and SBOM
      tied to the release version and code SHA
    verification: CI definitions show four named tiers with the prescribed triggers, time budgets, and
      artefact-upload steps producing an archive linked to each release tag.
  - ref: appendix-f-regulatory-coverage:COMP-01
    name: GDPR Article 17 right-to-erasure via crypto-shredding
    scope: foundational
    definition: An EU-mandated individual right to erasure that local-first architectures answer by destroying
      the per-record DEK so encrypted CRDT history becomes unrecoverable, with the lawfulness of crypto-shred-as-erasure
      remaining unsettled across CNIL and German DPAs.
    must-implement: &id110
    - Per-record or per-tenant DEKs are independently destroyable
    - Operator documentation describes the crypto-shred procedure as the Article 17 mechanism
    - Residual CRDT metadata (operation IDs, timestamps, DAG position) is enumerated for jurisdictional
      review
    - Legal review precedes any production reliance on crypto-shred for Article 17 responses
    verification: After erasure, the targeted record's ciphertext remains but no DEK path exists to decrypt
      it; an ADR documents the chosen erasure mechanism and its jurisdictional caveats
  - ref: appendix-f-regulatory-coverage:COMP-02
    name: GDPR Article 30 records-of-processing at the node level
    scope: foundational
    definition: A GDPR requirement that processing activities be logged in a controller-accessible record,
      satisfied in local-first architectures by per-node processing logs rather than centralized SaaS
      audit trails.
    must-implement: &id111
    - Each node maintains a processing record covering purpose, categories of data, and retention
    - Records are exportable for controller and DPA inspection
    - The 72-hour Article 33 breach-notification window is the shortest assumed deadline absent stricter
      local rules
    verification: A node export produces an Article-30-compliant processing record without requiring vendor
      cooperation
  - ref: appendix-f-regulatory-coverage:COMP-05
    name: UAE Federal DPL 2022 Article 16 erasure right
    scope: foundational
    definition: A UAE federal data protection rule establishing an Article 16 erasure right for processing
      outside DIFC and ADGM, carrying the same crypto-shredding sufficiency tension as GDPR Article 17.
    must-implement: &id112
    - Erasure mechanism for UAE federal-jurisdiction tenants is the same crypto-shred path as GDPR Article
      17
    - Documentation distinguishes UAE federal tenancy from DIFC-licensed tenancy
    verification: A UAE federal tenant erasure request produces the same crypto-shred audit artifacts
      as a GDPR Article 17 request
  - ref: appendix-f-regulatory-coverage:COMP-06
    name: India DPDP Act 2023 Section 12 erasure rights
    scope: foundational
    definition: India's omnibus data protection statute establishes a Section 12 erasure right parallel
      to GDPR Article 17, with implementing rules pending and BFSI deployments layered with the RBI localization
      circular.
    must-implement: &id113
    - DPDP-jurisdiction tenants receive the same crypto-shred erasure path as GDPR Article 17
    - BFSI tenancy is segregated from non-BFSI to allow stricter residency enforcement
    verification: A DPDP Section 12 erasure request produces a documented crypto-shred audit trail for
      the targeted record
  - ref: appendix-f-regulatory-coverage:COMP-09
    name: China PIPL plus MLPS 2.0 strict cross-border restriction
    scope: foundational
    definition: PIPL Article 47 erasure rights combined with MLPS 2.0 security classification create one
      of the strictest cross-border transfer regimes globally, generally requiring personal data of Chinese
      residents to remain inside China.
    must-implement: *id098
    verification: A China-tenant deployment audit confirms node residency, MLPS classification, and absence
      of unauthorized cross-border egress
  - ref: appendix-f-regulatory-coverage:COMP-10
    name: Japan APPI Article 36 cross-border consent and erasure
    scope: foundational
    definition: The 2022-revised Japanese APPI introduces Article 36 cross-border transfer consent and
      an erasure-equivalent right that inherits the same CRDT-history-versus-DEK-destruction tension as
      GDPR Article 17.
    must-implement: &id114
    - Cross-border transfer of APPI-scoped data records consent provenance per data subject
    - Erasure mechanism for APPI-scoped tenants is the same crypto-shred path as GDPR Article 17
    verification: A Japan-tenant erasure request produces a crypto-shred audit trail and any cross-border
      transfer carries an attached consent record
  - ref: appendix-f-regulatory-coverage:COMP-11
    name: South Korea PIPA plus ISMS-P procurement certification
    scope: foundational
    definition: South Korea's PIPA establishes erasure rights and ISMS-P functions as a procurement-required
      certification that the local-first vendor must produce alongside SOC 2 and ISO 27001 documentation.
    must-implement: &id115
    - Korean-tenant erasure path matches the GDPR Article 17 crypto-shred mechanism
    - ISMS-P artifacts are produced as part of the compliance-packaging deliverable for Korean enterprise
      procurement
    verification: An ISMS-P artifact exists in the procurement-evidence bundle and an erasure dry-run
      produces a PIPA-suitable audit trail
  - ref: appendix-f-regulatory-coverage:COMP-12
    name: Africa parallel mandates (NDPA, POPIA, Kenya DPA)
    scope: foundational
    definition: A coherent set of African data-protection statutes (Nigeria NDPA 2023, South Africa POPIA
      Sections 24 and 72, Kenya DPA 2019 Section 40) establishing erasure rights and cross-border transfer
      prohibitions to non-adequate countries that mirror the GDPR structural argument for on-device residency.
    must-implement: &id116
    - Erasure path for African-jurisdiction tenants matches the GDPR Article 17 crypto-shred mechanism
    - Cross-border transfers from POPIA-scoped tenants verify destination adequacy under Section 72
    - Sectoral BFSI and telecom localization obligations are identified per tenant
    verification: A POPIA Section 72 transfer review and a per-tenant sectoral-obligation register exist
      and are kept current
  - ref: appendix-f-regulatory-coverage:COMP-13
    name: LATAM erasure-rights cluster (LGPD, LFPDPPP ARCO)
    scope: foundational
    definition: A Latin American cluster of statutes (Brazil LGPD Article 18, Mexico LFPDPPP ARCO cancellation
      right, Colombia Ley 1581, Argentina Ley 25.326) establishing erasure rights parallel to GDPR Article
      17 with the ANPD's stance on crypto-shredding still unsettled.
    must-implement: &id117
    - Erasure path for LATAM-jurisdiction tenants matches the GDPR Article 17 crypto-shred mechanism
    - LGPD-tenant documentation flags ANPD's open position on crypto-shred sufficiency
    verification: An LGPD Article 18 erasure dry-run produces a crypto-shred audit trail and an open-question
      note for ANPD review
  - ref: appendix-f-regulatory-coverage:COMP-14
    name: US sector-specific frameworks (HIPAA, FedRAMP, ITAR)
    scope: foundational
    definition: The absence of a US omnibus privacy law leaves sector-specific regimes — HIPAA for PHI,
      FedRAMP for federal cloud authorization, ITAR/EAR for export-controlled technology, CCPA/CPRA for
      California consumer rights — each addressed by on-device encryption and sovereign deployment patterns.
    must-implement: &id118
    - HIPAA-scoped PHI is encrypted at rest using the same per-record DEK pattern as GDPR-scoped data
    - ITAR-scoped or EAR-scoped deployments restrict node residency to authorized jurisdictions and personnel
    - FedRAMP-relevant deployments produce the procurement-evidence bundle required for federal authorization
    - California-resident-tenant nodes honor CCPA and CPRA consumer-rights requests through the same erasure
      path
    verification: A US-tenant deployment registers each applicable sectoral framework and produces the
      corresponding evidence artifacts on demand
  P6:
  - ref: ch01-when-saas-fights-reality:THESIS-07
    name: Third-party veto over vendor-custodied data
    scope: foundational
    definition: A failure mode in which an external authority — sanctions regime, data residency regulator,
      court order, or national security designation — compels the vendor to suspend service or compels
      the customer to cease use, ending the relationship regardless of either party's preferences because
      data custody at the vendor concentrates the exposure surface there.
    must-implement: *id099
    verification: Specification documents the data custody boundary; deployment guide demonstrates substituting
      a user-controlled relay for a vendor relay with no application-level changes.
  - ref: ch01-when-saas-fights-reality:THESIS-10
    name: Asymmetric exposure of small-and-medium organizations
    scope: foundational
    definition: The observation that the SaaS bundle's undesirable conditions fall hardest on small and
      medium professional service firms because they sign standard terms without negotiated SLA, escrow,
      or portability clauses, while bearing direct professional, regulatory, and client-relationship consequences
      from any of the six failure modes.
    must-implement: &id124
    - The architecture provides default protections (data custody, portability, durability) without requiring
      per-customer contractual negotiation
    - Compliance posture for regulated professions (legal, medical, construction, finance) is met by default
      deployment, not by enterprise add-ons
    verification: Default deployment of the architecture passes a representative SMB compliance checklist
      (HIPAA, professional responsibility, jurisdictional residency) without enterprise-tier features
      enabled.
  - ref: ch02-local-first-serious-stack:LF-06
    name: Security and privacy by default
    scope: foundational
    definition: Data is encrypted end-to-end at rest and in transit by default, with key control held
      by the user rather than the vendor, raising the cost of compromise from one breach exposing all
      users to one breach exposing one user.
    must-implement:
    - Data at rest is encrypted under keys the user controls
    - Data in transit is end-to-end encrypted between authorized peers
    - Vendor or relay infrastructure cannot decrypt user data
    - Compromise of one node yields one user's data, not all users' data
    verification: Confirm relay or vendor infrastructure handles ciphertext only; confirm key material
      does not leave user-controlled hardware; threat-model worksheet demonstrates one-node-compromise
      containment.
  - ref: ch02-local-first-serious-stack:THESIS-01
    name: Seven properties as a minimum bar, not a wishlist
    scope: foundational
    definition: The seven Kleppmann properties function as a calibrated filter that fails any system satisfying
      only a subset, not as a menu from which an implementer may select.
    must-implement: *id001
    verification: Conformance scorecard reports per-property pass/fail in addition to any gradient score;
      overall conformance requires all seven to pass.
  - ref: ch02-local-first-serious-stack:THESIS-04
    name: No-novel-cryptography discipline
    scope: foundational
    definition: Property 6 is feasible only when audited cryptographic primitives (libsodium, age, Argon2id
      reference) are used opaquely and a DEK/KEK hierarchy composes them against a specification reviewed
      by a cryptographic engineer, never when novel cryptography is invented.
    must-implement:
    - All cryptographic primitives come from audited reference libraries
    - No new cipher, KDF, or protocol construction is invented in-house
    - Key hierarchy composition is reviewed by a credentialed cryptographic engineer before deployment
    verification: SBOM lists cryptographic dependencies; design review record names the cryptographic
      engineer who approved the key hierarchy; no in-house cipher implementations are present in the codebase.
  - ref: ch03-inverted-stack-one-diagram:INV-16
    name: The Security Breach as hidden-exposure reveal
    scope: foundational
    definition: SaaS exposes users to a structurally invisible failure mode — vendor-side breach of decryptable
      copies — that the inverted architecture neutralizes by ensuring the relay only ever holds ciphertext
      sealed under per-document DEKs wrapped by role KEKs whose keys never leave the originating node.
    must-implement: &id126
    - Per-document data encryption keys (DEKs) are generated and held only on originating nodes
    - DEKs are wrapped by role-scoped key encryption keys (KEKs) at the source node
    - No relay or hosted infrastructure component receives any DEK or KEK material
    - A complete breach of relay infrastructure exposes no decryptable content
    verification: Threat-model audit demonstrates no key material crosses the node boundary; relay breach
      simulation produces only ciphertext payloads with no path to plaintext.
  - ref: ch04-choosing-your-architecture:DEC-09
    name: Four required local-first engineering skills
    scope: foundational
    definition: The four engineering skills that separate local-node development from standard web application
      development — CRDT debugging, distributed state management, multi-version schema migration, and
      key management.
    must-implement: *id076
    verification: Capability matrix documents named owners for each of the four skills; key compromise
      recovery procedure exists in writing before the first production deployment date is set.
  - ref: ch05-enterprise-lens:LENS-E-03
    name: Build-time SBOM generation in CycloneDX format
    scope: foundational
    definition: A Software Bill of Materials is generated at build time from source by the CI pipeline
      in CycloneDX format, scanned against vulnerability databases before release, and published with
      each release artifact.
    must-implement: *id100
    verification: CI pipeline configuration shows Syft (or equivalent) producing CycloneDX SBOM at build,
      Grype (or equivalent) scanning before release; release artifact directory contains the SBOM file
      for the corresponding binary.
  - ref: ch05-enterprise-lens:LENS-E-04
    name: Signed and notarized installer with trusted-publisher compatibility
    scope: foundational
    definition: Installers are code-signed and notarized using each platform's enterprise-grade signing
      path so that the software can be added to organizational trusted-publisher lists and deployed via
      MDM without disabling endpoint security policies.
    must-implement:
    - macOS installer is signed with an Apple Developer ID and notarized
    - Windows installer is Authenticode-signed and compatible with App Control for Business (WDAC) trusted-publisher
      policies
    - Installer supports silent installation without user elevation in MDM-managed deployments
    - No installation step requires disabling platform security policies
    verification: Release artifact passes platform notarization checks; deployment dry run via Intune
      or equivalent silently installs the software on a managed endpoint with default security policies
      enabled.
  - ref: ch05-enterprise-lens:LENS-E-05
    name: CVE response service-level commitment
    scope: foundational
    definition: The project commits to a public service-level agreement on vulnerability response, with
      critical CVEs addressed within fourteen days of disclosure and a public advisory posted within forty-eight
      hours of patch release.
    must-implement:
    - Critical CVEs are addressed by a patch release within fourteen days of disclosure
    - A public security advisory is posted within forty-eight hours of patch availability
    - SLA terms are published in the project's security policy
    - SBOM-driven scanning surfaces affected dependencies in time to meet the SLA
    verification: Project security policy publishes the CVE response SLA; historical advisories show patch-to-disclosure
      intervals within the committed window.
  - ref: ch05-enterprise-lens:LENS-E-06
    name: Defined incident response runbook
    scope: foundational
    definition: A formal incident response runbook accompanies the architecture, specifying triggering
      events, artifact collection sequence, chain of custody requirements, escalation path, and jurisdiction-specific
      regulatory notification windows, distinct from and complementary to the CRDT audit trail.
    must-implement: &id131
    - Runbook enumerates the triggering events (suspected unauthorized node access, unauthorized device
      in sync mesh, key compromise, relay-traffic exfiltration)
    - Runbook specifies which artifacts are collected from which systems in what order
    - Runbook defines chain-of-custody procedures for collected artifacts
    - Runbook defines escalation timing (CISO within one hour, legal within four hours when personal data
      is implicated)
    - Runbook enumerates per-jurisdiction regulatory notification windows (GDPR Article 33 72 hours, HIPAA
      60 days, DPDP, PIPA, PIPL, NDPR, POPIA, LGPD, 242-FZ) with cross-reference to Appendix F
    verification: Companion runbook document exists alongside architecture spec; runbook contains each
      enumerated section; tabletop exercise executes the runbook end-to-end against a simulated incident.
  - ref: ch05-enterprise-lens:LENS-E-07
    name: CRDT audit trail as forensic asset distinct from procedure
    scope: foundational
    definition: The tamper-evident append-only CRDT operation log is positioned and documented as a forensic
      asset that supports incident response, not as a substitute for a defined incident response procedure.
    must-implement:
    - Every write operation is recorded in a tamper-evident append-only operation log
    - Sync daemon can reconstruct full record history from the operation log
    - Documentation distinguishes the audit trail (forensic asset) from the runbook (procedure)
    - Audit-trail outputs are referenced as inputs to runbook artifact collection steps
    verification: Architecture documentation explicitly separates audit-trail capability from incident
      response procedure; runbook references audit-trail extraction as a defined collection step.
  - ref: ch05-enterprise-lens:LENS-E-09
    name: Enterprise network footprint and proxy compatibility
    scope: foundational
    definition: The node exposes no inbound ports on external interfaces, routes all relay traffic exclusively
      over port 443 with TLS 1.3, and respects system proxy configuration including PAC files, authenticating
      proxies, and TLS-inspecting corporate proxies via documented bypass-list format.
    must-implement: *id101
    verification: Network audit on a managed endpoint confirms zero inbound listeners and port-443-only
      outbound; proxy compatibility test passes the daemon through a PAC-configured authenticating proxy
      and through a TLS-inspecting proxy with a documented bypass entry.
  - ref: ch05-enterprise-lens:LENS-E-15
    name: Structural data residency by jurisdiction
    scope: foundational
    definition: Local-first data custody satisfies data-residency requirements across major regulatory
      regimes (GDPR/Schrems II, India DPDP, UAE DIFC DPL 2020, Russian import-substitution, and the full
      Appendix F matrix) as a structural property of the deployment rather than as a configuration option.
    must-implement: &id133
    - User data resides on user-controlled infrastructure by default of the architecture
    - Compliance with named regulatory regimes does not require special configuration toggles
    - Architecture operates without dependency on Western cloud services so that import-substitution-style
      regimes are satisfied
    - Per-jurisdiction coverage is enumerated in Appendix F
    verification: Compliance documentation maps each named regime to the architectural property that satisfies
      it; deployment audit confirms no Western cloud dependency exists in the default node configuration.
  - ref: ch06-distributed-systems-lens:LENS-D-13
    name: Schema-validation gate at CRDT store entry
    scope: foundational
    definition: Before an operation is applied locally and queued for gossip, the sync daemon validates
      it against the current schema definition for the operation's record type, quarantining structurally
      valid but semantically incorrect operations rather than letting them propagate.
    must-implement: *id034
    verification: Sync daemon code path shows schema validation between deserialization and CRDT store
      apply; behavioral test injects a structurally valid but schema-violating operation and confirms
      it is quarantined rather than applied or propagated.
  - ref: ch07-security-lens:LENS-S-01
    name: Send-tier subscription filtering
    scope: foundational
    definition: Subscription filtering is enforced at the sync daemon's send tier so that a node lacking
      the required role attestation never receives the operations, eliminating any reliance on the application
      or UI to discard data it should not have.
    must-implement: &id134
    - Sync daemon evaluates subscription scope before transmitting any operation
    - Application layer never receives operations the role is not authorized for
    - UI components and API handlers contain no visibility-filtering logic for role-scoped data
    verification: Black-box test in which a node without a role attestation observes zero matching operations
      on the wire and zero matching rows in local storage
  - ref: ch07-security-lens:LENS-S-02
    name: Distributed attack surface acknowledgment
    scope: foundational
    definition: Distributing data to endpoints does not eliminate the honeypot problem; it relocates the
      honeypot to the weakest endpoint in a heterogeneous fleet whose security posture sets the effective
      bound for any data that endpoint holds.
    must-implement: &id135
    - Threat model documents endpoint compromise as an expected event
    - Architecture bounds blast radius by role scope rather than denying endpoint exposure
    verification: Threat-model document enumerates endpoint compromise as in-scope and states that the
      weakest endpoint sets the data-at-risk bound for that endpoint's roles
  - ref: ch07-security-lens:LENS-S-03
    name: DEK/KEK envelope encryption hierarchy
    scope: foundational
    definition: A four-level hierarchy in which the root organization key wraps role KEKs, role KEKs are
      wrapped per authorized node with each node's public key, role KEKs wrap per-record DEKs, and DEKs
      encrypt ciphertext using a symmetric cipher.
    must-implement: &id136
    - Each document is encrypted by a per-record DEK
    - Each role holds a KEK that wraps the DEKs for documents in that role
    - Role KEKs are wrapped per authorized node using that node's public key
    - Root organization key wraps role KEKs and is held outside any per-node keystore
    verification: Key hierarchy diagram and code path demonstrate that decrypting any document requires
      unwrapping in the documented order from node key to role KEK to DEK to plaintext
  - ref: ch07-security-lens:LENS-S-04
    name: Key compromise response procedure
    scope: foundational
    definition: A specified sequence triggered by detection of KEK compromise that generates a fresh KEK
      not derived from the compromised key, re-wraps every DEK owned by the affected role, discards old
      KEK copies, broadcasts revocation through the relay, and notifies affected users with the data-at-risk
      window.
    must-implement: &id137
    - System exposes detection triggers including physical-loss reports, anomalous access patterns, and
      explicit administrator reports
    - Re-keying generates a fresh KEK independent of any compromised key material
    - All DEKs owned by the affected role are re-wrapped with the new KEK
    - Old KEK and all node-level wrapped copies are discarded
    - Revocation is broadcast through the relay
    - Affected users receive notification stating the data-at-risk window from KEK creation to revocation
    verification: Compromise drill executes the documented procedure end-to-end and produces revocation
      broadcast, re-wrapped DEKs, discarded prior key material, and a user-visible notification within
      a measurable interval
  - ref: ch07-security-lens:LENS-S-05
    name: Historical data-at-risk window
    scope: foundational
    definition: A compromised KEK exposes every document that KEK ever protected from the moment of key
      creation to the moment of revocation, so the data-at-risk window is bounded by KEK age rather than
      by detection latency.
    must-implement:
    - Each KEK records its creation timestamp
    - Incident response computes data-at-risk window from KEK creation to revocation
    - User notification states the computed window explicitly
    verification: Incident drill produces a user notification containing a concrete data-at-risk window
      derived from KEK metadata
  - ref: ch07-security-lens:LENS-S-08
    name: Re-authentication interval
    scope: foundational
    definition: A configurable interval at which the application re-requests credentials from the OS keychain,
      narrowing the window in which an attacker with live-system access can extract decryption keys from
      running process memory.
    must-implement:
    - Application supports a configurable re-authentication interval
    - Default interval for high-security deployments is four hours
    - Interval expiry forces credential re-prompt before further plaintext access
    verification: Configuration test confirms that after the interval expires the application requires
      fresh credentials before any further decryption operation
  - ref: ch07-security-lens:LENS-S-09
    name: Supply chain signing custody and transparency
    scope: foundational
    definition: 'Release artifact integrity rests on three layered controls: documented custody for the
      release signing key, reproducible builds that allow independent verification of binary against source,
      and a publicly auditable transparency log such as Sigstore that records every signing event.'
    must-implement: &id138
    - Release signing key custody is documented, including storage and compromise procedure
    - Build process is reproducible such that an independent party can rebuild the published binary from
      published source
    - Signing events are recorded in a transparency log
    - Clients reject any release whose signing event is absent from the transparency log
    verification: Independent rebuild matches the published artifact byte-for-byte and the signature appears
      in the public transparency log
  - ref: ch07-security-lens:LENS-S-10
    name: Ciphertext-only relay
    scope: foundational
    definition: The relay is treated as untrusted transport that handles only end-to-end encrypted payloads,
      so a relay operator who reads everything on the wire obtains operation identifiers and timestamps
      but no plaintext content.
    must-implement: &id139
    - All payloads are encrypted at the originating node before entering the relay
    - Relay code paths have no access to any DEK or KEK
    - Relay validates and forwards ciphertext only
    verification: Inspection of relay process memory and storage finds no key material capable of decrypting
      any routed payload
  - ref: ch07-security-lens:LENS-S-11
    name: Relay traffic-analysis disclosure
    scope: foundational
    definition: A ciphertext-only relay still observes the communication graph, timing, and volume between
      nodes, and the architecture must disclose this metadata exposure rather than leave it for security
      teams to discover at deployment.
    must-implement: &id140
    - Documentation enumerates the metadata fields visible to the relay operator
    - Self-hosted relay deployment is supported as the mitigation for metadata-sensitive contexts
    verification: Relay documentation lists each observable metadata channel and identifies the deployment
