- chapter: ch02-local-first-serious-stack
  id: LF-05
  name: The long now
  source: ch02 §"The Seven Ideals"
  source-paper: null
  definition: User data outlives the vendor, the subscription, the company's strategic priorities, and
    the political conditions under which the service operates, by virtue of being stored in an open format
    on user-controlled hardware.
  must-implement:
  - Data is stored in an open, documented format readable by tools other than the originating application
  - Data lives on hardware the user physically controls
  - Continued access does not depend on vendor existence, subscription status, or jurisdictional service
    availability
  - Sync formats are open or interoperable, not proprietary lock-in
  verification: Confirm data file format has a public specification readable by at least one independent
    tool; confirm continued read/write access works after simulated vendor shutdown and after simulated
    jurisdictional service withdrawal.
  kleppmann-properties:
