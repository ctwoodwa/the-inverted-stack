  id: EPI-01
  name: Protocol-layer data minimization
  source: epilogue §"What the Stack Owes You"
  source-paper: v13 §20
  definition: Data minimization is a send-tier protocol enforcement that prevents bytes from leaving the
    originating node toward an unauthorized peer, not a UI filter or server-side policy applied after
    data arrives.
  must-implement:
