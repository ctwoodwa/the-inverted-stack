- chapter: ch02-local-first-serious-stack
  id: THESIS-02
  name: Full node versus smart cache
  source: 'ch02 §"The Missing Step: Full Node, Not Smart Cache"'
  source-paper: v13 §2.4
  definition: A full node runs presentation, application logic, sync daemon, storage, and security primitives
    locally with the cloud serving as another peer for relay and backup, whereas a smart cache holds a
    recent copy of server-authoritative state and defers to the server for write authority and business
    logic.
  must-implement:
  - Local node holds authoritative state for data the user is allowed to act on
  - Business logic and automations execute locally, not on a server
  - Cloud components serve relay and backup roles, never source-of-truth roles
  - All five layers (UI, business logic, sync, storage, security) run on the user's device
  verification: Disconnect from any vendor-operated infrastructure; confirm new records can be created,
    business automations fire, and concurrent edits converge against local state alone.
