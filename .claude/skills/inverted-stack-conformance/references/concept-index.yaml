- chapter: ch02-local-first-serious-stack
  id: LF-07
  name: You retain ultimate ownership and control
  source: ch02 §"The Seven Ideals"
  source-paper: null
  definition: The user structurally — not contractually — decides where data lives, who can access it,
    and when to delete it, because the bits live on hardware the user controls in a format the user can
    read under encryption the user can manage.
  must-implement:
  - Data resides on hardware physically controlled by the user
  - Data format is readable by the user without vendor cooperation
  - Encryption keys are managed by the user, not held in escrow by the vendor
  - Ownership is structural (architectural) rather than promised by contract
  verification: Confirm user can copy, back up, and read data files independently of the vendor application;
    confirm key material is held only on user-controlled hardware.
