  - Session uses the highest version in the intersection of both peers' supported lists
  - Incompatible schema epoch closes the session with SCHEMA_VERSION_INCOMPATIBLE; no partial or read-only
    mode
  - Application surfaces a schema-update notification when the daemon closes a session on version grounds
  verification: Connect two daemons with non-overlapping supported_versions; confirm SCHEMA_VERSION_INCOMPATIBLE
