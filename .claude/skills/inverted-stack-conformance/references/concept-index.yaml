  source: ch14 §"Five-Step Handshake"
  source-paper: v13 §6
  definition: HELLO carries node ID, current schema epoch, public key, signed timestamp, and supported
    protocol versions; the session proceeds on the highest mutually supported version, and incompatible
    epochs result in SCHEMA_VERSION_INCOMPATIBLE and session close.
