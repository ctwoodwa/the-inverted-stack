concepts:
- chapter: preface
  id: PREF-01
  name: The architectural thesis — local node as primary, vendor as optional
  source: preface §"(opening)"
  source-paper: v13 preface
  definition: 'The book''s central thesis is the inversion of the SaaS dependency relationship: the local
    node is the primary data plane and the vendor relay is an optional accelerator, so the application
    survives vendor withdrawal.'
  must-implement:
  - Application reads and writes hit local storage as the primary data plane
  - No application function depends on cloud reachability for core operation
  - Vendor relay services are optional accelerators, not required dependencies
  - Application continues to function when the vendor service is unreachable, withdrawn, or sanctioned
  verification: Disconnect the application from all vendor services (network block of vendor domains);
    application performs all core read, write, and local collaboration operations identically to the connected
    state.
  kleppmann-properties:
  - P3
  - P5
  - P7
  scope: foundational
  failure-modes:
  - vendor-outage
  - vendor-acquisition
  - data-residency-objection
  tags:
  - thesis
  - architecture
  - philosophy
  - inversion
  notes: This is the book's defining concept; every later concept either implements it or stress-tests
    it.
- chapter: preface
  id: PREF-02
  name: SaaS tenancy as a withdrawable dependency
  source: preface §"(opening)"
  source-paper: v13 preface
  definition: SaaS tenancy is an external dependency that can be withdrawn unilaterally by the vendor,
    evidenced by the 2022 Adobe/Autodesk/Microsoft/Figma suspensions across Russia and the CIS that locked
    organizations out of their own data on infrastructure they had paid for.
  must-implement: []
  verification: null
  kleppmann-properties:
  - P5
  - P7
  scope: foundational
  failure-modes:
  - vendor-outage
  - vendor-acquisition
  - data-residency-objection
  tags:
  - thesis
  - motivation
  - framing
  - vendor-risk
  notes: Canonical real-world evidence cited throughout the book for the vendor-withdrawal failure mode.
- chapter: preface
  id: PREF-03
  name: Offline as daily operating condition, not edge case
  source: preface §"(opening)"
  source-paper: v13 preface
  definition: Intermittent or absent connectivity is the baseline operating condition for enterprise users
    across Sub-Saharan Africa, rural India, tier-3 Latin American cities, and much of Southeast Asia,
    so offline-first is a primary requirement rather than a degraded mode.
  must-implement:
  - Application has no degraded mode when offline; offline behavior matches online behavior for core operations
  - Application is usable on intermittent connectivity without user-visible spinners on local actions
  verification: Run the application on a connection that drops for hours at a time; user can complete
    every core workflow during the disconnected windows with no behavioral difference from connected operation.
  kleppmann-properties:
  - P1
  - P3
  scope: foundational
  failure-modes:
  - vendor-outage
  tags:
  - motivation
  - offline
  - global-south
  - framing
- chapter: preface
  id: PREF-04
  name: Three-audience scope (architects, enterprise evaluators, founders/contributors)
  source: preface §"Who This Book Is For"
  source-paper: null
  definition: The book is scoped for three audiences — software architects and senior engineers (Parts
    III/IV technical specification), enterprise IT and decision-makers (Chapters 5, 7, 15, 19 governance
    and compliance), and open-source contributors, technical founders, and product teams (Chapters 8,
    10, 16 commercial viability) — and a reference implementation must serve all three audience needs
    simultaneously.
  must-implement: []
  verification: null
  kleppmann-properties: []
  scope: inverted-stack-specific
  failure-modes: []
  tags:
  - audience
  - scope
  - book-meta
  notes: Book-meta concept; informs which audience constraints downstream chapters address.
- chapter: preface
  id: PREF-05
  name: Council adversarial-review framing (two rounds, five lenses)
  source: preface §"Why I Wrote This"
  source-paper: v13 preface
  definition: The architecture in this book has been stress-tested through two rounds of adversarial review
    by five domain experts (enterprise IT, distributed systems research, security, product management,
    local-first practitioner), with Round 1 producing two BLOCK verdicts that forced a partial rewrite
    and Round 2 clearing all five lenses under fifteen documented conditions named in the epilogue.
  must-implement:
  - Reference implementation documents the fifteen conditions under which Round 2 cleared the architecture
  - Each council lens has at least one corresponding test or design artifact demonstrating the objection
    has been answered
  verification: Repository contains a council-conditions document enumerating the fifteen Round 2 conditions,
    each cross-referenced to the chapter, code, or test that satisfies it.
  kleppmann-properties: []
  scope: inverted-stack-specific
  failure-modes: []
  tags:
  - framing
  - council
  - adversarial-review
  - methodology
  notes: Structures Part II of the book and the conformance contract for any reference implementation.
- chapter: preface
  id: PREF-06
  name: Sunfish reference-implementation policy (packages not class APIs)
  source: preface §"A Note on the Reference Implementation"
  source-paper: v5 §1
  definition: The book references the Sunfish reference implementation by package name (e.g., Sunfish.Kernel.Sync,
    Sunfish.Foundation.LocalFirst) rather than by class, method, or constructor signature, because package
    contracts are stable while pre-1.0 method signatures are not.
  must-implement:
  - Documentation references Sunfish (or any reference implementation) by package or namespace, not by
    class API
  - Package boundaries are stable across pre-1.0 releases even when class internals change
  verification: Search the manuscript for class-name or method-signature references to Sunfish packages;
    references must be at package or namespace granularity only.
  kleppmann-properties: []
  scope: inverted-stack-specific
  failure-modes: []
  tags:
  - sunfish
  - reference-implementation
  - documentation-policy
- chapter: preface
  id: PREF-07
  name: Engine-agnostic CRDT architecture via ICrdtEngine
  source: preface §"A Note on the Reference Implementation"
  source-paper: v5 §1
  definition: The CRDT engine is pluggable through a single ICrdtEngine adapter, with YDotNet as the current
    implementation and Loro as the aspirational target, so the engine choice is reversible by design.
  must-implement:
  - A single adapter interface (e.g., ICrdtEngine) abstracts the CRDT engine from the rest of the system
  - At least one engine implementation is wired through the adapter; swapping engines requires no changes
    outside the adapter implementation
  - Documentation names both the current engine and at least one alternate target to demonstrate engine-agnosticism
    is real, not aspirational
  verification: Replace the YDotNet adapter implementation with a stub or alternate engine; the rest of
    the system compiles and core CRDT operations route through the adapter without source changes outside
    the adapter package.
  kleppmann-properties:
  - P5
  - P7
  scope: inverted-stack-specific
  failure-modes:
  - vendor-acquisition
  tags:
  - crdt
  - architecture
  - engine-agnostic
  - sunfish
- chapter: preface
  id: PREF-08
  name: AI-collaboration disclosure (production transparency)
  source: preface §"A Note on Production"
  source-paper: null
  definition: The book discloses that Claude and Claude Code were collaborators in research, drafting,
    technical review, editing, the Kleppmann Council reviews, the literary-board review cycle, and the
    audiobook production pipeline, with the author retaining full responsibility for architectural arguments,
    conclusions, and remaining errors.
  must-implement: []
  verification: null
  kleppmann-properties: []
  scope: inverted-stack-specific
  failure-modes: []
  tags:
  - disclosure
  - ai-collaboration
  - methodology
  - book-meta
  notes: Production-transparency concept; not architectural but cited as a framing precedent for the Council
    disclosure in Part II.
- chapter: ch01-when-saas-fights-reality
  id: THESIS-01
  name: The SaaS bundle as conjoined value-and-cost
  source: ch01 §"The Bundle Nobody Agreed To"
  source-paper: v13 §3
  definition: SaaS packages three desirable properties (real-time collaboration, multi-device access,
    zero maintenance) inseparably with three undesirable conditions (data on vendor infrastructure, vendor-discretion
    pricing, vendor-contingent service continuity), accepted as a single take-it-or-leave-it deal because
    the technology of the time made the conditions appear structurally required to deliver the properties.
  must-implement: []
  verification: null
  kleppmann-properties:
  - P5
  - P7
  scope: foundational
  failure-modes:
  - vendor-outage
  - vendor-acquisition
  - data-residency-objection
  tags:
  - philosophy
  - thesis
  - saas-critique
  notes: The bundle frame is the organizing thesis Ch01 establishes; the rest of the book argues the bundle
    is now separable.
- chapter: ch01-when-saas-fights-reality
  id: THESIS-02
  name: Vendor outage as deadline-coincident failure
  source: ch01 §"The Outage That Takes Your Work With It"
  source-paper: v13 §3
  definition: A failure mode in which the SaaS provider's infrastructure becomes unavailable (full outage
    or undisclosed degraded performance) and renders user data inaccessible at the moment of greatest
    operational need, with cascading exposure when many vendors share the same underlying cloud region.
  must-implement:
  - Application reads and writes complete locally without dependency on vendor reachability
  - Application surfaces no functional difference between connected and disconnected operation for core
    workflows
  - Application does not silently queue submissions whose persistence cannot be confirmed
  verification: Disconnect network from the device; application performs all core read, write, search,
    and submission operations identically to the connected case.
  kleppmann-properties:
  - P1
  - P3
  scope: foundational
  failure-modes:
  - vendor-outage
  tags:
  - availability
  - failure-mode
  - dependency-chain
- chapter: ch01-when-saas-fights-reality
  id: THESIS-03
  name: Vendor disappearance as routine product end-state
  source: ch01 §"The Vendor That Disappears"
  source-paper: v13 §3
  definition: A failure mode in which the SaaS provider is acquired, sunset, pivoted, or runs out of runway,
    terminating service on a vendor-controlled timeline and leaving users with whatever export the vendor
    chooses to provide in whatever format the vendor chooses to emit.
  must-implement:
  - User data is stored in a format the user can read without the vendor's tools
  - Application continues to function on user-controlled hardware after vendor termination
  - Schema, attachments, comment threads, and relationship structure remain coherent without vendor-side
    reconstruction
  verification: Remove all vendor-side services; application launches, reads historical data, and continues
    normal operation against the local store.
  kleppmann-properties:
  - P5
  - P7
  scope: foundational
  failure-modes:
  - vendor-acquisition
  tags:
  - longevity
  - vendor-risk
  - failure-mode
- chapter: ch01-when-saas-fights-reality
  id: THESIS-04
  name: Capability degradation under offline conditions
  source: ch01 §"The Connectivity That Wasn't There"
  source-paper: v13 §3
  definition: A failure mode in which a SaaS application reduces to a read-only cache, queued submissions
    of uncertain success, or total inoperability when network connectivity is intermittent, weak, restricted,
    or absent — disproportionately affecting field, rural, clinical, industrial, air-gapped, and majority-world
    users whose baseline operating environment is non-continuous connectivity.
  must-implement:
  - All core operations including create, update, search, and report execute against local storage with
    no functional difference from the connected case
  - Submission persistence is locally durable and acknowledged at write time
  - No feature is gated on persistent connectivity
  verification: Place device in airplane mode for the duration of a complete representative workflow;
    confirm every action completes locally and converges on later reconnect with no user intervention.
  kleppmann-properties:
  - P1
  - P3
  scope: foundational
  failure-modes:
  - vendor-outage
  tags:
  - offline-first
  - connectivity
  - accessibility
  - global-baseline
- chapter: ch01-when-saas-fights-reality
  id: THESIS-05
  name: Data inaccessibility despite nominal ownership
  source: ch01 §"The Data You Can't Get Back"
  source-paper: v13 §3
  definition: A failure mode in which user data is contractually owned by the user but operationally inaccessible
    due to export rate limits, proprietary formats that strip semantic structure, feature-gated export
    behind paid tiers, or short post-cancellation retrieval windows.
  must-implement:
  - User data is stored locally in a documented, schema-described format
  - Bulk export of all user data completes in bounded time without rate limiting
  - Export preserves attachments with metadata, comment threading, and custom-field semantics
  - No retrieval depends on an active subscription or vendor billing state
  verification: Run a documented export procedure on a representative dataset; confirm the export round-trips
    into a third-party tool with attachments, threading, and field semantics intact.
  kleppmann-properties:
  - P5
  - P7
  scope: foundational
  failure-modes:
  - vendor-acquisition
  - data-residency-objection
  tags:
  - portability
  - custody
  - format-lock-in
  - failure-mode
- chapter: ch01-when-saas-fights-reality
  id: THESIS-06
  name: Post-adoption pricing capture
  source: ch01 §"The Price That Changes After You've Committed"
  source-paper: v13 §3
  definition: A failure mode in which switching costs accumulated through training, integrations, historical
    data, and learned workflows allow vendors to raise prices, move features behind higher tiers, or change
    contractual terms after the customer has lost realistic exit leverage, with per-seat pricing and integration
    ecosystems compounding the lock-in as teams grow.
  must-implement:
  - Architecture removes the structural switching cost by keeping data, schema, and workflow on user infrastructure
  - No core capability is gated on a vendor subscription tier
  - Integration with other tools occurs through user-controlled interfaces, not vendor-locked connectors
  verification: Cancel any optional vendor relay or sync service; confirm the application retains all
    core functionality on the local node alone.
  kleppmann-properties:
  - P5
  - P7
  scope: foundational
  failure-modes:
  - vendor-acquisition
  tags:
  - pricing
  - lock-in
  - switching-cost
  - failure-mode
- chapter: ch01-when-saas-fights-reality
  id: THESIS-07
  name: Third-party veto over vendor-custodied data
  source: ch01 §"The Third-Party Veto"
  source-paper: v13 §3
  definition: A failure mode in which an external authority — sanctions regime, data residency regulator,
    court order, or national security designation — compels the vendor to suspend service or compels the
    customer to cease use, ending the relationship regardless of either party's preferences because data
    custody at the vendor concentrates the exposure surface there.
  must-implement:
  - Authoritative state for user data resides on hardware the user controls
  - Application functions independently of any vendor-side service for core workflows
  - Any optional relay holds ciphertext only and is replaceable by a user-controlled relay without data
    migration
  verification: Specification documents the data custody boundary; deployment guide demonstrates substituting
    a user-controlled relay for a vendor relay with no application-level changes.
  kleppmann-properties:
  - P5
  - P6
  - P7
  scope: foundational
  failure-modes:
  - data-residency-objection
  - vendor-acquisition
  tags:
  - sovereignty
  - regulatory
  - sanctions
  - failure-mode
  notes: Distinct from the first five failure modes in originating outside the vendor-customer relationship;
    addressed in Appendix F regulatory coverage.
- chapter: ch01-when-saas-fights-reality
  id: THESIS-08
  name: Architectural reversal of data custody
  source: ch01 §"The Dependency That Looks Inevitable"
  source-paper: v13 Executive Summary
  definition: The thesis-level architectural inversion that moves authoritative state from vendor infrastructure
    to user infrastructure, demoting the vendor's role from primary data plane to optional relay peer,
    made feasible by three independently matured technology shifts (production CRDTs, edge gossip protocols,
    the local service pattern).
  must-implement:
  - Authoritative copy of user data lives on the user's device or user-controlled infrastructure
  - Vendor or shared services participate, when present, as peers or relays rather than as authoritative
    state holders
  - The architecture composes production-proven CRDT, gossip, and local-service-pattern components rather
    than introducing novel primitives
  verification: Architecture documents identify the device-resident authoritative store; sync protocol
    documents identify any cloud component as relay or peer rather than primary; component inventory cites
    mature open implementations for each substrate.
  kleppmann-properties:
  - P3
  - P5
  - P7
  scope: foundational
  failure-modes:
  - vendor-outage
  - vendor-acquisition
  - data-residency-objection
  tags:
  - thesis
  - inversion
  - architecture
- chapter: ch01-when-saas-fights-reality
  id: THESIS-09
  name: No-degraded-mode commitment
  source: ch01 §"The Connectivity That Wasn't There"
  source-paper: v13 §3
  definition: An architectural commitment that the application exposes no reduced-capability operating
    mode under offline, partitioned, or vendor-unreachable conditions — every core capability behaves
    identically whether the network is present or absent.
  must-implement:
  - No feature presents an offline-only read-only state
  - No submission path queues with uncertain persistence semantics
  - Search, reporting, create, update, and delete operate against local storage with the same latency
    and correctness profile online and offline
  - The application surfaces no banner, modal, or capability gate that distinguishes connected from disconnected
    state for core workflows
  verification: Behavioral test runs the full core workflow with the network disabled and asserts byte-identical
    outcomes (modulo timestamps) to the connected baseline; UI inspection confirms no degraded-mode indicator
    appears.
  kleppmann-properties:
  - P1
  - P3
  scope: foundational
  failure-modes:
  - vendor-outage
  tags:
  - offline-first
  - ux
  - commitment
  - accessibility
  notes: Specifically named for accessibility-technology users for whom degraded mode is functionally
    equivalent to inaccessibility.
- chapter: ch01-when-saas-fights-reality
  id: THESIS-10
  name: Asymmetric exposure of small-and-medium organizations
  source: ch01 §"Who Pays the Most"
  source-paper: v13 §14.1
  definition: The observation that the SaaS bundle's undesirable conditions fall hardest on small and
    medium professional service firms because they sign standard terms without negotiated SLA, escrow,
    or portability clauses, while bearing direct professional, regulatory, and client-relationship consequences
    from any of the six failure modes.
  must-implement:
  - The architecture provides default protections (data custody, portability, durability) without requiring
    per-customer contractual negotiation
  - Compliance posture for regulated professions (legal, medical, construction, finance) is met by default
    deployment, not by enterprise add-ons
  verification: Default deployment of the architecture passes a representative SMB compliance checklist
    (HIPAA, professional responsibility, jurisdictional residency) without enterprise-tier features enabled.
  kleppmann-properties:
  - P6
  - P7
  scope: foundational
  failure-modes:
  - data-residency-objection
  tags:
  - market
  - sovereignty
  - smb
  - compliance
- chapter: ch01-when-saas-fights-reality
  id: THESIS-11
  name: Paper-fallback as evidence of mediation rather than value
  source: ch01 §"The Work That Doesn't Stop"
  source-paper: v13 §20.4
  definition: The observation that organizations under SaaS outage continue operating via analog fallbacks
    (paper charts, whiteboards, fax, manual reconciliation) demonstrates that the SaaS layer was largely
    mediating work that continued to happen, while the digital affordances (search, cross-history pattern
    detection, analytic queries) were the genuine value lost — value that a local-first node preserves
    through the outage.
  must-implement:
  - Local node retains full digital affordances (search, reporting, cross-record analytics) during vendor
    or network unavailability
  - Reconciliation overhead after a connectivity gap reduces from days of post-incident transcription
    to automatic convergence on reconnect
  - Paper backup remains an available last resort but ceases to be the only operating mode
  verification: Field test simulates vendor unavailability for a representative workday; node retains
    search, reporting, and analytic queries against local data; on reconnect, no manual transcription
    or back-fill is required.
  kleppmann-properties:
  - P1
  - P3
  - P4
  scope: foundational
  failure-modes:
  - vendor-outage
  tags:
  - resilience
  - value-attribution
  - continuity
- chapter: ch02-local-first-serious-stack
  id: LF-01
  name: No spinners, no waiting
  source: ch02 §"The Seven Ideals"
  source-paper: null
  definition: The software responds instantly because it reads from local state rather than from a network
    request, with no perceptible round-trip latency for any user-visible operation.
  must-implement:
  - Application reads resolve from local storage without a network call
  - User-visible operations show no loading spinners during normal use
  - Latency does not depend on network round-trip time for any core operation
  verification: Disconnect network; instrument all user-visible reads and writes; confirm zero network
    calls and sub-frame latency for every core operation.
  kleppmann-properties:
