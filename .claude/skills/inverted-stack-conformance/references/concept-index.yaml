- chapter: ch02-local-first-serious-stack
  id: LF-06
  name: Security and privacy by default
  source: ch02 §"The Seven Ideals"
  source-paper: null
  definition: Data is encrypted end-to-end at rest and in transit by default, with key control held by
    the user rather than the vendor, raising the cost of compromise from one breach exposing all users
    to one breach exposing one user.
  must-implement:
  - Data at rest is encrypted under keys the user controls
  - Data in transit is end-to-end encrypted between authorized peers
  - Vendor or relay infrastructure cannot decrypt user data
  - Compromise of one node yields one user's data, not all users' data
  verification: Confirm relay or vendor infrastructure handles ciphertext only; confirm key material does
    not leave user-controlled hardware; threat-model worksheet demonstrates one-node-compromise containment.
  kleppmann-properties:
