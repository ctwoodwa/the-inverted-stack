  id: LENS-D-04
  name: Three-tier GC policy by data class
  source: ch06 §"What Changed Between Rounds"
  source-paper: v13 §6
  definition: Operation-history garbage collection is differentiated by data class — aggressive GC for
    ephemeral data, a 90-day retention window for business records, and no GC at all for compliance records.
  must-implement:
  - Each record type is assigned to one of three GC tiers (ephemeral, business, compliance)
  - Ephemeral tier uses aggressive library-level GC and assumes no durability requirement
  - Business tier guarantees at least 90 days of operation history before compaction
  - Compliance tier retains full operation history indefinitely
  - When a record could belong to multiple tiers, the higher tier is assigned
  verification: Schema definitions tag every record type with a GC tier; integration test confirms business-tier
    records are not compacted before the 90-day horizon and compliance-tier records are never compacted.
