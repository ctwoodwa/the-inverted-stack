  id: LENS-D-05
  name: Stale peer recovery via full-state snapshot transfer
  source: ch06 §"What Changed Between Rounds"
  source-paper: v13 §6
  definition: When a reconnecting peer's vector clock predates the current GC horizon, the sync daemon
    detects the incompatibility at CAPABILITY_NEG, abandons incremental sync, and initiates a full-state
    snapshot transfer that becomes the peer's new gossip baseline.
  must-implement:
  - Sync daemon CAPABILITY_NEG phase compares the reconnecting peer's vector clock against the local GC
    horizon
  - When the vector clock predates the horizon, incremental sync is abandoned and snapshot transfer begins
  - Receiving peer adopts the snapshot as a new baseline and resumes normal gossip anti-entropy from that
    point
  - Behavior is deterministic and surfaces an explicit code path rather than a silent merge failure
  verification: Sync daemon protocol specifies the vector-clock-vs-horizon check at CAPABILITY_NEG; integration
    test simulates a peer offline past the GC horizon and confirms snapshot transfer rather than silent
    failure.
