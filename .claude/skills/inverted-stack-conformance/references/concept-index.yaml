  id: DEC-06
  name: The Practical Shortcut (three-question prefilter)
  source: ch04 §"The Practical Shortcut"
  source-paper: v13 §20.8
  definition: A three-question prefilter — primary-record ownership, sustained-offline requirement, vendor-outlive
    requirement — that determines whether a full five-filter evaluation is worth the time for a project
    in early discovery.
  must-implement:
  - Discovery-stage projects answer the three shortcut questions before committing to a full filter evaluation
  - All-yes answers route to Zone A (Anchor) for greenfield or Zone C (Bridge) for migration
  - A "no" answer maps to a specific filter for full evaluation (Q1 → Filter 2, Q2 → Zone C tolerance,
    Q3 → Filter 4)
  - The shortcut is not a substitute for the full five filters in a production architectural decision
  verification: Discovery-stage architecture note records the three shortcut answers and either cites
    the resulting Zone or names the filter requiring full evaluation.
  kleppmann-properties:
  - P3
  - P5
  - P7
  scope: foundational
  failure-modes:
  - vendor-acquisition
  - vendor-outage
  tags:
  - decision-framework
  - shortcut
  - discovery
- chapter: ch04-choosing-your-architecture
  id: DEC-07
  name: Vendor-outlive requirement
  source: ch04 §"The Practical Shortcut"
  source-paper: v13 §20.8
  definition: The requirement that the product keep working regardless of whether the vendor survives,
    is acquired, changes pricing, or is directed to stop serving a given jurisdiction — making vendor-independent
    authoritative data custody a structural, not contractual, property.
  must-implement:
  - Authoritative data lives on infrastructure under the user's or customer's control
  - The application functions without vendor server availability
  - Data export is not gated by vendor permission or active subscription
  - Recovery from vendor disappearance does not require vendor cooperation
  verification: Behavioral test simulates vendor service permanently unavailable; the application continues
    to function on local data and a documented procedure exists for replacing vendor-provided relay infrastructure
    without data migration.
  kleppmann-properties:
  - P5
  - P7
  scope: foundational
  failure-modes:
  - vendor-outage
  - vendor-acquisition
  tags:
  - longevity
  - ownership
  - vendor-independence
  - philosophy
- chapter: ch04-choosing-your-architecture
  id: DEC-08
  name: Degraded-vs-absent network distinction
  source: 'ch04 §"Filter 3: Connectivity and Operational Environment"'
  source-paper: v13 §20.5
  definition: An operational distinction that treats an application loading stale data and queueing writes
    as degraded (still working) and an application showing a spinner and refusing input as broken — establishing
    absence-tolerance, not graceful-degradation, as the local-first acceptance criterion.
  must-implement:
  - The application accepts user input with no network present
  - Writes are persisted locally and queued for sync without blocking the UI
  - Reads return locally available data without spinners on network absence
  - Failure to reach the network never produces a refused-input state
  verification: Behavioral test disables all network interfaces and exercises the application's primary
    write and read paths; no spinner appears on network absence and no input is refused.
  kleppmann-properties:
  - P1
  - P3
  scope: foundational
  failure-modes:
  - vendor-outage
  tags:
  - offline
  - ux
  - acceptance-criteria
- chapter: ch04-choosing-your-architecture
  id: DEC-09
  name: Four required local-first engineering skills
  source: 'ch04 §"Filter 5: Team Capability and Timeline"'
  source-paper: v13 §20.7
  definition: The four engineering skills that separate local-node development from standard web application
    development — CRDT debugging, distributed state management, multi-version schema migration, and key
    management.
  must-implement:
  - Team has practitioners who can reason about CRDT type semantics and merge order under uncertainty
  - Team manages authoritative local state under concurrent local edits, incoming sync deltas, and schema
    migrations with explicit design
  - Team applies the expand-contract pattern for schema migrations across a distribution of in-field versions
  - Team designs and implements key rotation, revocation, and recovery procedures before first production
    deployment
  verification: Capability matrix documents named owners for each of the four skills; key compromise recovery
    procedure exists in writing before the first production deployment date is set.
