- chapter: ch02-local-first-serious-stack
  id: LF-03
  name: The network is optional
  source: ch02 §"The Seven Ideals"
  source-paper: null
  definition: The full application works without any network connection indefinitely and syncs when a
    connection becomes available, with the local node holding an authoritative copy of all data it is
    allowed to act on.
  must-implement:
  - Every core operation works identically with the network disconnected
  - The local node holds an authoritative copy of data it can act on, not a stale cache
  - No operation queues waiting for a server before completing locally
  - Sync resumes automatically when connectivity returns
  verification: Disconnect network indefinitely; perform all core operations; confirm identical behavior
    to online mode and successful convergence after reconnection.
