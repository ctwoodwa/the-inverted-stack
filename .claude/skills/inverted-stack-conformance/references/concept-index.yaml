  id: SCH-02
  name: Expand-contract migration pattern
  source: ch13 §"Expand-Contract Migration"
  source-paper: v13 §7
  definition: A schema modification divided into an expand phase (additive, dual-write, both old and new
    fields present) and a contract phase (removal of old field) separated by a compatibility window.
  must-implement:
  - Every breaking schema modification decomposes into an expand phase followed by a contract phase
  - Expand phase remains active for at least one full major version release cycle
  - Contract phase is initiated only by explicit operational act, never by timer
  verification: Migration runbook in source control documents the expand-contract decomposition for each
    schema change; CI rejects schema changes lacking a registered expand and contract step.
