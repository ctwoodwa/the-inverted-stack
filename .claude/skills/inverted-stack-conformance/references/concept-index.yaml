- chapter: ch12-crdt-engine-data-layer
  id: CRDT-29
  name: Layer 2 — append-only event log as source of truth
  source: ch12 §"The Five-Layer Storage Architecture"
  source-paper: v13 §9
  definition: Layer 2 is the append-only CRDT and event log — the source of truth — to which every CRDT
    operation, domain event, and ledger posting is durably written (fsync on POSIX, FlushFileBuffers on
